// Draft eligibility: a Juvenile-active fighter aged 14-17. Earliest eligibility is a
// fighter's 14th birth-year; 17 is the last age they can still be picked before aging
// out of Juvenile into the Amateur ranks undrafted. (Junior and Amateur were swapped
// from an earlier design pass — Junior now drafts straight out of Juvenile, and Amateur
// is the older 18+ money league that sits between Junior and Pro. An amateurLeagueId
// check is intentionally NOT required here anymore.)
//
// Also gated by the calendar now — Draft Day is a fixed date (May 15, from
// tierKeyDates), not "whenever the player clicks in." Age/rights eligibility can be
// true well before that; the button just stays disabled with an explanatory status
// until the actual day arrives.
function currentIslandYear(){
  return resolveTierSeason('juvenile', getCurrentDay()).cycleYear;
}
function isDraftEligible(f){
  const petitionedEarly = f.juvenilePetitionStatus === 'approved-pending-draft';
  const ageOk = petitionedEarly || (f.age >= 14 && f.age <= 17);
  const draftDayArrived = getCurrentDay() >= tierKeyDates(currentIslandYear()).juniorDraftDay;
  return !!f.juvenileHomeProvinceId && ageOk && !f.juniorTeamId && draftDayArrived;
}

// Runs the island-wide NPC bulk draft exactly once per cycle, the moment Draft Day
// arrives — guarded so revisiting the screen later in the cycle doesn't re-draft
// everyone. Safe to call liberally (e.g. every time the select screen renders); it
// no-ops instantly once already resolved for the current year.
function ensureNpcDraftRunForYear(){
  const cycleYear = currentIslandYear();
  const s = loadJrState();
  if(s.npcDraftResolvedYear === cycleYear) return;
  if(getCurrentDay() < tierKeyDates(cycleYear).juniorDraftDay) return;
  runJuniorDraftDayBulk(cycleYear);
  const s2 = loadJrState();
  s2.npcDraftResolvedYear = cycleYear;
  saveJrState(s2);
}

function getFighterScouting(f){
  // Reuse the Fight Pit's league scouting rating if available on the fighter's record;
  // fall back to a neutral 3 if this fighter was created/tracked before that field existed.
  return f.amateurLeagueScouting || 3;
}

// Runs the full draft across all 3 leagues for ONE fighter (the player's), plus a
// flavor-only procedural board so Draft Day feels like a real event. Returns
// { results: [{leagueId, round, teamIndex}], board: {leagueId: [[pick,pick,...] per round]} }
function runDraftForFighter(f){
  const ovr = calcOVR(f.stats);
  const scouting = getFighterScouting(f);
  const results = [];
  const board = {};

  JR_LEAGUES.forEach(league=>{
    const thresholds = TIER_ROUND_THRESHOLDS[league.tier];
    board[league.id] = [];
    let drafted = false;
    let draftedRound = null, draftedTeam = null;

    for(let r=0; r<3; r++){
      const roundPicks = [];
      const chance = draftChance(ovr, thresholds[r], scouting);
      // Which pick number (team) in this round does the player land at, if drafted this round?
      const playerPickSlot = !drafted && Math.random() < chance ? rand(0, league.teams.length-1) : -1;

      for(let t=0; t<league.teams.length; t++){
        if(t === playerPickSlot){
          roundPicks.push({ team: jrTeamName(league.id, t), name: f.name, isPlayer:true });
          drafted = true; draftedRound = r+1; draftedTeam = t;
        } else {
          roundPicks.push({ team: jrTeamName(league.id, t), name: prospectName(league), isPlayer:false });
        }
      }
      board[league.id].push(roundPicks);
    }
    if(drafted){
      results.push({ leagueId: league.id, round: draftedRound, teamIndex: draftedTeam });
    }
  });

  return { results, board };
}

function rightsStillActive(f){
  if(!f.juniorRightsHolders || !f.juniorRightsHolders.length) return false;
  const seasonsNow = (f.amateurSeasonHistory || []).length;
  return seasonsNow <= (f.juniorRightsExpiresAfterSeasons || 0);
}

function findFighterAnywhere(id){
  const roster = getRoster();
  let f = roster.find(r=>r.id===id);
  if(f) return { f, isField:false };
  // Search every team roster's NPC slots too, since teammates aren't in the main roster.
  const s = loadJrState();
  for(const key of Object.keys(s.rosters||{})){
    const found = s.rosters[key].find(sl=> !sl.isPlayer && sl.fighter && sl.fighter.id===id);
    if(found) return { f: found.fighter, isField:true };
  }
  return { f:null, isField:false };
}

const PROJECTED_PATH_TEMPLATES = {
  eliteWithRoom: [
    "Pro {weightClass} title threat in {discipline} — if the frame fills out on schedule, this is a future island champion.",
    "The kind of {discipline} prospect a Pro scout circles twice. {weightClass} contender, and soon.",
    "Generational buzz. Realistic ceiling is a Pro {weightClass} champion in {discipline} once the growth curve catches up.",
  ],
  eliteMatured: [
    "Pro-caliber right now. {weightClass} {discipline} specialist, ready for the top level the day the rules allow it.",
    "Already fighting like a Pro. {weightClass} division, {discipline} — the ceiling and the floor are basically the same.",
  ],
  solidPro: [
    "Rotational Pro roster piece. Won't headline, but a {weightClass} {discipline} team wants this on the depth chart.",
    "Realistic ceiling: a dependable Pro {weightClass} fighter — not a champion, but a real paycheck for a real career.",
    "Pro debut likely once the frame catches up. The {discipline} instincts translate at the next level.",
  ],
  topAmateur: [
    "Ceiling is a strong Amateur run — {weightClass} {discipline} money-maker, but the Pro offers probably don't come.",
    "Amateur {weightClass} contender projection — the {discipline} tools are there, the ceiling just isn't Pro-high.",
  ],
  averageAmateur: [
    "Likely average Amateur-level ceiling. {weightClass} journeyman, steady paychecks, no title runs.",
    "Middle-of-the-pack Amateur projection. {weightClass} division, no real upside beyond that at this pace.",
  ],
  juniorDepth: [
    "Junior roster depth piece — {weightClass} {discipline}, more roster-filler than prospect at this rate.",
    "The tools are raw. Realistic ceiling is hanging onto a Junior roster spot, not much further than that.",
  ],
  washout: [
    "Hard to project much of a path from here without a real jump in development.",
    "Realistic read: may not hold a Junior roster spot much longer without visible growth.",
  ],
};
function generateProjectedPath(f){
  const wc = f.weightClass || weightClassOf(f.weightLb||140);
  const discName = DISCIPLINE_NAMES[f.primaryDisc] || 'fighting';
  const growth = growthOutlook(f);
  let bucket;
  if(f.talentTier === 'generational') bucket = growth.pctOfCeiling >= 65 ? 'eliteMatured' : 'eliteWithRoom';
  else if(f.talentTier === 'prodigy') bucket = growth.pctOfCeiling >= 80 ? 'solidPro' : 'eliteWithRoom';
  else if(growth.pctOfCeiling >= 85) bucket = 'topAmateur';
  else if(growth.pctOfCeiling >= 60) bucket = 'averageAmateur';
  else if(growth.pctOfCeiling >= 35) bucket = 'juniorDepth';
  else bucket = 'washout';
  const line = pick(PROJECTED_PATH_TEMPLATES[bucket]);
  return fillTpl(line, { weightClass: wc, discipline: discName });
}

  const rows = roster.map(f=>{

    const draftDayArrived = getCurrentDay() >= tierKeyDates(currentIslandYear()).juniorDraftDay;

      <div class="offer-card" data-accept-offer="${i}" style="--pc-color:${prov?prov.color:'#C9A23C'}">
        <div class="offer-head">
          <div class="offer-team">${teamName}</div>
          <div class="offer-tier-tag">Tier ${league.tier}</div>
        </div>
        <div class="offer-meta">${league.name}${o.round?' · Round '+o.round+' pick':' · Exclusive rights offer'}</div>
        <p class="offer-blurb">${league.tier===1
          ? 'The biggest stage on the island. Toughest competition, brightest lights.'
          : league.tier===2
          ? 'Solid mid-tier league — real development, real competition, less spotlight.'
          : 'Smaller stage, lighter competition — a real chance to be a featured piece early.'}</p>
      </div>
    `;
  }).join('');

  return `
    <div class="section-label">${f.name} Got Drafted!</div>
    <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); margin-bottom:18px;">
      ${state.pendingOffers.length} offer${state.pendingOffers.length===1?'':'s'} on the table. Sign with one now, or decline all and stay Amateur — but declining means you can ONLY sign with these same team(s) for one more Amateur season. Wait past that window with no signing and you're back in the open pool for a fresh draft.
    </p>
    <div class="offer-grid">${cards}</div>
    <div class="btn-row"><button class="btn" id="decline-all-jr-offers">Decline All — Stay Amateur</button><span></span></div>
  `;
}

function renderSeasonHub(){

    ${state.simMode && state.lastSimResult ? `<p style="font-family:var(--mono); font-size:11px; color:${state.lastSimResult.won?'var(--good)':'var(--ink-red)'}; margin:8px 0 0;">Last game: ${state.lastSimResult.won?'WIN':'LOSS'} ${state.lastSimResult.score} vs ${state.lastSimResult.opponent}</p>` : ''}

        <span class="clickable-name" data-open-team="${f.juniorLeagueId}|${pairing.away}">${jrTeamName(f.juniorLeagueId, pairing.away)}</span> @ <span class="clickable-name" data-open-team="${f.juniorLeagueId}|${pairing.home}">${jrTeamName(f.juniorLeagueId, pairing.home)}</span> — every other team in the league plays their own game this same Saturday.
      </p>
    ` : `
      <div class="section-label" style="margin-top:18px;">${seasonOver ? 'Season Complete' : 'Bye Week'}</div>
      <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); margin-bottom:18px;">

}

function renderGameDayPreview(){
  const gd = state.currentGameDay;
  const league = getJrLeague(gd.leagueId);
  const standings = ensureStandings(gd.leagueId);
  const homeName = jrTeamName(gd.leagueId, gd.homeIdx);
  const awayName = jrTeamName(gd.leagueId, gd.awayIdx);
  const homeRec = standings[gd.homeIdx], awayRec = standings[gd.awayIdx];
  const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
  const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);

  const tabsHtml = `
    <div class="offer-grid" style="grid-template-columns:1fr 1fr; display:grid; gap:8px; margin-bottom:16px;">
      <button class="fr-season-btn" data-gameday-tab="preview" style="${gd.tab==='preview'?'background:var(--ink-red); color:var(--bone); border-color:var(--ink-red);':''}">Preview</button>
      <button class="fr-season-btn" data-gameday-tab="analyst" style="${gd.tab==='analyst'?'background:var(--ink-red); color:var(--bone); border-color:var(--ink-red);':''}">Analyst Views</button>
    </div>
  `;

  function rosterList(slots, title){
    const rows = slots.map(sl=>{
      const fighter = resolveSlotFighter(sl);
      const ovr = fighter ? calcOVR(fighter.stats) : '—';
      return `<div class="pick-row ${sl.isPlayer?'you':''}"><span class="pick-team">${sl.weightClass}</span><span class="pick-fighter ${sl.isPlayer?'you':''} clickable-name" data-open-fighter="${fighter?fighter.id:''}">${sl.isPlayer?'YOU — ':''}${sl.name} (${ovr})</span></div>`;
    }).join('');
    return `<div class="round-label">${title}</div>${rows}`;
  }

  let tabBody;
  if(gd.tab === 'preview'){
    tabBody = `
      ${rosterList(awaySlots, awayName + ' (Visitor) — ' + awayRec.wins + '-' + awayRec.losses)}
      <div style="height:14px;"></div>
      ${rosterList(homeSlots, homeName + ' (Home) — ' + homeRec.wins + '-' + homeRec.losses)}
    `;
  } else {
    const homeAvg = Math.round(homeSlots.reduce((s,sl)=>{ const fx=resolveSlotFighter(sl); return s+(fx?calcOVR(fx.stats):0); },0)/homeSlots.length);
    const awayAvg = Math.round(awaySlots.reduce((s,sl)=>{ const fx=resolveSlotFighter(sl); return s+(fx?calcOVR(fx.stats):0); },0)/awaySlots.length);
    const favored = homeAvg >= awayAvg ? homeName : awayName;
    const gap = Math.abs(homeAvg-awayAvg);
    const takeStrength = gap >= 8 ? 'a clear favorite' : gap >= 3 ? 'a slight edge' : 'basically a coin flip';
    tabBody = `
      <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); line-height:1.6;">
        "${homeName} averages ${homeAvg} OVR across the lineup, ${awayName} comes in at ${awayAvg}. On paper ${favored} looks like ${takeStrength} tonight. Home advantage matters here too — ${homeName} gets to set their lineup last, after seeing what ${awayName} brings to the floor." — Iron Island Fight Desk
      </p>
    `;
  }

  return `
    <div class="roster-team-head">
      <div class="roster-team-name"><span class="clickable-name" data-open-team="${gd.leagueId}|${gd.awayIdx}">${awayName}</span> @ <span class="clickable-name" data-open-team="${gd.leagueId}|${gd.homeIdx}">${homeName}</span></div>
      <div class="roster-team-meta">${league.name} · Week ${gd.week+1}</div>
    </div>
    ${tabsHtml}
    ${tabBody}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="to-set-lineup">Set Lineup →</button></div>
  `;
}

function renderSetLineup(){
  const gd = state.currentGameDay;
  const f = getFighterById(state.fighterId);
  const mySlots = gd.isHome ? ensureTeamRoster(gd.leagueId, gd.homeIdx) : ensureTeamRoster(gd.leagueId, gd.awayIdx);
  const myTeamName = jrTeamName(gd.leagueId, gd.isHome ? gd.homeIdx : gd.awayIdx);
  const oppLineupKnown = gd.isHome ? gd.awayLineup : null; // player only ever sees opponent lineup when they're Home

  const revealHtml = gd.isHome ? `
    <div class="section-label">Visitor's Announced Lineup</div>
    ${WEIGHT_CLASSES.map(wc=>{
      const af = gd.awayLineup[wc];
      return af && af.stats ? `<div class="pick-row"><span class="pick-team">${wc}</span><span class="pick-fighter clickable-name" data-open-fighter="${af.id}">${af.name} (${calcOVR(af.stats)})</span></div>` : '';
    }).join('')}
    <p style="font-family:var(--mono); font-size:10.5px; color:var(--muted); margin:10px 0 18px;">You're Home — you get to counter-pick knowing this.</p>
  ` : `<p style="font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-bottom:18px;">You're the Visitor — your lineup locks in blind. Home sets theirs after seeing yours.</p>`;

  const pickerHtml = WEIGHT_CLASSES.map(wc=>{
    const options = mySlots.filter(sl=>sl.weightClass===wc);
    const chosen = gd.myLineup[wc];
    const cardsHtml = options.map(sl=>{
      const fighter = resolveSlotFighter(sl);
      if(!fighter || !fighter.stats) return ''; // defensive — skip any slot that still can't resolve a real fighter
      const ovr = calcOVR(fighter.stats);
      const isChosen = chosen && chosen.id === fighter.id;
      return `<button class="fr-season-btn" data-lineup-pick="${wc}|${sl.isPlayer?'player':fighter.id}" style="${isChosen?'background:var(--ink-red); color:var(--bone); border-color:var(--ink-red);':''}">${sl.isPlayer?'YOU — ':''}${sl.name} (${ovr})</button>`;
    }).join('');
    return `<div class="round-block"><div class="round-label">${wc}</div><div style="display:flex; gap:8px; flex-wrap:wrap;">${cardsHtml}</div></div>`;
  }).join('');

  const allPicked = WEIGHT_CLASSES.every(wc=> gd.myLineup[wc]);

  return `
    <div class="section-label">${myTeamName} — Set Your Lineup</div>
    ${revealHtml}
    ${pickerHtml}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="confirm-lineup" ${allPicked?'':'disabled'}>Confirm Lineup →</button></div>
  `;
}

function renderFightCard(){
  const gd = state.currentGameDay;
  const wc = gd.cardOrder[gd.cardIndex];
  const homeName = jrTeamName(gd.leagueId, gd.homeIdx);
  const awayName = jrTeamName(gd.leagueId, gd.awayIdx);
  const homeScore = gd.cardResults.filter(r=>r.homeWon).length;
  const awayScore = gd.cardResults.filter(r=>!r.homeWon).length;

  const scoreboardHtml = `
    <div class="roster-team-head">
      <div class="roster-team-name">${awayScore} — ${homeScore}</div>
      <div class="roster-team-meta"><span class="clickable-name" data-open-team="${gd.leagueId}|${gd.awayIdx}">${awayName}</span> @ <span class="clickable-name" data-open-team="${gd.leagueId}|${gd.homeIdx}">${homeName}</span> · ${wc} Class (${gd.cardIndex+1} of 5)</div>
    </div>
  `;

  if(gd.subPhase === 'quickresult'){
    const last = gd.cardResults[gd.cardResults.length-1];
    return `
      ${scoreboardHtml}
      <div class="pick-row" style="border-color:var(--brass-dim);">
        <span class="pick-team">${last.weightClass}</span>
        <span class="pick-fighter"><span class="clickable-name" data-open-fighter="${last.winnerId||''}">${last.winnerName}</span> def. <span class="clickable-name" data-open-fighter="${last.loserId||''}">${last.loserName}</span> (${last.method})</span>
      </div>
      <div class="btn-row"><span></span><button class="btn btn-primary" id="next-card-fight">${gd.cardIndex+1>=5?'See Final Score →':'Next Fight →'}</button></div>
    `;
  }

  if(gd.subPhase === 'preview'){
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    const ovrH = calcOVR(homeF.stats), ovrA = calcOVR(awayF.stats);
    const scaleMax = Math.max(ovrH, ovrA, 20) * 1.3;
    function statRow(label, valA, valH){
      const pctA = clamp(valA/scaleMax*100,0,100), pctH = clamp(valH/scaleMax*100,0,100);
      return `<div class="tape-stat-row"><div class="tape-stat-label">${label}</div><div class="tape-stat-bars">
        <div class="tape-side-l"><div class="tape-val">${valA}</div><div class="tape-bar-track"><div class="tape-bar-fill-l" style="width:${pctA}%"></div></div></div>
        <div class="tape-side-r"><div class="tape-bar-track"><div class="tape-bar-fill-r" style="width:${pctH}%"></div></div><div class="tape-val">${valH}</div></div>
      </div></div>`;
    }
    return `
      ${scoreboardHtml}
      <div class="tape-grid">
        <div class="tape-side"><div class="tape-avatar">${buildSilhouetteSM(awayF.appearance)}</div><div class="tape-name clickable-name" data-open-fighter="${awayF.id}">${awayF.name}</div><div class="tape-disc">${DISCIPLINE_NAMES[awayF.primaryDisc]}</div><div class="tape-ovr">${ovrA}</div></div>
        <div class="tape-side"><div class="tape-avatar">${buildSilhouetteSM(homeF.appearance)}</div><div class="tape-name clickable-name" data-open-fighter="${homeF.id}">${homeF.name}</div><div class="tape-disc">${DISCIPLINE_NAMES[homeF.primaryDisc]}</div><div class="tape-ovr">${ovrH}</div></div>
      </div>
      ${statRow('SPEED', awayF.stats.speed, homeF.stats.speed)}
      ${statRow('QUICKNESS', awayF.stats.quickness, homeF.stats.quickness)}
      ${statRow('TOUGHNESS', awayF.stats.toughness, homeF.stats.toughness)}
      ${statRow('POWER', awayF.stats.power, homeF.stats.power)}
      ${statRow('AGILITY', awayF.stats.agility, homeF.stats.agility)}
      <div class="btn-row"><span></span><button class="btn btn-primary" id="enter-arena">Enter the Arena →</button></div>
    `;
  }

  // subPhase === 'bout' — the player's own live fight, full play-by-play
  const r = state.boutResult;
  const visible = r.log.slice(0, state.revealedCount);
  const logHtml = visible.map((entry,i)=>{
    if(entry.type==='round-header') return `<div class="round-label">ROUND ${entry.round}</div>`;
    if(entry.type==='finish') return `<div class="pick-row" style="border-color:var(--ink-red); animation-delay:${i*0.02}s;"><span style="color:var(--ink-red); font-weight:600;">${entry.text}</span></div>`;
    if(entry.type==='decision') return `<div class="pick-row" style="border-color:var(--brass-dim); animation-delay:${i*0.02}s;"><span style="color:var(--brass);">${entry.text}</span></div>`;
    return `<div class="pick-row" style="animation-delay:${i*0.02}s;"><span>${entry.text}</span></div>`;
  }).join('');
  const done = state.revealedCount >= r.log.length;
  return `
    ${scoreboardHtml}
    <div>${logHtml}</div>
    <div class="btn-row"><span></span><button class="btn btn-primary" id="advance-bout">${done?'Confirm Result →':'Next →'}</button></div>
  `;
}

function renderGameResult(){
  const gd = state.currentGameDay;
  const homeName = jrTeamName(gd.leagueId, gd.homeIdx);
  const awayName = jrTeamName(gd.leagueId, gd.awayIdx);
  const homeScore = gd.cardResults.filter(r=>r.homeWon).length;
  const awayScore = gd.cardResults.length - homeScore;
  const homeWon = homeScore > awayScore;
  const playerIsHome = gd.isHome;
  const playerWon = playerIsHome ? homeWon : !homeWon;

  const rowsHtml = gd.cardResults.map(r=>`
    <div class="pick-row ${r.isPlayerBout?'you':''}">
      <span class="pick-team">${r.weightClass}</span>
      <span class="pick-fighter ${r.isPlayerBout?'you':''}"><span class="clickable-name" data-open-fighter="${r.winnerId||''}">${r.winnerName}</span> def. <span class="clickable-name" data-open-fighter="${r.loserId||''}">${r.loserName}</span> (${r.method})</span>
    </div>
  `).join('');

  return `
    <div class="roster-team-head">
      <div class="roster-team-name">${playerWon?'TEAM WIN':'TEAM LOSS'}</div>
      <div class="roster-team-meta"><span class="clickable-name" data-open-team="${gd.leagueId}|${gd.awayIdx}">${awayName}</span> ${awayScore} — ${homeScore} <span class="clickable-name" data-open-team="${gd.leagueId}|${gd.homeIdx}">${homeName}</span></div>
    </div>
    <div class="section-label">Bout by Bout</div>
    ${rowsHtml}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="back-to-hub-from-result">Continue →</button></div>
  `;
}

function renderStandings(){
  const f = getFighterById(state.fighterId);
  const league = getJrLeague(f.juniorLeagueId);
  const standings = ensureStandings(f.juniorLeagueId);
  const rows = league.teams.map((t,i)=>({ name: jrTeamName(league.id, i), i, rec: standings[i] }))
    .sort((a,b)=> (b.rec.wins-b.rec.losses) - (a.rec.wins-a.rec.losses));
  const rowsHtml = rows.map(row=>`
    <div class="pick-row ${row.i===f.juniorTeamId?'you':''}">
      <span class="pick-team clickable-name" data-open-team="${league.id}|${row.i}">${row.i===f.juniorTeamId?'YOU — ':''}${row.name}</span>
      <span class="pick-fighter">${row.rec.wins}-${row.rec.losses}</span>
    </div>
  `).join('');

  return `
    <div class="section-label">${league.name} Standings</div>
    ${rowsHtml}
    <div class="btn-row"><button class="btn" id="back-to-hub-from-standings">← Team Season</button><span></span></div>
  `;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  document.querySelectorAll('[data-view-league]').forEach(btn=>{
    btn.onclick = ()=>{ state.viewLeagueId = btn.dataset.viewLeague; state.screen = 'league-detail'; render(); };
  });
  const backToOverview = document.getElementById('back-to-overview');
  if(backToOverview) backToOverview.onclick = ()=>{ state.screen = 'overview'; render(); };
  const goToDraftSelect = document.getElementById('go-to-draft-select');
  if(goToDraftSelect) goToDraftSelect.onclick = ()=>{ state.screen = 'select'; render(); };

  document.querySelectorAll('[data-select-fighter]').forEach(btn=>{
    btn.onclick = ()=>{
      state.fighterId = btn.dataset.selectFighter;
      const f = getFighterById(state.fighterId);
      if(f.juniorTeamId){
        state.screen = 'season-hub';
      } else if(rightsStillActive(f)){
        state.pendingOffers = f.juniorRightsHolders.map(r=> ({ leagueId:r.leagueId, teamIndex:r.teamIndex, round:null }));
        state.screen = 'offers';
      } else {
        state.draftResult = runDraftForFighter(f);
        state.screen = 'draft-day';
      }
      render();
    };
  });

  const seeResults = document.getElementById('see-results');
  if(seeResults) seeResults.onclick = ()=>{
    const offers = state.draftResult.results.map(r=> ({ leagueId:r.leagueId, teamIndex:r.teamIndex, round:r.round }));
    if(offers.length){
      state.pendingOffers = offers;
      state.screen = 'offers';
    } else {
      updateFighter(state.fighterId, (f)=>{
        if(f.juvenilePetitionStatus === 'approved-pending-draft'){
          f.juvenilePetitionStatus = 'approved-undrafted';
          f.juvenileLockoutStartDay = getCurrentDay();
        }
      });
      state.screen = 'no-offers';
    }
    render();
  };

  document.querySelectorAll('[data-accept-offer]').forEach(card=>{
    card.onclick = ()=>{
      const idx = parseInt(card.dataset.acceptOffer, 10);
      const offer = state.pendingOffers[idx];
      const f = getFighterById(state.fighterId);
      setPlayerIntoRoster(offer.leagueId, offer.teamIndex, f);
      updateFighter(state.fighterId, (ff)=>{
        ff.juniorTeamId = offer.teamIndex;
        ff.juniorLeagueId = offer.leagueId;
        ff.juniorRightsHolders = [];
        ff.juniorDraftHistory.push({ leagueId: offer.leagueId, teamIndex: offer.teamIndex, round: offer.round, date: new Date().toISOString() });
      });
      state.screen = 'season-hub';
      render();
    };
  });

  const declineAll = document.getElementById('decline-all-jr-offers');
  if(declineAll) declineAll.onclick = ()=>{
    updateFighter(state.fighterId, (f)=>{
      f.juniorRightsHolders = state.pendingOffers.map(o=> ({ leagueId:o.leagueId, teamIndex:o.teamIndex }));
      f.juniorRightsExpiresAfterSeasons = (f.amateurSeasonHistory || []).length + 1;
    });
    state.screen = 'select';
    render();
  };

  const backFromNone = document.getElementById('back-to-select-from-none');
  if(backFromNone) backFromNone.onclick = ()=>{ state.screen='select'; render(); };

  const backFromRoster = document.getElementById('back-to-select-from-roster');
  if(backFromRoster) backFromRoster.onclick = ()=>{ state.screen='select'; render(); };

  const goToSeasonHub = document.getElementById('go-to-season-hub');
  if(goToSeasonHub) goToSeasonHub.onclick = ()=>{ state.screen='season-hub'; render(); };

  const backFromHub = document.getElementById('back-to-select-from-hub');
  if(backFromHub) backFromHub.onclick = ()=>{ state.screen='select'; render(); };

  const viewJrRoster = document.getElementById('view-jr-roster');
  if(viewJrRoster) viewJrRoster.onclick = ()=>{ state.screen='roster'; render(); };

  const viewStandings = document.getElementById('view-standings');
  if(viewStandings) viewStandings.onclick = ()=>{ state.screen='standings'; render(); };

  const backFromStandings = document.getElementById('back-to-hub-from-standings');
  if(backFromStandings) backFromStandings.onclick = ()=>{ state.screen='season-hub'; render(); };

  const toggleSimMode = document.getElementById('toggle-sim-mode');
  if(toggleSimMode) toggleSimMode.onchange = (e)=>{ state.simMode = e.target.checked; render(); };

  const goToGameDay = document.getElementById('go-to-game-day');
  if(goToGameDay) goToGameDay.onclick = ()=>{
    const f = getFighterById(state.fighterId);
    const weekIdx = getLeagueWeek(f.juniorLeagueId);
    const pairing = findWeekPairing(f.juniorLeagueId, f.juniorTeamId, weekIdx);
    if(!pairing) return;
    // Every other game around the league resolves silently the moment gameday starts,
    // so standings for the whole league move together, week to week.
    resolveOtherGamesThisWeek(f.juniorLeagueId, f.juniorTeamId, weekIdx);
    state.currentGameDay = {
      leagueId: f.juniorLeagueId, week: weekIdx,
      homeIdx: pairing.home, awayIdx: pairing.away,
      isHome: pairing.home === f.juniorTeamId,
      tab: 'preview',
      myLineup: {}, homeLineup: null, awayLineup: null,
      cardOrder: WEIGHT_CLASSES.slice(), // Fly first — lightest class opens the card
      cardIndex: 0, cardResults: [], subPhase: 'ready',
    };
    if(state.simMode){
      simEntireGameDay();
    } else {
      state.screen = 'game-day-preview';
    }
    render();
  };

  document.querySelectorAll('[data-gameday-tab]').forEach(btn=>{
    btn.onclick = ()=>{ state.currentGameDay.tab = btn.dataset.gamedayTab; render(); };
  });

  const toSetLineup = document.getElementById('to-set-lineup');
  if(toSetLineup) toSetLineup.onclick = ()=>{
    const gd = state.currentGameDay;
    if(gd.isHome){
      // Visitor sets first, blind — resolve that immediately so it can be revealed.
      const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);
      gd.awayLineup = aiPickLineup(awaySlots, null);
    }
    state.screen = 'set-lineup';
    render();
  };

  document.querySelectorAll('[data-lineup-pick]').forEach(btn=>{
    btn.onclick = ()=>{
      const gd = state.currentGameDay;
      const [wc, who] = btn.dataset.lineupPick.split('|');
      const mySlots = gd.isHome ? ensureTeamRoster(gd.leagueId, gd.homeIdx) : ensureTeamRoster(gd.leagueId, gd.awayIdx);
      const slot = mySlots.find(sl=> sl.weightClass===wc && (who==='player' ? sl.isPlayer : (resolveSlotFighter(sl)||{}).id===who));
      if(slot) gd.myLineup[wc] = resolveSlotFighter(slot);
      render();
    };
  });

  const confirmLineup = document.getElementById('confirm-lineup');
  if(confirmLineup) confirmLineup.onclick = ()=>{
    const gd = state.currentGameDay;
    if(gd.isHome){
      gd.homeLineup = gd.myLineup;
      // awayLineup already set blind before reveal
    } else {
      gd.awayLineup = gd.myLineup;
      const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
      gd.homeLineup = aiPickLineup(homeSlots, gd.awayLineup); // home counter-picks, informed
    }
    gd.cardIndex = 0;
    gd.subPhase = 'ready';
    state.screen = 'fight-card';
    if(state.simMode){
      runFightCardSim();
    } else {
      advanceFightCard();
    }
    render();
  };

  function playerFighterIdForGameDay(){
    return state.fighterId;
  }

  // Advances to the next fight in the card. If it's the player's own weight class,
  // sets up the interactive preview/bout; otherwise resolves it instantly and shows
  // a quick result card.
  function advanceFightCard(){
    const gd = state.currentGameDay;
    if(gd.cardIndex >= gd.cardOrder.length){ finishTeamGame(); return; }
    const wc = gd.cardOrder[gd.cardIndex];
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    if(!homeF || !awayF){ gd.cardIndex++; advanceFightCard(); return; }
    const playerId = playerFighterIdForGameDay();
    const isPlayerBout = homeF.id === playerId || awayF.id === playerId;

    if(isPlayerBout && !state.simMode){
      const myFighter = homeF.id===playerId ? homeF : awayF;
      const oppFighter = homeF.id===playerId ? awayF : homeF;
      const ctx = { arena: generateArena(), hometownPit: gd.isHome };
      state.boutResult = simulateBout(myFighter, oppFighter, ctx);
      state.revealedCount = 0;
      gd.subPhase = 'preview';
      gd.pendingLive = { myFighter, oppFighter, homeIsMe: homeF.id===playerId };
    } else {
      const bout = simulateBout(homeF, awayF, { arena:{floor:'neutral court'}, hometownPit: gd.isHome && homeF.id===playerId });
      const homeWon = bout.winner.id === homeF.id;
      gd.cardResults.push({
        weightClass: wc, homeWon, method: bout.method, isPlayerBout,
        winnerName: bout.winner.name, loserName: bout.loser.name,
        winnerId: bout.winner.id, loserId: bout.loser.id,
      });
      gd.subPhase = 'quickresult';
    }
  }

  const enterArena = document.getElementById('enter-arena');
  if(enterArena) enterArena.onclick = ()=>{ state.currentGameDay.subPhase = 'bout'; render(); };

  const advanceBout = document.getElementById('advance-bout');
  if(advanceBout) advanceBout.onclick = ()=>{
    const r = state.boutResult;
    if(state.revealedCount < r.log.length){
      state.revealedCount = Math.min(r.log.length, state.revealedCount + 3);
    } else {
      const gd = state.currentGameDay;
      const won = r.winner.id === gd.pendingLive.myFighter.id;
      const homeWon = gd.pendingLive.homeIsMe ? won : !won;
      gd.cardResults.push({
        weightClass: gd.cardOrder[gd.cardIndex], homeWon, method: r.method, isPlayerBout: true,
        winnerName: r.winner.name, loserName: r.loser.name,
        winnerId: r.winner.id, loserId: r.loser.id,
      });
      gd.cardIndex++;
      advanceFightCard();
    }
    render();
  };

  const nextCardFight = document.getElementById('next-card-fight');
  if(nextCardFight) nextCardFight.onclick = ()=>{
    const gd = state.currentGameDay;
    gd.cardIndex++;
    advanceFightCard();
    render();
  };

  function finishTeamGame(){
    const gd = state.currentGameDay;
    const f = getFighterById(state.fighterId);
    const homeScore = gd.cardResults.filter(r=>r.homeWon).length;
    const awayScore = gd.cardResults.length - homeScore;
    const homeWon = homeScore > awayScore;

    const playerResult = gd.cardResults.find(r=>r.isPlayerBout);
    updateFighter(state.fighterId, (ff)=>{
      if(playerResult){
        const playerWonBout = gd.isHome ? playerResult.homeWon : !playerResult.homeWon;
        const oppName = playerWonBout ? playerResult.loserName : playerResult.winnerName;
        const oppId = playerWonBout ? playerResult.loserId : playerResult.winnerId;
        if(playerWonBout) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier: 'Junior', opponent: oppName, opponentId: oppId, result: playerWonBout ? 'W':'L', method: playerResult.method,
          location: `${jrTeamName(gd.leagueId, gd.awayIdx)} @ ${jrTeamName(gd.leagueId, gd.homeIdx)} — Week ${gd.week+1}`,
          date: new Date().toISOString(),
        });
        const oppOvr = calcOVR((gd.isHome ? gd.awayLineup : gd.homeLineup)[playerResult.weightClass].stats);
        growJuniorStats(ff, playerWonBout, playerResult.method, oppOvr);
      }
    });

    recordStandingsResult(gd.leagueId, gd.homeIdx, gd.awayIdx, homeWon);
    advanceLeagueWeek(gd.leagueId);

    if(state.simMode){
      const playerWonBout = playerResult ? (gd.isHome ? playerResult.homeWon : !playerResult.homeWon) : homeWon===gd.isHome;
      state.lastSimResult = {
        won: playerWonBout, score: `${awayScore}-${homeScore}`,
        opponent: jrTeamName(gd.leagueId, gd.isHome ? gd.awayIdx : gd.homeIdx),
      };
      state.screen = 'season-hub';
    } else {
      state.screen = 'game-result';
    }
  }

  function runFightCardSim(){
    const gd = state.currentGameDay;
    while(gd.cardIndex < gd.cardOrder.length){
      advanceFightCard();
      gd.cardIndex++;
    }
    finishTeamGame();
  }

  function simEntireGameDay(){
    const gd = state.currentGameDay;
    const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);
    gd.awayLineup = aiPickLineup(awaySlots, null);
    const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
    gd.homeLineup = aiPickLineup(homeSlots, gd.awayLineup);
    runFightCardSim();
  }

  const backFromResult = document.getElementById('back-to-hub-from-result');
  if(backFromResult) backFromResult.onclick = ()=>{ state.screen='season-hub'; render(); };
}

render();
try{
  const urlScreen = new URLSearchParams(window.location.search).get('screen');
  if(urlScreen === 'draft-day' && getCurrentDay() >= tierKeyDates(currentIslandYear()).juniorDraftDay){
    state.screen = 'draft-day';
    render();
  }
}catch(e){ /* malformed URL param — just stay on overview */ }
</script>
<div class="version-badge">JUNIOR LEAGUE · V23 · 2026-07-17</div>
</body>
