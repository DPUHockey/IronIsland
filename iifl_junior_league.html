// Thursday's "Jr Fight Night" hub — the entry point for actually pushing all 3 leagues'
// weeks forward. Before this, only the player's OWN league ever advanced, and only when
// they manually played through Team Season — the other 2 leagues never moved at all.
function renderLeagueNight(){
  ensurePlayoffWeeksInjected(currentIslandYear());
  const cards = JR_LEAGUES.map(league=>{
    const weekIdx = getLeagueWeek(league.id);
    const weeks = ensureLeagueSchedule(league.id);
    const seasonOver = weekIdx >= weeks.length;
    const pairings = seasonOver ? [] : weeks[weekIdx];
    const playedCount = pairings.filter(p=> isPairingPlayed(league.id, weekIdx, p.home, p.away)).length;
    const roster = getRoster();
    const mine = roster.find(r=>r.isPlayable);
    const myGame = mine && mine.juniorLeagueId===league.id ? pairings.find(p=> p.home===mine.juniorTeamId || p.away===mine.juniorTeamId) : null;
    const gameDay = seasonOver ? null : jrWeekGameDay(league.id, weekIdx);
    const unlocked = seasonOver || jrWeekIsUnlocked(league.id, weekIdx);
    return `
      <div class="fighter-row" style="align-items:flex-start; flex-direction:column; gap:8px;">
        <div style="display:flex; justify-content:space-between; width:100%; align-items:baseline;">
          <div class="fr-name">${league.name}</div>
          <div class="fr-meta">${seasonOver ? 'Season complete' : `Week ${weekIdx+1} of ${weeks.length} · ${formatCalendarDateShort(gameDay)}`}</div>
        </div>
        ${myGame ? `<div class="fr-meta" style="color:var(--brass);">Your team plays this week — ${jrTeamName(league.id, myGame.away)} @ ${jrTeamName(league.id, myGame.home)}</div>` : ''}
        <div class="fr-meta">${seasonOver ? '' : `${playedCount} of ${pairings.length} games resolved this week`}</div>
        <div class="btn-row" style="width:100%;">
          <button class="btn btn-small" data-view-league="${league.id}">Standings →</button>
          ${seasonOver ? '' : unlocked
            ? `<button class="btn btn-small" data-sim-league="${league.id}">Sim This Week</button><button class="btn btn-small btn-primary" data-watch-league="${league.id}">Watch This Week →</button>`
            : `<span class="fr-meta" style="color:var(--muted);">🔒 Unlocks ${formatCalendarDateShort(gameDay)}</span>`}
        </div>
      </div>
    `;
  }).join('');

  // Only leagues that actually have something outstanding as of tonight should be able
  // to hold up Finish Thursday — a league whose season is already over, or whose current
  // week isn't even unlocked yet (its real Thursday hasn't arrived), has nothing to do
  // with "finishing Thursday" and must not block it just because it exists.
  const allDone = JR_LEAGUES.every(league=>{
    const weekIdx = getLeagueWeek(league.id);
    const weeks = ensureLeagueSchedule(league.id);
    if(weekIdx >= weeks.length) return true; // season over for this league — not relevant tonight
    const gameDay = jrWeekGameDay(league.id, weekIdx);
    if(gameDay > getCurrentDay()) return true; // still locked for a future date — not relevant tonight either
    return weeks[weekIdx].every(p=> isPairingPlayed(league.id, weekIdx, p.home, p.away));
  });
  const todayLabel = formatCalendarDateShort(getCurrentDay());

  return `
    <div class="section-label">Jr Fight Night — Thursday</div>
    <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:16px;">Sim everything at once, sim one league at a time, or drop into any league to watch its games individually. Each week unlocks on its real Thursday — no racing ahead of the calendar.</p>
    <div class="fighter-grid">${cards}</div>
    <div class="btn-row" style="margin-top:18px;"><span></span><button class="btn btn-primary" id="sim-all-leagues">⚡ Sim All 3 Leagues →</button></div>
    <div class="section-label" style="margin-top:20px;">Close Out The Night</div>
    <p style="font-family:var(--body); font-size:12.5px; color:var(--bone-dim); margin-bottom:10px;">
      ${allDone ? "Nothing outstanding for tonight — lock it in and head back out for Friday morning." : 'Still games left to sim or watch tonight before Thursday can close out.'}
    </p>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" id="finish-thursday" ${allDone?'':'disabled style="opacity:0.4; cursor:not-allowed;"'}>✅ Finish Thursday (${todayLabel}) — Jr Fight Night</button>
    </div>
  `;
}

// One league's slate for its current week — sim or watch each pairing individually.
function renderLeagueNightGames(){
  ensurePlayoffWeeksInjected(currentIslandYear());
  const league = getJrLeague(state.viewLeagueId);
  const weekIdx = getLeagueWeek(league.id);
  const weeks = ensureLeagueSchedule(league.id);
  if(weekIdx >= weeks.length){
    return `<div class="empty-note">${league.name}'s season is already complete.</div><div class="btn-row"><button class="btn" id="back-to-league-night">← Jr Fight Night</button><span></span></div>`;
  }
  if(!jrWeekIsUnlocked(league.id, weekIdx)){
    return `<div class="empty-note">Week ${weekIdx+1} isn't up yet — unlocks ${formatCalendarDateShort(jrWeekGameDay(league.id, weekIdx))}.</div><div class="btn-row"><button class="btn" id="back-to-league-night">← Jr Fight Night</button><span></span></div>`;
  }
  const roster = getRoster();
  const mine = roster.find(r=>r.isPlayable);
  const pairings = weeks[weekIdx];
  const rows = pairings.map((p,i)=>{
    const played = isPairingPlayed(league.id, weekIdx, p.home, p.away);
    const isMyGame = mine && mine.juniorLeagueId===league.id && (p.home===mine.juniorTeamId || p.away===mine.juniorTeamId);
    const status = isMyGame ? getJrGameWeekStatus(league.id) : null;
    const iMissedThisWeek = isMyGame && status && status.missed && status.weekIdx === weekIdx;
    const standings = ensureStandings(league.id);
    return `
      <div class="pick-row">
        <span class="pick-team clickable-name" data-open-team="${league.id}|${p.away}">${jrTeamName(league.id,p.away)}</span>
        <span class="fr-meta">@ <span class="clickable-name" data-open-team="${league.id}|${p.home}">${jrTeamName(league.id,p.home)}</span></span>
        ${played
          ? (function(){
              const score = getGameScore(league.id, weekIdx, p.home, p.away);
              if(!score) return `<span class="pick-fighter">Final ${isMyGame?'⭐':''}</span>`;
              const homeWonIt = score.homeScore > score.awayScore;
              return `<span class="pick-fighter"><b>${score.awayScore} — ${score.homeScore}</b> · ${homeWonIt ? jrTeamName(league.id,p.home) : jrTeamName(league.id,p.away)} wins ${isMyGame?'⭐':''}</span>`;
            })()
          : iMissedThisWeek
            ? `<span style="display:flex; align-items:center; gap:8px;">
                 <span class="fr-meta" style="color:var(--ink-red);">You missed the deadline — backup starts</span>
                 <button class="btn btn-small" data-sim-pairing="${i}">Resolve</button>
               </span>`
            : `<span style="display:flex; gap:6px;">
               <button class="btn btn-small" data-sim-pairing="${i}">Sim</button>
               <button class="btn btn-small btn-primary" data-watch-pairing="${i}">Watch →</button>
             </span>`}
      </div>
    `;
  }).join('');
  const allPlayed = pairings.every(p=> isPairingPlayed(league.id, weekIdx, p.home, p.away));
  return `
    <div class="section-label">${league.name} — Week ${weekIdx+1}</div>
    ${rows}
    <div class="btn-row" style="margin-top:16px;">
      <button class="btn" id="back-to-league-night">← Jr Fight Night</button>
      ${allPlayed ? `<button class="btn btn-primary" id="advance-week-and-back">Week Done — Continue →</button>` : '<span></span>'}
    </div>
  `;
}

function renderGameDayPreview(){
  const gd = state.currentGameDay;
  const league = getJrLeague(gd.leagueId);
  const standings = ensureStandings(gd.leagueId);
  const homeName = jrTeamName(gd.leagueId, gd.homeIdx);
  const awayName = jrTeamName(gd.leagueId, gd.awayIdx);
  const homeRec = standings[gd.homeIdx], awayRec = standings[gd.awayIdx];
  const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
  const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);

  const tabsHtml = `
    <div class="offer-grid" style="grid-template-columns:1fr 1fr; display:grid; gap:8px; margin-bottom:16px;">
      <button class="fr-season-btn" data-gameday-tab="preview" style="${gd.tab==='preview'?'background:var(--ink-red); color:var(--bone); border-color:var(--ink-red);':''}">Preview</button>
      <button class="fr-season-btn" data-gameday-tab="analyst" style="${gd.tab==='analyst'?'background:var(--ink-red); color:var(--bone); border-color:var(--ink-red);':''}">Analyst Views</button>
    </div>
  `;

  function rosterList(slots, title){
    const rows = slots.map(sl=>{
      const fighter = resolveSlotFighter(sl);
      const ovr = fighter ? calcOVR(fighter.stats) : '—';
      return `<div class="pick-row ${sl.isPlayer?'you':''}"><span class="pick-team">${sl.weightClass}</span><span class="pick-fighter ${sl.isPlayer?'you':''} clickable-name" data-open-fighter="${fighter?fighter.id:''}">${sl.isPlayer?'YOU — ':''}${sl.name} (${ovr})</span></div>`;
    }).join('');
    return `<div class="round-label">${title}</div>${rows}`;
  }

  let tabBody;
  if(gd.tab === 'preview'){
    tabBody = `
      ${rosterList(awaySlots, awayName + ' (Visitor) — ' + awayRec.wins + '-' + awayRec.losses)}
      <div style="height:14px;"></div>
      ${rosterList(homeSlots, homeName + ' (Home) — ' + homeRec.wins + '-' + homeRec.losses)}
    `;
  } else {
    const homeAvg = Math.round(homeSlots.reduce((s,sl)=>{ const fx=resolveSlotFighter(sl); return s+(fx?calcOVR(fx.stats):0); },0)/homeSlots.length);
    const awayAvg = Math.round(awaySlots.reduce((s,sl)=>{ const fx=resolveSlotFighter(sl); return s+(fx?calcOVR(fx.stats):0); },0)/awaySlots.length);
    const favored = homeAvg >= awayAvg ? homeName : awayName;
    const gap = Math.abs(homeAvg-awayAvg);
    const takeStrength = gap >= 8 ? 'a clear favorite' : gap >= 3 ? 'a slight edge' : 'basically a coin flip';
    tabBody = `
      <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); line-height:1.6;">
        "${homeName} averages ${homeAvg} OVR across the lineup, ${awayName} comes in at ${awayAvg}. On paper ${favored} looks like ${takeStrength} tonight. Home advantage matters here too — ${homeName} gets to set their lineup last, after seeing what ${awayName} brings to the floor." — Iron Island Fight Desk
      </p>
    `;
  }

  return `
    <div class="roster-team-head">
      <div class="roster-team-name"><span class="clickable-name" data-open-team="${gd.leagueId}|${gd.awayIdx}">${awayName}</span> @ <span class="clickable-name" data-open-team="${gd.leagueId}|${gd.homeIdx}">${homeName}</span></div>
      <div class="roster-team-meta">${league.name} · Week ${gd.week+1}</div>
    </div>
    ${tabsHtml}
    ${tabBody}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="to-set-lineup">Set Lineup →</button></div>
  `;
}

function renderSetLineup(){
  const gd = state.currentGameDay;

  const mySlots = gd.isHome ? ensureTeamRoster(gd.leagueId, gd.homeIdx) : ensureTeamRoster(gd.leagueId, gd.awayIdx);

  const revealHtml = gd.isHome ? `
    <div class="section-label">Visitor's Announced Lineup</div>
    ${WEIGHT_CLASSES.map(wc=>{
      const af = gd.awayLineup[wc];
      return af && af.stats ? `<div class="pick-row"><span class="pick-team">${wc}</span><span class="pick-fighter clickable-name" data-open-fighter="${af.id}">${af.name} (${calcOVR(af.stats)})</span></div>` : '';
    }).join('')}
    <p style="font-family:var(--mono); font-size:10.5px; color:var(--muted); margin:10px 0 18px;">You're Home — you get to counter-pick knowing this.</p>
  ` : `<p style="font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-bottom:18px;">You're the Visitor — your lineup locks in blind. Home sets theirs after seeing yours.</p>`;

  const pickerHtml = WEIGHT_CLASSES.map(wc=>{
    const options = mySlots.filter(sl=>sl.weightClass===wc);

      return `<button class="fr-season-btn" data-lineup-pick="${wc}|${sl.isPlayer?'player':fighter.id}" style="${isChosen?'background:var(--ink-red); color:var(--bone); border-color:var(--ink-red);':''}">${sl.isPlayer?'YOU — ':''}${sl.name} (${ovr})</button>`;

    return `<div class="round-block"><div class="round-label">${wc}</div><div style="display:flex; gap:8px; flex-wrap:wrap;">${cardsHtml}</div></div>`;
  }).join('');

  const allPicked = WEIGHT_CLASSES.every(wc=> gd.myLineup[wc]);

  return `
    <div class="section-label">${myTeamName} — Set Your Lineup</div>
    ${revealHtml}
    ${pickerHtml}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="confirm-lineup" ${allPicked?'':'disabled'}>Confirm Lineup →</button></div>
  `;
}

function renderFightCard(){
  const gd = state.currentGameDay;
  const wc = gd.cardOrder[gd.cardIndex];
  const homeName = jrTeamName(gd.leagueId, gd.homeIdx);
  const awayName = jrTeamName(gd.leagueId, gd.awayIdx);
  const homeScore = gd.cardResults.filter(r=>r.homeWon).length;
  const awayScore = gd.cardResults.filter(r=>!r.homeWon).length;

  const scoreboardHtml = `
    <div class="roster-team-head">
      <div class="roster-team-name">${awayScore} — ${homeScore}</div>
      <div class="roster-team-meta"><span class="clickable-name" data-open-team="${gd.leagueId}|${gd.awayIdx}">${awayName}</span> @ <span class="clickable-name" data-open-team="${gd.leagueId}|${gd.homeIdx}">${homeName}</span> · ${wc} Class (${gd.cardIndex+1} of 5)</div>
    </div>
  `;

  // The whole night's card, all 5 weight classes, with team/OVR/record on each fighter
  // and the result (or "pending") for every fight — visible throughout the whole
  // sequence, not just revealed one at a time as you get to each fight.
  function cardOverviewHtml(){
    const rows = gd.cardOrder.map(cwc=>{
      const hF = gd.homeLineup ? gd.homeLineup[cwc] : null;
      const aF = gd.awayLineup ? gd.awayLineup[cwc] : null;
      if(!hF || !aF) return '';
      const result = gd.cardResults.find(r=>r.weightClass===cwc);
      const isCurrent = cwc===wc && !result;
      const aRec = aF.record ? `${aF.record.wins}-${aF.record.losses}` : '0-0';
      const hRec = hF.record ? `${hF.record.wins}-${hF.record.losses}` : '0-0';
      const aTag = `${aF.name} <span class="fr-meta">(${awayName} · OVR ${calcOVR(aF.stats)} · ${aRec})</span>`;
      const hTag = `${hF.name} <span class="fr-meta">(${homeName} · OVR ${calcOVR(hF.stats)} · ${hRec})</span>`;
      const statusHtml = result
        ? `<b style="color:var(--brass);">${result.winnerName} def. ${result.loserName}</b> (${result.method})`
        : `<span style="color:var(--muted);">${isCurrent ? 'up now' : 'pending'}</span>`;
      return `
        <div class="pick-row" style="${isCurrent?'border-color:var(--brass);':''}">
          <span class="pick-team">${cwc}</span>
          <span class="pick-fighter">${aTag} vs. ${hTag} — ${statusHtml}</span>
        </div>
      `;
    }).join('');
    return `<div class="round-label">Tonight's Card</div>${rows}`;
  }

  if(gd.subPhase === 'choose'){
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    return `
      ${scoreboardHtml}
      ${cardOverviewHtml()}
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn" id="choose-sim-fight">Sim This Fight</button>
        <button class="btn btn-primary" id="choose-watch-fight">Watch This Fight →</button>
      </div>
    `;
  }

  if(gd.subPhase === 'quickresult'){
    return `
      ${scoreboardHtml}
      ${cardOverviewHtml()}
      <div class="btn-row"><span></span><button class="btn btn-primary" id="next-card-fight">${gd.cardIndex+1>=5?'See Final Score →':'Next Fight →'}</button></div>
    `;
  }

  if(gd.subPhase === 'preview'){
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    const ovrH = calcOVR(homeF.stats), ovrA = calcOVR(awayF.stats);
    const scaleMax = Math.max(ovrH, ovrA, 20) * 1.3;
    function statRow(label, valA, valH){
      const pctA = clamp(valA/scaleMax*100,0,100), pctH = clamp(valH/scaleMax*100,0,100);
      return `<div class="tape-stat-row"><div class="tape-stat-label">${label}</div><div class="tape-stat-bars">
        <div class="tape-side-l"><div class="tape-val">${valA}</div><div class="tape-bar-track"><div class="tape-bar-fill-l" style="width:${pctA}%"></div></div></div>
        <div class="tape-side-r"><div class="tape-bar-track"><div class="tape-bar-fill-r" style="width:${pctH}%"></div></div><div class="tape-val">${valH}</div></div>
      </div></div>`;
    }
    return `
      ${scoreboardHtml}
      <div class="tape-grid">
        <div class="tape-side"><div class="tape-avatar">${buildSilhouetteSM(awayF.appearance)}</div><div class="tape-name clickable-name" data-open-fighter="${awayF.id}">${awayF.name}</div><div class="tape-disc">${DISCIPLINE_NAMES[awayF.primaryDisc]} · ${awayName}</div><div class="tape-ovr">${ovrA}</div></div>
        <div class="tape-side"><div class="tape-avatar">${buildSilhouetteSM(homeF.appearance)}</div><div class="tape-name clickable-name" data-open-fighter="${homeF.id}">${homeF.name}</div><div class="tape-disc">${DISCIPLINE_NAMES[homeF.primaryDisc]} · ${homeName}</div><div class="tape-ovr">${ovrH}</div></div>
      </div>
      ${statRow('SPEED', awayF.stats.speed, homeF.stats.speed)}
      ${statRow('QUICKNESS', awayF.stats.quickness, homeF.stats.quickness)}
      ${statRow('TOUGHNESS', awayF.stats.toughness, homeF.stats.toughness)}
      ${statRow('POWER', awayF.stats.power, homeF.stats.power)}
      ${statRow('AGILITY', awayF.stats.agility, homeF.stats.agility)}
      <div class="btn-row"><span></span><button class="btn btn-primary" id="enter-arena">Enter the Arena →</button></div>
    `;
  }

  // subPhase === 'bout' — the player's own live fight, full play-by-play
  const r = state.boutResult;
  const visible = r.log.slice(0, state.revealedCount);
  const logHtml = visible.map((entry,i)=>{
    if(entry.type==='round-header') return `<div class="round-label">ROUND ${entry.round}</div>`;
    if(entry.type==='finish') return `<div class="pick-row" style="border-color:var(--ink-red); animation-delay:${i*0.02}s;"><span style="color:var(--ink-red); font-weight:600;">${entry.text}</span></div>`;
    if(entry.type==='decision') return `<div class="pick-row" style="border-color:var(--brass-dim); animation-delay:${i*0.02}s;"><span style="color:var(--brass);">${entry.text}</span></div>`;
    return `<div class="pick-row" style="animation-delay:${i*0.02}s;"><span>${entry.text}</span></div>`;
  }).join('');
  const done = state.revealedCount >= r.log.length;
  return `
    ${scoreboardHtml}
    <div>${logHtml}</div>
    <div class="btn-row"><span></span><button class="btn btn-primary" id="advance-bout">${done?'Confirm Result →':'Next →'}</button></div>
  `;
}

function renderGameResult(){
  const gd = state.currentGameDay;
  const homeName = jrTeamName(gd.leagueId, gd.homeIdx);
  const awayName = jrTeamName(gd.leagueId, gd.awayIdx);
  const homeScore = gd.cardResults.filter(r=>r.homeWon).length;
  const awayScore = gd.cardResults.length - homeScore;
  const homeWon = homeScore > awayScore;
  const playerIsHome = gd.isHome;
  const playerWon = playerIsHome ? homeWon : !homeWon;

  const rowsHtml = gd.cardResults.map(r=>{
    const hF = gd.homeLineup[r.weightClass], aF = gd.awayLineup[r.weightClass];
    const winnerIsHome = hF && r.winnerId === hF.id;
    const winnerF = winnerIsHome ? hF : aF;
    const loserF = winnerIsHome ? aF : hF;
    const winnerTeam = winnerIsHome ? homeName : awayName;
    const loserTeam = winnerIsHome ? awayName : homeName;
    const winnerRec = winnerF && winnerF.record ? `${winnerF.record.wins}-${winnerF.record.losses}` : '0-0';
    const loserRec = loserF && loserF.record ? `${loserF.record.wins}-${loserF.record.losses}` : '0-0';
    const winnerOvr = winnerF ? calcOVR(winnerF.stats) : '—';
    const loserOvr = loserF ? calcOVR(loserF.stats) : '—';
    return `
      <div class="pick-row ${r.isPlayerBout?'you':''}">
        <span class="pick-team">${r.weightClass}</span>
        <span class="pick-fighter ${r.isPlayerBout?'you':''}"><span class="clickable-name" data-open-fighter="${r.winnerId||''}">${r.winnerName}</span> <span class="fr-meta">(${winnerTeam} · OVR ${winnerOvr} · ${winnerRec})</span> def. <span class="clickable-name" data-open-fighter="${r.loserId||''}">${r.loserName}</span> <span class="fr-meta">(${loserTeam} · OVR ${loserOvr} · ${loserRec})</span> (${r.method})</span>
      </div>
    `;
  }).join('');

  return `
    <div class="roster-team-head">
      <div class="roster-team-name">${playerWon?'TEAM WIN':'TEAM LOSS'}</div>
      <div class="roster-team-meta"><span class="clickable-name" data-open-team="${gd.leagueId}|${gd.awayIdx}">${awayName}</span> ${awayScore} — ${homeScore} <span class="clickable-name" data-open-team="${gd.leagueId}|${gd.homeIdx}">${homeName}</span></div>
    </div>
    <div class="section-label">Bout by Bout</div>
    ${rowsHtml}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="back-to-hub-from-result">Continue →</button></div>
  `;
}

function renderStandings(){
  const f = getFighterById(state.fighterId);
  const league = getJrLeague(f.juniorLeagueId);
  const standings = ensureStandings(f.juniorLeagueId);
  const rows = league.teams.map((t,i)=>({ name: jrTeamName(league.id, i), i, rec: standings[i] }))
    .sort((a,b)=> (b.rec.wins-b.rec.losses) - (a.rec.wins-a.rec.losses));
  const rowsHtml = rows.map(row=>`
    <div class="pick-row ${row.i===f.juniorTeamId?'you':''}">
      <span class="pick-team clickable-name" data-open-team="${league.id}|${row.i}">${row.i===f.juniorTeamId?'YOU — ':''}${row.name}</span>
      <span class="pick-fighter">${row.rec.wins}-${row.rec.losses}</span>
    </div>
  `).join('');

  return `
    <div class="section-label">${league.name} Standings</div>
    ${rowsHtml}
    <div class="btn-row"><button class="btn" id="back-to-hub-from-standings">← Team Season</button><span></span></div>
  `;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  document.querySelectorAll('[data-view-league]').forEach(btn=>{
    btn.onclick = ()=>{ state.viewLeagueId = btn.dataset.viewLeague; state.screen = 'league-detail'; render(); };
  });
  const backToOverview = document.getElementById('back-to-overview');
  if(backToOverview) backToOverview.onclick = ()=>{ state.screen = 'overview'; render(); };
  const goToDraftSelect = document.getElementById('go-to-draft-select');
  if(goToDraftSelect) goToDraftSelect.onclick = ()=>{ state.screen = 'select'; render(); };

  document.querySelectorAll('[data-select-fighter]').forEach(btn=>{
    btn.onclick = ()=>{
      state.fighterId = btn.dataset.selectFighter;
      const f = getFighterById(state.fighterId);
      const action = btn.dataset.fighterAction;
      if(action === 'contract'){
        state.screen = 'jr-contract';
      } else if(action === 'status'){
        state.screen = 'declared-list';
      } else if(action === 'offers' || (f.pendingJuniorOffers && f.pendingJuniorOffers.length)){
        state.pendingOffers = f.pendingJuniorOffers;
        state.screen = 'offers';
      } else if(f.juniorTeamId){
        state.screen = 'season-hub';
      } else if(rightsStillActive(f)){
        state.pendingOffers = f.juniorRightsHolders.map(r=> ({ leagueId:r.leagueId, teamIndex:r.teamIndex, round:null }));
        state.screen = 'offers';
      } else {
        state.draftResult = runDraftForFighter(f);
        state.screen = 'draft-day';
      }
      render();
    };
  });

  const goToDeclaredList = document.getElementById('go-to-declared-list');
  if(goToDeclaredList) goToDeclaredList.onclick = ()=>{ state.screen = 'declared-list'; render(); };
  const goToLeagueNight = document.getElementById('go-to-league-night');
  if(goToLeagueNight) goToLeagueNight.onclick = ()=>{
    const roster = getRoster();
    const mine = roster.find(r=>r.isPlayable);
    const myLeagueOver = mine && mine.juniorLeagueId && getLeagueWeek(mine.juniorLeagueId) >= ensureLeagueSchedule(mine.juniorLeagueId).length;
    const status = mine && mine.juniorLeagueId ? getJrGameWeekStatus(mine.juniorLeagueId) : null;
    const thisWeek = mine && mine.juniorLeagueId ? getLeagueWeek(mine.juniorLeagueId) : null;
    const legitArrival = mine && mine.juniorLeagueId && status && status.arrived && status.weekIdx === thisWeek;
    // Once your own season is done there's no more Wednesday/stadium ritual to complete
    // for it, ever — the arrival flag can never become true again, so this must not stay
    // gated behind it or the other two leagues (still live for a signed teammate or not)
    // become permanently unreachable just to watch, which was never the point.
    if(legitArrival || myLeagueOver || !mine || !mine.juniorLeagueId){
      state.screen = 'league-night';
      render();
    } else {
      alert("Jr Fight Night is only open once you've actually made it to the arena — walk there in Free Roam first.");
    }
  };
  const goToFAPool = document.getElementById('go-to-fa-pool');
  if(goToFAPool) goToFAPool.onclick = ()=>{ state.screen = 'fa-pool'; render(); };
  const backFromContract = document.getElementById('back-to-select-from-contract');
  if(backFromContract) backFromContract.onclick = ()=>{ state.screen = 'select'; render(); };
  const backFromDeclared = document.getElementById('back-to-select-from-declared');
  if(backFromDeclared) backFromDeclared.onclick = ()=>{ state.screen = 'select'; render(); };
  const backFromFA = document.getElementById('back-to-select-from-fa');
  if(backFromFA) backFromFA.onclick = ()=>{ state.screen = 'select'; render(); };
  const signContract = document.getElementById('sign-jr-contract');
  if(signContract) signContract.onclick = ()=>{
    updateFighter(state.fighterId, (f)=>{
      f.juniorDraftRegistered = true;
      f.juniorDraftRegisteredYear = currentIslandYear();
    });
    state.screen = 'select';
    render();
  };

  const seeResults = document.getElementById('see-results');
  if(seeResults) seeResults.onclick = ()=>{
    const offers = state.draftResult.results.map(r=> ({ leagueId:r.leagueId, teamIndex:r.teamIndex, round:r.round }));
    if(offers.length){
      state.pendingOffers = offers;
      state.screen = 'offers';
    } else {
      updateFighter(state.fighterId, (f)=>{
        if(f.juvenilePetitionStatus === 'approved-pending-draft'){
          f.juvenilePetitionStatus = 'approved-undrafted';
          f.juvenileLockoutStartDay = getCurrentDay();
        }
      });
      state.screen = 'no-offers';
    }
    render();
  };

  document.querySelectorAll('[data-accept-offer]').forEach(card=>{
    card.onclick = ()=>{
      const idx = parseInt(card.dataset.acceptOffer, 10);
      const offer = state.pendingOffers[idx];
      const f = getFighterById(state.fighterId);
      setPlayerIntoRoster(offer.leagueId, offer.teamIndex, f);
      updateFighter(state.fighterId, (ff)=>{
        ff.juniorTeamId = offer.teamIndex;
        ff.juniorLeagueId = offer.leagueId;
        ff.juniorRightsHolders = [];
        ff.pendingJuniorOffers = null;
        ff.juniorDraftHistory.push({ leagueId: offer.leagueId, teamIndex: offer.teamIndex, round: offer.round, date: new Date().toISOString() });
      });
      state.screen = 'season-hub';
      render();
    };
  });

  const declineAll = document.getElementById('decline-all-jr-offers');
  if(declineAll) declineAll.onclick = ()=>{
    updateFighter(state.fighterId, (f)=>{
      f.juniorRightsHolders = state.pendingOffers.map(o=> ({ leagueId:o.leagueId, teamIndex:o.teamIndex }));
      f.juniorRightsExpiresAfterSeasons = (f.amateurSeasonHistory || []).length + 1;
      f.pendingJuniorOffers = null;
    });
    state.screen = 'select';
    render();
  };

  const backFromNone = document.getElementById('back-to-select-from-none');
  if(backFromNone) backFromNone.onclick = ()=>{ state.screen='select'; render(); };

  const backFromRoster = document.getElementById('back-to-select-from-roster');
  if(backFromRoster) backFromRoster.onclick = ()=>{ state.screen='select'; render(); };

  const goToSeasonHub = document.getElementById('go-to-season-hub');
  if(goToSeasonHub) goToSeasonHub.onclick = ()=>{ state.screen='season-hub'; render(); };

  const backFromHub = document.getElementById('back-to-select-from-hub');
  if(backFromHub) backFromHub.onclick = ()=>{ state.screen='select'; render(); };

  const viewJrRoster = document.getElementById('view-jr-roster');
  if(viewJrRoster) viewJrRoster.onclick = ()=>{ state.screen='roster'; render(); };

  const viewStandings = document.getElementById('view-standings');
  if(viewStandings) viewStandings.onclick = ()=>{ state.screen='standings'; render(); };

  const backFromStandings = document.getElementById('back-to-hub-from-standings');
  if(backFromStandings) backFromStandings.onclick = ()=>{ state.screen='season-hub'; render(); };

  const toggleSimMode = document.getElementById('toggle-sim-mode');
  if(toggleSimMode) toggleSimMode.onchange = (e)=>{ state.simMode = e.target.checked; render(); };

  function simPairingFully(leagueId, weekIdx, pairing){
    if(isPairingPlayed(leagueId, weekIdx, pairing.home, pairing.away)) return;
    const roster = getRoster();
    const mine = roster.find(r=>r.isPlayable);
    const isMyGame = mine && mine.juniorLeagueId===leagueId && (pairing.home===mine.juniorTeamId || pairing.away===mine.juniorTeamId);
    const status = isMyGame ? getJrGameWeekStatus(leagueId) : null;
    const iMissedThisWeek = isMyGame && status && status.missed && status.weekIdx === weekIdx;
    if(isMyGame && !iMissedThisWeek){
      // Route the player's own game through the real gameday pipeline (so their personal
      // record/fightLog/stat growth still happens) but in forced sim mode with no screens
      // shown, and with the automatic week-advance suppressed since this is one game out
      // of a whole week being resolved together.
      state.fighterId = mine.id;
      state.currentGameDay = {
        leagueId, week: weekIdx, homeIdx: pairing.home, awayIdx: pairing.away,
        isHome: pairing.home === mine.juniorTeamId, tab:'preview',
        myLineup:{}, homeLineup:null, awayLineup:null,
        cardOrder: WEIGHT_CLASSES.slice(), cardIndex:0, cardResults:[], subPhase:'ready',
        suppressWeekAdvance: true,
      };
      const wasSimMode = state.simMode;
      state.simMode = true;
      simEntireGameDay();
      state.simMode = wasSimMode;
    } else if(iMissedThisWeek){
      // Missed the deadline — team plays without you, backup fills your weight class.
      simulateAiTeamGame(leagueId, pairing.home, pairing.away, weekIdx, mine.id);
    } else {
      simulateAiTeamGame(leagueId, pairing.home, pairing.away, weekIdx);
    }
  }

  const finishThursday = document.getElementById('finish-thursday');
  if(finishThursday && !finishThursday.disabled) finishThursday.onclick = ()=>{
    const roster = getRoster();
    const mine = roster.find(r=>r.isPlayable);
    if(mine && mine.juniorLeagueId){
      setJrGameWeekStatus(mine.juniorLeagueId, { announced:false, arrived:false, missed:false, weekIdx:null, isHome:null });
    }
    saveClock({ day: getCurrentDay() + 1 });
    window.location.href = 'iifl_free_roam.html';
  };

  const simAllLeagues = document.getElementById('sim-all-leagues');
  if(simAllLeagues) simAllLeagues.onclick = ()=>{
    JR_LEAGUES.forEach(league=>{
      const weekIdx = getLeagueWeek(league.id);
      const weeks = ensureLeagueSchedule(league.id);
      if(weekIdx >= weeks.length) return;
      if(!jrWeekIsUnlocked(league.id, weekIdx)) return; // still waiting on its real Thursday
      weeks[weekIdx].forEach(p=> simPairingFully(league.id, weekIdx, p));
      if(isWeekFullyPlayed(league.id, weekIdx)) advanceLeagueWeek(league.id);
    });
    state.screen = 'league-night'; // simPairingFully may have redirected this via finishTeamGame
    render();
  };

  document.querySelectorAll('[data-sim-league]').forEach(btn=>{
    btn.onclick = ()=>{
      const league = getJrLeague(btn.dataset.simLeague);
      const weekIdx = getLeagueWeek(league.id);
      const weeks = ensureLeagueSchedule(league.id);
      if(weekIdx >= weeks.length) return;
      if(!jrWeekIsUnlocked(league.id, weekIdx)) return; // still waiting on its real Thursday
      weeks[weekIdx].forEach(p=> simPairingFully(league.id, weekIdx, p));
      if(isWeekFullyPlayed(league.id, weekIdx)) advanceLeagueWeek(league.id);
      state.screen = 'league-night'; // simPairingFully may have redirected this via finishTeamGame
      render();
    };
  });

  document.querySelectorAll('[data-watch-league]').forEach(btn=>{
    btn.onclick = ()=>{
      const league = getJrLeague(btn.dataset.watchLeague);
      const weekIdx = getLeagueWeek(league.id);
      if(weekIdx < ensureLeagueSchedule(league.id).length && !jrWeekIsUnlocked(league.id, weekIdx)) return; // still waiting on its real Thursday
      state.viewLeagueId = btn.dataset.watchLeague; state.screen = 'league-night-games'; render();
    };
  });
  const backToLeagueNight = document.getElementById('back-to-league-night');
  if(backToLeagueNight) backToLeagueNight.onclick = ()=>{ state.screen = 'league-night'; render(); };

  document.querySelectorAll('[data-sim-pairing]').forEach(btn=>{
    btn.onclick = ()=>{
      const league = getJrLeague(state.viewLeagueId);
      const weekIdx = getLeagueWeek(league.id);
      const weeks = ensureLeagueSchedule(league.id);
      const p = weeks[weekIdx][parseInt(btn.dataset.simPairing,10)];
      simPairingFully(league.id, weekIdx, p);
      state.screen = 'league-night-games'; // simPairingFully may have redirected this via finishTeamGame
      render();
    };
  });
  document.querySelectorAll('[data-watch-pairing]').forEach(btn=>{
    btn.onclick = ()=>{
      const league = getJrLeague(state.viewLeagueId);
      const weekIdx = getLeagueWeek(league.id);
      const weeks = ensureLeagueSchedule(league.id);
      const p = weeks[weekIdx][parseInt(btn.dataset.watchPairing,10)];
      const roster = getRoster();
      const mine = roster.find(r=>r.isPlayable);
      const isMyGame = mine && mine.juniorLeagueId===league.id && (p.home===mine.juniorTeamId || p.away===mine.juniorTeamId);
      state.fighterId = mine ? mine.id : null;
      state.currentGameDay = {
        leagueId: league.id, week: weekIdx, homeIdx: p.home, awayIdx: p.away,
        isHome: isMyGame ? (p.home === mine.juniorTeamId) : false,
        tab: 'preview',
        myLineup: {}, homeLineup: null, awayLineup: null,
        cardOrder: WEIGHT_CLASSES.slice(), cardIndex: 0, cardResults: [], subPhase: 'ready',
        suppressWeekAdvance: true,
        watchMode: !isMyGame, // non-player games get a Sim/Watch choice per fight instead of auto-resolving instantly
        involvesPlayer: !!isMyGame,
        returnScreen: 'league-night-games',
      };
      state.screen = 'game-day-preview';
      render();
    };
  });
  const advanceWeekAndBack = document.getElementById('advance-week-and-back');
  if(advanceWeekAndBack) advanceWeekAndBack.onclick = ()=>{
    const league = getJrLeague(state.viewLeagueId);
    const weekIdx = getLeagueWeek(league.id);
    if(isWeekFullyPlayed(league.id, weekIdx)) advanceLeagueWeek(league.id);
    state.screen = 'league-night';
    render();
  };

  const goToGameDay = document.getElementById('go-to-game-day');
  if(goToGameDay) goToGameDay.onclick = ()=>{
    const f = getFighterById(state.fighterId);
    const weekIdx = getLeagueWeek(f.juniorLeagueId);
    const pairing = findWeekPairing(f.juniorLeagueId, f.juniorTeamId, weekIdx);
    if(!pairing) return;
    if(isPairingPlayed(f.juniorLeagueId, weekIdx, pairing.home, pairing.away)){
      // Already resolved via the weekly Jr Fight Night flow — don't let it be replayed,
      // just catch the week counter up and show the result on Standings instead.
      advanceLeagueWeek(f.juniorLeagueId);
      state.screen = 'standings';
      render();
      return;
    }
    // Every other game around the league resolves silently the moment gameday starts,
    // so standings for the whole league move together, week to week.
    resolveOtherGamesThisWeek(f.juniorLeagueId, f.juniorTeamId, weekIdx);
    state.currentGameDay = {
      leagueId: f.juniorLeagueId, week: weekIdx,
      homeIdx: pairing.home, awayIdx: pairing.away,
      isHome: pairing.home === f.juniorTeamId,
      tab: 'preview',
      myLineup: {}, homeLineup: null, awayLineup: null,
      cardOrder: WEIGHT_CLASSES.slice(), // Fly first — lightest class opens the card
      cardIndex: 0, cardResults: [], subPhase: 'ready',
      involvesPlayer: true,
    };
    if(state.simMode){
      simEntireGameDay();
    } else {
      state.screen = 'game-day-preview';
    }
    render();
  };

  document.querySelectorAll('[data-gameday-tab]').forEach(btn=>{
    btn.onclick = ()=>{ state.currentGameDay.tab = btn.dataset.gamedayTab; render(); };
  });

  const toSetLineup = document.getElementById('to-set-lineup');
  if(toSetLineup) toSetLineup.onclick = ()=>{
    const gd = state.currentGameDay;
    if(!gd.involvesPlayer){
      // Neither team is the player's — no one to interactively pick for. Auto-pick both
      // sides (visitor blind, home informed) and jump straight into the fight card.
      const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);
      gd.awayLineup = aiPickLineup(awaySlots, null);
      const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
      gd.homeLineup = aiPickLineup(homeSlots, gd.awayLineup);
      gd.cardIndex = 0;
      gd.subPhase = 'ready';
      state.screen = 'fight-card';
      advanceFightCard();
      render();
      return;
    }
    if(gd.isHome){
      // Visitor sets first, blind — resolve that immediately so it can be revealed.
      const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);
      gd.awayLineup = aiPickLineup(awaySlots, null);
    }
    state.screen = 'set-lineup';
    render();
  };

  document.querySelectorAll('[data-lineup-pick]').forEach(btn=>{
    btn.onclick = ()=>{
      const gd = state.currentGameDay;
      const [wc, who] = btn.dataset.lineupPick.split('|');
      const mySlots = gd.isHome ? ensureTeamRoster(gd.leagueId, gd.homeIdx) : ensureTeamRoster(gd.leagueId, gd.awayIdx);
      const slot = mySlots.find(sl=> sl.weightClass===wc && (who==='player' ? sl.isPlayer : (resolveSlotFighter(sl)||{}).id===who));
      if(slot) gd.myLineup[wc] = resolveSlotFighter(slot);
      render();
    };
  });

  const confirmLineup = document.getElementById('confirm-lineup');
  if(confirmLineup) confirmLineup.onclick = ()=>{
    const gd = state.currentGameDay;
    if(gd.isHome){
      gd.homeLineup = gd.myLineup;
      // awayLineup already set blind before reveal
    } else {
      gd.awayLineup = gd.myLineup;
      const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
      gd.homeLineup = aiPickLineup(homeSlots, gd.awayLineup); // home counter-picks, informed
    }
    gd.cardIndex = 0;
    gd.subPhase = 'ready';
    state.screen = 'fight-card';
    if(state.simMode){
      runFightCardSim();
    } else {
      advanceFightCard();
    }
    render();
  };

  function playerFighterIdForGameDay(){
    return state.fighterId;
  }

  // Advances to the next fight in the card. If it's the player's own weight class,
  // sets up the interactive preview/bout; otherwise resolves it instantly and shows
  // a quick result card.
  function advanceFightCard(){
    const gd = state.currentGameDay;
    if(gd.cardIndex >= gd.cardOrder.length){ finishTeamGame(); return; }
    const wc = gd.cardOrder[gd.cardIndex];
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    if(!homeF || !awayF){ gd.cardIndex++; advanceFightCard(); return; }
    const playerId = playerFighterIdForGameDay();
    const isPlayerBout = homeF.id === playerId || awayF.id === playerId;

    if(isPlayerBout && !state.simMode){
      const myFighter = homeF.id===playerId ? homeF : awayF;
      const oppFighter = homeF.id===playerId ? awayF : homeF;
      const ctx = { arena: generateArena(), hometownPit: gd.isHome };
      state.boutResult = simulateBout(myFighter, oppFighter, ctx);
      state.revealedCount = 0;
      gd.subPhase = 'preview';
      gd.pendingLive = { myFighter, oppFighter, homeIsMe: homeF.id===playerId };
    } else if(gd.watchMode && !state.simMode){
      // Non-player bout in a watched game — let the player choose per fight instead of
      // silently auto-resolving it.
      gd.subPhase = 'choose';
    } else {
      const bout = simulateBout(homeF, awayF, { arena:{floor:'neutral court'}, hometownPit: gd.isHome && homeF.id===playerId });
      const homeWon = bout.winner.id === homeF.id;
      gd.cardResults.push({
        weightClass: wc, homeWon, method: bout.method, isPlayerBout,
        winnerName: bout.winner.name, loserName: bout.loser.name,
        winnerId: bout.winner.id, loserId: bout.loser.id,
      });
      gd.subPhase = 'quickresult';
    }
  }

  const chooseSimFight = document.getElementById('choose-sim-fight');
  if(chooseSimFight) chooseSimFight.onclick = ()=>{
    const gd = state.currentGameDay;
    const wc = gd.cardOrder[gd.cardIndex];
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    const bout = simulateBout(homeF, awayF, { arena:{floor:'neutral court'}, hometownPit:false });
    const homeWon = bout.winner.id === homeF.id;
    gd.cardResults.push({
      weightClass: wc, homeWon, method: bout.method, isPlayerBout:false,
      winnerName: bout.winner.name, loserName: bout.loser.name,
      winnerId: bout.winner.id, loserId: bout.loser.id,
    });
    gd.subPhase = 'quickresult';
    render();
  };
  const chooseWatchFight = document.getElementById('choose-watch-fight');
  if(chooseWatchFight) chooseWatchFight.onclick = ()=>{
    const gd = state.currentGameDay;
    const wc = gd.cardOrder[gd.cardIndex];
    const homeF = gd.homeLineup[wc], awayF = gd.awayLineup[wc];
    const ctx = { arena: generateArena(), hometownPit:false };
    state.boutResult = simulateBout(homeF, awayF, ctx);
    state.revealedCount = 0;
    gd.subPhase = 'preview';
    gd.pendingLive = { myFighter: homeF, oppFighter: awayF, homeIsMe: true };
    render();
  };

  const enterArena = document.getElementById('enter-arena');
  if(enterArena) enterArena.onclick = ()=>{ state.currentGameDay.subPhase = 'bout'; render(); };

  const advanceBout = document.getElementById('advance-bout');
  if(advanceBout) advanceBout.onclick = ()=>{
    const r = state.boutResult;
    if(state.revealedCount < r.log.length){
      state.revealedCount = Math.min(r.log.length, state.revealedCount + 3);
    } else {
      const gd = state.currentGameDay;
      const won = r.winner.id === gd.pendingLive.myFighter.id;
      const homeWon = gd.pendingLive.homeIsMe ? won : !won;
      gd.cardResults.push({
        weightClass: gd.cardOrder[gd.cardIndex], homeWon, method: r.method, isPlayerBout: true,
        winnerName: r.winner.name, loserName: r.loser.name,
        winnerId: r.winner.id, loserId: r.loser.id,
      });
      gd.cardIndex++;
      advanceFightCard();
    }
    render();
  };

  const nextCardFight = document.getElementById('next-card-fight');
  if(nextCardFight) nextCardFight.onclick = ()=>{
    const gd = state.currentGameDay;
    gd.cardIndex++;
    advanceFightCard();
    render();
  };

  function finishTeamGame(){
    const gd = state.currentGameDay;
    const f = getFighterById(state.fighterId);
    const homeScore = gd.cardResults.filter(r=>r.homeWon).length;
    const awayScore = gd.cardResults.length - homeScore;
    const homeWon = homeScore > awayScore;

    const playerResult = gd.cardResults.find(r=>r.isPlayerBout);
    updateFighter(state.fighterId, (ff)=>{
      if(playerResult){
        const playerWonBout = gd.isHome ? playerResult.homeWon : !playerResult.homeWon;
        const oppName = playerWonBout ? playerResult.loserName : playerResult.winnerName;
        const oppId = playerWonBout ? playerResult.loserId : playerResult.winnerId;
        if(playerWonBout) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier: 'Junior', opponent: oppName, opponentId: oppId, result: playerWonBout ? 'W':'L', method: playerResult.method,
          location: `${jrTeamName(gd.leagueId, gd.awayIdx)} @ ${jrTeamName(gd.leagueId, gd.homeIdx)} — Week ${gd.week+1}`,
          date: new Date().toISOString(),
        });
        const wr = ensureJrSeasonRecord(ff);
        if(playerWonBout){ wr.wins++; wr.methods[playerResult.method] = (wr.methods[playerResult.method]||0)+1; } else { wr.losses++; }
        const oppF = (gd.isHome ? gd.awayLineup : gd.homeLineup)[playerResult.weightClass];
        const oppOvr = calcOVR(oppF.stats);
        growJuniorStats(ff, playerWonBout, playerResult.method, oppOvr);
        const winnerF = playerWonBout ? ff : oppF;
        const loserF = playerWonBout ? oppF : ff;
        applyPostBoutFatigueAndInjury(winnerF, loserF, playerResult.method);
      }
    });
    // The other 3-4 bouts in this same game used to just feed the team score and then
    // vanish — nothing about them was ever saved to the fighters involved. Recording
    // them now so every teammate (not just the player) builds a real season history.
    gd.cardResults.forEach(r=>{
      if(r.isPlayerBout) return;
      const homeF = gd.homeLineup[r.weightClass], awayF = gd.awayLineup[r.weightClass];
      if(!homeF || !awayF) return;
      const winnerF = r.winnerId===homeF.id ? homeF : awayF;
      const loserF = winnerF===homeF ? awayF : homeF;
      recordJrBoutOutcome(winnerF, loserF, r.method);
      applyPostBoutFatigueAndInjury(winnerF, loserF, r.method);
    });
    persistLineupRecords(gd.leagueId, gd.homeIdx, gd.homeLineup);
    persistLineupRecords(gd.leagueId, gd.awayIdx, gd.awayLineup);
    // Weekly maintenance needs the FULL rosters (not just this week's starters) so
    // bench players who sat this game out still get their fatigue decayed and any
    // existing injury countdown ticks down.
    const competedIds = new Set();
    gd.cardResults.forEach(r=>{
      const homeF = gd.homeLineup[r.weightClass], awayF = gd.awayLineup[r.weightClass];
      if(homeF) competedIds.add(homeF.id);
      if(awayF) competedIds.add(awayF.id);
    });
    const homeSlotsForMaint = ensureTeamRoster(gd.leagueId, gd.homeIdx);
    const awaySlotsForMaint = ensureTeamRoster(gd.leagueId, gd.awayIdx);
    applyWeeklyRosterMaintenance(homeSlotsForMaint, competedIds);
    applyWeeklyRosterMaintenance(awaySlotsForMaint, competedIds);
    persistRosterSlots(gd.leagueId, gd.homeIdx, homeSlotsForMaint);
    persistRosterSlots(gd.leagueId, gd.awayIdx, awaySlotsForMaint);

    if(!isPlayoffWeek(gd.leagueId, gd.week)) recordStandingsResult(gd.leagueId, gd.homeIdx, gd.awayIdx, homeWon); // playoff results tracked separately, not folded into regular-season W-L
    recordGameScore(gd.leagueId, gd.week, gd.homeIdx, gd.awayIdx, homeScore, awayScore);
    markPairingPlayed(gd.leagueId, gd.week, gd.homeIdx, gd.awayIdx);
    if(!gd.suppressWeekAdvance) advanceLeagueWeek(gd.leagueId);

    if(state.simMode){
      const playerWonBout = playerResult ? (gd.isHome ? playerResult.homeWon : !playerResult.homeWon) : homeWon===gd.isHome;
      state.lastSimResult = {
        won: playerWonBout, score: `${awayScore}-${homeScore}`,
        opponent: jrTeamName(gd.leagueId, gd.isHome ? gd.awayIdx : gd.homeIdx),
      };
      state.screen = gd.returnScreen || 'season-hub';
    } else {
      state.screen = 'game-result';
    }
  }

  function runFightCardSim(){
    const gd = state.currentGameDay;
    while(gd.cardIndex < gd.cardOrder.length){
      advanceFightCard();
      gd.cardIndex++;
    }
    finishTeamGame();
  }

  function simEntireGameDay(){
    const gd = state.currentGameDay;
    const awaySlots = ensureTeamRoster(gd.leagueId, gd.awayIdx);
    gd.awayLineup = aiPickLineup(awaySlots, null);
    const homeSlots = ensureTeamRoster(gd.leagueId, gd.homeIdx);
    gd.homeLineup = aiPickLineup(homeSlots, gd.awayLineup);
    runFightCardSim();
  }

  const backFromResult = document.getElementById('back-to-hub-from-result');
  if(backFromResult) backFromResult.onclick = ()=>{
    const gd = state.currentGameDay;
    state.screen = (gd && gd.returnScreen) ? gd.returnScreen : 'season-hub';
    render();
  };
}

render();
try{
  const urlScreen = new URLSearchParams(window.location.search).get('screen');
  if(urlScreen === 'draft-day' && getCurrentDay() >= tierKeyDates(currentIslandYear()).juniorDraftDayIronbound){
    state.screen = 'league-draft-day';
    render();
  } else if(urlScreen === 'league-night'){
    const roster = getRoster();
    const mine = roster.find(r=>r.isPlayable);
    const myLeagueOver = mine && mine.juniorLeagueId && getLeagueWeek(mine.juniorLeagueId) >= ensureLeagueSchedule(mine.juniorLeagueId).length;
    const status = mine && mine.juniorLeagueId ? getJrGameWeekStatus(mine.juniorLeagueId) : null;
    const thisWeek = mine && mine.juniorLeagueId ? getLeagueWeek(mine.juniorLeagueId) : null;
    const legitArrival = mine && mine.juniorLeagueId && status && status.arrived && status.weekIdx === thisWeek;
    if(legitArrival || myLeagueOver || !mine || !mine.juniorLeagueId){
      state.screen = 'league-night';
    } else {
      state.screen = 'select';
      alert("Jr Fight Night is only open once you've actually made it to the arena — walk there in Free Roam first.");
    }
    render();
  }
}catch(e){ /* malformed URL param — just stay on overview */ }
</script>
