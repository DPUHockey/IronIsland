<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Island Fight League — Junior League Draft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1B1714; --bg-panel:#241D17; --bg-raised:#312820; --bg-raised-2:#3A2F25;
    --ink-red:#A6342A; --ink-red-dim:#7C2620; --brass:#C9A23C; --brass-dim:#8E7228;
    --bone:#EDE3CF; --bone-dim:#C9BFA9; --muted:#8B8070; --line:#43392D; --good:#5A8C5C;
    --display:'Anton',sans-serif; --label:'Oswald',sans-serif; --body:'Work Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at top, #241D17 0%, #1B1714 55%, #14110D 100%);
    color:var(--bone); font-family:var(--body); min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:32px 16px 80px; line-height:1.4;
  }
  .app{ width:100%; max-width:820px; }
  .ticket-header{
    background:var(--bg-panel); border:1px solid var(--line); border-bottom:none; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .ticket-eyebrow{ font-family:var(--label); font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--brass); }
  .ticket-title{ font-family:var(--display); font-size:26px; letter-spacing:1px; color:var(--bone); text-transform:uppercase; }
  .ticket-sub{ font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; }
  .panel{ background:var(--bg-panel); border:1px solid var(--line); border-top:none; padding:32px; min-height:420px; }
  .section-label{
    font-family:var(--label); font-size:12px; letter-spacing:2.5px; text-transform:uppercase; color:var(--brass);
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }
  .btn{
    font-family:var(--label); letter-spacing:1.5px; text-transform:uppercase; font-size:13px; font-weight:500;
    padding:13px 28px; border:1px solid var(--brass); background:transparent; color:var(--brass); cursor:pointer; transition:all .15s ease;
  }
  .btn:hover{ background:var(--brass); color:var(--bg-base); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .btn-primary{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .btn-primary:hover{ background:#C03F32; border-color:#C03F32; color:var(--bone); }
  .btn-row{ display:flex; justify-content:space-between; margin-top:24px; gap:12px; flex-wrap:wrap; }
  .empty-note{ text-align:center; padding:50px 20px; color:var(--muted); font-family:var(--body); font-size:14px; }
  .stub-screen{ text-align:center; padding:24px 10px 10px; }
  .stub-screen h2{ font-family:var(--display); font-size:24px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-red); margin-bottom:14px; }
  .stub-screen p{ font-family:var(--body); color:var(--bone-dim); font-size:14px; max-width:460px; margin:0 auto 18px; }

  /* fighter select */
  .fighter-grid{ display:grid; gap:10px; }
  .fighter-row{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--fr-color, var(--brass));
    padding:13px 16px; display:flex; align-items:center; gap:14px;
  }
  .fr-avatar{ width:30px; height:42px; flex-shrink:0; display:flex; align-items:flex-end; }
  .fr-avatar svg{ width:100%; height:100%; }
  .fr-name{ font-family:var(--label); font-size:15px; font-weight:600; color:var(--bone); }
  .fr-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px; }
  .fr-status{ margin-left:auto; font-family:var(--label); font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); text-align:right; }
  .fr-btn{
    font-family:var(--label); font-size:11px; letter-spacing:.5px; text-transform:uppercase; padding:9px 14px;

  .league-name{ font-family:var(--display); font-size:18px; letter-spacing:.5px; text-transform:uppercase; color:var(--brass); }
  .league-tier{ font-family:var(--mono); font-size:10px; color:var(--muted); }

  .pick-row{
    display:flex; justify-content:space-between; align-items:center; padding:6px 10px;

  .pick-row.you{ border-color:var(--ink-red); background:var(--bg-raised-2); }
  .pick-team{ color:var(--muted); font-family:var(--mono); font-size:10.5px; }
  .pick-fighter{ color:var(--bone-dim); }
  .pick-fighter.you{ color:var(--brass); font-weight:700; }

  /* offer cards */
  .offer-grid{ display:grid; gap:12px; }
  .offer-card{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--pc-color, var(--brass));

  .roster-team-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; }
  .roster-slot-grid{ display:grid; gap:8px; }

    display:flex; justify-content:space-between; align-items:center; padding:10px 14px;

  /* modal shared */

  .modal-title{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .modal-close{ background:transparent; border:1px solid var(--line); color:var(--muted); width:30px; height:30px; cursor:pointer; font-family:var(--mono); font-size:14px; }
  .modal-close:hover{ border-color:var(--ink-red); color:var(--ink-red); }

  /* fighter card modal */
  .mf-head{ display:flex; gap:14px; align-items:center; margin-bottom:18px; }
  .mf-avatar{ width:50px; height:70px; flex-shrink:0; display:flex; align-items:flex-end; }
  .mf-avatar svg{ width:100%; height:100%; }
  .mf-name{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .mf-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px; }
  .mf-disc{ font-family:var(--label); font-size:11.5px; color:var(--brass); text-transform:uppercase; margin-top:3px; }

  .mf-stat .msl{ font-family:var(--label); font-size:8.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  .mf-section-title{ font-family:var(--label); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass); margin:14px 0 8px; padding-top:12px; border-top:1px solid var(--line); }
  .mf-quotes{ display:flex; flex-direction:column; gap:6px; }

  .mf-quote-name{ font-family:var(--label); font-style:normal; font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); margin-right:4px; }
  .mf-growth-bar{ height:7px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; }
  .mf-growth-fill{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); }
  .mf-growth-text{ font-family:var(--body); font-size:12px; color:var(--bone-dim); margin-top:6px; line-height:1.5; }
  .mf-tier-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .mf-tier-tab{ font-family:var(--label); font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; padding:7px 11px; border:1px solid var(--line); background:var(--bg-raised); color:var(--muted); cursor:pointer; }
  .mf-tier-tab.active{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .mf-history-row{ display:grid; grid-template-columns:70px 1fr auto; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-family:var(--body); font-size:12.5px; }
  .mf-history-row:last-child{ border-bottom:none; }
  .mfh-date{ font-family:var(--mono); font-size:10px; color:var(--muted); }
  .mfh-opp{ color:var(--bone-dim); }
  .mfh-opp b{ color:var(--bone); }
  .mfh-loc{ font-family:var(--mono); font-size:10px; color:var(--muted); display:block; margin-top:1px; }
  .mfh-result{ font-family:var(--mono); font-size:11.5px; font-weight:700; }
  .mfh-result.win{ color:var(--good); }
  .mfh-result.loss{ color:var(--ink-red); }
  .mf-empty{ text-align:center; padding:24px 10px; color:var(--muted); font-family:var(--body); font-size:13px; }
  .mf-tier-summary{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; font-family:var(--mono); font-size:11px; color:var(--muted); }

  /* team card modal */
  .mt-head{ display:flex; gap:14px; align-items:center; margin-bottom:18px; }
  .mt-logo{ width:56px; height:56px; flex-shrink:0; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:20px; color:var(--bone); border:2px solid var(--brass); }
  .mt-name{ font-family:var(--display); font-size:19px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .mt-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px; }
  .mt-record-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
  .mt-record-box{ background:var(--bg-raised); border:1px solid var(--line); text-align:center; padding:12px; }
  .mt-record-box .mrv{ font-family:var(--mono); font-size:20px; font-weight:700; color:var(--brass); }
  .mt-record-box .mrl{ font-family:var(--label); font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }

  /* tale of the tape / bout (reused from Fight Pit) */
  .tape-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
  .tape-side{ background:var(--bg-raised); border:1px solid var(--line); padding:14px 16px; text-align:center; }
  .tape-avatar{ width:50px; height:70px; margin:0 auto 8px; display:flex; align-items:flex-end; justify-content:center; }
  .tape-avatar svg{ width:100%; height:100%; }
  .tape-name{ font-family:var(--display); font-size:16px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .tape-disc{ font-family:var(--label); font-size:11px; color:var(--brass); text-transform:uppercase; margin-top:2px; }
  .tape-ovr{ font-family:var(--mono); font-size:24px; font-weight:700; color:var(--brass); margin-top:6px; }
  .tape-stat-row{ margin-bottom:12px; }
  .tape-stat-label{ text-align:center; font-family:var(--label); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .tape-stat-bars{ display:grid; grid-template-columns:1fr 1fr; gap:10px; align-items:center; }
  .tape-side-l, .tape-side-r{ display:flex; align-items:center; gap:8px; }
  .tape-side-l{ flex-direction:row-reverse; }
  .tape-bar-track{ flex:1; height:7px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; }
  .tape-bar-fill-l{ position:absolute; right:0; top:0; bottom:0; background:linear-gradient(270deg, var(--ink-red-dim), var(--ink-red)); }
  .tape-bar-fill-r{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); }
  .tape-val{ font-family:var(--mono); font-size:11.5px; font-weight:700; color:var(--bone); width:22px; text-align:center; flex-shrink:0; }
  .check-row input{ accent-color:var(--ink-red); }

  @media (max-width:600px){
    .ticket-header{ flex-direction:column; align-items:flex-start; gap:6px; }
    .fighter-row{ flex-wrap:wrap; }
  }

  .version-badge{
    position:fixed; bottom:14px; right:16px; font-family:'JetBrains Mono',monospace; font-size:10px; color:#8B8070;
    background:#241D17; border:1px solid #43392D; padding:5px 9px; letter-spacing:.5px; z-index:999;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="modal-root"></div>

<script>
/* ============================ SHARED DATA ============================ */

/* ============================ SAVE REGISTRY ============================ */
/*
  Every game save is a fully independent world: its own clock, its own roster, its own
  field pools, its own fight results — nothing shared between saves except this registry
  itself and the global created-fighters catalog (see CREATED_FIGHTERS_KEY below). A
  fighter built in the Character Creator doesn't belong to any save until it's actually
  added to one; from that point on each save tracks its own evolving copy independently
  (Karza's career in "IronOne" and Karza's career in some other save, if he were ever
  added to two, would diverge completely — they're snapshots, not live-shared records).

  sk() is the mechanism: every existing storage key in every file gets wrapped with it
  at the point of use, so `localStorage.getItem(sk(CLOCK_KEY))` becomes
  `localStorage.getItem(sk(CLOCK_KEY))` and now transparently reads/writes the ACTIVE
  save's own copy of that data. No stored key's declaration or meaning changes — only
  which save's namespace it's actually reading/writing.
*/
const SAVE_REGISTRY_KEY = 'iifl_save_registry_v1';
const CREATED_FIGHTERS_KEY = 'iifl_created_fighters_v1'; // global catalog, NOT save-namespaced

function loadSaveRegistry(){
  try{
    const raw = localStorage.getItem(SAVE_REGISTRY_KEY);
    return raw ? JSON.parse(raw) : { saves: [], activeSaveId: null };
  }catch(err){ console.error('IIFL save registry load failed:', err); return { saves: [], activeSaveId: null }; }
}
function saveSaveRegistry(reg){
  try{ localStorage.setItem(SAVE_REGISTRY_KEY, JSON.stringify(reg)); return true; }
  catch(err){ console.error('IIFL save registry save failed:', err); return false; }
}
function getActiveSaveId(){ return loadSaveRegistry().activeSaveId; }
function getActiveSave(){
  const reg = loadSaveRegistry();
  return reg.saves.find(s=> s.id === reg.activeSaveId) || null;
}
function setActiveSaveId(saveId){
  const reg = loadSaveRegistry();
  reg.activeSaveId = saveId;
  saveSaveRegistry(reg);
}

// The wrapper every storage key gets threaded through. Falls back to the raw base key
// when no save is active yet (e.g. mid-creation, or old data from before this system
// existed) rather than silently losing access to it.
function sk(baseKey){
  const sid = getActiveSaveId();
  return sid ? `iifl_save_${sid}__${baseKey}` : baseKey;
}

// Creates a brand new, fully independent save: fresh clock at Day 1 (May 1, 1958),
// no records, no roster. playableFighterId is the one fighter from the created-fighters
// catalog the player actually controls; npcFighterIds are the others they've chosen to
// bring into THIS world (opt-in per save, never automatic — see CREATED_FIGHTERS_KEY).
// Both get cloned from the catalog into this save's own roster as independent copies.
function createNewSave(name, playableFighterId, npcFighterIds){
  const reg = loadSaveRegistry();
  const id = 'save_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
  reg.saves.push({
    id, name, createdAt: Date.now(),
    playableFighterId, npcFighterIds: npcFighterIds || [],
  });
  reg.activeSaveId = id;
  saveSaveRegistry(reg);

  // Fresh clock for this save, independent of every other save's timeline.
  localStorage.setItem(`iifl_save_${id}__${CLOCK_KEY}`, JSON.stringify({ day: 1 }));

  // Clone the chosen fighters out of the global catalog into this save's own roster —
  // from here on they're this save's copies, not the catalog's.
  const catalog = loadCreatedFighters();
  const allIds = [playableFighterId, ...(npcFighterIds || [])].filter(Boolean);
  const clonedRoster = allIds
    .map(fid => catalog.find(f=> f.id === fid))
    .filter(Boolean)
    .map(f => ({ ...f, isPlayable: f.id === playableFighterId }));
  localStorage.setItem(`iifl_save_${id}__${ROSTER_KEY}`, JSON.stringify(clonedRoster));

  return id;
}

function loadCreatedFighters(){
  try{ const raw = localStorage.getItem(CREATED_FIGHTERS_KEY); return raw ? JSON.parse(raw) : []; }
  catch(err){ console.error('IIFL created-fighters catalog load failed:', err); return []; }
}
function saveCreatedFighters(list){
  try{ localStorage.setItem(CREATED_FIGHTERS_KEY, JSON.stringify(list)); return true; }
  catch(err){ console.error('IIFL created-fighters catalog save failed:', err); return false; }
}


const ROSTER_KEY = 'iifl_roster_v1';
const JR_STATE_KEY = 'iifl_junior_league_v1';

const PROVINCES = [
  { flag:'Provincial%20Flags/alexandretta.jpg', id:'alexandretta', name:'Alexandretta Province', color:'#5C7C5E' },
  { flag:'Provincial%20Flags/kolsati.jpg', id:'kolsati', name:'Kolsati District', color:'#5E7A93' },
  { flag:'Provincial%20Flags/sherwood.jpg', id:'sherwood', name:'Sherwood Province', color:'#A0623B' },
  { flag:'Provincial%20Flags/gazon.jpg', id:'gazon', name:'Gazon Province', color:'#C8943F' },
  { flag:'Provincial%20Flags/ditiero.jpg', id:'ditiero', name:'Di Tiero Province', color:'#7C5491' },
  { flag:'Provincial%20Flags/carpathia.jpg', id:'carpathia', name:'The Province of Targu', color:'#5B4070' },
  { flag:'Provincial%20Flags/northeast.jpg', id:'northeast', name:'Northeast Territory', color:'#9C4242' },
  { flag:'Provincial%20Flags/bay.jpg', id:'bay', name:'White Bay Province', color:'#6E8C9C' },
];
const DISCIPLINE_NAMES = {
  boxer:'Boxer', brawler:'Street Brawler', wrestler:'Wrestler', sambo:'Russian Sambo',
  mma:'MMA', karate:'Karate', judo:'Judo', catch:'Catch Wrestling'
};
const WEIGHT_CLASSES = ['Fly','Light','Middle','Heavy','Mega'];
const ROSTER_SPOTS = 10; // 2 per weight class across 5 classes

function rand(lo,hi){ return Math.floor(Math.random()*(hi-lo+1))+lo; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }

/* ============================ GAME CLOCK ============================ */
/*
  One shared, island-wide clock (localStorage, not per-fighter) so "today" and the
  Juvenile background simulation stay consistent across every file that reads it
  (this file, the newspaper in Free Roam, etc). Day 1 = Monday, March 3, 1958 — chosen
  to match Free Roam's existing flavor epoch so both calendars agree.
*/
const CLOCK_KEY = 'iifl_clock_v1';
const GAME_EPOCH = new Date(1958, 2, 3); // Monday, March 3 1958 = Day 1
const WEEKDAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const JUVENILE_SEASON_WEEKS = 16;
const JUVENILE_SEASON_START_DAY = 1;
const JUVENILE_SEASON_END_DAY = JUVENILE_SEASON_START_DAY + JUVENILE_SEASON_WEEKS*7 - 1;

/* ============================ TIER SEASON CALENDAR ============================ */
/*
  Each tier runs its own annual regular-season + playoff window, anchored to a real
  calendar month/day — Juvenile always opens May 1, and every other tier's dates are
  offsets from that, chosen so the ENTIRE island year (every draft, deadline, and
  championship across all four tiers) lands inside May 1 - Dec 25, never spilling into
  the next calendar year. Deliberately stateless/derived: given any day number,
  resolveTierSeason() recomputes which cycle-year and phase that day falls in from
  scratch. No stored season-state to drift out of sync or need migrating.

  Junior's playoffWeeks (4) covers TWO stages, not one bracket: 2 weeks of each of the
  3 leagues running its own playoff to crown a league champion, then 2 weeks for the
  4-team Iron Island Championship (the 3 league champs + a bid-won host city).
  resolveJuniorPlayoffSubPhase() below tells you which of those two stages a given day
  falls in once resolveTierSeason says Junior's phase is 'playoffs'.
*/
const TIER_SEASON_CONFIG = {
  juvenile: { startMonth: 5, startDay: 1,  regularWeeks: 16, playoffWeeks: 0 },
  junior:   { startMonth: 5, startDay: 29, regularWeeks: 16, playoffWeeks: 4 },
  amateur:  { startMonth: 6, startDay: 1,  regularWeeks: 14, playoffWeeks: 2 },
  pro:      { startMonth: 8, startDay: 1,  regularWeeks: 18, playoffWeeks: 3 },
};

// Day number (same 1-based convention as getCurrentDay/dateForDay) for a given real
// calendar year/month/day — the bridge between "June 1, 1959" and the island clock.
function dayForCalendarDate(year, month, dayOfMonth){
  const d = new Date(year, month-1, dayOfMonth);
  return Math.round((d - GAME_EPOCH) / 86400000) + 1;
}

// Resolves which annual cycle a tier is in for a given day, and what phase of that
// cycle it's in: 'regular' (weekly cards happening), 'playoffs' (bracket underway),
// or 'dead-days' (season's over, next one hasn't started — the window where the
// player gets the stay/off-season/advance-to-next-season choice).
function resolveTierSeason(tierKey, todayDay){
  const cfg = TIER_SEASON_CONFIG[tierKey];
  if(!cfg) return null;
  const todayDate = dateForDay(todayDay);
  let year = todayDate.getFullYear();
  let startDay = dayForCalendarDate(year, cfg.startMonth, cfg.startDay);
  if(todayDay < startDay){
    year -= 1;
    startDay = dayForCalendarDate(year, cfg.startMonth, cfg.startDay);
  }
  const regularEndDay = startDay + cfg.regularWeeks*7 - 1;
  const playoffEndDay = regularEndDay + cfg.playoffWeeks*7;
  const nextStartDay = dayForCalendarDate(year+1, cfg.startMonth, cfg.startDay);
  let phase = 'regular';
  if(todayDay > playoffEndDay) phase = 'dead-days';
  else if(todayDay > regularEndDay) phase = 'playoffs';
  return { tierKey, cycleYear: year, startDay, regularEndDay, playoffEndDay, nextStartDay, phase };
}

// The island-wide "advance to next season" action always means "fast-forward to the
// next Juvenile opening day" — that's the anchor for the whole game year, even if
// you're looking at Pro's dead-days when you trigger it.
function nextJuvenileOpeningDay(fromDay){
  const s = resolveTierSeason('juvenile', fromDay);
  return s.phase === 'dead-days' ? s.nextStartDay : dayForCalendarDate(s.cycleYear+1, TIER_SEASON_CONFIG.juvenile.startMonth, TIER_SEASON_CONFIG.juvenile.startDay);
}

// Once Junior's overall phase is 'playoffs' (a 4-week window), this tells you which
// half you're in: the first 2 weeks are each league running its own bracket, the
// second 2 weeks are the 4-team Iron Island Championship.
function resolveJuniorPlayoffSubPhase(todayDay){
  const s = resolveTierSeason('junior', todayDay);
  if(s.phase !== 'playoffs') return null;
  const leaguePOEnd = s.regularEndDay + 2*7;
  return todayDay <= leaguePOEnd ? 'league-playoffs' : 'island-championship';
}

// Every named date on the island calendar for a given island-year, all derived from
// that year's Juvenile May 1 opener. This is the single source of truth other screens
// (Home Hub, newspaper, etc) should read from rather than re-deriving offsets by hand.
function tierKeyDates(cycleYear){
  const may1 = dayForCalendarDate(cycleYear, 5, 1);
  const jrDraft = may1 + 14;
  const jrOpen = jrDraft + 14;
  const amOpen = may1 + 31;
  const proOpen = dayForCalendarDate(cycleYear, 8, 1);
  const juvRegEnd = may1 + 16*7 - 1;
  const amRegEnd = amOpen + 14*7 - 1;
  const jrRegEnd = jrOpen + 16*7 - 1;
  const jrLeaguePOEnd = jrRegEnd + 2*7;
  const jrChampEnd = jrRegEnd + 4*7;
  const proRegEnd = proOpen + 18*7 - 1;
  return {
    cycleYear,
    juvenileOpen: may1,
    juvenileRegEnd: juvRegEnd,
    jrChampHostBidDue: may1,
    jrChampHostAnnounced: may1 + 7,
    juniorDraftDeclareDeadline: may1,
    juniorDraftDay: jrDraft,
    juniorOpen: jrOpen,
    juniorTradeDeadline: jrOpen + 10*7,
    juniorRegEnd: jrRegEnd,
    jrLeaguePlayoffStart: jrRegEnd + 1,
    jrLeaguePlayoffEnd: jrLeaguePOEnd,
    jrIslandChampStart: jrLeaguePOEnd + 1,
    jrIslandChampEnd: jrChampEnd,
    amateurOpen: amOpen,
    amateurTradeDeadline: amOpen + 8*7,
    amateurRegEnd: amRegEnd,
    amateurPlayoffStart: amRegEnd + 1,
    amateurPlayoffEnd: amRegEnd + 2*7,
    proDraftDeclareDeadline: may1 + 24,
    proDraftDay: may1 + 35,
    proOpen: proOpen,
    proTradeDeadline: proOpen + 12*7,
    proRegEnd: proRegEnd,
    proPlayoffStart: proRegEnd + 1,
    proPlayoffEnd: proRegEnd + 3*7,
  };
}

// Weighted rotation for which QUALIFYING team hosts its league's own playoff bracket.
// Hosting is a venue perk, not a playoff-entry mechanic — it's picked from teams that
// already qualified. Weighted toward "better programs" (all-time win% is the proxy
// until there's a real arena/prestige stat) with a recency penalty so the same team
// doesn't host every single year. lastHostedYear is a { teamKey: year } map the caller
// persists between cycles (teamKey = `${leagueId}_${teamIndex}`).
function pickLeaguePlayoffHost(qualifyingTeams, allTimeStandings, lastHostedYear, cycleYear){
  if(!qualifyingTeams.length) return null;
  const weighted = qualifyingTeams.map(t=>{
    const rec = allTimeStandings[t.teamIndex] || { wins:0, losses:0 };
    const winPct = (rec.wins + rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0.5;
    const key = `${t.leagueId}_${t.teamIndex}`;
    const yearsSinceHosted = lastHostedYear[key] ? Math.min(cycleYear - lastHostedYear[key], 5) : 5;
    // Recency penalty tapers back in over 5 years so a strong program isn't locked
    // out forever after one turn, but can't host back-to-back either.
    const weight = Math.max(0.05, winPct) * (yearsSinceHosted / 5);
    return { ...t, weight };
  });
  const total = weighted.reduce((s,t)=> s+t.weight, 0);
  let roll = Math.random() * total;
  for(const t of weighted){ roll -= t.weight; if(roll <= 0) return t; }
  return weighted[weighted.length-1];
}

/* ============================ OFF-SEASON & DRAFT DECLARATION TRIGGERS ============================ */
/*
  "Silent" island-wide triggers — calendar-driven effects that fire without their own
  screen (at least for now). Off-season conditioning/decline apply once a tier's
  off-season is actively engaged (the "advance to off-season" choice, not just idly
  sitting in dead-days). Draft declarations are a snapshot-on-a-date mechanic: the
  eligible pool and each fighter's in/out decision are both resolved on the deadline day.
*/

// Prime-age assumption (not previously specified) — flagging it here since it's new:
// 24-29 is a fighter's physical prime, decline starts at 30 and compounds the further
// past it they get. Only matters for Amateur/Pro fighters since Juvenile/Junior top out
// at 20.
const PRIME_AGE_START = 24;
const PRIME_AGE_END = 29;
const DECLINE_START_AGE = 30;

// Extra height/weight tick on top of the normal age-based growth curve — a real
// off-season training camp, not just another birthday passing. Only fires for
// still-developing fighters (under 22); grown adults don't get taller in the off-season.
function applyOffSeasonConditioning(f){
  if(!f.age || f.age >= 22) return;
  const buildMult = { lean:0.9, athletic:1.0, stocky:1.15 }[(f.appearance && f.appearance.build) || 'athletic'] || 1.0;
  f.heightIn = (f.heightIn || 60) + rand(0,1);
  f.weightLb = (f.weightLb || 100) + Math.round(rand(2,6) * buildMult);
}

// A real training camp — more generous than the small in-season growth ticks — bumps
// 2-3 stats toward the tier ceiling.
function applyOffSeasonTrainingBonus(f){
  if(!f.stats) return;
  const ceiling = bandCeiling(f.age||18, f.talentTier||'normal');
  const statKeys = ['speed','quickness','toughness','power','agility'];
  const shuffled = [...statKeys].sort(()=> Math.random()-0.5);
  const bumpCount = rand(2,3);
  for(let i=0;i<bumpCount;i++){
    const key = shuffled[i];
    if(f.stats[key] < ceiling) f.stats[key] = clamp(f.stats[key] + rand(1,3), 1, ceiling);
  }
}

// Past-prime decline — chance and magnitude both grow the further past 30 a fighter
// gets. Only ever touches Amateur/Pro fighters since nobody in Juvenile/Junior is old
// enough to trigger it.
function applyPastPrimeDecline(f){
  if(!f.age || f.age < DECLINE_START_AGE || !f.stats) return;
  const yearsPastPrime = f.age - DECLINE_START_AGE;
  const declineChance = clamp(0.15 + yearsPastPrime*0.08, 0.15, 0.85);
  if(Math.random() > declineChance) return;
  const key = pick(Object.keys(f.stats));
  const amount = 1 + Math.floor(yearsPastPrime/3);
  f.stats[key] = clamp(f.stats[key] - amount, 1, 99);
}

// Runs all three off-season effects on a fighter in one pass — the function the
// "advance to off-season" action should call per-fighter once it's wired to a screen.
function applyOffSeasonToFighter(f){
  applyOffSeasonConditioning(f);
  applyOffSeasonTrainingBonus(f);
  applyPastPrimeDecline(f);
}

// The Juvenile→Junior draft-eligible pool as of the May 1 snapshot day — ages 14-17,
// not already attached to a Junior team or Amateur league. Matches the existing Draft
// Watch eligibility window (draftWatchHtml above).
function juniorDraftEligiblePool(fighters){
  return fighters.filter(f=> f.age >= 14 && f.age <= 17 && !f.juniorTeamId && !f.amateurLeagueId);
}

// Age 17 is mandatory — it's the fighter's final eligible year, so staying isn't an
// option (they'd age out with nowhere to go). 14-16 is a real choice; NPCs default to
// declaring once they're far enough along their growth curve, using the same
// pctOfCeiling threshold Projected Path already reads. The player's own fighter should
// get an actual prompt once that screen exists — this just determines the pool + the
// NPC-side default so the mechanic isn't silently absent while the UI catches up.
function resolveJuniorDraftDeclaration(f){
  if(f.age === 17) return 'declared';
  return growthOutlook(f).pctOfCeiling >= 55 ? 'declared' : 'stayed';
}

// The Junior/Amateur→Pro draft-eligible pool as of the May 25 declare deadline (draft
// itself is June 5). Two source pools: Junior players (mandatory declare at 20, since
// that's when they age out of Junior) and Amateur fighters (any year, once they've built
// a real case).
function proDraftEligiblePool(fighters){
  return fighters.filter(f=> f.age >= 18 && (f.juniorTeamId || f.amateurLeagueId));
}

function resolveProDraftDeclaration(f){
  if(f.juniorTeamId && f.age >= 20) return 'declared';
  return growthOutlook(f).pctOfCeiling >= 70 ? 'declared' : 'stayed'; // Pro bar is higher than Junior's
}

function loadClock(){
  try{ const raw = localStorage.getItem(sk(CLOCK_KEY)); return raw ? JSON.parse(raw) : { day: 1 }; }
  catch(err){ return { day: 1 }; }
}
function saveClock(c){ try{ localStorage.setItem(sk(CLOCK_KEY), JSON.stringify(c)); }catch(err){} }
function getCurrentDay(){ return loadClock().day; }
function advanceClockByDays(n){ const c = loadClock(); c.day = Math.max(1, c.day + n); saveClock(c); return c.day; }
function dateForDay(day){ const d = new Date(GAME_EPOCH); d.setDate(d.getDate() + (day-1)); return d; }
function formatCalendarDate(day){ return dateForDay(day).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }); }
function formatCalendarDateShort(day){ return dateForDay(day).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
function weekdayNameForDay(day){ return WEEKDAY_NAMES[((day-1)%7+7)%7]; }
function eventNameForDay(day){
  const w = weekdayNameForDay(day);
  if(w==='Monday') return 'Juvenile League Fight Night';
  if(w==='Tuesday') return 'Juvenile Local Tournament';
  if(w==='Wednesday') return 'Invite Circuit / Fiesta Fights';
  if(w==='Thursday') return 'Junior League Night';
  if(w==='Friday') return 'Amateur Fight Night';
  if(w==='Saturday') return 'Pro League Night';
  return 'Off Night — no scheduled cards';
}

// Carpathia's remote villages are too sparse to each field a standalone Juvenile pit,
// so they pool into three shared regional circuits instead. Bargo Rift is the smallest
// and most remote of the three (built around Wraithwood, the least populated settlement
// on the island) — it's the intended source for the GDD's rare "cohort of near-invincible
// fighters" event; nobody really knows what training looks like that far from anywhere.
const CARPATHIA_COMBINED_PITS = {
  'Highreach Circuit': ['Mikini','Purovest','Greywatch','White Sands','Slanik','Hollowmere'],
  'Hollow Road Circuit': ["Sorrow's Pass",'Ravenshade','Varna','Drovna','Balchik','Ludus'],
  'Bargo Rift Circuit': ['Kessel Vorn','Thornfall','Bargo Pass','Pice','Wraithwood'],
};

// Juvenile pit sizing, PER WEIGHT CLASS (multiply by 3 for a location's total roster).
// TARGET is what a settlement fields at full province appetite (1.0); HARD_MIN is the
// absolute floor regardless of appetite, so even the lowest-interest province still
// puts on a real Tuesday-night bracket everywhere instead of a two-man scrap.
const PIT_TIER_TARGET  = { Village:6, CombinedPit:11, Town:20, City:35, Capital:50 };
const PIT_TIER_HARDMIN = { Village:4, CombinedPit:6,  Town:10, City:18, Capital:28 };

// How much of a province's population actually turns out for organized Juvenile
// fighting (0-1). Settlement counts and populations set the ceiling; appetite is the
// knob that sets the actual island pecking order — Kolsati and Sherwood are fight-mad,
// Gazon and Carpathia are provinces nobody bothers scouting.
const PROVINCE_APPETITE = {
  kolsati:1.00, sherwood:0.90, ditiero:0.68, alexandretta:0.60,
  northeast:0.55, bay:0.58, carpathia:0.28, gazon:0.40,
};

// Every Juvenile pit location in a province, with how many fighters per weight class it
// should carry. Real settlements map 1:1 except Carpathia, where combined-pit members
// are folded into their circuit and each fighter's hometown is drawn from the real
// member villages (so Free Roam's map/walkability never sees a fake location name —
// only the fight-log/tournament grouping treats them as one shared pit).
function pitLocationsForProvince(provinceId){
  const settlements = SETTLEMENT_DATA[provinceId] || [];
  const appetite = PROVINCE_APPETITE[provinceId] ?? 0.5;
  const combined = provinceId === 'carpathia' ? CARPATHIA_COMBINED_PITS : null;
  const combinedMembers = combined ? new Set(Object.values(combined).flat()) : new Set();
  const locations = [];
  settlements.forEach(s=>{
    if(combinedMembers.has(s.name)) return; // folded into a combined pit below
    const perClass = Math.max(PIT_TIER_HARDMIN[s.tier], Math.round(PIT_TIER_TARGET[s.tier] * appetite));
    locations.push({ key: s.name, hometownPool:[s.name], perClass });
  });
  if(combined){
    Object.entries(combined).forEach(([pitName, members])=>{
      const perClass = Math.max(PIT_TIER_HARDMIN.CombinedPit, Math.round(PIT_TIER_TARGET.CombinedPit * appetite));
      locations.push({ key: pitName, hometownPool: members, perClass });
    });
  }
  return locations;
}

// Resolves a fighter's real hometown to its shared-pit grouping key for fight-log and
// tournament-bracket purposes — Carpathia's combined-circuit villages collapse to one
// key (e.g. "Bargo Rift Circuit"), everyone else's hometown is already the key.
function pitKeyForHometown(hometown){
  for(const [pitName, members] of Object.entries(CARPATHIA_COMBINED_PITS)){
    if(members.includes(hometown)) return pitName;
  }
  return hometown;
}

// Every pit location island-wide, ranked by roster depth — this IS the ranking that
// decides which 5-6 pits are big enough to host a Wednesday invitational most weeks.
// Computed fresh from PIT_TIER_TARGET/PROVINCE_APPETITE rather than a hardcoded list,
// so retuning those constants automatically retunes who's "top tier" too.
function topPitsIslandWide(n){
  const all = [];
  PROVINCES.forEach(p=>{
    pitLocationsForProvince(p.id).forEach(loc=>{
      all.push({ provinceId: p.id, key: loc.key, hometownPool: loc.hometownPool, perClass: loc.perClass });
    });
  });
  all.sort((a,b)=> b.perClass - a.perClass);
  return all.slice(0, n);
}

// Roughly evocative, gritty promo-circuit names — the pool an event's sponsor name gets
// drawn from. The same name can run independently at multiple pits (a "Cannonball
// Rumble" in Kolsati and a separate "Cannonball Rumble" in Alexandretta both track their
// own edition numbers), and a single pit can host more than one named series over time.
const INVITE_SPONSOR_NAMES = [
  'Cannonball Rumble','Wednesday Beatdown','Iron Fist Invitational','The Blacktop Brawl',
  'Sundown Slugfest','The Hard Row Classic','Lantern Night Showcase','The Anvil Cup',
  'Tin Roof Throwdown','Dustbowl Derby','The Salt Circuit Invitational','Midweek Mayhem',
  'The Broken Bell Invitational','Cinder Row Clash','The Drydock Duel','Foghorn Faceoff',
  'The Split Lip Series','Hollow Bell Showcase','The Rust Belt Rumble','Payday Fights',
];
const INVITE_REGISTRY_KEY = 'iifl_invite_registry_v1';
function loadInviteRegistry(){
  try{ const raw = localStorage.getItem(sk(INVITE_REGISTRY_KEY)); return raw ? JSON.parse(raw) : {}; }
  catch(err){ return {}; }
}
function saveInviteRegistry(reg){
  try{ localStorage.setItem(sk(INVITE_REGISTRY_KEY), JSON.stringify(reg)); }catch(err){}
}
function ordinal(n){
  const suf = ['th','st','nd','rd'], v = n % 100;
  return n + (suf[(v-20)%10] || suf[v] || suf[0]);
}
// Books this week's edition of a hosting pit's event — reuses one of that pit's
// established sponsors 85% of the time (incrementing its count), occasionally launching
// a brand new named series at that pit instead (starts at "1st").
function bookInviteEdition(pitKey){
  const reg = loadInviteRegistry();
  if(!reg[pitKey]) reg[pitKey] = [];
  let entry;
  if(reg[pitKey].length && Math.random() < 0.85){
    entry = pick(reg[pitKey]);
  } else {
    const used = new Set(reg[pitKey].map(e=>e.name));
    const available = INVITE_SPONSOR_NAMES.filter(n=> !used.has(n));
    const name = available.length ? pick(available) : pick(INVITE_SPONSOR_NAMES);
    entry = { name, count: 0 };
    reg[pitKey].push(entry);
  }
  entry.count += 1;
  saveInviteRegistry(reg);
  return { name: entry.name, edition: entry.count, label: `${ordinal(entry.count)} ${entry.name}` };
}

// A real 365-day calendar year. The whole island calendar recurs annually on this
// same cadence (nextJuvenileOpeningDay jumps to cycleYear+1's May 1, same month/day
// every year) — so a fighter's age should follow the same real-year clock everything
// else on the island already runs on, not an invented shorter unit.
const DAYS_PER_FIGHTER_YEAR = 365;
function birthDayForAge(age, today){
  return today - (age*DAYS_PER_FIGHTER_YEAR) - Math.floor(Math.random()*DAYS_PER_FIGHTER_YEAR); // no floor — a fighter older than the world itself needs a pre-Day-1 (negative) birthday; dateForDay() handles negative days fine via native Date math
}
function ageFromBirthday(birthDay, today){ return Math.max(0, Math.floor((today-birthDay)/DAYS_PER_FIGHTER_YEAR)); }

// Repairs birthDay values saved under the OLD 63-day-year system, which collapse to a
// near-zero apparent age once reinterpreted under the 365-day divisor. entryDay is real
// ground truth where available (juvenile intake always starts at exactly 11); everything
// else falls back to a rough fights-played estimate rather than trusting the already-
// corrupted age field. Gated by ageSystemVersion so it only ever runs once per fighter.
// v3 (2026-07-17): the v2 migration ran before DAYS_PER_FIGHTER_YEAR was corrected
// from 63 to 365, so it stamped fighters "migrated" with a wrong-divisor birthDay.
// v4 (2026-07-17, same day): birthDayForAge() had a Math.max(1, ...) floor that clamped
// EVERY fighter older than the world itself (world was only ~2 sim-years old) to a
// birthDay of exactly 1 — collapsing everyone's age to "years since Day 1" forever,
// which is what actually caused the persistent "everyone is 2" bug. A birthday before
// Day 1 is valid (dateForDay handles negative days fine); the floor was the bug, now
// removed. If age corruption ever resurfaces, bump this number again rather than
// patching in place — re-deriving without bumping just re-stamps the same fighters
// as "already fixed" without ever touching their bad data.
function estimateAgeFallback(f){
  const totalFights = f.record ? (f.record.wins||0)+(f.record.losses||0) : 0;
  if(f.juniorTeamId || f.amateurLeagueId){
    return Math.min(35, Math.max(14, 16 + Math.round(totalFights / 12)));
  }
  return Math.min(18, Math.max(11, 11 + Math.round(totalFights / 7)));
}
function syncFighterAge(f, today){
  if(f.ageSystemVersion === 4){
    if(!f.birthDay) f.birthDay = birthDayForAge(f.age || 12, today);
    f.age = ageFromBirthday(f.birthDay, today);
    return;
  }
  if(f.entryDay){
    f.age = 11 + Math.floor((today - f.entryDay) / DAYS_PER_FIGHTER_YEAR);
  } else {
    f.age = estimateAgeFallback(f);
  }
  f.birthDay = birthDayForAge(f.age, today);
  f.ageSystemVersion = 4;
}

function ensureFighterDefaults(f){
  if(!f.record) f.record = { wins:0, losses:0 };
  if(!f.fightLog) f.fightLog = [];
  if(!f.age) f.age = 12;
  syncFighterAge(f, getCurrentDay());
  if(f.juniorTeamId === undefined) f.juniorTeamId = null;
  if(f.juniorLeagueId === undefined) f.juniorLeagueId = null;
  if(!f.juniorRightsHolders) f.juniorRightsHolders = []; // [{leagueId, teamIndex}] exclusive re-sign rights after a decline
  if(!f.juniorDraftHistory) f.juniorDraftHistory = [];
  reconcileRecord(f);
  return f;
}
// Same fix as Fight Pit/Free Roam — the header record is always recomputed from the
// fight log rather than tracked as a separate counter that could fall out of sync.
function reconcileRecord(f){
  if(!f.fightLog) return;
  const wins = f.fightLog.filter(e=>e.result==='W').length;
  const losses = f.fightLog.filter(e=>e.result==='L').length;
  f.record = { wins, losses };
}
function getRoster(){ const roster = loadRoster().map(ensureFighterDefaults); saveRoster(roster); return roster; }
function getFighterById(id){ return getRoster().find(f=> f.id === id); }
function updateFighter(id, mutateFn){
  const roster = loadRoster().map(ensureFighterDefaults);
  const f = roster.find(r=> r.id === id);
  if(f){ mutateFn(f); saveRoster(roster); }
  return f;
}

function loadJrState(){
  try{ const raw = localStorage.getItem(sk(JR_STATE_KEY)); return raw ? JSON.parse(raw) : { rosters:{} }; }
  catch(err){ console.error('IIFL junior league state load failed:', err); return { rosters:{} }; }
}
function saveJrState(s){
  try{ localStorage.setItem(sk(JR_STATE_KEY), JSON.stringify(s)); return true; }
  catch(err){ console.error('IIFL junior league state save failed:', err); return false; }
}
const WC_WEIGHT_RANGES = { Fly:[75,90], Light:[91,105], Middle:[106,120], Heavy:[121,140], Mega:[141,175] };
const TEAMMATE_SKIN_TONES = ['#3E2A1E','#5C3A24','#8C5A35','#C68642','#E0AC69','#F1C27D'];
const TEAMMATE_HAIR_COLORS = ['#0E0C0A','#3B2417','#6B4226','#A85C2A','#C9A23C','#D9D2C5'];

function rollJuniorTalentTier(){
  const r = Math.random();
  if(r < 0.02) return 'generational';
  if(r < 0.20) return 'prodigy';
  return 'normal';
}
// NPC teammate — full stat block so they can actually be simulated in team games,
// not just a name on a roster sheet. Named per the province mix of the drafting league.
function generateTeammateFighter(weightClass, league, provinceIdHint){
  const provinceId = provinceIdHint || (league ? pick(league.provinces) : 'bay');
  const tier = rollJuniorTalentTier();
  const ceiling = juniorCeiling(tier);
  const targetOVR = rand(Math.round(ceiling*0.3), Math.round(ceiling*0.85));
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    stats[k] = clamp(targetOVR + rand(-6,6), 5, ceiling);
  });
  const age = rand(14,20); // Junior League's full age span
  const build = pick(['lean','athletic','stocky']);
  const bmiTarget = bmiForBuild(build);
  const adultHeightIn = rollAdultHeightIn();
  const heightIn = heightForAge(adultHeightIn, age);
  const weightLb = weightForAge(heightIn, age, bmiTarget);
  return {
    id: 'teammate_' + Date.now() + '_' + rand(0,99999),
    name: pickName(provinceId, null),
    primaryDisc: pick(ALL_DISCIPLINES),
    stats, age,
    weightLb, heightIn, adultHeightIn, bmiTarget,
    weightClass: weightClassOf(weightLb),
    talentTier: tier,
    potential: rand(30,80),
    appearance: { skin: pick(TEAMMATE_SKIN_TONES), hair: pick(TEAMMATE_HAIR_COLORS), build },
  };
}

function teamRosterKey(leagueId, teamIndex){ return leagueId+'_'+teamIndex; }
function ensureTeamRoster(leagueId, teamIndex){
  const s = loadJrState();
  const key = teamRosterKey(leagueId, teamIndex);
  const league = getJrLeague(leagueId);
  const team = jrTeam(leagueId, teamIndex);
  const teamProvince = team ? team.provinceId : null;
  if(s.rosters[key]){
    // Repair pass: earlier builds only stored a name for NPC slots (no stats). Any
    // slot missing a usable fighter object gets regenerated in place so old saved
    // data doesn't silently break the lineup screen.
    let repaired = false;
    s.rosters[key].forEach(sl=>{
      if(!sl.isPlayer && (!sl.fighter || !sl.fighter.stats)){
        sl.fighter = generateTeammateFighter(sl.weightClass, league, teamProvince);
        sl.name = sl.fighter.name;
        repaired = true;
      }
    });
    if(repaired) saveJrState(s);
    return s.rosters[key];
  }
  const slots = [];
  WEIGHT_CLASSES.forEach(wc=>{
    for(let i=0;i<2;i++){
      const fighter = generateTeammateFighter(wc, league, teamProvince);
      slots.push({ weightClass: wc, name: fighter.name, isPlayer:false, fighterId:null, fighter });
    }
  });
  s.rosters[key] = slots;
  saveJrState(s);
  return slots;
}
function setPlayerIntoRoster(leagueId, teamIndex, fighter){
  const s = loadJrState();
  const key = teamRosterKey(leagueId, teamIndex);
  if(!s.rosters[key]) ensureTeamRoster(leagueId, teamIndex);
  const slots = loadJrState().rosters[key];
  const wClass = weightClassOf(fighter.weightLb);
  let slot = slots.find(sl=> sl.weightClass===wClass && !sl.isPlayer);
  if(!slot) slot = slots[0];
  slot.isPlayer = true;
  slot.name = fighter.name;
  slot.fighterId = fighter.id;
  slot.fighter = null; // player's live stats are always fetched fresh via fighterId
  const s2 = loadJrState();
  s2.rosters[key] = slots;
  saveJrState(s2);
}
// Resolves a roster slot to a live fighter object — player slots pull fresh from the
// shared roster (so growth/aging always reflects current state), NPC slots use their
// stored generated stats.
function resolveSlotFighter(slot){
  if(slot.isPlayer && slot.fighterId){
    const f = getFighterById(slot.fighterId);
    if(f) return f;
  }
  return slot.fighter;
}
function weightClassOf(weightLb){
  // 5-class Junior/Pro split, widened for the BMI-based body model (realistic weights
  // now span teen-lean up to full-grown-heavyweight, not the old flat low range).
  if(weightLb <= 135) return 'Fly';
  if(weightLb <= 165) return 'Light';
  if(weightLb <= 195) return 'Middle';
  if(weightLb <= 230) return 'Heavy';
  return 'Mega';
}

/*
  Whole-league round-robin schedule, "circle method" — every team plays once per week,
  everyone plays everyone exactly once across the season. Matches real sports scheduling:
  the whole league moves in lockstep, Saturdays for Junior, Sundays reserved for Pro later.
*/
function generateRoundRobinSchedule(teamCount){
  const teams = Array.from({length: teamCount}, (_,i)=>i);
  const n = teams.length; // both our leagues (16, 12) are even — no byes needed
  const fixed = teams[0];
  let rotation = teams.slice(1);
  const weeks = [];
  for(let w=0; w<n-1; w++){
    const roundTeams = [fixed, ...rotation];
    const pairs = [];
    for(let i=0;i<n/2;i++){
      const a = roundTeams[i], b = roundTeams[n-1-i];
      // Alternate home/away by week parity so nobody's permanently stuck on the road.
      pairs.push(w % 2 === 0 ? { home:a, away:b } : { home:b, away:a });
    }
    weeks.push(pairs);
    rotation.push(rotation.shift());
  }
  return weeks;
}

function ensureLeagueSchedule(leagueId){
  const s = loadJrState();
  if(!s.leagueSchedules) s.leagueSchedules = {};
  if(s.leagueSchedules[leagueId]) return s.leagueSchedules[leagueId];
  const league = getJrLeague(leagueId);
  const weeks = generateRoundRobinSchedule(league.teams.length);
  s.leagueSchedules[leagueId] = weeks;
  saveJrState(s);
  return weeks;
}
function getLeagueWeek(leagueId){
  const s = loadJrState();
  if(!s.leagueWeek) s.leagueWeek = {};
  if(s.leagueWeek[leagueId] === undefined){ s.leagueWeek[leagueId] = 0; saveJrState(s); }
  return s.leagueWeek[leagueId];
}
function advanceLeagueWeek(leagueId){
  const s = loadJrState();
  if(!s.leagueWeek) s.leagueWeek = {};
  s.leagueWeek[leagueId] = (s.leagueWeek[leagueId]||0) + 1;
  saveJrState(s);
}
function findWeekPairing(leagueId, teamIndex, weekIdx){
  const weeks = ensureLeagueSchedule(leagueId);
  if(weekIdx >= weeks.length) return null;
  return weeks[weekIdx].find(p=> p.home===teamIndex || p.away===teamIndex) || null;
}

function ensureStandings(leagueId){
  const s = loadJrState();
  if(!s.standings) s.standings = {};
  if(!s.standings[leagueId]){
    const league = getJrLeague(leagueId);
    s.standings[leagueId] = league.teams.map(()=> ({ wins:0, losses:0 }));
    saveJrState(s);
  }
  return s.standings[leagueId];
}
// All-time record persists across season resets (there's no season-reset system yet,
// so right now it just tracks in parallel with current — the infrastructure is ready
// for whenever seasons actually roll over).
function ensureAllTimeStandings(leagueId){
  const s = loadJrState();
  if(!s.allTimeStandings) s.allTimeStandings = {};
  if(!s.allTimeStandings[leagueId]){
    const league = getJrLeague(leagueId);
    s.allTimeStandings[leagueId] = league.teams.map(()=> ({ wins:0, losses:0 }));
    saveJrState(s);
  }
  return s.allTimeStandings[leagueId];
}
function recordStandingsResult(leagueId, homeIdx, awayIdx, homeWon){
  const standings = ensureStandings(leagueId);
  const allTime = ensureAllTimeStandings(leagueId);
  if(homeWon){ standings[homeIdx].wins += 1; standings[awayIdx].losses += 1; allTime[homeIdx].wins += 1; allTime[awayIdx].losses += 1; }
  else { standings[awayIdx].wins += 1; standings[homeIdx].losses += 1; allTime[awayIdx].wins += 1; allTime[homeIdx].losses += 1; }
  const s = loadJrState(); s.standings[leagueId] = standings; s.allTimeStandings[leagueId] = allTime; saveJrState(s);
}

/* ============================ NPC BULK DRAFT ============================ */
/*
  The player's own draft (runDraftForFighter, further up) resolves one fighter against
  a flavor-only procedural board. This is the real thing — every Juvenile fighter who
  declared on the May 1 deadline (tagged juniorDraftDeclaration/juniorDraftDeclaredYear
  by runJuniorDraftDeclareDay in the fight_pit/free_roam field-pool code) actually gets
  drafted onto real Junior rosters here, island-wide, on Draft Day itself.

  Draft order: leagues go in their existing draftOrder (Kolsati, Northern, Eastern —
  Kolsati picks its whole 3 rounds before Northern gets a look, matching the existing
  "Kolsati drafts first and gets the best" design). Within a league, teams pick in
  reverse-standings order (worst record first) using THIS season's running standings —
  there's no season-archival system yet to pull a true "prior season" order from, so
  this is the practical stand-in; falls back to random order before any games have been
  played. Every round is best-fighter-available from the declared pool.
*/

// Worst-to-best team order within one league. Falls back to random if no games have
// been played yet this season (win% ties at 0-0 across the board).
function resolveTeamDraftOrder(leagueId){
  const league = getJrLeague(leagueId);
  const standings = ensureStandings(leagueId);
  const indices = league.teams.map((_,i)=> i);
  const anyGamesPlayed = standings.some(s=> (s.wins+s.losses) > 0);
  if(!anyGamesPlayed){
    for(let i=indices.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [indices[i],indices[j]]=[indices[j],indices[i]]; }
    return indices;
  }
  return [...indices].sort((a,b)=>{
    const wa = standings[a], wb = standings[b];
    const pctA = (wa.wins+wa.losses) ? wa.wins/(wa.wins+wa.losses) : 0.5;
    const pctB = (wb.wins+wb.losses) ? wb.wins/(wb.wins+wb.losses) : 0.5;
    return pctA - pctB; // ascending win% = worst team first
  });
}

// Places a real drafted fighter (a genuine Juvenile-pool prospect, not a generated
// placeholder) into a team roster slot — same pattern as setPlayerIntoRoster, but for
// an NPC: stores the live fighter object directly rather than a fighterId lookup, since
// drafted prospects aren't tracked in the player's own roster.
function draftFighterIntoRoster(leagueId, teamIndex, fighter){
  ensureTeamRoster(leagueId, teamIndex);
  const s = loadJrState();
  const key = teamRosterKey(leagueId, teamIndex);
  const slots = s.rosters[key];
  const wClass = weightClassOf(fighter.weightLb);
  let slot = slots.find(sl=> sl.weightClass===wClass && !sl.isPlayer && !sl.isDraftedProspect);
  if(!slot) slot = slots.find(sl=> !sl.isPlayer && !sl.isDraftedProspect) || slots[0];
  slot.isPlayer = false;
  slot.isDraftedProspect = true;
  slot.name = fighter.name;
  slot.fighterId = null;
  slot.fighter = fighter;
  s.rosters[key] = slots;
  saveJrState(s);
}

// The real engine. Call once per island-year on Draft Day (gated by the calendar at
// the call site, not in here) — gathers every fighter who declared this cycle across
// every province's Juvenile pool, runs the full 3-league x 3-round draft, assigns
// picks onto real team rosters, and removes drafted fighters from the Juvenile pool.
// Returns a results/board structure shaped like runDraftForFighter's so the same
// Draft Day screen can display both a player pick (if any) and the full NPC board.
function runJuniorDraftDayBulk(cycleYear){
  const pools = loadFieldPools();
  const declared = [];
  Object.keys(pools.juvenile || {}).forEach(provinceId=>{
    pools.juvenile[provinceId].forEach(f=>{
      if(f.juniorDraftDeclaredYear === cycleYear && f.juniorDraftDeclaration === 'declared'){
        declared.push(f);
      }
    });
  });
  declared.sort((a,b)=> calcOVR(b.stats)-calcOVR(a.stats)); // best-available pool, island-wide
  const available = [...declared];
  const board = {};
  const results = [];

  [...JR_LEAGUES].sort((a,b)=> a.draftOrder-b.draftOrder).forEach(league=>{
    const order = resolveTeamDraftOrder(league.id);
    board[league.id] = [];
    for(let r=0; r<3; r++){
      const roundPicks = [];
      order.forEach(teamIndex=>{
        const prospect = available.shift(); // best remaining fighter, island-wide
        if(!prospect){ roundPicks.push(null); return; }
        draftFighterIntoRoster(league.id, teamIndex, prospect);
        results.push({ leagueId: league.id, round: r+1, teamIndex, fighterId: prospect.id, name: prospect.name });
        roundPicks.push({ team: jrTeamName(league.id, teamIndex), name: prospect.name, isPlayer:false, fighterId: prospect.id });
      });
      board[league.id].push(roundPicks);
    }
  });

  // Drafted fighters come off the Juvenile board entirely — remove by id from every
  // province's pool in one pass.
  const draftedIds = new Set(results.map(r=> r.fighterId));
  Object.keys(pools.juvenile || {}).forEach(provinceId=>{
    pools.juvenile[provinceId] = pools.juvenile[provinceId].filter(f=> !draftedIds.has(f.id));
  });
  saveFieldPools(pools);

  return { results, board, totalDeclared: declared.length, totalDrafted: results.length };
}

/* ============================ JUNIOR PLAYOFFS ============================ */
/*
  Two stages, matching resolveJuniorPlayoffSubPhase's calendar split:
  1. LEAGUE PLAYOFFS (jrLeaguePlayoffStart -> jrLeaguePlayoffEnd, 2 weeks): each of the
     3 leagues independently runs a top-4 single-elim bracket (1v4, 2v3, then the final)
     to crown a league champion. A host TEAM is picked from the qualifiers via
     pickLeaguePlayoffHost (weighted rotation, imported from the fight_pit calendar
     module) purely for venue/hometown-edge purposes — hosting never grants a bracket
     spot, only qualifying teams play.
  2. ISLAND CHAMPIONSHIP (jrIslandChampStart -> jrIslandChampEnd, 2 weeks): the 3 league
     champions plus a HOST CITY (any Junior team, chosen via a May bid — see
     pickIslandChampionshipHost) meet in a 4-team single-elim: Host vs #1 seed in one
     semi, #2 vs #3 in the other, winners meet in the final. If the host team happens to
     also be a league champion by the time this runs, its host-slot passes to the next
     best non-champion team island-wide (the host CITY still gets credit for hosting;
     it just doesn't occupy two bracket seats).
*/
const JR_PLAYOFF_QUALIFIER_COUNT = 4;

// Top 4 by this season's win% — ties broken by raw win count, then random (stable
// enough for a bracket cut; a real tiebreaker system is more than this needs right now).
function getPlayoffQualifiers(leagueId){
  const league = getJrLeague(leagueId);
  const standings = ensureStandings(leagueId);
  const withPct = league.teams.map((_,i)=>{
    const rec = standings[i];
    const pct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0;
    return { teamIndex:i, pct, wins:rec.wins };
  });
  withPct.sort((a,b)=> (b.pct-a.pct) || (b.wins-a.wins) || (Math.random()-0.5));
  return withPct.slice(0, JR_PLAYOFF_QUALIFIER_COUNT).map(t=>t.teamIndex);
}

// Resolves (and persists) this league's playoff host exactly once per cycle, from the
// set of teams that actually qualified.
// Pre-determined BEFORE the season, from every team in the league — not conditioned on
// qualifying. This is a rotation (weighted toward stronger programs, recency-penalized),
// not a bid like the Island Championship's; it just needs to be locked in before
// playoffs need a venue. Resolved once per cycle at Junior's season-open day.
function resolveLeaguePlayoffHostPreSeason(leagueId, cycleYear){
  const s = loadJrState();
  if(!s.lastHostedYear) s.lastHostedYear = {};
  if(!s.leaguePlayoffHost) s.leaguePlayoffHost = {};
  const league = getJrLeague(leagueId);
  const allTeams = league.teams.map((_,teamIndex)=> ({ leagueId, teamIndex }));
  const allTime = ensureAllTimeStandings(leagueId);
  const picked = pickLeaguePlayoffHost(allTeams, allTime, s.lastHostedYear, cycleYear);
  const teamIndex = picked ? picked.teamIndex : 0;
  s.lastHostedYear[`${leagueId}_${teamIndex}`] = cycleYear;
  s.leaguePlayoffHost[leagueId] = { cycleYear, teamIndex };
  saveJrState(s);
  return teamIndex;
}

// Idempotent per-cycle trigger for host selection — gated at Junior's season-open day
// (well before playoffs, matching "pre-determine... rotates year to year").
function ensureLeaguePlayoffHostsForYear(cycleYear){
  const s = loadJrState();
  if(getCurrentDay() < tierKeyDates(cycleYear).juniorOpen) return;
  JR_LEAGUES.forEach(league=>{
    const existing = s.leaguePlayoffHost && s.leaguePlayoffHost[league.id];
    if(existing && existing.cycleYear === cycleYear) return;
    resolveLeaguePlayoffHostPreSeason(league.id, cycleYear);
  });
}

// One playoff game — same 5-weight-class aggregate as the regular season
// (simulateAiTeamGame), but doesn't touch regular-season standings, and always gives
// the host team's fighters the hometown-arena edge regardless of which side of the
// bracket they're on.
function simulatePlayoffGame(leagueId, teamAIdx, teamBIdx, hostTeamIdx){
  const slotsA = ensureTeamRoster(leagueId, teamAIdx);
  const slotsB = ensureTeamRoster(leagueId, teamBIdx);
  const aIsHost = teamAIdx === hostTeamIdx;
  const lineupB = aiPickLineup(slotsB, null);
  const lineupA = aiPickLineup(slotsA, lineupB);
  let scoreA = 0, scoreB = 0;
  WEIGHT_CLASSES.forEach(wc=>{
    const fA = lineupA[wc], fB = lineupB[wc];
    if(!fA || !fB) return;
    const bout = simulateBout(fA, fB, { arena:{floor:'championship court'}, hometownPit: aIsHost ? true : false });
    if(bout.winner.id === fA.id) scoreA++; else scoreB++;
  });
  return { winnerIdx: scoreA >= scoreB ? teamAIdx : teamBIdx, scoreA, scoreB };
}

// Runs one league's entire playoff bracket top to bottom — call once per cycle, gated
// at the call site by the calendar (jrLeaguePlayoffStart). The host was already locked
// in back at season-open (ensureLeaguePlayoffHostsForYear) — this just reads it; if for
// some reason it's missing (an old save, or the season-open trigger never fired), it
// falls back to resolving one on the spot rather than crashing.
function runLeaguePlayoffs(leagueId, cycleYear){
  const qualifiers = getPlayoffQualifiers(leagueId); // [1st,2nd,3rd,4th] seed order
  const s0 = loadJrState();
  const preResolved = s0.leaguePlayoffHost && s0.leaguePlayoffHost[leagueId];
  const hostTeamIdx = (preResolved && preResolved.cycleYear === cycleYear)
    ? preResolved.teamIndex
    : resolveLeaguePlayoffHostPreSeason(leagueId, cycleYear);
  const semiA = simulatePlayoffGame(leagueId, qualifiers[0], qualifiers[3], hostTeamIdx); // 1 vs 4
  const semiB = simulatePlayoffGame(leagueId, qualifiers[1], qualifiers[2], hostTeamIdx); // 2 vs 3
  const final = simulatePlayoffGame(leagueId, semiA.winnerIdx, semiB.winnerIdx, hostTeamIdx);
  const result = {
    cycleYear, qualifiers, hostTeamIdx,
    semis: [
      { a: qualifiers[0], b: qualifiers[3], ...semiA },
      { a: qualifiers[1], b: qualifiers[2], ...semiB },
    ],
    final: { a: semiA.winnerIdx, b: semiB.winnerIdx, ...final },
    championTeamIdx: final.winnerIdx,
  };
  const s = loadJrState();
  if(!s.leaguePlayoffs) s.leaguePlayoffs = {};
  s.leaguePlayoffs[leagueId] = result;
  saveJrState(s);
  return result;
}

// Idempotent per-cycle trigger — safe to call every render, only actually runs once
// the calendar hits jrLeaguePlayoffStart, and only once per league per cycle.
function ensureLeaguePlayoffsRunForYear(cycleYear){
  const s = loadJrState();
  if(getCurrentDay() < tierKeyDates(cycleYear).jrLeaguePlayoffStart) return;
  JR_LEAGUES.forEach(league=>{
    const existing = s.leaguePlayoffs && s.leaguePlayoffs[league.id];
    if(existing && existing.cycleYear === cycleYear) return;
    runLeaguePlayoffs(league.id, cycleYear);
  });
}

/* ---------------------------- ISLAND CHAMPIONSHIP ---------------------------- */

// Any Junior team, from any league, can bid to host — this runs in May, long before
// anyone knows who the eventual 3 league champions even are, so it can't be scoped to
// "qualifying" teams the way the per-league host pick is.
function allJuniorTeamsFlat(){
  const flat = [];
  JR_LEAGUES.forEach(league=> league.teams.forEach((_,teamIndex)=> flat.push({ leagueId: league.id, teamIndex })));
  return flat;
}

// Same weighted-rotation shape as pickLeaguePlayoffHost, just pooling every team
// island-wide instead of one league's qualifiers.
function pickIslandChampionshipHost(cycleYear){
  const s = loadJrState();
  if(!s.islandChampHostHistory) s.islandChampHostHistory = {};
  const allTeams = allJuniorTeamsFlat();
  const weighted = allTeams.map(t=>{
    const allTime = ensureAllTimeStandings(t.leagueId);
    const rec = allTime[t.teamIndex] || { wins:0, losses:0 };
    const winPct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0.5;
    const key = `${t.leagueId}_${t.teamIndex}`;
    const yearsSince = s.islandChampHostHistory[key] ? Math.min(cycleYear - s.islandChampHostHistory[key], 5) : 5;
    const weight = Math.max(0.05, winPct) * (yearsSince/5);
    return { ...t, weight };
  });
  const total = weighted.reduce((sum,t)=> sum+t.weight, 0);
  let roll = Math.random()*total;
  let picked = weighted[weighted.length-1];
  for(const t of weighted){ roll -= t.weight; if(roll <= 0){ picked = t; break; } }
  s.islandChampHostHistory[`${picked.leagueId}_${picked.teamIndex}`] = cycleYear;
  s.islandChampHost = { cycleYear, leagueId: picked.leagueId, teamIndex: picked.teamIndex };
  saveJrState(s);
  return s.islandChampHost;
}

function ensureIslandChampHostForYear(cycleYear){
  const s = loadJrState();
  if(s.islandChampHost && s.islandChampHost.cycleYear === cycleYear) return s.islandChampHost;
  if(getCurrentDay() < tierKeyDates(cycleYear).jrChampHostAnnounced) return null;
  return pickIslandChampionshipHost(cycleYear);
}

// Seeds the 3 league champions #1-#3 by this season's win% (not raw wins — the 3
// leagues have different team counts and round-robin lengths, so win% is the only fair
// cross-league comparison).
function seedIslandChampionshipTeams(cycleYear){
  const s = loadJrState();
  const champs = JR_LEAGUES.map(league=>{
    const lp = s.leaguePlayoffs && s.leaguePlayoffs[league.id];
    if(!lp || lp.cycleYear !== cycleYear) return null;
    const standings = ensureStandings(league.id);
    const rec = standings[lp.championTeamIdx];
    const pct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0;
    return { leagueId: league.id, teamIndex: lp.championTeamIdx, pct };
  }).filter(Boolean);
  champs.sort((a,b)=> b.pct-a.pct);
  return champs; // [#1, #2, #3]
}

// Runs the full 4-team Island Championship: Host vs #1 in one semi, #2 vs #3 in the
// other. If the host also won its own league (so it's already one of the 3 seeds), its
// host slot passes to the next-best non-champion team island-wide — the host city
// still gets hosting credit, it just doesn't occupy two bracket seats.
function runIslandChampionship(cycleYear){
  const host = ensureIslandChampHostForYear(cycleYear);
  const seeds = seedIslandChampionshipTeams(cycleYear);
  if(!host || seeds.length < 3) return null;

  const hostIsAlsoChamp = seeds.some(c=> c.leagueId===host.leagueId && c.teamIndex===host.teamIndex);
  let hostSlot = host;
  if(hostIsAlsoChamp){
    const champKeys = new Set(seeds.map(c=> `${c.leagueId}_${c.teamIndex}`));
    const allTeams = allJuniorTeamsFlat().filter(t=> !champKeys.has(`${t.leagueId}_${t.teamIndex}`));
    let best = null, bestPct = -1;
    allTeams.forEach(t=>{
      const standings = ensureStandings(t.leagueId);
      const rec = standings[t.teamIndex];
      const pct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0;
      if(pct > bestPct){ bestPct = pct; best = t; }
    });
    hostSlot = best || host;
  }

  // Cross-league team match — both sides borrow simulatePlayoffGame's per-weight-class
  // aggregate, but since the two teams are in different leagues (different roster
  // pools), we resolve it directly here instead of routing through one league's helper.
  function crossLeagueGame(teamA, teamB, hostTeam){
    const slotsA = ensureTeamRoster(teamA.leagueId, teamA.teamIndex);
    const slotsB = ensureTeamRoster(teamB.leagueId, teamB.teamIndex);
    const aIsHost = teamA.leagueId===hostTeam.leagueId && teamA.teamIndex===hostTeam.teamIndex;
    const lineupB = aiPickLineup(slotsB, null);
    const lineupA = aiPickLineup(slotsA, lineupB);
    let scoreA=0, scoreB=0;
    WEIGHT_CLASSES.forEach(wc=>{
      const fA = lineupA[wc], fB = lineupB[wc];
      if(!fA || !fB) return;
      const bout = simulateBout(fA, fB, { arena:{floor:'championship court'}, hometownPit: aIsHost });
      if(bout.winner.id===fA.id) scoreA++; else scoreB++;
    });
    return { winner: scoreA>=scoreB ? teamA : teamB, scoreA, scoreB };
  }

  const semiA = crossLeagueGame(hostSlot, seeds[0], hostSlot); // Host vs #1
  const semiB = crossLeagueGame(seeds[1], seeds[2], hostSlot); // #2 vs #3
  const final = crossLeagueGame(semiA.winner, semiB.winner, hostSlot);

  const result = {
    cycleYear, host, hostSlot, hostIsAlsoChamp, seeds,
    semis: [
      { a: hostSlot, b: seeds[0], winner: semiA.winner, scoreA: semiA.scoreA, scoreB: semiA.scoreB },
      { a: seeds[1], b: seeds[2], winner: semiB.winner, scoreA: semiB.scoreA, scoreB: semiB.scoreB },
    ],
    final: { a: semiA.winner, b: semiB.winner, winner: final.winner, scoreA: final.scoreA, scoreB: final.scoreB },
    champion: final.winner,
  };
  const s = loadJrState();
  s.islandChampionship = result;
  saveJrState(s);
  return result;
}

// Idempotent per-cycle trigger for the Island Championship stage.
function ensureIslandChampionshipRunForYear(cycleYear){
  const s = loadJrState();
  if(s.islandChampionship && s.islandChampionship.cycleYear === cycleYear) return;
  if(getCurrentDay() < tierKeyDates(cycleYear).jrIslandChampStart) return;
  runIslandChampionship(cycleYear);
}

function pickStarter(slots, weightClass){
  const candidates = slots.filter(sl=> sl.weightClass===weightClass);
  let best = null, bestOvr = -1;
  candidates.forEach(sl=>{
    const f = resolveSlotFighter(sl);
    if(!f) return;
    const ovr = calcOVR(f.stats);
    if(ovr > bestOvr){ bestOvr = ovr; best = sl; }
  });
  return best;
}

// AI lineup selection for non-player teams. Blind = no visibility into the opponent's
// picks (just fields best OVR per class). Informed = knows the opponent's revealed
// lineup and counter-picks using the discipline matchup chart — this is what makes
// "home sets lineup last" a real advantage rather than flavor text.
function aiPickLineup(slots, opponentLineup){
  const lineup = {};
  WEIGHT_CLASSES.forEach(wc=>{
    const options = slots.filter(sl=>sl.weightClass===wc).map(sl=>resolveSlotFighter(sl)).filter(Boolean);
    if(!options.length) return;
    if(!opponentLineup || !opponentLineup[wc]){
      lineup[wc] = options.reduce((best,f)=> calcOVR(f.stats) > calcOVR(best.stats) ? f : best, options[0]);
    } else {
      const opp = opponentLineup[wc];
      let best = options[0], bestEff = -999;
      options.forEach(f=>{
        const eff = calcOVR(f.stats) + matchupBonus(f.primaryDisc, opp.primaryDisc);
        if(eff > bestEff){ bestEff = eff; best = f; }
      });
      lineup[wc] = best;
    }
  });
  return lineup;
}

// Simulates a full 5-bout team game between two AI-controlled teams (no player
// involved) — used to resolve every other game happening around the league each week.
function simulateAiTeamGame(leagueId, homeIdx, awayIdx){
  const homeSlots = ensureTeamRoster(leagueId, homeIdx);
  const awaySlots = ensureTeamRoster(leagueId, awayIdx);
  const awayLineup = aiPickLineup(awaySlots, null); // visitor sets first, blind
  const homeLineup = aiPickLineup(homeSlots, awayLineup); // home counter-picks
  let homeScore = 0, awayScore = 0;
  WEIGHT_CLASSES.forEach(wc=>{
    const hf = homeLineup[wc], af = awayLineup[wc];
    if(!hf || !af) return;
    const bout = simulateBout(hf, af, { arena:{floor:'neutral court'}, hometownPit:true });
    if(bout.winner.id === hf.id) homeScore++; else awayScore++;
  });
  recordStandingsResult(leagueId, homeIdx, awayIdx, homeScore > awayScore);
}

// Resolves every OTHER game in the given week (not involving teamIndex) — keeps the
// whole league's standings moving in lockstep with the player's own game each week.
function resolveOtherGamesThisWeek(leagueId, teamIndex, weekIdx){
  const weeks = ensureLeagueSchedule(leagueId);
  if(weekIdx >= weeks.length) return;
  weeks[weekIdx].forEach(pair=>{
    if(pair.home===teamIndex || pair.away===teamIndex) return;
    simulateAiTeamGame(leagueId, pair.home, pair.away);
  });
}

function calcOVR(stats){ return Math.round((stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5); }

const ALL_DISCIPLINES = Object.keys(DISCIPLINE_NAMES);
const MATCHUP = {
  boxer:    { boxer:0, brawler:1, wrestler:-1, sambo:-1, mma:-1, karate:1, judo:-1, catch:-1 },
  brawler:  { boxer:-1, brawler:0, wrestler:-1, sambo:-2, mma:-1, karate:0, judo:-2, catch:-1 },
  wrestler: { boxer:1, brawler:1, wrestler:0, sambo:-1, mma:0, karate:1, judo:0, catch:1 },
  sambo:    { boxer:1, brawler:2, wrestler:1, sambo:0, mma:0, karate:1, judo:-1, catch:0 },
  mma:      { boxer:1, brawler:1, wrestler:0, sambo:0, mma:0, karate:1, judo:0, catch:1 },
  karate:   { boxer:-1, brawler:0, wrestler:-1, sambo:-1, mma:-1, karate:0, judo:-1, catch:0 },
  judo:     { boxer:1, brawler:2, wrestler:0, sambo:1, mma:0, karate:1, judo:0, catch:1 },
  catch:    { boxer:1, brawler:1, wrestler:-1, sambo:0, mma:-1, karate:0, judo:-1, catch:0 },
};
const MATCHUP_SCALE = 5;
function matchupBonus(myDisc, oppDisc){ const row=MATCHUP[myDisc]; return row && row[oppDisc]!==undefined ? row[oppDisc]*MATCHUP_SCALE : 0; }
function winProbability(effA, effB){ return 1/(1+Math.pow(10, -(effA-effB)/12)); }
function weightedPick(weights){
  const r = Math.random(); let acc = 0;
  for(const [k,w] of Object.entries(weights)){ acc += w; if(r <= acc) return k; }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

  '{W} swarms {L} and the referee has seen enough. TKO.',
  '{L}\'s corner is waving it off. TKO, {W} wins.',

  '{L} loses all composure — an illegal shot, and the ref has no choice. DQ, {W} wins.',
  'That\'s a blatant foul from {L}. Referee calls it — DQ, {W} takes it.',
];

  'After three rounds, it goes to the scorecards.',
  'Both fighters empty the tank — now it\'s in the judges\' hands.',
  'No finish tonight — the crowd waits on the decision.',
];
function fillTpl(text, map){ return text.replace(/{(\w+)}/g, (_,k)=> map[k]!==undefined ? map[k] : ''); }

function simulateBout(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const homeBonusA = ctx && ctx.hometownPit ? 4 : 0;
  const effA = ovrA + mbA + homeBonusA;
  const effB = ovrB + mbB;
  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;
  const gap = Math.abs(effA - effB);

  let finishWeights;
  if(gap >= 20) finishWeights = { KO:0.38, TKO:0.34, Decision:0.26, DQ:0.02 };
  else if(gap >= 10) finishWeights = { KO:0.20, TKO:0.32, Decision:0.46, DQ:0.02 };
  else finishWeights = { KO:0.09, TKO:0.24, Decision:0.65, DQ:0.02 };

  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.22, 2:0.36, 3:0.42}), 10);
  const floor = (ctx && ctx.arena && ctx.arena.floor) || 'sport court';
  const log = [];
  for(let r=1; r<=3; r++){
    log.push({ type:'round-header', round:r });
    const map = { A: fA.name, B: fB.name, floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma) };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });
    if(method !== 'Decision' && r === finishRound){
      const fmap = { W: winner.name, L: loser.name, floor };
      const lib = method === 'KO' ? FINISH_KO : method === 'TKO' ? FINISH_TKO : FINISH_DQ;
      log.push({ type:'finish', text: fillTpl(pick(lib), fmap) });
      break;
    } else {
      log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS), map) });
    }
  }
  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }
  return { winner, loser, method, finishRound, ovrA, ovrB, effA, effB, probA, log };
}

const MATURITY_PCT_BY_AGE = { 11:0.74, 12:0.79, 13:0.84, 14:0.89, 15:0.93, 16:0.96, 17:0.98, 18:1.0 };
function bmiForBuild(build){
  if(build==='lean') return rand(19,23);
  if(build==='stocky') return rand(27,32);
  return rand(23,27);
}
function weightFromHeight(heightIn, bmi){
  const heightM = heightIn * 0.0254;
  return Math.round(bmi * heightM * heightM * 2.20462);
}
function rollAdultHeightIn(){
  const t = (Math.random()+Math.random()+Math.random())/3;
  return clamp(Math.round(64 + t*20), 64, 84);
}
function heightForAge(adultHeightIn, age){
  if(!age || age >= 18) return adultHeightIn;
  const pct = MATURITY_PCT_BY_AGE[clamp(age,11,18)] || 1.0;
  return Math.max(50, Math.round(adultHeightIn * pct));
}
function weightForAge(currentHeightIn, age, bmi){
  const youthFactor = (!age || age>=18) ? 1.0 : 0.85 + (clamp(age,11,18)-11)/7*0.15;
  return weightFromHeight(currentHeightIn, bmi*youthFactor);
}
function projectAdultSize(f){
  const age = f.age || 18;
  const pct = MATURITY_PCT_BY_AGE[clamp(age, 11, 18)] || 1.0;
  const build = f.appearance ? f.appearance.build : 'athletic';
  let adultHeightIn = f.adultHeightIn;
  let bmiTarget = f.bmiTarget;
  if(!adultHeightIn){
    adultHeightIn = clamp(Math.round((f.heightIn||64) / pct), 64, 84);
    bmiTarget = bmiForBuild(build);
  }
  const adultWeightLb = weightFromHeight(adultHeightIn, bmiTarget);
  return { adultHeightIn, adultWeightLb, isGrown: pct >= 1.0 };
}
function growthOutlook(f){
  let ceiling;
  if(f.juniorTeamId) ceiling = juniorCeiling(f.talentTier||'normal');
  else if(f.amateurLeagueId) ceiling = f.talentTier==='generational' ? 90 : 35;
  else ceiling = bandCeiling(f.age||11, f.talentTier||'normal');
  const avgStat = (f.stats.speed+f.stats.quickness+f.stats.toughness+f.stats.power+f.stats.agility)/5;
  const pctOfCeiling = clamp(avgStat/ceiling*100, 0, 100);
  let outlook;
  if(pctOfCeiling >= 90) outlook = 'Close to maxed out for where they are right now — future growth mostly comes from moving up a level.';
  else if(pctOfCeiling >= 60) outlook = 'Solid development so far, real room left to keep climbing.';
  else if(pctOfCeiling >= 30) outlook = 'Early in the development curve — plenty of runway left.';
  else outlook = 'Very raw. Most of the growth curve is still ahead.';
  return { ceiling, avgStat, pctOfCeiling, outlook };
}

/* ============================ JUNIOR-TIER GROWTH ============================ */
/* Junior League ceiling sits well above Amateur's flat 35 — this is the "Minor Pro"
   band from the original tier design (30-60), with Generational Talents allowed to
   keep climbing toward Pro-level numbers. Growth stays earned, same mechanic as
   Juvenile/Amateur: win, finish, and beating someone tougher than you all matter. */
function juniorCeiling(talentTier){
  if(talentTier === 'generational') return 90;
  if(talentTier === 'prodigy') return 65;
  return 60;
}
function growJuniorStats(f, playerWon, method, oppOVR){
  const ceiling = juniorCeiling(f.talentTier);
  const potentialFactor = clamp((f.potential || 50) / 99, 0, 1);
  const ownOVR = calcOVR(f.stats);
  let growthTicks = 0;
  if(playerWon){
    growthTicks += 1;
    if(method !== 'Decision') growthTicks += 1;
    if(oppOVR > ownOVR) growthTicks += 1;
  } else if(Math.random() < 0.3){
    growthTicks += 1;
  }
  growthTicks = Math.round(growthTicks * (0.4 + potentialFactor * 0.9));
  if(growthTicks <= 0) return;
  const statKeys = ['speed','quickness','toughness','power','agility'];
  for(let i=0;i<growthTicks;i++){
    const key = pick(statKeys);
    const current = f.stats[key];
    if(current >= ceiling) continue;
    const room = 1 - (current/ceiling);
    if(Math.random() < 0.45 + room*0.4){
      f.stats[key] = clamp(current+1, 1, ceiling);
    }
  }
}
