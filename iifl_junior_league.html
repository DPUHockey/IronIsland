const WC_WEIGHT_RANGES = { Fly:[75,90], Light:[91,105], Middle:[106,120], Heavy:[121,140], Mega:[141,175] };
const TEAMMATE_SKIN_TONES = ['#3E2A1E','#5C3A24','#8C5A35','#C68642','#E0AC69','#F1C27D'];
const TEAMMATE_HAIR_COLORS = ['#0E0C0A','#3B2417','#6B4226','#A85C2A','#C9A23C','#D9D2C5'];

function rollJuniorTalentTier(){
  const r = Math.random();
  if(r < 0.02) return 'generational';
  if(r < 0.20) return 'prodigy';
  return 'normal';
}
// NPC teammate — full stat block so they can actually be simulated in team games,
// not just a name on a roster sheet. Named per the province mix of the drafting league.
function generateTeammateFighter(weightClass, league, provinceIdHint){
  const provinceId = provinceIdHint || (league ? pick(league.provinces) : 'bay');
  const settlement = (SETTLEMENT_DATA[provinceId] && SETTLEMENT_DATA[provinceId].length) ? pick(SETTLEMENT_DATA[provinceId]).name : null;
  const tier = rollJuniorTalentTier();
  const ceiling = juniorCeiling(tier);
  const targetOVR = rand(Math.round(ceiling*0.3), Math.round(ceiling*0.85));
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    stats[k] = clamp(targetOVR + rand(-6,6), 5, ceiling);
  });
  const age = rand(14,20); // Junior League's full age span
  const build = pick(['lean','athletic','stocky']);
  const bmiTarget = bmiForBuild(build);
  const adultHeightIn = rollAdultHeightIn();
  const heightIn = heightForAge(adultHeightIn, age);
  const weightLb = weightForAge(heightIn, age, bmiTarget);
  return {
    id: 'teammate_' + Date.now() + '_' + rand(0,99999),
    name: pickName(provinceId, settlement),
    primaryDisc: pick(ALL_DISCIPLINES),
    stats, age,
    weightLb, heightIn, adultHeightIn, bmiTarget,
    weightClass: weightClassOf(weightLb),
    talentTier: tier,
    potential: rand(30,80),
    provinceId, settlement,
    appearance: { skin: pick(TEAMMATE_SKIN_TONES), hair: pick(TEAMMATE_HAIR_COLORS), build },
  };
}

function teamRosterKey(leagueId, teamIndex){ return leagueId+'_'+teamIndex; }
// Season-long per-fighter Junior stat tracking — lives directly on the fighter object
// (generated teammate or drafted prospect) so a roster page can show a real record and
// finish breakdown instead of team-only win/loss. Before this, only the PLAYER's own
// bouts were ever recorded anywhere (ff.fightLog) — every other fighter on every roster
// had zero season history, AI-vs-AI games and even the other 4 bouts in the player's own
// weekly game never persisted anything past the immediate team score.
function ensureJrSeasonRecord(f){
  if(!f.jrSeasonRecord) f.jrSeasonRecord = { wins:0, losses:0, methods:{KO:0,TKO:0,Decision:0} };
  return f.jrSeasonRecord;
}
function recordJrBoutOutcome(winner, loser, method){
  const wr = ensureJrSeasonRecord(winner); wr.wins++; wr.methods[method] = (wr.methods[method]||0)+1;
  ensureJrSeasonRecord(loser).losses++;
}
function persistRosterSlots(leagueId, teamIndex, slots){
  const s = loadJrState();
  if(!s.rosters) s.rosters = {};
  s.rosters[teamRosterKey(leagueId, teamIndex)] = slots;
  saveJrState(s);
}
// ---- Fatigue & matchup-driven injury ----
// Fatigue (0-100) builds up when a fighter actually competes and decays when they sit
// a week out. Past a threshold, a fresher backup gets the nod over them even if the
// backup's raw OVR is lower — this is what actually gives backups real playing time,
// rather than the old "best OVR wins, forever" selection with no rest mechanic at all.
// Injury risk is driven by the same MATCHUP table the bout engine already uses for win
// probability — a fighter caught in a bad stylistic matchup (the opponent's discipline
// beats theirs) takes more real punishment and is genuinely more likely to get hurt,
// on top of a baseline rate that climbs with how fatigued they already were going in.
const FATIGUE_DECAY_PER_WEEK = 35;
const FATIGUE_REST_THRESHOLD = 75;
const INJURY_BASE_RATE = 0.03;
const INJURY_FATIGUE_FACTOR = 0.002; // extra risk per fatigue point above 50
const INJURY_MATCHUP_FACTOR = 0.02;  // extra risk per raw MATCHUP-table point of the opponent's stylistic edge (table runs roughly -2..+2)
function ensureFatigueFields(f){
  if(f.fatigue === undefined) f.fatigue = 0;
  if(f.injuryWeeksRemaining === undefined) f.injuryWeeksRemaining = 0;
  return f;
}
// Weekly maintenance for a whole roster — decays fatigue for anyone who DIDN'T compete
// this week and counts down anyone already injured. Call once per team per week,
// alongside whatever bout(s) that team actually played.
function applyWeeklyRosterMaintenance(slots, competedIds){
  slots.forEach(sl=>{
    const f = resolveSlotFighter(sl);
    if(!f) return;
    ensureFatigueFields(f);
    if(f.injuryWeeksRemaining > 0) f.injuryWeeksRemaining = Math.max(0, f.injuryWeeksRemaining - 1);
    if(!competedIds.has(f.id)) f.fatigue = Math.max(0, f.fatigue - FATIGUE_DECAY_PER_WEEK);
  });
}
// Call right after a bout resolves — updates both competitors' fatigue and rolls injury
// for each of them independently (either or both can come out of the same fight hurt).
function applyPostBoutFatigueAndInjury(winner, loser, method){
  [winner, loser].forEach(f=> ensureFatigueFields(f));
  const gainFor = (won)=> 25 + (method==='Decision'?15:0) + (won?0:5); // decisions grind harder; losing takes more of a beating
  winner.fatigue = Math.min(100, winner.fatigue + gainFor(true));
  loser.fatigue = Math.min(100, loser.fatigue + gainFor(false));
  [ {f:winner, opp:loser}, {f:loser, opp:winner} ].forEach(({f,opp})=>{
    const row = MATCHUP[opp.primaryDisc];
    const rawEdge = Math.max(0, (row && row[f.primaryDisc]) || 0); // opponent's raw stylistic edge over me, 0..2
    const chance = INJURY_BASE_RATE + rawEdge*INJURY_MATCHUP_FACTOR + Math.max(0, f.fatigue-50)*INJURY_FATIGUE_FACTOR;
    if(Math.random() < chance) f.injuryWeeksRemaining = rand(1,3);
  });
}
// Writes fighters mutated inside a game-day lineup (keyed by weight class) back onto
// their real roster slot by fighter id — needed because gd.homeLineup/gd.awayLineup
// are a separate in-memory snapshot from whatever ensureTeamRoster returns by the time
// finishTeamGame runs, so mutating the lineup fighter alone would never actually persist.
// Small visible status tag for roster rows — makes fatigue/injury an actual visible
// mechanic instead of invisible numbers only the sim logic can see.
function fatigueInjuryBadge(f){
  if(!f) return '';
  ensureFatigueFields(f);
  if(f.injuryWeeksRemaining > 0) return ` <span style="color:var(--ink-red);" title="Out ${f.injuryWeeksRemaining} more week${f.injuryWeeksRemaining===1?'':'s'}">🤕 ${f.injuryWeeksRemaining}wk</span>`;
  if(f.fatigue >= FATIGUE_REST_THRESHOLD) return ` <span style="color:var(--muted);" title="Fatigue ${f.fatigue}/100 — needs rest">😮‍💨 Tired</span>`;
  return '';
}
function persistLineupRecords(leagueId, teamIndex, lineup){
  const slots = ensureTeamRoster(leagueId, teamIndex);
  Object.values(lineup).forEach(f=>{
    if(!f) return;
    const slot = slots.find(sl=> sl.fighter && sl.fighter.id===f.id);
    if(slot) slot.fighter = f;
  });
  persistRosterSlots(leagueId, teamIndex, slots);
}
// Real transaction feed — currently covers the two roster-move types that actually
// exist in the engine (draft picks, weekly FA-wire signings). No release or injury
// mechanic exists yet, so this deliberately doesn't fabricate those event types —
// it'll just start showing them once/if that gameplay gets built. Newest-first, capped.
function logTransaction(leagueId, teamIndex, entry){
  const s = loadJrState();
  if(!s.transactions) s.transactions = {};
  const key = teamRosterKey(leagueId, teamIndex);
  if(!s.transactions[key]) s.transactions[key] = [];
  s.transactions[key].unshift({ day: getCurrentDay(), ...entry });
  if(s.transactions[key].length > 25) s.transactions[key].length = 25;
  saveJrState(s);
}
function getTransactions(leagueId, teamIndex){
  const s = loadJrState();
  return (s.transactions && s.transactions[teamRosterKey(leagueId, teamIndex)]) || [];
}
function ensureTeamRoster(leagueId, teamIndex){
  const s = loadJrState();
  const key = teamRosterKey(leagueId, teamIndex);
  const league = getJrLeague(leagueId);
  const team = jrTeam(leagueId, teamIndex);
  const teamProvince = team ? team.provinceId : null;
  if(s.rosters[key]){
    // Repair pass: earlier builds only stored a name for NPC slots (no stats). Any
    // slot missing a usable fighter object gets regenerated in place so old saved
    // data doesn't silently break the lineup screen.
    let repaired = false;
    s.rosters[key].forEach(sl=>{
      if(!sl.isPlayer && (!sl.fighter || !sl.fighter.stats)){
        sl.fighter = generateTeammateFighter(sl.weightClass, league, teamProvince);
        sl.name = sl.fighter.name;
        repaired = true;
      }
    });
    if(repaired) saveJrState(s);
    return s.rosters[key];
  }
  const slots = [];
  WEIGHT_CLASSES.forEach(wc=>{
    for(let i=0;i<2;i++){
      const fighter = generateTeammateFighter(wc, league, teamProvince);
      slots.push({ weightClass: wc, name: fighter.name, isPlayer:false, fighterId:null, fighter });
    }
  });
  s.rosters[key] = slots;
  saveJrState(s);
  return slots;
}
function setPlayerIntoRoster(leagueId, teamIndex, fighter){
  if(fighter.juniorSignedYear === undefined){
    updateFighter(fighter.id, ff=>{ ff.juniorSignedYear = currentIslandYear(); });
  }
  ensureTeamRoster(leagueId, teamIndex); // guarantees the roster exists before we touch it
  const s = loadJrState();
  const key = teamRosterKey(leagueId, teamIndex);
  const slots = s.rosters[key];
  const wClass = weightClassOf(fighter.weightLb);
  let slot = slots.find(sl=> sl.weightClass===wClass && !sl.isPlayer);
  if(!slot) slot = slots[0];
  slot.isPlayer = true;
  slot.name = fighter.name;
  slot.fighterId = fighter.id;
  slot.fighter = null; // player's live stats are always fetched fresh via fighterId
  saveJrState(s);
  // Verify the write actually landed — if it didn't, the player's own signing would
  // silently vanish while their juniorTeamId/juniorLeagueId still claimed they were
  // signed, which is exactly the bug this replaced.
  const check = loadJrState();
  const stillThere = (check.rosters[key]||[]).some(sl=> sl.isPlayer && sl.fighterId===fighter.id);
  if(!stillThere) console.error('IIFL setPlayerIntoRoster: write did not persist for', fighter.name, key);
  logTransaction(leagueId, teamIndex, { type:'Player Signing', fighterName: fighter.name, weightClass: wClass });
}
// Resolves a roster slot to a live fighter object — player slots pull fresh from the
// shared roster (so growth/aging always reflects current state), NPC slots use their
// stored generated stats.
// R for a fighter's first Junior season, then 2/3/4... for each season after —
// signed year is stamped once at draft/FA-sign/offer-accept time and never touched again.
function experienceLabel(fighter){
  if(!fighter || fighter.juniorSignedYear === undefined) return '';
  const yr = currentIslandYear() - fighter.juniorSignedYear + 1;
  return yr <= 1 ? 'R' : String(yr);
}
function resolveSlotFighter(slot){
  if(slot.isPlayer && slot.fighterId){
    const f = getFighterById(slot.fighterId);
    if(f) return f;
  }
  return slot.fighter;
}
function weightClassOf(weightLb){
  // 5-class Junior/Pro split, widened for the BMI-based body model (realistic weights
  // now span teen-lean up to full-grown-heavyweight, not the old flat low range).
  if(weightLb <= 135) return 'Fly';
  if(weightLb <= 165) return 'Light';
  if(weightLb <= 195) return 'Middle';
  if(weightLb <= 230) return 'Heavy';
  return 'Mega';
}

/*
  Whole-league round-robin schedule, "circle method" — every team plays once per week,
  everyone plays everyone exactly once across the season. Matches real sports scheduling:
  the whole league moves in lockstep, Saturdays for Junior, Sundays reserved for Pro later.
*/
function generateRoundRobinSchedule(teamCount){
  const teams = Array.from({length: teamCount}, (_,i)=>i);
  const n = teams.length; // both our leagues (16, 12) are even — no byes needed
  const fixed = teams[0];
  let rotation = teams.slice(1);
  const weeks = [];
  for(let w=0; w<n-1; w++){
    const roundTeams = [fixed, ...rotation];
    const pairs = [];
    for(let i=0;i<n/2;i++){
      const a = roundTeams[i], b = roundTeams[n-1-i];
      // Alternate home/away by week parity so nobody's permanently stuck on the road.
      pairs.push(w % 2 === 0 ? { home:a, away:b } : { home:b, away:a });
    }
    weeks.push(pairs);
    rotation.push(rotation.shift());
  }
  return weeks;
}

function ensureLeagueSchedule(leagueId){
  const s = loadJrState();
  if(!s.leagueSchedules) s.leagueSchedules = {};
  if(s.leagueSchedules[leagueId]) return s.leagueSchedules[leagueId];
  const league = getJrLeague(leagueId);
  const weeks = generateRoundRobinSchedule(league.teams.length);
  s.leagueSchedules[leagueId] = weeks;
  saveJrState(s);
  return weeks;
}
function getLeagueWeek(leagueId){
  const s = loadJrState();
  if(!s.leagueWeek) s.leagueWeek = {};
  if(s.leagueWeek[leagueId] === undefined){ s.leagueWeek[leagueId] = 0; saveJrState(s); }
  return s.leagueWeek[leagueId];
}
// Regular season is always exactly teamCount-1 weeks (round robin) — playoff weeks get
// appended onto the SAME schedule array after this, so weeks.length grows over time and
// this stays the fixed boundary between "regular season" and "playoffs" for a league.
function regularSeasonWeeks(league){ return league.teams.length - 1; }
function isPlayoffWeek(leagueId, weekIdx){ return weekIdx >= regularSeasonWeeks(getJrLeague(leagueId)); }
function advanceLeagueWeek(leagueId){
  const s = loadJrState();
  if(!s.leagueWeek) s.leagueWeek = {};
  s.leagueWeek[leagueId] = (s.leagueWeek[leagueId]||0) + 1;
  saveJrState(s);
}
function findWeekPairing(leagueId, teamIndex, weekIdx){
  const weeks = ensureLeagueSchedule(leagueId);
  if(weekIdx >= weeks.length) return null;
  return weeks[weekIdx].find(p=> p.home===teamIndex || p.away===teamIndex) || null;
}

function ensureStandings(leagueId){
  const s = loadJrState();
  if(!s.standings) s.standings = {};
  if(!s.standings[leagueId]){
    const league = getJrLeague(leagueId);
    s.standings[leagueId] = league.teams.map(()=> ({ wins:0, losses:0 }));
    saveJrState(s);
  }
  return s.standings[leagueId];
}
// All-time record persists across season resets (there's no season-reset system yet,
// so right now it just tracks in parallel with current — the infrastructure is ready
// for whenever seasons actually roll over).
function ensureAllTimeStandings(leagueId){
  const s = loadJrState();
  if(!s.allTimeStandings) s.allTimeStandings = {};
  if(!s.allTimeStandings[leagueId]){
    const league = getJrLeague(leagueId);
    s.allTimeStandings[leagueId] = league.teams.map(()=> ({ wins:0, losses:0 }));
    saveJrState(s);
  }
  return s.allTimeStandings[leagueId];
}
function recordStandingsResult(leagueId, homeIdx, awayIdx, homeWon){
  const standings = ensureStandings(leagueId);
  const allTime = ensureAllTimeStandings(leagueId);
  if(homeWon){ standings[homeIdx].wins += 1; standings[awayIdx].losses += 1; allTime[homeIdx].wins += 1; allTime[awayIdx].losses += 1; }
  else { standings[awayIdx].wins += 1; standings[homeIdx].losses += 1; allTime[awayIdx].wins += 1; allTime[homeIdx].losses += 1; }
  const s = loadJrState(); s.standings[leagueId] = standings; s.allTimeStandings[leagueId] = allTime; saveJrState(s);
}

/* ============================ NPC BULK DRAFT ============================ */
/*
  The player's own draft (runDraftForFighter, further up) resolves one fighter against
  a flavor-only procedural board. This is the real thing — every Juvenile fighter who
  declared on the May 1 deadline (tagged juniorDraftDeclaration/juniorDraftDeclaredYear
  by runJuniorDraftDeclareDay in the fight_pit/free_roam field-pool code) actually gets
  drafted onto real Junior rosters here, island-wide, on Draft Day itself.

  Draft order: leagues go in their existing draftOrder (Kolsati, Northern, Eastern —
  Kolsati picks its whole 3 rounds before Northern gets a look, matching the existing
  "Kolsati drafts first and gets the best" design). Within a league, teams pick in
  reverse-standings order (worst record first) using THIS season's running standings —
  there's no season-archival system yet to pull a true "prior season" order from, so
  this is the practical stand-in; falls back to random order before any games have been
  played. Every round is best-fighter-available from the declared pool.
*/

// Worst-to-best team order within one league. Falls back to random if no games have
// been played yet this season (win% ties at 0-0 across the board).
function resolveTeamDraftOrder(leagueId){
  const league = getJrLeague(leagueId);
  const standings = ensureStandings(leagueId);
  const indices = league.teams.map((_,i)=> i);
  const anyGamesPlayed = standings.some(s=> (s.wins+s.losses) > 0);
  if(!anyGamesPlayed){
    for(let i=indices.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [indices[i],indices[j]]=[indices[j],indices[i]]; }
    return indices;
  }
  return [...indices].sort((a,b)=>{
    const wa = standings[a], wb = standings[b];
    const pctA = (wa.wins+wa.losses) ? wa.wins/(wa.wins+wa.losses) : 0.5;
    const pctB = (wb.wins+wb.losses) ? wb.wins/(wb.wins+wb.losses) : 0.5;
    return pctA - pctB; // ascending win% = worst team first
  });
}

// Places a real drafted fighter (a genuine Juvenile-pool prospect, not a generated
// placeholder) into a team roster slot — same pattern as setPlayerIntoRoster, but for
// an NPC: stores the live fighter object directly rather than a fighterId lookup, since
// drafted prospects aren't tracked in the player's own roster.
function draftFighterIntoRoster(leagueId, teamIndex, fighter, source){
  ensureTeamRoster(leagueId, teamIndex);
  const s = loadJrState();
  const key = teamRosterKey(leagueId, teamIndex);
  const slots = s.rosters[key];
  const wClass = weightClassOf(fighter.weightLb);
  let slot = slots.find(sl=> sl.weightClass===wClass && !sl.isPlayer && !sl.isDraftedProspect);
  if(!slot) slot = slots.find(sl=> !sl.isPlayer && !sl.isDraftedProspect);
  if(!slot) slot = slots.find(sl=> !sl.isPlayer); // last resort — never overwrite the player's own roster spot
  if(!slot) return; // roster is genuinely full of real bodies including the player — nowhere safe to put this pick
  slot.isPlayer = false;
  slot.isDraftedProspect = true;
  slot.name = fighter.name;
  slot.fighterId = null;
  if(fighter.juniorSignedYear === undefined) fighter.juniorSignedYear = currentIslandYear();
  slot.fighter = fighter;
  s.rosters[key] = slots;
  saveJrState(s);
  logTransaction(leagueId, teamIndex, { type: source==='fa-wire' ? 'FA Signing' : 'Draft Pick', fighterName: fighter.name, weightClass: wClass });
}

// ============ THREE-NIGHT DRAFT CYCLE ============
// Restores the original design (from an earlier session, never fully wired up): each
// league drafts on its OWN night (Ironbound Monday, Northgate Tuesday, Tidewater
// Wednesday — see tierKeyDates), and each draws from the SAME frozen, non-depleting
// declared pool — a lower tier can "reach" for a prospect a higher tier already took.
// That's intentional risk, not a bug: whoever ends up drafted by more than one league
// signs with the highest tier that took them (resolved at the Friday sign deadline);
// any other league that reached for them just wasted the pick. The declared pool is
// snapshotted ONCE when the cycle begins so all three leagues are drafting the same
// island-wide board, not three different pools depleted in sequence.

function findFighterInPools(pools, id){
  for(const provinceId in (pools.juvenile||{})){
    const f = pools.juvenile[provinceId].find(x=> x.id === id);
    if(f) return f;
  }
  // A signed, registered player fighter is declared straight off the roster, not the
  // NPC pool — check there too so the draft functions can resolve either kind of pick.
  const roster = loadRoster();
  return roster.find(r=> r.id === id) || null;
}

const JUNIOR_DRAFT_ROUNDS = 4;
const INAUGURAL_DRAFT_ROUNDS = 7; // one-time expansion draft, the first cycle this save ever runs — turns the fake starting rosters into real ones fast instead of trickling in over years

// The actual bug that made every Junior draft cycle draft nobody: beginDraftCycleIfNeeded
// only ever looks at fighters already stamped juniorDraftDeclaredYear/juniorDraftDeclaration
// for the current cycle — but nothing was EVER calling resolveJuniorDraftDeclaration to
// stamp them. This runs once per cycle, right before the declared pool is snapshotted,
// and stamps every real Juvenile-pool fighter aged 14-17 with this cycle's declaration —
// mandatory at 17, otherwise the same growth-based default NPCs already used everywhere
// else in this codebase.
function ensureJuniorDeclarationsForYear(cycleYear){
  const pools = loadFieldPools();
  let changed = false;
  Object.keys(pools.juvenile || {}).forEach(provinceId=>{
    pools.juvenile[provinceId].forEach(f=>{
      if(f.age >= 14 && f.age <= 17 && f.juniorDraftDeclaredYear !== cycleYear){
        f.juniorDraftDeclaredYear = cycleYear;
        f.juniorDraftDeclaration = resolveJuniorDraftDeclaration(f);
        changed = true;
      }
    });
  });
  if(changed) saveFieldPools(pools);
  // A player fighter who's signed the Jr Contract is declared automatically every
  // cycle from then on (no re-signing needed) until they're drafted or age out at 18.
  const roster = loadRoster();
  let rosterChanged = false;
  roster.forEach(f=>{
    if(f.juniorDraftRegistered && f.age >= 14 && f.age <= 17 && !f.juniorTeamId && f.juniorDraftDeclaredYear !== cycleYear){
      f.juniorDraftDeclaredYear = cycleYear;
      f.juniorDraftDeclaration = 'declared';
      rosterChanged = true;
    }
  });
  if(rosterChanged) saveRoster(roster);
}

/* ============================ JUNIOR FREE AGENT WAIVER WIRE ============================ */
/*
  Aged-out Juveniles who never got drafted land in pools.juniorFA (see syncJuvenilePoolAges
  in free_roam.html) instead of just vanishing at 18. Every Tuesday, each league runs a
  single "Indian run" waiver turn: whichever team is at the front of that league's queue
  either signs the best-fit available free agent to fill an open (still-generated-filler)
  roster slot, or passes — passing keeps them at the front for next Tuesday, signing sends
  them to the back. A team with no open slot just sits out that week without losing a turn.
*/
function ensureFAQueue(s, leagueId){
  if(!s.faQueue) s.faQueue = {};
  if(!s.faQueue[leagueId] || s.faQueue[leagueId].length !== getJrLeague(leagueId).teams.length){
    s.faQueue[leagueId] = resolveTeamDraftOrder(leagueId); // worst-record-first initial priority
  }
  return s.faQueue[leagueId];
}

function findFakeFillerSlot(leagueId, teamIndex){
  const slots = ensureTeamRoster(leagueId, teamIndex);
  return slots.find(sl=> !sl.isPlayer && !sl.isDraftedProspect) || null;
}

// Draft first, free agency second — same order real leagues use, and not just a style
// choice here: draftFighterIntoRoster falls back to overwriting slots[0] if it can't find
// an open "still generated filler" slot, with no check for what's already sitting there.
// If FA had already filled every open slot before draft night, a draft pick landing on
// that team would silently bulldoze an FA signee (or another draft pick). Pausing FA for
// a league while its current-cycle draft is declared-but-not-yet-signed avoids that.
function draftCycleBlocksFAForLeague(){
  const cycleYear = currentIslandYear();
  const s = loadJrState();
  const dc = s.draftCycle;
  if(!dc || dc.cycleYear !== cycleYear) return false; // this year's draft hasn't started yet
  if(dc.signed) return false; // resolved — FA is open again
  return true; // mid-draft-week, not yet signed
}

function processFAWaiverForLeague(league, pools){
  if(draftCycleBlocksFAForLeague()) return;
  const s = loadJrState();
  const queue = ensureFAQueue(s, league.id);
  const teamIndex = queue[0];
  const openSlot = findFakeFillerSlot(league.id, teamIndex);
  if(!openSlot) return; // roster's already all real bodies (or the one open spot is the player's) — sits out, keeps its queue spot
  const candidates = (pools.juniorFA || []).filter(f=> !f.juniorTeamId);
  if(!candidates.length) return; // nobody on the wire to sign
  if(Math.random() < 0.25) return; // team passes this week, stays at the front

  let best = candidates.filter(f=> weightClassOf(f.weightLb)===openSlot.weightClass).sort((a,b)=> calcOVR(b.stats)-calcOVR(a.stats))[0];
  if(!best) best = candidates.slice().sort((a,b)=> calcOVR(b.stats)-calcOVR(a.stats))[0];

  draftFighterIntoRoster(league.id, teamIndex, best, 'fa-wire');
  pools.juniorFA = (pools.juniorFA || []).filter(f=> f.id !== best.id);

  const s2 = loadJrState();
  const q2 = ensureFAQueue(s2, league.id);
  q2.push(q2.shift());
  saveJrState(s2);
}

const FA_TURNS_PER_TUESDAY = 3; // some teams need more than one signing to catch up, not just the single front-of-queue pick

function ensureJuniorFAWaiverCaughtUp(){
  const s = loadJrState();
  const today = getCurrentDay();
  if(s.lastFAWaiverDay === undefined){ s.lastFAWaiverDay = today; saveJrState(s); return; } // baseline on first run, no retroactive catch-up
  let day = s.lastFAWaiverDay + 1;
  let iterations = 0;
  const pools = loadFieldPools();
  if(!pools.juniorFA) pools.juniorFA = [];
  while(day <= today && iterations < 400){
    if(weekdayNameForDay(day) === 'Tuesday'){
      JR_LEAGUES.forEach(league=>{
        for(let i=0;i<FA_TURNS_PER_TUESDAY;i++) processFAWaiverForLeague(league, pools);
      });
    }
    day++; iterations++;
  }
  saveFieldPools(pools);
  const s2 = loadJrState();
  s2.lastFAWaiverDay = today;
  saveJrState(s2);
}

function beginDraftCycleIfNeeded(cycleYear){
  const s = loadJrState();
  if(s.draftCycle && s.draftCycle.cycleYear === cycleYear) return s;
  ensureJuniorDeclarationsForYear(cycleYear);
  const pools = loadFieldPools();
  const declared = [];
  Object.keys(pools.juvenile || {}).forEach(provinceId=>{
    pools.juvenile[provinceId].forEach(f=>{
      if(f.juniorDraftDeclaredYear === cycleYear && f.juniorDraftDeclaration === 'declared') declared.push(f);
    });
  });
  loadRoster().forEach(f=>{
    if(f.juniorDraftDeclaredYear === cycleYear && f.juniorDraftDeclaration === 'declared') declared.push(f);
  });
  declared.sort((a,b)=> calcOVR(b.stats)-calcOVR(a.stats)); // frozen, best-available, shared by all 3 leagues
  if(s.firstDraftCycleYear === undefined) s.firstDraftCycleYear = cycleYear; // this save's inaugural draft
  const rounds = (cycleYear === s.firstDraftCycleYear) ? INAUGURAL_DRAFT_ROUNDS : JUNIOR_DRAFT_ROUNDS;
  s.draftCycle = {
    cycleYear,
    rounds,
    declaredIds: declared.map(f=>f.id),
    boards: {},        // leagueId -> { board:[[pick,pick,...]xN rounds], picks:[{round,teamIndex,fighterId,name,hometown,record}] }
    completedLeagues: [],
    signed: false,
  };
  saveJrState(s);
  return s;
}

function runLeagueDraftForCycle(league, dc, pools){
  const declaredFighters = dc.declaredIds.map(id=> findFighterInPools(pools, id)).filter(Boolean);
  const order = resolveTeamDraftOrder(league.id);
  const board = [];
  const picks = [];
  let idx = 0;
  const rounds = dc.rounds || JUNIOR_DRAFT_ROUNDS;
  for(let r=0; r<rounds; r++){
    const roundPicks = [];
    order.forEach(teamIndex=>{
      const prospect = declaredFighters[idx]; idx++; // same shared list every league draws from — NOT depleted between leagues
      if(!prospect){ roundPicks.push(null); return; }
      picks.push({
        round:r+1, teamIndex, fighterId: prospect.id, name: prospect.name,
        hometown: prospect.settlement || prospect.hometown, record: { wins: prospect.record.wins, losses: prospect.record.losses },
        isPlayer: !!prospect.isPlayable,
      });
      roundPicks.push({ team: jrTeamName(league.id, teamIndex), name: prospect.name, isPlayer:false, fighterId: prospect.id });
    });
    board.push(roundPicks);
  }
  dc.boards[league.id] = { board, picks };
  dc.completedLeagues.push(league.id);
}

// Friday: every fighter drafted by more than one league signs with the highest tier
// that took them (lowest draftOrder wins); every other league that picked them just
// wasted that roster slot for the cycle — a real, visible cost for reaching. Only NOW
// do fighters actually leave the Juvenile pool and get placed on real rosters.
// Not every multi-drafted fighter takes the top offer. Real pulls toward a lower tier:
// wanting to play near home, and a marginal prospect who'd ride the bench in the higher
// league preferring a real role (earlier round) in a lower one. Capped so the top tier
// still wins the clear majority of the time — this is a real minority outcome, not 50/50.
function pickSigningOffer(fighter, offersSortedByTier){
  let chosen = offersSortedByTier[0]; // start from the highest tier that drafted them
  for(let i=1; i<offersSortedByTier.length; i++){
    const lower = offersSortedByTier[i];
    const lowerLeague = getJrLeague(lower.leagueId);
    const chosenLeague = getJrLeague(chosen.leagueId);
    let pull = 0.10; // baseline homebody/comfort preference even with no special reason
    if(lowerLeague.provinces.includes(fighter.provinceId) && !chosenLeague.provinces.includes(fighter.provinceId)){
      pull += 0.25; // this lower league actually plays near their hometown, the higher one doesn't
    }
    if(lower.round <= chosen.round - 2){
      pull += 0.20; // clear starting role down here vs. a late-round bench spot up there
    } else if(lower.round < chosen.round){
      pull += 0.10; // meaningfully better opportunity, not just a marginal one
    }
    if(Math.random() < Math.min(0.55, pull)) chosen = lower; // top tier still wins the clear majority of the time
  }
  return chosen;
}

function resolveDraftSigningsForCycle(dc){
  const byFighter = {}; // fighterId -> [{leagueId, teamIndex, round}]
  [...JR_LEAGUES].forEach(league=>{
    const b = dc.boards[league.id];
    if(!b) return;
    b.picks.forEach(p=>{
      if(!byFighter[p.fighterId]) byFighter[p.fighterId] = [];
      byFighter[p.fighterId].push({ leagueId: league.id, teamIndex: p.teamIndex, round: p.round });
    });
  });

  const pools = loadFieldPools();
  const roster = loadRoster();
  const signedIds = new Set();
  let rosterChanged = false;
  Object.keys(byFighter).forEach(fighterId=>{
    const rosterFighter = roster.find(r=> r.id === fighterId);
    const fighter = rosterFighter || findFighterInPools(pools, fighterId);
    if(!fighter) return;
    const offersSortedByTier = byFighter[fighterId].slice().sort((a,b)=> getJrLeague(a.leagueId).draftOrder - getJrLeague(b.leagueId).draftOrder);
    if(rosterFighter){
      // The player's own fighter never auto-signs — hold every offer they got and let
      // them actually choose (or decline), same as the original design intent. This is
      // the one case that doesn't get resolved automatically like an NPC would.
      rosterFighter.pendingJuniorOffers = offersSortedByTier;
      rosterChanged = true;
      return; // nothing to remove from the Juvenile board for them — they were never in it
    }
    const winner = offersSortedByTier.length > 1 ? pickSigningOffer(fighter, offersSortedByTier) : offersSortedByTier[0];
    draftFighterIntoRoster(winner.leagueId, winner.teamIndex, fighter);
    signedIds.add(fighterId);
  });
  if(rosterChanged) saveRoster(roster);

  // Drafted-and-signed NPCs come off the Juvenile board entirely (the player's fighter
  // was never in it, so this is a no-op for them).
  Object.keys(pools.juvenile || {}).forEach(provinceId=>{
    pools.juvenile[provinceId] = pools.juvenile[provinceId].filter(f=> !signedIds.has(f.id));
  });
  saveFieldPools(pools);
}

// Orchestrates the whole cycle: begins it once Ironbound's night arrives, runs each
// league's draft on its own night as the days pass, and resolves signings once the
// Friday deadline hits and all three leagues have drafted.
function ensureNpcDraftRunForYear(){
  const cycleYear = currentIslandYear();
  const dates = tierKeyDates(cycleYear);
  const today = getCurrentDay();
  if(today < dates.juniorDraftDayIronbound) return;

  const s = beginDraftCycleIfNeeded(cycleYear);
  const dc = s.draftCycle;
  if(dc.signed) return;

  const leagueDayMap = {
    kolsati_jr: dates.juniorDraftDayIronbound,
    northern_jr: dates.juniorDraftDayNorthgate,
    eastern_jr: dates.juniorDraftDayTidewater,
  };
  const pools = loadFieldPools();
  let changed = false;
  [...JR_LEAGUES].sort((a,b)=> a.draftOrder-b.draftOrder).forEach(league=>{
    if(dc.completedLeagues.includes(league.id)) return;
    if(today < leagueDayMap[league.id]) return;
    runLeagueDraftForCycle(league, dc, pools);
    changed = true;
  });
  if(changed) saveJrState(s);

  if(dc.completedLeagues.length === JR_LEAGUES.length && today >= dates.juniorSignDeadline){
    resolveDraftSigningsForCycle(dc);
    dc.signed = true;
    saveJrState(s);
  }
}

/* ============================ JUNIOR PLAYOFFS ============================ */
/*
  Two stages, matching resolveJuniorPlayoffSubPhase's calendar split:
  1. LEAGUE PLAYOFFS (jrLeaguePlayoffStart -> jrLeaguePlayoffEnd, 2 weeks): each of the
     3 leagues independently runs a top-4 single-elim bracket (1v4, 2v3, then the final)
     to crown a league champion. A host TEAM is picked from the qualifiers via
     pickLeaguePlayoffHost (weighted rotation, imported from the fight_pit calendar
     module) purely for venue/hometown-edge purposes — hosting never grants a bracket
     spot, only qualifying teams play.
  2. ISLAND CHAMPIONSHIP (jrIslandChampStart -> jrIslandChampEnd, 2 weeks): the 3 league
     champions plus a HOST CITY (any Junior team, chosen via a May bid — see
     pickIslandChampionshipHost) meet in a 4-team single-elim: Host vs #1 seed in one
     semi, #2 vs #3 in the other, winners meet in the final. If the host team happens to
     also be a league champion by the time this runs, its host-slot passes to the next
     best non-champion team island-wide (the host CITY still gets credit for hosting;
     it just doesn't occupy two bracket seats).
*/
const JR_PLAYOFF_QUALIFIER_COUNT = 4;

// Top 4 by this season's win% — ties broken by raw win count, then random (stable
// enough for a bracket cut; a real tiebreaker system is more than this needs right now).
function getPlayoffQualifiers(leagueId){
  const league = getJrLeague(leagueId);
  const standings = ensureStandings(leagueId);
  const withPct = league.teams.map((_,i)=>{
    const rec = standings[i];
    const pct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0;
    return { teamIndex:i, pct, wins:rec.wins };
  });
  withPct.sort((a,b)=> (b.pct-a.pct) || (b.wins-a.wins) || (Math.random()-0.5));
  return withPct.slice(0, JR_PLAYOFF_QUALIFIER_COUNT).map(t=>t.teamIndex);
}

// Resolves (and persists) this league's playoff host exactly once per cycle, from the
// set of teams that actually qualified.
// Pre-determined BEFORE the season, from every team in the league — not conditioned on
// qualifying. This is a rotation (weighted toward stronger programs, recency-penalized),
// not a bid like the Island Championship's; it just needs to be locked in before
// playoffs need a venue. Resolved once per cycle at Junior's season-open day.
function resolveLeaguePlayoffHostPreSeason(leagueId, cycleYear){
  const s = loadJrState();
  if(!s.lastHostedYear) s.lastHostedYear = {};
  if(!s.leaguePlayoffHost) s.leaguePlayoffHost = {};
  const league = getJrLeague(leagueId);
  const allTeams = league.teams.map((_,teamIndex)=> ({ leagueId, teamIndex }));
  const allTime = ensureAllTimeStandings(leagueId);
  const bids = s.jrHostBids && s.jrHostBids[cycleYear];
  const bidTeamKey = (bids && bids.leagueBid && bids.leagueBid.leagueId===leagueId) ? `${leagueId}_${bids.leagueBid.teamIndex}` : null;
  const picked = pickLeaguePlayoffHost(allTeams, allTime, s.lastHostedYear, cycleYear, bidTeamKey);
  const teamIndex = picked ? picked.teamIndex : 0;
  s.lastHostedYear[`${leagueId}_${teamIndex}`] = cycleYear;
  s.leaguePlayoffHost[leagueId] = { cycleYear, teamIndex };
  saveJrState(s);
  return teamIndex;
}

// Retimed to jrChampHostAnnounced (May 8) so all 4 hosting assignments — 3 leagues +
// the Island Championship — resolve and get announced together, matching the real bid
// window (May 1 bids due, May 8 destinations announced).
function ensureLeaguePlayoffHostsForYear(cycleYear){
  const s = loadJrState();
  if(getCurrentDay() < tierKeyDates(cycleYear).jrChampHostAnnounced) return;
  JR_LEAGUES.forEach(league=>{
    const existing = s.leaguePlayoffHost && s.leaguePlayoffHost[league.id];
    if(existing && existing.cycleYear === cycleYear) return;
    resolveLeaguePlayoffHostPreSeason(league.id, cycleYear);
  });
}

// Playoffs now run through the SAME weekly machinery as the regular season — real
// Wednesday announce, real stadium arrival, real sim/watch/participate — instead of
// resolving silently and instantly the moment a shared calendar date arrives. Each
// league starts ITS OWN playoffs immediately after ITS OWN regular season ends (a
// 16-team league runs 4 weeks longer than a 12-team one, so leagues naturally stagger),
// by appending real "weeks" onto the same schedule array the round robin already lives
// in — every bit of existing week-indexed machinery (jrWeekGameDay, isPairingPlayed,
// aiPickLineup, the fatigue/injury system, fighter records) keeps working unchanged.
// The final's pairing isn't knowable until the semifinal week actually resolves, so
// that week gets appended one real week later, once the semis are actually in — not
// precomputed, since a bracket can't be scheduled before its seeds are known.
function ensurePlayoffWeeksInjected(cycleYear){
  const s = loadJrState();
  if(!s.leaguePlayoffs) s.leaguePlayoffs = {};
  let changed = false;
  JR_LEAGUES.forEach(league=>{
    const leagueId = league.id;
    const regWeeks = regularSeasonWeeks(league);
    const weeks = s.leagueSchedules && s.leagueSchedules[leagueId];
    if(!weeks) return; // schedule not generated yet — nothing to inject onto
    const weekIdx = (s.leagueWeek && s.leagueWeek[leagueId]) || 0;

    // Stage 1: regular season just finished — append the semifinal week (real seeds).
    if(weekIdx === regWeeks && weeks.length === regWeeks){
      const preResolved = s.leaguePlayoffHost && s.leaguePlayoffHost[leagueId];
      const hostTeamIdx = (preResolved && preResolved.cycleYear === cycleYear)
        ? preResolved.teamIndex
        : resolveLeaguePlayoffHostPreSeason(leagueId, cycleYear); // safety net for an old save
      const qualifiers = getPlayoffQualifiers(leagueId); // [1st,2nd,3rd,4th] seed order
      weeks.push([
        { home: qualifiers[0], away: qualifiers[3] }, // 1 vs 4
        { home: qualifiers[1], away: qualifiers[2] }, // 2 vs 3
      ]);
      s.leaguePlayoffs[leagueId] = { cycleYear, qualifiers, hostTeamIdx, stage:'semis' };
      changed = true;
    }
    // Stage 2: semifinal week just finished — append the final (real winners).
    else if(weekIdx === regWeeks+1 && weeks.length === regWeeks+1){
      const lp = s.leaguePlayoffs[leagueId];
      if(lp && lp.cycleYear === cycleYear && lp.stage === 'semis'){
        const semiWeek = weeks[regWeeks];
        const scoreA = getGameScore(leagueId, regWeeks, semiWeek[0].home, semiWeek[0].away);
        const scoreB = getGameScore(leagueId, regWeeks, semiWeek[1].home, semiWeek[1].away);
        if(scoreA && scoreB){
          const winnerA = scoreA.homeScore >= scoreA.awayScore ? semiWeek[0].home : semiWeek[0].away;
          const winnerB = scoreB.homeScore >= scoreB.awayScore ? semiWeek[1].home : semiWeek[1].away;
          weeks.push([ { home: winnerA, away: winnerB } ]);
          lp.stage = 'final';
          lp.semis = [
            { a: semiWeek[0].home, b: semiWeek[0].away, winnerIdx: winnerA, scoreA: scoreA.homeScore, scoreB: scoreA.awayScore },
            { a: semiWeek[1].home, b: semiWeek[1].away, winnerIdx: winnerB, scoreA: scoreB.homeScore, scoreB: scoreB.awayScore },
          ];
          changed = true;
        }
      }
    }
    // Stage 3: final week just finished — crown the champion.
    else if(weekIdx === regWeeks+2 && weeks.length === regWeeks+2){
      const lp = s.leaguePlayoffs[leagueId];
      if(lp && lp.cycleYear === cycleYear && lp.stage === 'final'){
        const finalWeek = weeks[regWeeks+1];
        const score = getGameScore(leagueId, regWeeks+1, finalWeek[0].home, finalWeek[0].away);
        if(score){
          const championTeamIdx = score.homeScore >= score.awayScore ? finalWeek[0].home : finalWeek[0].away;
          lp.final = { a: finalWeek[0].home, b: finalWeek[0].away, winnerIdx: championTeamIdx, scoreA: score.homeScore, scoreB: score.awayScore };
          lp.championTeamIdx = championTeamIdx;
          lp.stage = 'complete';
          changed = true;
        }
      }
    }
  });
  if(changed) saveJrState(s);
}

/* ---------------------------- ISLAND CHAMPIONSHIP ---------------------------- */

// Any Junior team, from any league, can bid to host — this runs in May, long before
// anyone knows who the eventual 3 league champions even are, so it can't be scoped to
// "qualifying" teams the way the per-league host pick is.
function allJuniorTeamsFlat(){
  const flat = [];
  JR_LEAGUES.forEach(league=> league.teams.forEach((_,teamIndex)=> flat.push({ leagueId: league.id, teamIndex })));
  return flat;
}

// Same weighted-rotation shape as pickLeaguePlayoffHost, just pooling every team
// island-wide instead of one league's qualifiers.
function pickIslandChampionshipHost(cycleYear){
  const s = loadJrState();
  if(!s.islandChampHostHistory) s.islandChampHostHistory = {};
  const allTeams = allJuniorTeamsFlat();
  const bids = s.jrHostBids && s.jrHostBids[cycleYear];
  const bidTeamKey = bids && bids.islandBid ? `${bids.islandBid.leagueId}_${bids.islandBid.teamIndex}` : null;
  const weighted = allTeams.map(t=>{
    const allTime = ensureAllTimeStandings(t.leagueId);
    const rec = allTime[t.teamIndex] || { wins:0, losses:0 };
    const winPct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0.5;
    const key = `${t.leagueId}_${t.teamIndex}`;
    const yearsSince = s.islandChampHostHistory[key] ? Math.min(cycleYear - s.islandChampHostHistory[key], 5) : 5;
    let weight = Math.max(0.05, winPct) * (yearsSince/5);
    if(bidTeamKey && key === bidTeamKey) weight *= 3; // a submitted bid meaningfully improves your odds — doesn't guarantee it
    return { ...t, weight };
  });
  const total = weighted.reduce((sum,t)=> sum+t.weight, 0);
  let roll = Math.random()*total;
  let picked = weighted[weighted.length-1];
  for(const t of weighted){ roll -= t.weight; if(roll <= 0){ picked = t; break; } }
  s.islandChampHostHistory[`${picked.leagueId}_${picked.teamIndex}`] = cycleYear;
  s.islandChampHost = { cycleYear, leagueId: picked.leagueId, teamIndex: picked.teamIndex };
  saveJrState(s);
  return s.islandChampHost;
}

function ensureIslandChampHostForYear(cycleYear){
  const s = loadJrState();
  if(s.islandChampHost && s.islandChampHost.cycleYear === cycleYear) return s.islandChampHost;
  if(getCurrentDay() < tierKeyDates(cycleYear).jrChampHostAnnounced) return null;
  return pickIslandChampionshipHost(cycleYear);
}

// Seeds the 3 league champions #1-#3 by this season's win% (not raw wins — the 3
// leagues have different team counts and round-robin lengths, so win% is the only fair
// cross-league comparison).
function seedIslandChampionshipTeams(cycleYear){
  const s = loadJrState();
  const champs = JR_LEAGUES.map(league=>{
    const lp = s.leaguePlayoffs && s.leaguePlayoffs[league.id];
    if(!lp || lp.cycleYear !== cycleYear) return null;
    const standings = ensureStandings(league.id);
    const rec = standings[lp.championTeamIdx];
    const pct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0;
    return { leagueId: league.id, teamIndex: lp.championTeamIdx, pct };
  }).filter(Boolean);
  champs.sort((a,b)=> b.pct-a.pct);
  return champs; // [#1, #2, #3]
}

// Runs the full 4-team Island Championship: Host vs #1 in one semi, #2 vs #3 in the
// other. If the host also won its own league (so it's already one of the 3 seeds), its
// host slot passes to the next-best non-champion team island-wide — the host city
// still gets hosting credit, it just doesn't occupy two bracket seats.
function runIslandChampionship(cycleYear){
  const host = ensureIslandChampHostForYear(cycleYear);
  const seeds = seedIslandChampionshipTeams(cycleYear);
  if(!host || seeds.length < 3) return null;

  const hostIsAlsoChamp = seeds.some(c=> c.leagueId===host.leagueId && c.teamIndex===host.teamIndex);
  let hostSlot = host;
  if(hostIsAlsoChamp){
    const champKeys = new Set(seeds.map(c=> `${c.leagueId}_${c.teamIndex}`));
    const allTeams = allJuniorTeamsFlat().filter(t=> !champKeys.has(`${t.leagueId}_${t.teamIndex}`));
    let best = null, bestPct = -1;
    allTeams.forEach(t=>{
      const standings = ensureStandings(t.leagueId);
      const rec = standings[t.teamIndex];
      const pct = (rec.wins+rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0;
      if(pct > bestPct){ bestPct = pct; best = t; }
    });
    hostSlot = best || host;
  }

  // Cross-league team match — same per-weight-class aggregate the regular season and
  // league playoffs use, but since the two teams are in different leagues (different
  // roster pools), we resolve it directly here instead of routing through a shared helper.
  function crossLeagueGame(teamA, teamB, hostTeam){
    const slotsA = ensureTeamRoster(teamA.leagueId, teamA.teamIndex);
    const slotsB = ensureTeamRoster(teamB.leagueId, teamB.teamIndex);
    const aIsHost = teamA.leagueId===hostTeam.leagueId && teamA.teamIndex===hostTeam.teamIndex;
    const lineupB = aiPickLineup(slotsB, null);
    const lineupA = aiPickLineup(slotsA, lineupB);
    let scoreA=0, scoreB=0;
    const competedIds = new Set();
    WEIGHT_CLASSES.forEach(wc=>{
      const fA = lineupA[wc], fB = lineupB[wc];
      if(!fA || !fB) return;
      const bout = simulateBout(fA, fB, { arena:{floor:'championship court'}, hometownPit: aIsHost });
      if(bout.winner.id===fA.id) scoreA++; else scoreB++;
      recordJrBoutOutcome(bout.winner, bout.loser, bout.method);
      applyPostBoutFatigueAndInjury(bout.winner, bout.loser, bout.method);
      competedIds.add(fA.id); competedIds.add(fB.id);
    });
    applyWeeklyRosterMaintenance(slotsA, competedIds);
    applyWeeklyRosterMaintenance(slotsB, competedIds);
    persistRosterSlots(teamA.leagueId, teamA.teamIndex, slotsA);
    persistRosterSlots(teamB.leagueId, teamB.teamIndex, slotsB);
    return { winner: scoreA>=scoreB ? teamA : teamB, scoreA, scoreB };
  }

  const semiA = crossLeagueGame(hostSlot, seeds[0], hostSlot); // Host vs #1
  const semiB = crossLeagueGame(seeds[1], seeds[2], hostSlot); // #2 vs #3
  const final = crossLeagueGame(semiA.winner, semiB.winner, hostSlot);

  const result = {
    cycleYear, host, hostSlot, hostIsAlsoChamp, seeds,
    semis: [
      { a: hostSlot, b: seeds[0], winner: semiA.winner, scoreA: semiA.scoreA, scoreB: semiA.scoreB },
      { a: seeds[1], b: seeds[2], winner: semiB.winner, scoreA: semiB.scoreA, scoreB: semiB.scoreB },
    ],
    final: { a: semiA.winner, b: semiB.winner, winner: final.winner, scoreA: final.scoreA, scoreB: final.scoreB },
    champion: final.winner,
  };
  const s = loadJrState();
  s.islandChampionship = result;
  saveJrState(s);
  return result;
}

// Idempotent per-cycle trigger for the Island Championship stage.
function ensureIslandChampionshipRunForYear(cycleYear){
  const s = loadJrState();
  if(s.islandChampionship && s.islandChampionship.cycleYear === cycleYear) return;
  if(getCurrentDay() < tierKeyDates(cycleYear).jrIslandChampStart) return;
  runIslandChampionship(cycleYear);
}

function pickStarter(slots, weightClass){
  const candidates = slots.filter(sl=> sl.weightClass===weightClass);
  let best = null, bestOvr = -1;
  candidates.forEach(sl=>{
    const f = resolveSlotFighter(sl);
    if(!f) return;
    const ovr = calcOVR(f.stats);
    if(ovr > bestOvr){ bestOvr = ovr; best = sl; }
  });
  return best;
}

// AI lineup selection for non-player teams. Blind = no visibility into the opponent's
// picks (just fields best OVR per class). Informed = knows the opponent's revealed
// lineup and counter-picks using the discipline matchup chart — this is what makes
// "home sets lineup last" a real advantage rather than flavor text.
function aiPickLineup(slots, opponentLineup){
  const lineup = {};
  WEIGHT_CLASSES.forEach(wc=>{
    const raw = slots.filter(sl=>sl.weightClass===wc).map(sl=>resolveSlotFighter(sl)).filter(Boolean);
    if(!raw.length) return;
    raw.forEach(ensureFatigueFields);
    // Injured fighters are hard-unavailable. If everyone at this weight is hurt, fall
    // back to the full pool rather than forfeit the class outright.
    const healthy = raw.filter(f=> f.injuryWeeksRemaining <= 0);
    let options = healthy.length ? healthy : raw;
    // A fighter carrying heavy fatigue needs the week off if a fresher body is available
    // — this is what actually gives a backup real playing time instead of the same
    // starter going every single week forever.
    const rested = options.filter(f=> f.fatigue < FATIGUE_REST_THRESHOLD);
    if(rested.length) options = rested;
    if(!opponentLineup || !opponentLineup[wc]){
      lineup[wc] = options.reduce((best,f)=> calcOVR(f.stats) > calcOVR(best.stats) ? f : best, options[0]);
    } else {
      const opp = opponentLineup[wc];
      let best = options[0], bestEff = -999;
      options.forEach(f=>{
        const eff = calcOVR(f.stats) + matchupBonus(f.primaryDisc, opp.primaryDisc);
        if(eff > bestEff){ bestEff = eff; best = f; }
      });
      lineup[wc] = best;
    }
  });
  return lineup;
}

function recordGameScore(leagueId, weekIdx, homeIdx, awayIdx, homeScore, awayScore){
  const s = loadJrState();
  if(!s.gameScores) s.gameScores = {};
  s.gameScores[pairingKey(leagueId, weekIdx, homeIdx, awayIdx)] = { homeScore, awayScore };
  saveJrState(s);
}
function getGameScore(leagueId, weekIdx, homeIdx, awayIdx){
  const s = loadJrState();
  return (s.gameScores || {})[pairingKey(leagueId, weekIdx, homeIdx, awayIdx)] || null;
}

function pairingKey(leagueId, weekIdx, home, away){ return `${leagueId}|${weekIdx}|${Math.min(home,away)}-${Math.max(home,away)}`; }
function isPairingPlayed(leagueId, weekIdx, home, away){
  const s = loadJrState();
  return !!(s.playedPairings && s.playedPairings[pairingKey(leagueId,weekIdx,home,away)]);
}
function markPairingPlayed(leagueId, weekIdx, home, away){
  const s = loadJrState();
  if(!s.playedPairings) s.playedPairings = {};
  s.playedPairings[pairingKey(leagueId,weekIdx,home,away)] = true;
  saveJrState(s);
}
function isWeekFullyPlayed(leagueId, weekIdx){
  const weeks = ensureLeagueSchedule(leagueId);
  if(weekIdx >= weeks.length) return true;
  return weeks[weekIdx].every(p=> isPairingPlayed(leagueId, weekIdx, p.home, p.away));
}

// Simulates a full 5-bout team game between two AI-controlled teams (no player
// involved) — used to resolve every other game happening around the league each week.
function simulateAiTeamGame(leagueId, homeIdx, awayIdx, weekIdx, scratchedFighterId){
  if(weekIdx !== undefined && isPairingPlayed(leagueId, weekIdx, homeIdx, awayIdx)) return; // already resolved via another path
  const playoffWk = weekIdx !== undefined && isPlayoffWeek(leagueId, weekIdx);
  let hostIdx = null;
  if(playoffWk){
    const s0 = loadJrState();
    const h = s0.leaguePlayoffHost && s0.leaguePlayoffHost[leagueId];
    if(h) hostIdx = h.teamIndex;
  }
  const homeSlots = ensureTeamRoster(leagueId, homeIdx);
  const awaySlots = ensureTeamRoster(leagueId, awayIdx);
  // A scratched fighter (missed the Thursday deadline) is excluded from THIS game's
  // lineup selection only — their roster slot is untouched, so their backup naturally
  // gets picked instead via the normal weight-class fallback.
  const homeForLineup = scratchedFighterId ? homeSlots.filter(sl=> !(sl.isPlayer && sl.fighterId===scratchedFighterId)) : homeSlots;
  const awayForLineup = scratchedFighterId ? awaySlots.filter(sl=> !(sl.isPlayer && sl.fighterId===scratchedFighterId)) : awaySlots;
  const awayLineup = aiPickLineup(awayForLineup, null); // visitor sets first, blind
  const homeLineup = aiPickLineup(homeForLineup, awayLineup); // home counter-picks
  let homeScore = 0, awayScore = 0;
  const competedIds = new Set();
  WEIGHT_CLASSES.forEach(wc=>{
    const hf = homeLineup[wc], af = awayLineup[wc];
    if(!hf || !af) return;
    const hometownPit = playoffWk ? (hostIdx !== null && homeIdx === hostIdx) : true;
    const bout = simulateBout(hf, af, { arena:{floor: playoffWk ? 'championship court' : 'neutral court'}, hometownPit });
    if(bout.winner.id === hf.id) homeScore++; else awayScore++;
    recordJrBoutOutcome(bout.winner, bout.loser, bout.method);
    applyPostBoutFatigueAndInjury(bout.winner, bout.loser, bout.method);
    competedIds.add(hf.id); competedIds.add(af.id);
  });
  applyWeeklyRosterMaintenance(homeSlots, competedIds);
  applyWeeklyRosterMaintenance(awaySlots, competedIds);
  if(!playoffWk) recordStandingsResult(leagueId, homeIdx, awayIdx, homeScore > awayScore); // playoff results are tracked separately (semis/final), not folded into regular-season W-L
  if(weekIdx !== undefined){
    markPairingPlayed(leagueId, weekIdx, homeIdx, awayIdx);
    recordGameScore(leagueId, weekIdx, homeIdx, awayIdx, homeScore, awayScore);
  }
  persistRosterSlots(leagueId, homeIdx, homeSlots);
  persistRosterSlots(leagueId, awayIdx, awaySlots);
}

// Resolves every OTHER game in the given week (not involving teamIndex) — keeps the
// whole league's standings moving in lockstep with the player's own game each week.
function resolveOtherGamesThisWeek(leagueId, teamIndex, weekIdx){
  const weeks = ensureLeagueSchedule(leagueId);
  if(weekIdx >= weeks.length) return;
  weeks[weekIdx].forEach(pair=>{
    if(pair.home===teamIndex || pair.away===teamIndex) return;
    simulateAiTeamGame(leagueId, pair.home, pair.away, weekIdx);
  });
}

function calcOVR(stats){ return Math.round((stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5); }
function heightLabel(inches){ if(!inches) return ''; const ft=Math.floor(inches/12), inch=inches%12; return `${ft}'${inch}"`; }

}

/* Ported from the Fight Pit — same math, same feel, so a Junior League team game
   resolves consistently with everything else in the world. */

const ALL_DISCIPLINES = Object.keys(DISCIPLINE_NAMES);
const MATCHUP = {
  boxer:    { boxer:0, brawler:1, wrestler:-1, sambo:-1, mma:-1, karate:1, judo:-1, catch:-1 },
  brawler:  { boxer:-1, brawler:0, wrestler:-1, sambo:-2, mma:-1, karate:0, judo:-2, catch:-1 },
  wrestler: { boxer:1, brawler:1, wrestler:0, sambo:-1, mma:0, karate:1, judo:0, catch:1 },
  sambo:    { boxer:1, brawler:2, wrestler:1, sambo:0, mma:0, karate:1, judo:-1, catch:0 },
  mma:      { boxer:1, brawler:1, wrestler:0, sambo:0, mma:0, karate:1, judo:0, catch:1 },
  karate:   { boxer:-1, brawler:0, wrestler:-1, sambo:-1, mma:-1, karate:0, judo:-1, catch:0 },
  judo:     { boxer:1, brawler:2, wrestler:0, sambo:1, mma:0, karate:1, judo:0, catch:1 },
  catch:    { boxer:1, brawler:1, wrestler:-1, sambo:0, mma:-1, karate:0, judo:-1, catch:0 },
};
const MATCHUP_SCALE = 5;
function matchupBonus(myDisc, oppDisc){ const row=MATCHUP[myDisc]; return row && row[oppDisc]!==undefined ? row[oppDisc]*MATCHUP_SCALE : 0; }
function winProbability(effA, effB){ return 1/(1+Math.pow(10, -(effA-effB)/12)); }
function weightedPick(weights){
  const r = Math.random(); let acc = 0;
  for(const [k,w] of Object.entries(weights)){ acc += w; if(r <= acc) return k; }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

function fillTpl(text, map){ return text.replace(/{(\w+)}/g, (_,k)=> map[k]!==undefined ? map[k] : ''); }

function simulateBout(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const homeBonusA = ctx && ctx.hometownPit ? 4 : 0;
  const effA = ovrA + mbA + homeBonusA;
  const effB = ovrB + mbB;
  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;
  const gap = Math.abs(effA - effB);

  let finishWeights;
  if(gap >= 20) finishWeights = { KO:0.38, TKO:0.34, Decision:0.26, DQ:0.02 };
  else if(gap >= 10) finishWeights = { KO:0.20, TKO:0.32, Decision:0.46, DQ:0.02 };
  else finishWeights = { KO:0.09, TKO:0.24, Decision:0.65, DQ:0.02 };

  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.22, 2:0.36, 3:0.42}), 10);
  const floor = (ctx && ctx.arena && ctx.arena.floor) || 'sport court';
  const log = [];
  for(let r=1; r<=3; r++){
    log.push({ type:'round-header', round:r });
    const map = { A: fA.name, B: fB.name, floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma) };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });
    if(method !== 'Decision' && r === finishRound){
      const fmap = { W: winner.name, L: loser.name, floor };
      const lib = method === 'KO' ? FINISH_KO : method === 'TKO' ? FINISH_TKO : FINISH_DQ;
      log.push({ type:'finish', text: fillTpl(pick(lib), fmap) });
      break;
    } else {
      log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS), map) });
    }
  }
  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }
  return { winner, loser, method, finishRound, ovrA, ovrB, effA, effB, probA, log };
}

const AGE_BAND_TYPICAL      = { 11:13, 12:15, 13:18, 14:21, 15:25, 16:28, 17:31, 18:35, 19:36, 20:37 };
const AGE_BAND_PRODIGY      = { 11:17, 12:20, 13:23, 14:26, 15:29, 16:32, 17:34, 18:35, 19:36, 20:37 };
const AGE_BAND_GENERATIONAL = { 11:22, 12:30, 13:40, 14:50, 15:60, 16:70, 17:80, 18:88, 19:90, 20:92 };
function bandCeiling(age, tier){
  const table = tier==='generational' ? AGE_BAND_GENERATIONAL : tier==='prodigy' ? AGE_BAND_PRODIGY : AGE_BAND_TYPICAL;
  return table[clamp(age, 11, 20)];
}

const MATURITY_PCT_BY_AGE = { 11:0.74, 12:0.79, 13:0.84, 14:0.89, 15:0.93, 16:0.96, 17:0.98, 18:1.0 };
function bmiForBuild(build){
  if(build==='lean') return rand(19,23);
  if(build==='stocky') return rand(27,32);
  return rand(23,27);
}
function weightFromHeight(heightIn, bmi){
  const heightM = heightIn * 0.0254;
  return Math.round(bmi * heightM * heightM * 2.20462);
}
function rollAdultHeightIn(){
  const t = (Math.random()+Math.random()+Math.random())/3;
  return clamp(Math.round(64 + t*20), 64, 84);
}
function heightForAge(adultHeightIn, age){
  if(!age || age >= 18) return adultHeightIn;
  const pct = MATURITY_PCT_BY_AGE[clamp(age,11,18)] || 1.0;
  return Math.max(50, Math.round(adultHeightIn * pct));
}
function weightForAge(currentHeightIn, age, bmi){
  const youthFactor = (!age || age>=18) ? 1.0 : 0.85 + (clamp(age,11,18)-11)/7*0.15;
  return weightFromHeight(currentHeightIn, bmi*youthFactor);
}
function projectAdultSize(f){
  const age = f.age || 18;
  const pct = MATURITY_PCT_BY_AGE[clamp(age, 11, 18)] || 1.0;
  const build = f.appearance ? f.appearance.build : 'athletic';
  let adultHeightIn = f.adultHeightIn;
  let bmiTarget = f.bmiTarget;
  if(!adultHeightIn){
    adultHeightIn = clamp(Math.round((f.heightIn||64) / pct), 64, 84);
    bmiTarget = bmiForBuild(build);
  }
  const adultWeightLb = weightFromHeight(adultHeightIn, bmiTarget);
  return { adultHeightIn, adultWeightLb, isGrown: pct >= 1.0 };
}
function growthOutlook(f){
  let ceiling;
  if(f.juniorTeamId) ceiling = juniorCeiling(f.talentTier||'normal');
  else if(f.amateurLeagueId) ceiling = f.talentTier==='generational' ? 90 : 35;
  else ceiling = bandCeiling(f.age||11, f.talentTier||'normal');
  const avgStat = (f.stats.speed+f.stats.quickness+f.stats.toughness+f.stats.power+f.stats.agility)/5;
  const pctOfCeiling = clamp(avgStat/ceiling*100, 0, 100);
  let outlook;
  if(pctOfCeiling >= 90) outlook = 'Close to maxed out for where they are right now — future growth mostly comes from moving up a level.';
  else if(pctOfCeiling >= 60) outlook = 'Solid development so far, real room left to keep climbing.';
  else if(pctOfCeiling >= 30) outlook = 'Early in the development curve — plenty of runway left.';
  else outlook = 'Very raw. Most of the growth curve is still ahead.';
  return { ceiling, avgStat, pctOfCeiling, outlook };
}

/* ============================ JUNIOR-TIER GROWTH ============================ */
/* Junior League ceiling sits well above Amateur's flat 35 — this is the "Minor Pro"
   band from the original tier design (30-60), with Generational Talents allowed to
   keep climbing toward Pro-level numbers. Growth stays earned, same mechanic as
   Juvenile/Amateur: win, finish, and beating someone tougher than you all matter. */
function juniorCeiling(talentTier){
  if(talentTier === 'generational') return 90;
  if(talentTier === 'prodigy') return 65;
  return 60;
}
function growJuniorStats(f, playerWon, method, oppOVR){
  const ceiling = juniorCeiling(f.talentTier);
  const potentialFactor = clamp((f.potential || 50) / 99, 0, 1);
  const ownOVR = calcOVR(f.stats);
  let growthTicks = 0;
  if(playerWon){
    growthTicks += 1;
    if(method !== 'Decision') growthTicks += 1;
    if(oppOVR > ownOVR) growthTicks += 1;
  } else if(Math.random() < 0.3){
    growthTicks += 1;
  }
  growthTicks = Math.round(growthTicks * (0.4 + potentialFactor * 0.9));
  if(growthTicks <= 0) return;
  const statKeys = ['speed','quickness','toughness','power','agility'];
  for(let i=0;i<growthTicks;i++){
    const key = pick(statKeys);
    const current = f.stats[key];
    if(current >= ceiling) continue;
    const room = 1 - (current/ceiling);
    if(Math.random() < 0.45 + room*0.4){
      f.stats[key] = clamp(current+1, 1, ceiling);
    }
  }
}

/* ============================ DRAFT ENGINE ============================ */

// Draft eligibility: a Juvenile-active fighter aged 14-17. Earliest eligibility is a
// fighter's 14th birth-year; 17 is the last age they can still be picked before aging
// out of Juvenile into the Amateur ranks undrafted. (Junior and Amateur were swapped
// from an earlier design pass — Junior now drafts straight out of Juvenile, and Amateur
// is the older 18+ money league that sits between Junior and Pro. An amateurLeagueId
// check is intentionally NOT required here anymore.)
//
// Also gated by the calendar now — Draft Day is a fixed date (May 15, from
// tierKeyDates), not "whenever the player clicks in." Age/rights eligibility can be
// true well before that; the button just stays disabled with an explanatory status
// until the actual day arrives.
function currentIslandYear(){
  return resolveTierSeason('juvenile', getCurrentDay()).cycleYear;
}
function isDraftEligible(f){
  const petitionedEarly = f.juvenilePetitionStatus === 'approved-pending-draft';
  const ageOk = petitionedEarly || (f.age >= 14 && f.age <= 17);
  const draftWeekArrived = getCurrentDay() >= tierKeyDates(currentIslandYear()).juniorDraftDayIronbound;
  return !!f.juvenileHomeProvinceId && ageOk && !f.juniorTeamId && draftWeekArrived;
}

function getFighterScouting(f){
  // Reuse the Fight Pit's league scouting rating if available on the fighter's record;
  // fall back to a neutral 3 if this fighter was created/tracked before that field existed.
  return f.amateurLeagueScouting || 3;
}

// Runs the full draft across all 3 leagues for ONE fighter (the player's), plus a
// flavor-only procedural board so Draft Day feels like a real event. Returns
// { results: [{leagueId, round, teamIndex}], board: {leagueId: [[pick,pick,...] per round]} }
function runDraftForFighter(f){
  const ovr = calcOVR(f.stats);
  const scouting = getFighterScouting(f);
  const results = [];
  const board = {};

  // Each league drafts independently against the SAME pool — a lower tier can "reach" for
  // a player a higher tier already took. That's intentional risk, not a bug: if multiple
  // leagues draft the player, they get to choose which offer to actually sign with (see the
  // 'offers' screen), naturally favoring the higher tier — a lower-tier team that reached
  // for someone with a better offer on the table just wasted a pick, same as real drafts.
  [...JR_LEAGUES].sort((a,b)=> a.draftOrder-b.draftOrder).forEach(league=>{
    const thresholds = TIER_ROUND_THRESHOLDS[league.tier];
    board[league.id] = [];
    let drafted = false;
    let draftedRound = null, draftedTeam = null;

    for(let r=0; r<3; r++){
      const roundPicks = [];
      const chance = draftChance(ovr, thresholds[r], scouting);
      // Which pick number (team) in this round does the player land at, if drafted this round?
      const playerPickSlot = !drafted && Math.random() < chance ? rand(0, league.teams.length-1) : -1;

      for(let t=0; t<league.teams.length; t++){
        if(t === playerPickSlot){
          roundPicks.push({ team: jrTeamName(league.id, t), name: f.name, isPlayer:true });
          drafted = true; draftedRound = r+1; draftedTeam = t;
        } else {
          roundPicks.push({ team: jrTeamName(league.id, t), name: prospectName(league), isPlayer:false });
        }
      }
      board[league.id].push(roundPicks);
    }
    if(drafted){
      results.push({ leagueId: league.id, round: draftedRound, teamIndex: draftedTeam });
    }
  });

  return { results, board };
}

function rightsStillActive(f){
  if(!f.juniorRightsHolders || !f.juniorRightsHolders.length) return false;
  const seasonsNow = (f.amateurSeasonHistory || []).length;
  return seasonsNow <= (f.juniorRightsExpiresAfterSeasons || 0);
}

function findFighterAnywhere(id){
  const roster = getRoster();
  let f = roster.find(r=>r.id===id);
  if(f) return { f, isField:false };
  // Search every team roster's NPC slots too, since teammates aren't in the main roster.
  const s = loadJrState();
  for(const key of Object.keys(s.rosters||{})){
    const found = s.rosters[key].find(sl=> !sl.isPlayer && sl.fighter && sl.fighter.id===id);
    if(found) return { f: found.fighter, isField:true };
  }
  // Not on any team yet — check the declared Juvenile pool and the Junior free-agent
  // pool, so a name can be clicked straight from the Declared or FA Pool screens too.
  const pools = loadFieldPools();
  for(const provinceId in (pools.juvenile||{})){
    const found = pools.juvenile[provinceId].find(x=> x.id === id);
    if(found) return { f: found, isField:true };
  }
  const faFound = (pools.juniorFA||[]).find(x=> x.id === id);
  if(faFound) return { f: faFound, isField:true };
  return { f:null, isField:false };
}

// A recruit's real draft stock isn't just their current OVR — a Generational-tier 14
// year old sitting at a modest current OVR is still a much better long-term bet than a
// Normal-tier fighter already close to their ceiling. This blends projected adult
// ceiling (talent tier) with current production to rank recruits the way a scout would,
// which is why "Recruit #N" can land in a different order than a straight OVR sort.
function recruitScoutingScore(f){
  const ceiling = bandCeiling(18, f.talentTier || 'normal');
  return ceiling * 0.65 + calcOVR(f.stats) * 0.35;
}
function rankRecruits(list){
  return list.slice().sort((a,b)=> recruitScoutingScore(b) - recruitScoutingScore(a));
}
function recruitRowHtml(f, recruitNumber){
  const prov = PROVINCES.find(p=>p.id===f.provinceId);
  const doc = projectAdultSize(f);
  return `
    <div class="fighter-row" style="--fr-color:${prov?prov.color:'#C9A23C'}">
      <div class="fr-status" style="min-width:64px; text-align:left;">Recruit<br>#${recruitNumber}</div>
      <div class="fr-avatar">${buildSilhouetteSM(f.appearance)}</div>
      <div style="flex:1;">
        <div class="fr-name clickable-name" data-open-fighter="${f.id}">${f.isPlayable ? '⭐ ' : ''}${f.name}</div>
        <div class="fr-meta">Age ${f.age} · ${f.settlement||f.hometown||'Unknown'}${prov ? ', '+prov.name : ''} · ${DISCIPLINE_NAMES[f.primaryDisc]} · ${heightLabel(f.heightIn)} · Projects ${weightClassOf(doc.adultWeightLb)}weight</div>
      </div>
      <div class="fr-status">OVR ${calcOVR(f.stats)}<br>${f.record.wins}-${f.record.losses}</div>
    </div>
  `;
}

// All real fighters currently declared for the upcoming/most recent draft cycle —
// NPCs and the player alike — pulled straight from the real draft cycle state.
function renderDeclaredList(){
  const cycleYear = currentIslandYear();
  ensureJuniorDeclarationsForYear(cycleYear);
  const pools = loadFieldPools();
  const declared = [];
  Object.keys(pools.juvenile || {}).forEach(provinceId=>{
    pools.juvenile[provinceId].forEach(f=>{
      if(f.juniorDraftDeclaredYear === cycleYear && f.juniorDraftDeclaration === 'declared') declared.push(f);
    });
  });
  loadRoster().forEach(f=>{
    if(f.juniorDraftDeclaredYear === cycleYear && f.juniorDraftDeclaration === 'declared') declared.push(f);
  });
  declared.sort((a,b)=> calcOVR(b.stats)-calcOVR(a.stats));
  const ranked = rankRecruits(declared);
  const rows = ranked.length ? ranked.map((f,i)=> recruitRowHtml(f, i+1)).join('') : `<div class="empty-note">Nobody's declared for the ${cycleYear} draft yet.</div>`;
  return `
    <div class="section-label">Declared for the ${cycleYear} Draft (${declared.length})</div>
    <div class="fighter-grid">${rows}</div>
    <div class="btn-row" style="margin-top:16px;"><button class="btn" id="back-to-select-from-declared">← Back</button><span></span></div>
  `;
}

// The real, island-wide draft reveal — every actual pick, across all 3 leagues, sourced
// straight from the real declared-pool draft cycle (not the player's own flavor board).
// This is what "Watch It" on a Junior Draft calendar event routes to.
function renderLeagueDraftDay(){
  ensureNpcDraftRunForYear();
  ensureJuniorFAWaiverCaughtUp();
  const s = loadJrState();
  const dc = s.draftCycle;
  if(!dc || !dc.completedLeagues.length){
    return `
      <div class="empty-note">Draft night hasn't happened yet — check back once the calendar actually reaches it.</div>
      <div class="btn-row" style="margin-top:14px;"><span></span><a class="btn btn-primary" href="iifl_home.html" style="text-decoration:none; display:inline-block;">🏠 Home Hub</a></div>
    `;
  }
  const leaguesHtml = [...JR_LEAGUES].sort((a,b)=> a.draftOrder-b.draftOrder).map(league=>{
    const b = dc.boards[league.id];
    if(!b){
      return `
        <div class="league-board">
          <div class="league-head"><div class="league-name">${league.name}</div><div class="league-tier">Hasn't drafted yet</div></div>
        </div>
      `;
    }
    let overall = 0;
    const picksHtml = b.picks.map(p=>{
      overall++;
      const ord = overall===1?'1st':overall===2?'2nd':overall===3?'3rd':overall+'th';
      return `
        <div class="pick-row">
          <span class="pick-team">${ord} pick, Rd ${p.round}</span>
          <span class="pick-fighter">${jrTeamName(league.id, p.teamIndex)} select <b>${p.name}</b> from ${p.hometown||'Unknown'}, with a Juvenile record of ${p.record.wins}-${p.record.losses}</span>
        </div>
      `;
    }).join('');
    return `
      <div class="league-board">
        <div class="league-head">
          <div class="league-name">${dc.cycleYear} Jr ${league.name} Draft</div>
          <div class="league-tier">Tier ${league.tier} · Drafted ${league.draftOrder===1?'1st':league.draftOrder===2?'2nd':'3rd'}</div>
        </div>
        ${picksHtml}
      </div>
    `;
  }).join('');

  const notSignedYet = !dc.signed;
  return `
    <div class="section-label">Draft Night — ${dc.cycleYear}</div>
    ${notSignedYet ? `<p style="font-family:var(--body); font-size:12.5px; color:var(--bone-dim); margin-bottom:14px;">Signings resolve at the Friday deadline — anyone taken by more than one league is still a "reach" until then.</p>` : ''}
    ${leaguesHtml}
    <div class="btn-row" style="margin-top:16px;"><span></span><a class="btn btn-primary" href="iifl_home.html" style="text-decoration:none; display:inline-block;">🏠 Home Hub</a></div>
  `;
}
