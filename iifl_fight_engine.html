<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Island Fight League — Fight Resolution Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1B1714;
    --bg-panel:#241D17;
    --bg-raised:#312820;
    --bg-raised-2:#3A2F25;
    --ink-red:#A6342A;
    --ink-red-dim:#7C2620;
    --brass:#C9A23C;
    --brass-dim:#8E7228;
    --bone:#EDE3CF;
    --bone-dim:#C9BFA9;
    --muted:#8B8070;
    --line:#43392D;
    --good:#5A8C5C;
    --display: 'Anton', sans-serif;
    --label: 'Oswald', sans-serif;
    --body: 'Work Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse at top, #241D17 0%, #1B1714 55%, #14110D 100%);
    color:var(--bone);
    font-family:var(--body);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 80px;
    line-height:1.4;
  }
  .app{ width:100%; max-width:820px; }

  .ticket-header{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-bottom:none;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .ticket-eyebrow{ font-family:var(--label); font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--brass); }
  .ticket-title{ font-family:var(--display); font-size:26px; letter-spacing:1px; color:var(--bone); text-transform:uppercase; }
  .ticket-sub{ font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; }

  .panel{ background:var(--bg-panel); border:1px solid var(--line); border-top:none; padding:32px; min-height:420px; }

  .section-label{
    font-family:var(--label); font-size:12px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--brass); margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }

  .btn{
    font-family:var(--label); letter-spacing:1.5px; text-transform:uppercase; font-size:13px; font-weight:500;
    padding:13px 28px; border:1px solid var(--brass); background:transparent; color:var(--brass); cursor:pointer; transition:all .15s ease;
  }
  .btn:hover{ background:var(--brass); color:var(--bg-base); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .btn-primary{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .btn-primary:hover{ background:#C03F32; border-color:#C03F32; color:var(--bone); }
  .btn-row{ display:flex; justify-content:space-between; margin-top:24px; gap:12px; flex-wrap:wrap; }

  .empty-note{
    text-align:center; padding:50px 20px; color:var(--muted); font-family:var(--body); font-size:14px;
  }
  .empty-note a{ color:var(--brass); }

  /* ---- fighter pick grid ---- */
  .pick-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:8px; }
  .pick-card{
    position:relative;
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-left:4px solid var(--pc-color, var(--brass));
    padding:12px 14px;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:center;
    transition:all .15s ease;
  }
  .pick-card:hover{ background:var(--bg-raised-2); }
  .pick-card.selected{ background:var(--bg-raised-2); box-shadow:inset 0 0 0 1px var(--pc-color, var(--brass)); }
  .pick-card.disabled{ opacity:.3; pointer-events:none; }
  .pick-avatar{ width:28px; height:40px; flex-shrink:0; display:flex; align-items:flex-end; }
  .pick-avatar svg{ width:100%; height:100%; }
  .pick-name{ font-family:var(--label); font-size:14px; font-weight:600; color:var(--bone); }
  .pick-meta{ font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:2px; }
  .pick-ovr{ margin-left:auto; font-family:var(--mono); font-weight:700; font-size:17px; color:var(--brass); flex-shrink:0; }

  .slot-label{
    font-family:var(--label); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin:18px 0 8px;
  }

  /* ---- setup controls ---- */
  .field{ margin-bottom:20px; }
  .field label{
    display:block; font-family:var(--label); font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px;
  }
  .field select, .field input[type=text]{
    width:100%; background:var(--bg-base); border:1px solid var(--line); color:var(--bone);
    font-family:var(--body); font-size:15px; padding:11px 12px;
  }
  .field select:focus, .field input:focus{ outline:none; border-color:var(--brass); }
  .toggle-row{ display:flex; gap:10px; }
  .toggle-opt{
    flex:1; text-align:center; padding:12px; border:1px solid var(--line); background:var(--bg-raised);
    font-family:var(--label); font-size:12.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone-dim);
    cursor:pointer; transition:all .12s ease;
  }
  .toggle-opt:hover{ border-color:var(--brass-dim); }
  .toggle-opt.selected{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .check-row{ display:flex; align-items:center; gap:9px; padding:10px 0; font-family:var(--body); font-size:14px; color:var(--bone-dim); cursor:pointer; }
  .check-row input{ width:16px; height:16px; accent-color:var(--ink-red); }

  /* ---- vs card ---- */
  .vs-wrap{ display:flex; align-items:center; justify-content:center; gap:18px; margin:26px 0; }
  .vs-fighter{ flex:1; text-align:center; }
  .vs-fighter .vsa{ width:64px; height:90px; margin:0 auto 8px; display:flex; align-items:flex-end; justify-content:center; }
  .vs-fighter .vsa svg{ width:100%; height:100%; }
  .vs-fighter .vname{ font-family:var(--display); font-size:18px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .vs-fighter .vdisc{ font-family:var(--label); font-size:11.5px; color:var(--brass); margin-top:2px; text-transform:uppercase; }
  .vs-fighter .vovr{ font-family:var(--mono); font-size:24px; font-weight:700; color:var(--bone); margin-top:6px; }
  .vs-fighter .vtag{ font-family:var(--mono); font-size:9.5px; color:var(--muted); letter-spacing:1px; margin-top:3px; text-transform:uppercase; }
  .vs-mid{ font-family:var(--display); font-size:28px; color:var(--ink-red); }

  /* ---- arena card ---- */
  .arena-card{
    background:var(--bg-raised); border:1px solid var(--line); padding:16px 18px; margin-bottom:24px;
  }
  .arena-name{ font-family:var(--display); font-size:19px; letter-spacing:.5px; text-transform:uppercase; color:var(--brass); }
  .arena-meta{ font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:5px; }

  /* ---- fight log ---- */
  .fight-log{ display:flex; flex-direction:column; gap:10px; margin-bottom:6px; }
  .log-round{
    font-family:var(--label); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted);
    margin-top:14px; display:flex; align-items:center; gap:10px;
  }
  .log-round::after{ content:""; flex:1; height:1px; background:var(--line); }
  .log-line{
    font-family:var(--body); font-size:14.5px; color:var(--bone-dim); line-height:1.5;
    opacity:0; animation:line-in .35s ease forwards;
  }
  @keyframes line-in{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .log-line.finish{ color:var(--ink-red); font-weight:600; }
  .log-line.decision{ color:var(--brass); font-weight:600; }

  /* ---- result card ---- */
  .result-banner{
    text-align:center; padding:24px 10px; background:var(--bg-raised); border:1px solid var(--brass-dim); margin-bottom:20px;
  }
  .result-winner{ font-family:var(--display); font-size:30px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); }
  .result-method{ font-family:var(--label); font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:var(--bone-dim); margin-top:6px; }
  .result-round{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:4px; }

  .record-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
  .record-box{ background:var(--bg-raised); border:1px solid var(--line); padding:12px 14px; text-align:center; }
  .record-box .rname{ font-family:var(--label); font-size:13px; color:var(--bone); }
  .record-box .rrec{ font-family:var(--mono); font-size:16px; color:var(--brass); margin-top:4px; }

  @media (max-width:600px){
    .pick-grid{ grid-template-columns:1fr; }
    .ticket-header{ flex-direction:column; align-items:flex-start; gap:6px; }
    .toggle-row{ flex-direction:column; }
    .record-grid{ grid-template-columns:1fr; }
  }

  /* ---- fighter card modal ---- */
  .clickable-name{ cursor:pointer; text-decoration:underline; text-decoration-color:transparent; transition:text-decoration-color .12s ease; }
  .clickable-name:hover{ text-decoration-color:var(--brass); color:var(--brass); }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,6,0.78); display:flex; align-items:flex-start; justify-content:center;
    padding:40px 16px; z-index:1000; overflow-y:auto;
  }
  .modal-card{ background:var(--bg-panel); border:1px solid var(--brass-dim); max-width:520px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,0.55); }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); }
  .modal-title{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .modal-close{ background:transparent; border:1px solid var(--line); color:var(--muted); width:30px; height:30px; cursor:pointer; font-family:var(--mono); font-size:14px; }
  .modal-close:hover{ border-color:var(--ink-red); color:var(--ink-red); }
  .modal-body{ padding:20px; }
  .mf-head{ display:flex; gap:14px; align-items:center; margin-bottom:18px; }
  .mf-avatar{ width:50px; height:70px; flex-shrink:0; display:flex; align-items:flex-end; }
  .mf-avatar svg{ width:100%; height:100%; }
  .mf-name{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .mf-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px; }
  .mf-disc{ font-family:var(--label); font-size:11.5px; color:var(--brass); text-transform:uppercase; margin-top:3px; }
  .mf-stats-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:18px; }
  .mf-stat{ background:var(--bg-raised); border:1px solid var(--line); text-align:center; padding:8px 4px; }
  .mf-stat .msv{ font-family:var(--mono); font-size:15px; font-weight:700; color:var(--brass); }
  .mf-stat .msl{ font-family:var(--label); font-size:8.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  .mf-tier-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .mf-tier-tab{ font-family:var(--label); font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; padding:7px 11px; border:1px solid var(--line); background:var(--bg-raised); color:var(--muted); cursor:pointer; }
  .mf-tier-tab.active{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .mf-history-row{ display:grid; grid-template-columns:70px 1fr auto; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-family:var(--body); font-size:12.5px; }
  .mf-history-row:last-child{ border-bottom:none; }
  .mfh-date{ font-family:var(--mono); font-size:10px; color:var(--muted); }
  .mfh-opp{ color:var(--bone-dim); }
  .mfh-opp b{ color:var(--bone); }
  .mfh-loc{ font-family:var(--mono); font-size:10px; color:var(--muted); display:block; margin-top:1px; }
  .mfh-result{ font-family:var(--mono); font-size:11.5px; font-weight:700; }
  .mfh-result.win{ color:var(--good); }
  .mfh-result.loss{ color:var(--ink-red); }
  .mf-empty{ text-align:center; padding:24px 10px; color:var(--muted); font-family:var(--body); font-size:13px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="modal-root"></div>

<script>
/* ============================ SHARED DATA (mirrors character creator) ============================ */

const ROSTER_KEY = 'iifl_roster_v1';

const PROVINCES = [
  { id:'alexandretta', name:'Alexandretta Province', color:'#5C7C5E' },
  { id:'kolsati', name:'Kolsati District', color:'#5E7A93' },
  { id:'sherwood', name:'Sherwood Province', color:'#A0623B' },
  { id:'gazon', name:'Gazon Province', color:'#C8943F' },
  { id:'ditiero', name:'Di Tiero Province', color:'#7C5491' },
  { id:'carpathia', name:'Carpathia Province', color:'#5B4070' },
  { id:'northeast', name:'Northeast Territory', color:'#9C4242' },
  { id:'bay', name:'Bay Province', color:'#6E8C9C' },
];

const DISCIPLINE_NAMES = {
  boxer:'Boxer', brawler:'Street Brawler', wrestler:'Wrestler', sambo:'Russian Sambo',
  mma:'MMA', karate:'Karate', judo:'Judo', catch:'Catch Wrestling'
};

// Discipline matchup chart — from GDD §5.1. Row vs column, -2 to +2.
const MATCHUP = {
  boxer:    { boxer:0, brawler:1, wrestler:-1, sambo:-1, mma:-1, karate:1, judo:-1, catch:-1 },
  brawler:  { boxer:-1, brawler:0, wrestler:-1, sambo:-2, mma:-1, karate:0, judo:-2, catch:-1 },
  wrestler: { boxer:1, brawler:1, wrestler:0, sambo:-1, mma:0, karate:1, judo:0, catch:1 },
  sambo:    { boxer:1, brawler:2, wrestler:1, sambo:0, mma:0, karate:1, judo:-1, catch:0 },
  mma:      { boxer:1, brawler:1, wrestler:0, sambo:0, mma:0, karate:1, judo:0, catch:1 },
  karate:   { boxer:-1, brawler:0, wrestler:-1, sambo:-1, mma:-1, karate:0, judo:-1, catch:0 },
  judo:     { boxer:1, brawler:2, wrestler:0, sambo:1, mma:0, karate:1, judo:0, catch:1 },
  catch:    { boxer:1, brawler:1, wrestler:-1, sambo:0, mma:-1, karate:0, judo:-1, catch:0 },
};
const MATCHUP_SCALE = 5; // each chart point = ±5 effective OVR

function buildMult(b){ return { lean:0.8, athletic:1, stocky:1.25 }[b] || 1; }
const DEFAULT_APPEARANCE = { skin:'#C68642', hair:'#2B1B12', build:'athletic' };

function buildSilhouetteSM(app){
  app = app || DEFAULT_APPEARANCE;
  const stroke = (3 * buildMult(app.build)).toFixed(1);
  const hair = app.hair === 'none' ? '' : `<path d="M13 7 Q20 -2 27 7" stroke="${app.hair}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  return `<svg width="40" height="56" viewBox="0 0 40 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="10" r="7" fill="${app.skin}"/>
    ${hair}
    <path d="M8 56 L11 30 Q12 22 20 22 Q28 22 29 30 L32 56" stroke="${app.skin}" stroke-width="${stroke}" fill="none" stroke-linecap="round"/>
    <path d="M11 28 L4 38 M29 28 L36 38" stroke="${app.skin}" stroke-width="${stroke}" stroke-linecap="round"/>
  </svg>`;
}

/* ============================ ROSTER STORAGE ============================ */

function loadRoster(){
  try{
    const raw = localStorage.getItem(ROSTER_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(err){ console.error('IIFL roster load failed:', err); return []; }
}
function saveRoster(list){
  try{ localStorage.setItem(ROSTER_KEY, JSON.stringify(list)); return true; }
  catch(err){ console.error('IIFL roster save failed:', err); return false; }
}
function ensureRecord(f){
  if(!f.record) f.record = { wins:0, losses:0 };
  if(!f.fightLog) f.fightLog = [];
  return f;
}

/* ============================ FIGHT MATH ============================ */

function calcOVR(stats){
  return Math.round((stats.speed + stats.quickness + stats.toughness + stats.power + stats.agility) / 5);
}

function matchupBonus(myDisc, oppDisc){
  const row = MATCHUP[myDisc];
  if(!row || row[oppDisc] === undefined) return 0;
  return row[oppDisc] * MATCHUP_SCALE;
}

function winProbability(effA, effB){
  return 1 / (1 + Math.pow(10, -(effA - effB) / 12));
}

function rand(lo, hi){ return Math.floor(Math.random()*(hi-lo+1))+lo; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function weightedPick(weights){
  // weights: { key: probability, ... } summing ~1
  const r = Math.random();
  let acc = 0;
  for(const [k,w] of Object.entries(weights)){
    acc += w;
    if(r <= acc) return k;
  }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

const ARENA_NAMES = ['The Iron Drum','Concrete Coliseum','The Rusty Bell','Sundown Arena','The Salt Pit','Cinderblock Yard','The Velvet Cage','Foghorn Hall','The Anvil Room','Lantern Court','The Tin Roof','Drydock Arena'];
const FLOOR_TYPES = ['sport court','rubber mat over cement','grass','hard-packed clay','dirt with glass in it'];
const CROWD_TYPES = [
  { label:'Rabid', bonus:9 },
  { label:'Loud', bonus:6 },
  { label:'Reserved', bonus:3 },
  { label:'Quiet / Indifferent', bonus:0 },
];

function generateArena(){
  return {
    name: pick(ARENA_NAMES),
    floor: pick(FLOOR_TYPES),
    capacity: rand(5,100) * 100, // 500–10,000
  };
}

/* ============================ COMMENTARY ============================ */

const DISC_FLAVOR = {
  boxer: ['a sharp jab-cross combo', 'a tight body-head combination', 'a stiff counter right'],
  brawler: ['a wild looping haymaker', 'a scrappy flurry with no real plan', 'a desperate forward charge'],
  wrestler: ['a hard level change for a takedown', 'a grinding clinch against the fence', 'a drive through to the mat'],
  sambo: ['a sweeping hip throw', 'a tight ankle lock attempt', 'a textbook trip takedown'],
  mma: ['a clean mix of strikes and a takedown attempt', 'a smart check-and-counter sequence', 'a probing combination from the outside'],
  karate: ['a snapping front kick', 'a sharp reverse punch', 'a quick in-and-out point strike'],
  judo: ['a hard hip toss', 'a shoulder throw that lands clean', 'a grip fight that ends in a sweep'],
  catch: ['a scramble into a tight headlock', 'a leg lace fight on the mat', 'a sudden roll into a submission hunt'],
};

const ROUND_OPENERS = [
  '{A} and {B} circle the {floor}, sizing each other up.',
  'The bell sounds and {A} comes out moving, {B} matching the pace.',
  '{A} starts working behind a stiff jab as {B} looks for an opening.',
  'Both fighters trade cautious feints before {A} commits first.',
];
const ROUND_EXCHANGES = [
  '{A} lands {flavorA}, {B} answers right back with {flavorB}.',
  '{B} eats {flavorA} from {A} but fires back immediately.',
  '{A} controls the center, mixing in {flavorA} that {B} can\'t quite solve.',
  '{B} finds a home for {flavorB}, and the crowd reacts.',
];
const ROUND_CLOSERS = [
  'The horn sounds to end the round — close to call.',
  'Round ends with both corners shouting instructions.',
  'Round closes with {A} marginally ahead on output.',
  'Round closes with {B} landing the harder shot at the bell.',
];

const FINISH_KO = [
  '{W} catches {L} clean — {L} goes down and the ref doesn\'t even bother counting. KO, {W}!',
  '{W} lands the perfect shot and {L} hits the canvas. It\'s over — KO!',
  'One shot. That\'s all it took. {L} is out cold. {W} wins by knockout.',
];
const FINISH_TKO = [
  '{L} can\'t answer back anymore. The ref steps in — TKO, {W}!',
  '{W} swarms {L} against the {floor} and the referee has seen enough. TKO.',
  '{L}\'s corner is screaming for the towel — and the ref agrees. TKO, {W} wins.',
];
const FINISH_DQ = [
  '{L} loses all composure — an illegal shot, and the ref has no choice. Disqualification, {W} wins.',
  'That\'s a blatant foul from {L}. Referee calls it — DQ, {W} takes the win.',
];
const DECISION_LINES = [
  'After three hard rounds, it goes to the scorecards.',
  'Both fighters empty the tank, and now it\'s in the judges\' hands.',
  'No finish tonight — the crowd waits on the decision.',
];

function fillTpl(text, map){
  return text.replace(/{(\w+)}/g, (_,k)=> map[k] !== undefined ? map[k] : '');
}

/* ============================ FIGHT SIMULATION ============================ */

function simulateFight(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats);
  const ovrB = calcOVR(fB.stats);

  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);

  const homeBonusA = ctx.homeId === fA.id ? ctx.crowdBonus : 0;
  const homeBonusB = ctx.homeId === fB.id ? ctx.crowdBonus : 0;

  const travelPenaltyA = (ctx.homeId && ctx.homeId !== fA.id) ? ctx.travelPenalty : 0;
  const travelPenaltyB = (ctx.homeId && ctx.homeId !== fB.id) ? ctx.travelPenalty : 0;

  const hometownBonusA = ctx.hometownA ? 3 : 0;
  const hometownBonusB = ctx.hometownB ? 3 : 0;

  const effA = ovrA + mbA + homeBonusA - travelPenaltyA + hometownBonusA;
  const effB = ovrB + mbB + homeBonusB - travelPenaltyB + hometownBonusB;

  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;

  const gap = Math.abs(effA - effB);

  let finishWeights;
  if(gap >= 20) finishWeights = { KO:0.40, TKO:0.34, Decision:0.24, DQ:0.02 };
  else if(gap >= 10) finishWeights = { KO:0.22, TKO:0.33, Decision:0.43, DQ:0.02 };
  else finishWeights = { KO:0.10, TKO:0.25, Decision:0.63, DQ:0.02 };

  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.22, 2:0.36, 3:0.42}), 10);

  const floor = ctx.arena.floor;
  const log = [];

  for(let r = 1; r <= 3; r++){
    log.push({ type:'round-header', round:r });
    const map = {
      A: fA.name, B: fB.name,
      floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma),
    };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });

    if(method !== 'Decision' && r === finishRound){
      const fmap = { W: winner.name, L: loser.name, floor };
      const lib = method === 'KO' ? FINISH_KO : method === 'TKO' ? FINISH_TKO : FINISH_DQ;
      log.push({ type:'finish', text: fillTpl(pick(lib), fmap) });
      break;
    } else {
      log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS), map) });
    }
  }

  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }

  return {
    winner, loser, method, finishRound,
    ovrA, ovrB, effA, effB, probA,
    log,
  };
}

/* ============================ STATE ============================ */

const state = {
  screen: 'matchmaking', // matchmaking -> setup -> fight -> result
  fighterAId: null,
  fighterBId: null,
  homeId: null, // null = neutral site
  travelDistance: 'local', // local | cross
  crowdLabel: 'Loud',
  hometownA: false,
  hometownB: false,
  arena: null,
  result: null,
  revealedCount: 0,
};

function getRoster(){ return loadRoster().map(ensureRecord); }
function getFighter(id){ return getRoster().find(f=> f.id === id); }

/* ============================ RENDER ============================ */

function heightLabel(inches){ if(!inches) return ''; const ft=Math.floor(inches/12), inch=inches%12; return `${ft}'${inch}"`; }

/* ============================ FIGHTER CARD MODAL ============================ */

const TIERS = ['All','Juvenile','Amateur','Semi-Pro','Pro','Exhibition'];
let modalFighterId = null;
let modalActiveTier = 'All';

function openFighterCard(id){ modalFighterId = id; modalActiveTier = 'All'; renderModal(); }
function closeFighterCard(){ modalFighterId = null; renderModal(); }

function renderModal(){
  const root = document.getElementById('modal-root');
  if(!modalFighterId){ root.innerHTML = ''; return; }
  const roster = loadRoster().map(ensureRecord);
  const f = roster.find(r=> r.id === modalFighterId);
  if(!f){ root.innerHTML = ''; return; }

  const prov = PROVINCES.find(p=>p.id===f.provinceId);
  const rec = f.record || { wins:0, losses:0 };
  const log = f.fightLog || [];
  const filtered = modalActiveTier === 'All' ? log : log.filter(e=> e.tier === modalActiveTier);
  const sorted = [...filtered].sort((a,b)=> new Date(b.date) - new Date(a.date));

  const historyHtml = sorted.length ? sorted.map(e=>{
    const dateStr = e.date ? new Date(e.date).toLocaleDateString() : '—';
    return `
      <div class="mf-history-row">
        <div class="mfh-date">${dateStr}</div>
        <div class="mfh-opp"><b>${e.result==='W'?'def.':'lost to'}</b> ${e.opponent}${e.location?`<span class="mfh-loc">${e.location}</span>`:''}</div>
        <div class="mfh-result ${e.result==='W'?'win':'loss'}">${e.result} · ${e.method||''}</div>
      </div>
    `;
  }).join('') : `<div class="mf-empty">No fights on record${modalActiveTier==='All'?'':' at this level'} yet.</div>`;

  const tabsHtml = TIERS.map(t=>{
    const count = t==='All' ? log.length : log.filter(e=>e.tier===t).length;
    return `<button class="mf-tier-tab ${modalActiveTier===t?'active':''}" data-mf-tab="${t}">${t} (${count})</button>`;
  }).join('');

  root.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-card">
        <div class="modal-head">
          <div class="modal-title">Fighter Card</div>
          <button class="modal-close" data-modal-close>✕</button>
        </div>
        <div class="modal-body">
          <div class="mf-head">
            <div class="mf-avatar">${buildSilhouetteSM(f.appearance)}</div>
            <div>
              <div class="mf-name">${f.name}</div>
              <div class="mf-meta">${heightLabel(f.heightIn)}${f.weightLb?' · '+f.weightLb+' lb':''} · ${f.settlement||''}${prov?', '+prov.name:''}</div>
              <div class="mf-disc">${DISCIPLINE_NAMES[f.primaryDisc]||''} · Career ${rec.wins}-${rec.losses}</div>
            </div>
          </div>
          <div class="mf-stats-grid">
            <div class="mf-stat"><div class="msv">${f.stats.speed}</div><div class="msl">SPD</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.quickness}</div><div class="msl">QCK</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.toughness}</div><div class="msl">TGH</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.power}</div><div class="msl">PWR</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.agility}</div><div class="msl">AGL</div></div>
          </div>
          <div class="mf-tier-tabs">${tabsHtml}</div>
          <div class="mf-history">${historyHtml}</div>
        </div>
      </div>
    </div>
  `;
}

document.addEventListener('click', (e)=>{
  const openEl = e.target.closest('[data-open-fighter]');
  if(openEl){ openFighterCard(openEl.dataset.openFighter); return; }
  const closeEl = e.target.closest('[data-modal-close]');
  if(closeEl){ closeFighterCard(); return; }
  const overlayEl = e.target.closest('.modal-overlay');
  if(overlayEl && e.target === overlayEl){ closeFighterCard(); return; }
  const tabEl = e.target.closest('[data-mf-tab]');
  if(tabEl){ modalActiveTier = tabEl.dataset.mfTab; renderModal(); return; }
});

const app = document.getElementById('app');

function render(){
  let title = 'MATCHMAKING', sub = 'FIGHT RESOLUTION ENGINE', body = '';
  if(state.screen === 'matchmaking'){ body = renderMatchmaking(); }
  else if(state.screen === 'setup'){ body = renderSetup(); title = 'FIGHT SETUP'; }
  else if(state.screen === 'fight'){ body = renderFight(); title = 'FIGHT NIGHT'; }
  else if(state.screen === 'result'){ body = renderResult(); title = 'FINAL RESULT'; }

  app.innerHTML = `
    <div class="ticket-header">
      <div>
        <div class="ticket-eyebrow">Iron Island · Fight League</div>
        <div class="ticket-title">${title}</div>
      </div>
      <div class="ticket-sub">${sub}</div>
    </div>
    <div class="panel">${body}</div>
  `;
  wireEvents();
}

function fighterPickCard(f, slot){
  const prov = PROVINCES.find(p=>p.id===f.provinceId);
  const selectedId = slot === 'A' ? state.fighterAId : state.fighterBId;
  const otherSelectedId = slot === 'A' ? state.fighterBId : state.fighterAId;
  const selected = selectedId === f.id;
  const disabled = otherSelectedId === f.id;
  return `
    <div class="pick-card ${selected?'selected':''} ${disabled?'disabled':''}" data-pick="${slot}" data-id="${f.id}" style="--pc-color:${prov?prov.color:'#C9A23C'}">
      <div class="pick-avatar">${buildSilhouetteSM(f.appearance)}</div>
      <div>
        <div class="pick-name clickable-name" data-open-fighter="${f.id}">${f.name}</div>
        <div class="pick-meta">${DISCIPLINE_NAMES[f.primaryDisc]} · ${f.settlement} · ${f.record.wins}-${f.record.losses}</div>
      </div>
      <div class="pick-ovr">${calcOVR(f.stats)}</div>
    </div>
  `;
}

function renderMatchmaking(){
  const roster = getRoster();
  if(roster.length < 2){
    return `<div class="empty-note">Need at least two saved fighters to book a fight. Build them in the Character Creator first — fighters save to the same shared roster this engine reads from.</div>`;
  }

  return `
    <div class="slot-label">Corner A</div>
    <div class="pick-grid">${roster.map(f=>fighterPickCard(f,'A')).join('')}</div>

    <div class="slot-label">Corner B</div>
    <div class="pick-grid">${roster.map(f=>fighterPickCard(f,'B')).join('')}</div>

    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" id="to-setup" ${(!state.fighterAId || !state.fighterBId)?'disabled':''}>Set the Fight →</button>
    </div>
  `;
}

function renderSetup(){
  const fA = getFighter(state.fighterAId);
  const fB = getFighter(state.fighterBId);

  return `
    <div class="vs-wrap">
      <div class="vs-fighter"><div class="vsa">${buildSilhouetteSM(fA.appearance)}</div><div class="vname clickable-name" data-open-fighter="${fA.id}">${fA.name}</div><div class="vdisc">${DISCIPLINE_NAMES[fA.primaryDisc]}</div><div class="vovr">${calcOVR(fA.stats)}</div></div>
      <div class="vs-mid">VS</div>
      <div class="vs-fighter"><div class="vsa">${buildSilhouetteSM(fB.appearance)}</div><div class="vname clickable-name" data-open-fighter="${fB.id}">${fB.name}</div><div class="vdisc">${DISCIPLINE_NAMES[fB.primaryDisc]}</div><div class="vovr">${calcOVR(fB.stats)}</div></div>
    </div>

    <div class="section-label">Home Arena</div>
    <div class="toggle-row">
      <div class="toggle-opt ${state.homeId===fA.id?'selected':''}" data-home="${fA.id}">${fA.name} (Home)</div>
      <div class="toggle-opt ${state.homeId===fB.id?'selected':''}" data-home="${fB.id}">${fB.name} (Home)</div>
      <div class="toggle-opt ${state.homeId===null?'selected':''}" data-home="">Neutral Site</div>
    </div>

    <div class="section-label">Crowd Energy</div>
    <div class="toggle-row">
      ${CROWD_TYPES.map(c=>`<div class="toggle-opt ${state.crowdLabel===c.label?'selected':''}" data-crowd="${c.label}">${c.label}</div>`).join('')}
    </div>

    <div class="section-label">Away Fighter's Travel</div>
    <div class="toggle-row">
      <div class="toggle-opt ${state.travelDistance==='local'?'selected':''}" data-travel="local">Same Region</div>
      <div class="toggle-opt ${state.travelDistance==='cross'?'selected':''}" data-travel="cross">Cross-Province</div>
    </div>

    <div class="section-label">Hometown Edge</div>
    <label class="check-row"><input type="checkbox" id="hometown-a" ${state.hometownA?'checked':''}> ${fA.name} is fighting in or near ${fA.settlement}</label>
    <label class="check-row"><input type="checkbox" id="hometown-b" ${state.hometownB?'checked':''}> ${fB.name} is fighting in or near ${fB.settlement}</label>

    <div class="btn-row">
      <button class="btn" id="back-to-matchmaking">← Back</button>
      <button class="btn btn-primary" id="start-fight">Enter the Arena →</button>
    </div>
  `;
}

function renderFight(){
  const fA = getFighter(state.fighterAId);
  const fB = getFighter(state.fighterBId);
  const r = state.result;
  const arena = state.arena;

  const visibleEntries = r.log.slice(0, state.revealedCount);
  const logHtml = visibleEntries.map((entry,i)=>{
    if(entry.type === 'round-header') return `<div class="log-round">ROUND ${entry.round}</div>`;
    if(entry.type === 'finish') return `<div class="log-line finish" style="animation-delay:${i*0.02}s">${entry.text}</div>`;
    if(entry.type === 'decision') return `<div class="log-line decision" style="animation-delay:${i*0.02}s">${entry.text}</div>`;
    return `<div class="log-line" style="animation-delay:${i*0.02}s">${entry.text}</div>`;
  }).join('');

  const done = state.revealedCount >= r.log.length;

  return `
    <div class="arena-card">
      <div class="arena-name">${arena.name}</div>
      <div class="arena-meta">${arena.capacity.toLocaleString()} capacity · ${arena.floor} · ${state.crowdLabel} crowd${state.homeId ? ` · Home: ${getFighter(state.homeId).name}` : ' · Neutral Site'}</div>
    </div>

    <div class="vs-wrap" style="margin-top:0;">
      <div class="vs-fighter"><div class="vsa">${buildSilhouetteSM(fA.appearance)}</div><div class="vname clickable-name" data-open-fighter="${fA.id}">${fA.name}</div><div class="vdisc">${DISCIPLINE_NAMES[fA.primaryDisc]}</div></div>
      <div class="vs-mid">VS</div>
      <div class="vs-fighter"><div class="vsa">${buildSilhouetteSM(fB.appearance)}</div><div class="vname clickable-name" data-open-fighter="${fB.id}">${fB.name}</div><div class="vdisc">${DISCIPLINE_NAMES[fB.primaryDisc]}</div></div>
    </div>

    <div class="fight-log">${logHtml}</div>

    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" id="advance-fight">${done ? 'See Final Result →' : 'Next →'}</button>
    </div>
  `;
}

function renderResult(){
  const r = state.result;
  const fA = getFighter(state.fighterAId);
  const fB = getFighter(state.fighterBId);
  const methodLabel = r.method === 'Decision' ? `Decision (after Round 3)` : `${r.method} — Round ${r.finishRound}`;

  return `
    <div class="result-banner">
      <div class="result-winner">${r.winner.name} Wins</div>
      <div class="result-method">${methodLabel}</div>
      <div class="result-round">Effective rating: ${r.winner.id===fA.id?r.effA.toFixed(1):r.effB.toFixed(1)} vs ${r.winner.id===fA.id?r.effB.toFixed(1):r.effA.toFixed(1)} · Pre-fight win probability: ${(r.winner.id===fA.id ? r.probA*100 : (1-r.probA)*100).toFixed(0)}%</div>
    </div>

    <div class="record-grid">
      <div class="record-box"><div class="rname clickable-name" data-open-fighter="${fA.id}">${fA.name}</div><div class="rrec">${fA.record.wins}-${fA.record.losses}</div></div>
      <div class="record-box"><div class="rname clickable-name" data-open-fighter="${fB.id}">${fB.name}</div><div class="rrec">${fB.record.wins}-${fB.record.losses}</div></div>
    </div>

    <div class="btn-row">
      <button class="btn" id="back-to-roster-pick">New Matchup</button>
      <button class="btn btn-primary" id="rematch">Run It Back (Rematch)</button>
    </div>
  `;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  document.querySelectorAll('[data-pick]').forEach(card=>{
    card.onclick = ()=>{
      const slot = card.dataset.pick;
      if(slot === 'A') state.fighterAId = card.dataset.id;
      else state.fighterBId = card.dataset.id;
      render();
    };
  });

  const toSetup = document.getElementById('to-setup');
  if(toSetup) toSetup.onclick = ()=>{ state.screen = 'setup'; render(); };

  document.querySelectorAll('[data-home]').forEach(el=>{
    el.onclick = ()=>{ state.homeId = el.dataset.home || null; render(); };
  });
  document.querySelectorAll('[data-crowd]').forEach(el=>{
    el.onclick = ()=>{ state.crowdLabel = el.dataset.crowd; render(); };
  });
  document.querySelectorAll('[data-travel]').forEach(el=>{
    el.onclick = ()=>{ state.travelDistance = el.dataset.travel; render(); };
  });

  const homeA = document.getElementById('hometown-a');
  if(homeA) homeA.onchange = (e)=>{ state.hometownA = e.target.checked; };
  const homeB = document.getElementById('hometown-b');
  if(homeB) homeB.onchange = (e)=>{ state.hometownB = e.target.checked; };

  const backToMatchmaking = document.getElementById('back-to-matchmaking');
  if(backToMatchmaking) backToMatchmaking.onclick = ()=>{ state.screen = 'matchmaking'; render(); };

  const startFight = document.getElementById('start-fight');
  if(startFight) startFight.onclick = ()=>{
    const fA = getFighter(state.fighterAId);
    const fB = getFighter(state.fighterBId);
    const crowd = CROWD_TYPES.find(c=>c.label===state.crowdLabel) || CROWD_TYPES[1];
    const ctx = {
      homeId: state.homeId,
      crowdBonus: crowd.bonus,
      travelPenalty: state.travelDistance === 'cross' ? 7 : 3,
      hometownA: state.hometownA,
      hometownB: state.hometownB,
      arena: generateArena(),
    };
    state.arena = ctx.arena;
    state.result = simulateFight(fA, fB, ctx);
    state.revealedCount = 0;
    state.screen = 'fight';
    render();
  };

  const advanceFight = document.getElementById('advance-fight');
  if(advanceFight) advanceFight.onclick = ()=>{
    if(state.revealedCount < state.result.log.length){
      state.revealedCount = Math.min(state.result.log.length, state.revealedCount + 3);
      render();
    } else {
      applyResultToRoster();
      state.screen = 'result';
      render();
    }
  };

  const newMatchup = document.getElementById('back-to-roster-pick');
  if(newMatchup) newMatchup.onclick = ()=>{
    Object.assign(state, { screen:'matchmaking', fighterAId:null, fighterBId:null, homeId:null,
      travelDistance:'local', crowdLabel:'Loud', hometownA:false, hometownB:false, arena:null, result:null, revealedCount:0 });
    render();
  };

  const rematch = document.getElementById('rematch');
  if(rematch) rematch.onclick = ()=>{ state.screen = 'setup'; render(); };
}

function applyResultToRoster(){
  const roster = loadRoster().map(ensureRecord);
  const winner = roster.find(f=> f.id === state.result.winner.id);
  const loser = roster.find(f=> f.id === state.result.loser.id);
  const location = `${state.arena.name} (Exhibition)`;
  if(winner){
    winner.record.wins += 1;
    winner.fightLog.push({ tier:'Exhibition', opponent: loser ? loser.name : '—', result:'W', method: state.result.method, location, date: new Date().toISOString() });
  }
  if(loser){
    loser.record.losses += 1;
    loser.fightLog.push({ tier:'Exhibition', opponent: winner ? winner.name : '—', result:'L', method: state.result.method, location, date: new Date().toISOString() });
  }
  saveRoster(roster);
}

render();
</script>
