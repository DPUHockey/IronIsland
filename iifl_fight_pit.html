<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Island Fight League — Fight Pit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1B1714; --bg-panel:#241D17; --bg-raised:#312820; --bg-raised-2:#3A2F25;
    --ink-red:#A6342A; --ink-red-dim:#7C2620; --brass:#C9A23C; --brass-dim:#8E7228;
    --bone:#EDE3CF; --bone-dim:#C9BFA9; --muted:#8B8070; --line:#43392D; --good:#5A8C5C;
    --display:'Anton',sans-serif; --label:'Oswald',sans-serif; --body:'Work Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at top, #241D17 0%, #1B1714 55%, #14110D 100%);
    color:var(--bone); font-family:var(--body); min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:32px 16px 80px; line-height:1.4;
  }
  .app{ width:100%; max-width:820px; }
  .ticket-header{
    background:var(--bg-panel); border:1px solid var(--line); border-bottom:none; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .ticket-eyebrow{ font-family:var(--label); font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--brass); }
  .ticket-title{ font-family:var(--display); font-size:26px; letter-spacing:1px; color:var(--bone); text-transform:uppercase; }
  .ticket-sub{ font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; }
  .calendar-banner{
    background:var(--bg-raised); border:1px solid var(--line); border-top:none; padding:9px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px;
    font-family:var(--mono); font-size:10.5px; color:var(--muted);
  }
  .calendar-banner b{ color:var(--brass); font-weight:600; }
  .panel{ background:var(--bg-panel); border:1px solid var(--line); border-top:none; padding:32px; min-height:420px; }
  .section-label{
    font-family:var(--label); font-size:12px; letter-spacing:2.5px; text-transform:uppercase; color:var(--brass);
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }
  .btn{
    font-family:var(--label); letter-spacing:1.5px; text-transform:uppercase; font-size:13px; font-weight:500;
    padding:13px 28px; border:1px solid var(--brass); background:transparent; color:var(--brass); cursor:pointer; transition:all .15s ease;
  }
  .btn:hover{ background:var(--brass); color:var(--bg-base); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .btn-primary{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .btn-primary:hover{ background:#C03F32; border-color:#C03F32; color:var(--bone); }
  .btn-row{ display:flex; justify-content:space-between; margin-top:24px; gap:12px; flex-wrap:wrap; }
  .empty-note{ text-align:center; padding:50px 20px; color:var(--muted); font-family:var(--body); font-size:14px; }

  /* fighter select */
  .fighter-grid{ display:grid; gap:10px; }
  .fighter-row{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--fr-color, var(--brass));
    padding:13px 16px; display:flex; align-items:flex-start; gap:14px; transition:all .15s ease;
  }
  .fr-avatar{ width:30px; height:42px; flex-shrink:0; display:flex; align-items:flex-end; }
  .fr-avatar svg{ width:100%; height:100%; }
  .fr-name{ font-family:var(--label); font-size:15px; font-weight:600; color:var(--bone); }
  .fr-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px; }
  .fr-season-actions{ display:flex; gap:8px; margin-top:9px; flex-wrap:wrap; }
  .fr-season-btn{
    font-family:var(--label); font-size:10.5px; letter-spacing:.5px; text-transform:uppercase;
    padding:8px 12px; border:1px solid var(--line); background:var(--bg-raised-2); color:var(--brass);
    cursor:pointer; transition:all .12s ease;
  }
  .fr-season-btn:hover:not(:disabled){ border-color:var(--brass); }
  .fr-season-btn:disabled{ opacity:.35; cursor:not-allowed; color:var(--muted); }

  /* pit select */
  .pit-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .pit-card{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--pc-color, var(--brass));
    padding:14px 16px; cursor:pointer; transition:all .15s ease;
  }
  .pit-card:hover{ background:var(--bg-raised-2); }
  .pit-name{ font-family:var(--label); font-size:14.5px; font-weight:600; color:var(--bone); }
  .pit-meta{ font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:4px; }

  /* league offer cards */
  .offer-grid{ display:grid; gap:12px; }
  .offer-card{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--pc-color, var(--brass));
    padding:14px 16px; cursor:pointer; transition:all .15s ease;
  }
  .offer-card:hover{ background:var(--bg-raised-2); }
  .offer-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .offer-strength-tag{
    font-family:var(--label); font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--brass); border:1px solid var(--brass-dim); padding:3px 8px; flex-shrink:0;
  }
  .offer-blurb{ font-family:var(--body); font-size:12.5px; color:var(--bone-dim); margin:8px 0; line-height:1.5; }
  .offer-row{ display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-family:var(--mono); font-size:11px; }
  .offer-row-label{ color:var(--muted); }
  .offer-row-val{ color:var(--bone-dim); text-align:right; max-width:65%; }
  .offer-stars{ color:var(--brass); letter-spacing:1px; }

  /* season screen */
  .season-head{ display:flex; align-items:center; gap:16px; margin-bottom:22px; }
  .season-avatar{ width:50px; height:70px; flex-shrink:0; display:flex; align-items:flex-end; }
  .season-avatar svg{ width:100%; height:100%; }
  .season-name{ font-family:var(--display); font-size:22px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .season-meta{ font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:3px; }

  .progress-bar{ height:8px; background:var(--bg-base); border:1px solid var(--line); margin:6px 0 22px; position:relative; overflow:hidden; }
  .progress-fill{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--ink-red-dim), var(--ink-red)); transition:width .4s ease; }

  .stat-card-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
  .stat-card{ background:var(--bg-raised); border:1px solid var(--line); padding:12px; text-align:center; }
  .stat-card .scv{ font-family:var(--mono); font-size:20px; font-weight:700; color:var(--brass); }
  .stat-card .scl{ font-family:var(--label); font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }

  /* vs / bout */
  .vs-wrap{ display:flex; align-items:center; justify-content:center; gap:18px; margin:20px 0; }
  .vs-fighter{ flex:1; text-align:center; }
  .vs-fighter .vsa{ width:60px; height:84px; margin:0 auto 8px; display:flex; align-items:flex-end; justify-content:center; }
  .vs-fighter .vsa svg{ width:100%; height:100%; }
  .vs-fighter .vname{ font-family:var(--display); font-size:17px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .vs-fighter .vdisc{ font-family:var(--label); font-size:11px; color:var(--brass); margin-top:2px; text-transform:uppercase; }
  .vs-mid{ font-family:var(--display); font-size:24px; color:var(--ink-red); }

  .arena-card{ background:var(--bg-raised); border:1px solid var(--line); padding:14px 16px; margin-bottom:18px; }
  .arena-name{ font-family:var(--display); font-size:17px; letter-spacing:.5px; text-transform:uppercase; color:var(--brass); }
  .arena-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:4px; }

  .fight-log{ display:flex; flex-direction:column; gap:9px; margin-bottom:6px; }
  .log-round{ font-family:var(--label); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:12px; display:flex; align-items:center; gap:10px; }
  .log-round::after{ content:""; flex:1; height:1px; background:var(--line); }
  .log-line{ font-family:var(--body); font-size:14px; color:var(--bone-dim); line-height:1.5; opacity:0; animation:line-in .35s ease forwards; }
  @keyframes line-in{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .log-line.finish{ color:var(--ink-red); font-weight:600; }
  .log-line.decision{ color:var(--brass); font-weight:600; }

  .result-banner{ text-align:center; padding:20px 10px; background:var(--bg-raised); border:1px solid var(--brass-dim); margin-bottom:18px; }
  .result-winner{ font-family:var(--display); font-size:24px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); }
  .result-method{ font-family:var(--label); font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--bone-dim); margin-top:6px; }

  .rep-meter{ height:8px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; margin-top:6px; }
  .rep-fill{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); transition:width .4s ease; }

  .stub-screen{ text-align:center; padding:24px 10px 10px; }
  .stub-screen h2{ font-family:var(--display); font-size:24px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-red); margin-bottom:14px; }
  .stub-screen p{ font-family:var(--body); color:var(--bone-dim); font-size:14px; max-width:440px; margin:0 auto 22px; }

  /* bracket view */
  .bracket-round{ margin-bottom:20px; }
  .bracket-round-title{
    font-family:var(--label); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--brass);
    margin-bottom:8px; display:flex; align-items:center; gap:10px;
  }
  .bracket-round-title::after{ content:""; flex:1; height:1px; background:var(--line); }
  .bracket-match{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--bg-raised); border:1px solid var(--line); padding:8px 12px; margin-bottom:6px;
    font-family:var(--body); font-size:12.5px;
  }
  .bracket-match.live{ border-color:var(--ink-red); background:var(--bg-raised-2); }
  .bracket-side{ flex:1; color:var(--bone-dim); }
  .bracket-side.winner{ color:var(--good); font-weight:600; }
  .bracket-side.you{ color:var(--brass); font-weight:700; }
  .bracket-vs{ color:var(--muted); font-family:var(--mono); font-size:10px; flex-shrink:0; }
  .bracket-arrow{ color:var(--muted); font-family:var(--mono); font-size:11px; flex-shrink:0; }

  /* tale of the tape */
  .tape-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .tape-side{ background:var(--bg-raised); border:1px solid var(--line); padding:14px 16px; text-align:center; }
  .tape-avatar{ width:50px; height:70px; margin:0 auto 8px; display:flex; align-items:flex-end; justify-content:center; }
  .tape-avatar svg{ width:100%; height:100%; }
  .tape-name{ font-family:var(--display); font-size:17px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .tape-disc{ font-family:var(--label); font-size:11px; color:var(--brass); text-transform:uppercase; margin-top:2px; }
  .tape-facts{ font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:10px; line-height:1.9; text-align:left; }
  .tape-facts b{ color:var(--bone-dim); }
  .tape-ovr{ font-family:var(--mono); font-size:26px; font-weight:700; color:var(--brass); margin-top:8px; }

  .tape-stat-row{ margin-bottom:13px; }
  .tape-stat-label{ text-align:center; font-family:var(--label); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .tape-stat-bars{ display:grid; grid-template-columns:1fr 1fr; gap:10px; align-items:center; }
  .tape-side-l, .tape-side-r{ display:flex; align-items:center; gap:8px; }
  .tape-side-l{ flex-direction:row-reverse; }
  .tape-bar-track{ flex:1; height:7px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; }
  .tape-bar-fill-l{ position:absolute; right:0; top:0; bottom:0; background:linear-gradient(270deg, var(--ink-red-dim), var(--ink-red)); }
  .tape-bar-fill-r{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); }
  .tape-val{ font-family:var(--mono); font-size:11.5px; font-weight:700; color:var(--bone); width:22px; text-align:center; flex-shrink:0; }

  .press-note{ background:var(--bg-raised); border:1px solid var(--brass-dim); padding:16px 18px; margin:22px 0; }
  .press-title{ font-family:var(--label); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--brass); margin-bottom:8px; }
  .press-note p{ font-family:var(--body); font-size:14px; color:var(--bone-dim); line-height:1.6; }

  @media (max-width:600px){
    .pit-grid{ grid-template-columns:1fr; }
    .stat-card-row{ grid-template-columns:1fr 1fr; }
    .ticket-header{ flex-direction:column; align-items:flex-start; gap:6px; }
    .tape-grid{ grid-template-columns:1fr; }
  }

  /* ---- fighter card modal ---- */
  .clickable-name{ cursor:pointer; text-decoration:underline; text-decoration-color:transparent; transition:text-decoration-color .12s ease; }
  .clickable-name:hover{ text-decoration-color:var(--brass); color:var(--brass); }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,6,0.78); display:flex; align-items:flex-start; justify-content:center;
    padding:40px 16px; z-index:1000; overflow-y:auto;
  }
  .modal-card{ background:var(--bg-panel); border:1px solid var(--brass-dim); max-width:520px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,0.55); }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); }
  .modal-title{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .modal-close{ background:transparent; border:1px solid var(--line); color:var(--muted); width:30px; height:30px; cursor:pointer; font-family:var(--mono); font-size:14px; }
  .modal-close:hover{ border-color:var(--ink-red); color:var(--ink-red); }
  .modal-body{ padding:20px; }
  .mf-head{ display:flex; gap:14px; align-items:center; margin-bottom:18px; }
  .mf-avatar{ width:50px; height:70px; flex-shrink:0; display:flex; align-items:flex-end; }
  .mf-avatar svg{ width:100%; height:100%; }
  .mf-name{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .mf-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px; }
  .mf-disc{ font-family:var(--label); font-size:11.5px; color:var(--brass); text-transform:uppercase; margin-top:3px; }
  .mf-stats-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:18px; }
  .mf-stat{ background:var(--bg-raised); border:1px solid var(--line); text-align:center; padding:8px 4px; }
  .mf-stat .msv{ font-family:var(--mono); font-size:15px; font-weight:700; color:var(--brass); }
  .mf-stat .msl{ font-family:var(--label); font-size:8.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  .mf-section-title{
    font-family:var(--label); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass);
    margin:14px 0 8px; padding-top:12px; border-top:1px solid var(--line);
  }
  .mf-quotes{ display:flex; flex-direction:column; gap:6px; }
  .mf-quote{ font-family:var(--body); font-size:12px; color:var(--bone-dim); line-height:1.5; font-style:italic; }
  .mf-quote-name{ font-family:var(--label); font-style:normal; font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); margin-right:4px; }
  .mf-growth-bar{ height:7px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; }
  .mf-growth-fill{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); }
  .mf-growth-text{ font-family:var(--body); font-size:12px; color:var(--bone-dim); margin-top:6px; line-height:1.5; }

  .mf-tier-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .mf-tier-tab{ font-family:var(--label); font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; padding:7px 11px; border:1px solid var(--line); background:var(--bg-raised); color:var(--muted); cursor:pointer; }
  .mf-tier-tab.active{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .mf-history-row{ display:grid; grid-template-columns:70px 1fr auto; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-family:var(--body); font-size:12.5px; }
  .mf-history-row:last-child{ border-bottom:none; }
  .mfh-date{ font-family:var(--mono); font-size:10px; color:var(--muted); }
  .mfh-opp{ color:var(--bone-dim); }
  .mfh-opp b{ color:var(--bone); }
  .mfh-loc{ font-family:var(--mono); font-size:10px; color:var(--muted); display:block; margin-top:1px; }
  .mfh-result{ font-family:var(--mono); font-size:11.5px; font-weight:700; }
  .mfh-result.win{ color:var(--good); }
  .mfh-result.loss{ color:var(--ink-red); }
  .mf-empty{ text-align:center; padding:24px 10px; color:var(--muted); font-family:var(--body); font-size:13px; }

  .version-badge{
    position:fixed; bottom:14px; right:16px; font-family:'JetBrains Mono',monospace; font-size:10px; color:#8B8070;
    background:#241D17; border:1px solid #43392D; padding:5px 9px; letter-spacing:.5px; z-index:999;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="modal-root"></div>

<script>
/* ============================ SHARED DATA ============================ */

const ROSTER_KEY = 'iifl_roster_v1';

const PROVINCES = [
  { id:'alexandretta', name:'Alexandretta Province', color:'#5C7C5E', pit:'The Forge Pit', primary:['boxer','karate'], secondary:['wrestler'] },
  { id:'kolsati', name:'Kolsati District', color:'#5E7A93', pit:'The Concrete Ring', primary:['brawler','mma'], secondary:['boxer'] },
  { id:'sherwood', name:'Sherwood Province', color:'#A0623B', pit:'Frontenac Fight House', primary:['mma','brawler'], secondary:['boxer'] },
  { id:'gazon', name:'Gazon Province', color:'#C8943F', pit:'The Dust Circle', primary:['boxer'], secondary:[] },
  { id:'ditiero', name:'Di Tiero Province', color:'#7C5491', pit:"Big Jim's Fightin' Pit", primary:['karate'], secondary:['brawler'] },
  { id:'carpathia', name:'Targu Banshea Province', color:'#5B4070', pit:'The Hollow Ring', primary:['sambo'], secondary:['judo'] },
  { id:'northeast', name:'Northeast Territory', color:'#9C4242', pit:'Dojo Reach', primary:['sambo','judo'], secondary:['catch'] },
  { id:'bay', name:'White Bay Province', color:'#6E8C9C', pit:'The Fairground Ring', primary:['wrestler','catch'], secondary:[] },
];

const DISCIPLINE_NAMES = {
  boxer:'Boxer', brawler:'Street Brawler', wrestler:'Wrestler', sambo:'Russian Sambo',
  mma:'MMA', karate:'Karate', judo:'Judo', catch:'Catch Wrestling'
};
const ALL_DISCIPLINES = Object.keys(DISCIPLINE_NAMES);

const MATCHUP = {
  boxer:    { boxer:0, brawler:1, wrestler:-1, sambo:-1, mma:-1, karate:1, judo:-1, catch:-1 },
  brawler:  { boxer:-1, brawler:0, wrestler:-1, sambo:-2, mma:-1, karate:0, judo:-2, catch:-1 },
  wrestler: { boxer:1, brawler:1, wrestler:0, sambo:-1, mma:0, karate:1, judo:0, catch:1 },
  sambo:    { boxer:1, brawler:2, wrestler:1, sambo:0, mma:0, karate:1, judo:-1, catch:0 },
  mma:      { boxer:1, brawler:1, wrestler:0, sambo:0, mma:0, karate:1, judo:0, catch:1 },
  karate:   { boxer:-1, brawler:0, wrestler:-1, sambo:-1, mma:-1, karate:0, judo:-1, catch:0 },
  judo:     { boxer:1, brawler:2, wrestler:0, sambo:1, mma:0, karate:1, judo:0, catch:1 },
  catch:    { boxer:1, brawler:1, wrestler:-1, sambo:0, mma:-1, karate:0, judo:-1, catch:0 },
};
const MATCHUP_SCALE = 5;

const SKIN_TONES = ['#3E2A1E','#5C3A24','#8C5A35','#C68642','#E0AC69','#F1C27D'];
const HAIR_COLORS = ['#0E0C0A','#3B2417','#6B4226','#A85C2A','#C9A23C','#D9D2C5','none'];
const DEFAULT_APPEARANCE = { skin:'#C68642', hair:'#2B1B12', build:'athletic' };

function buildMult(b){ return { lean:0.8, athletic:1, stocky:1.25 }[b] || 1; }
function buildSilhouetteSM(app){
  app = app || DEFAULT_APPEARANCE;
  const stroke = (3 * buildMult(app.build)).toFixed(1);
  const hair = app.hair === 'none' ? '' : `<path d="M13 7 Q20 -2 27 7" stroke="${app.hair}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  return `<svg width="40" height="56" viewBox="0 0 40 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="10" r="7" fill="${app.skin}"/>
    ${hair}
    <path d="M8 56 L11 30 Q12 22 20 22 Q28 22 29 30 L32 56" stroke="${app.skin}" stroke-width="${stroke}" fill="none" stroke-linecap="round"/>
    <path d="M11 28 L4 38 M29 28 L36 38" stroke="${app.skin}" stroke-width="${stroke}" stroke-linecap="round"/>
  </svg>`;
}

function rand(lo, hi){ return Math.floor(Math.random()*(hi-lo+1))+lo; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function heightLabel(inches){ const ft=Math.floor(inches/12), inch=inches%12; return `${ft}'${inch}"`; }
function weightedPick(weights){
  const r = Math.random(); let acc = 0;
  for(const [k,w] of Object.entries(weights)){ acc += w; if(r <= acc) return k; }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

/* ============================ ROSTER STORAGE ============================ */

function loadRoster(){
  try{ const raw = localStorage.getItem(ROSTER_KEY); return raw ? JSON.parse(raw) : []; }
  catch(err){ console.error('IIFL roster load failed:', err); return []; }
}
function saveRoster(list){
  try{ localStorage.setItem(ROSTER_KEY, JSON.stringify(list)); return true; }
  catch(err){ console.error('IIFL roster save failed:', err); return false; }
}
/*
  Adolescent growth spurt, roughly bounded (not a runaway ratio-based curve) — biggest
  gains 12-15, tapering off by 17-18. Keyed by the NEW age being transitioned into.
  lastGrowthAge tracks how far growth has actually been applied so a fighter who's
  already aged past 12 without this system catches up retroactively on next load.
*/
const HEIGHT_GROWTH_BY_AGE = { 13:[2,4], 14:[2,4], 15:[1,3], 16:[1,2], 17:[0,1], 18:[0,1] };
const WEIGHT_GROWTH_BY_AGE = { 13:[8,16], 14:[8,16], 15:[8,18], 16:[6,15], 17:[5,12], 18:[5,10] };

function growHeightWeight(f, newAge){
  const hRange = HEIGHT_GROWTH_BY_AGE[newAge] || [0,1];
  const wRange = WEIGHT_GROWTH_BY_AGE[newAge] || [3,8];
  const buildMult = { lean:0.9, athletic:1.0, stocky:1.15 }[(f.appearance && f.appearance.build) || 'athletic'] || 1.0;
  f.heightIn = (f.heightIn || 60) + rand(hRange[0], hRange[1]);
  f.weightLb = (f.weightLb || 100) + Math.round(rand(wRange[0], wRange[1]) * buildMult);
}

function applyPendingGrowth(f){
  while(f.lastGrowthAge < (f.age || 12)){
    const nextAge = f.lastGrowthAge + 1;
    growHeightWeight(f, nextAge);
    f.lastGrowthAge = nextAge;
  }
}

function ensureFighterDefaults(f){
  if(!f.record) f.record = { wins:0, losses:0 };
  if(!f.fightLog) f.fightLog = [];
  if(!f.juvenileSeason) f.juvenileSeason = null;
  if(!f.juvenileSeasonHistory) f.juvenileSeasonHistory = [];
  if(!f.amateurSeason) f.amateurSeason = null;
  if(!f.amateurSeasonHistory) f.amateurSeasonHistory = [];
  if(!f.age) f.age = 12;
  if(!f.talentTier) f.talentTier = 'normal';
  if(f.juvenileHomeProvinceId === undefined) f.juvenileHomeProvinceId = null; // one-time Juvenile league declaration
  if(f.amateurLeagueId === undefined) f.amateurLeagueId = null; // one-time Amateur league commitment
  if(!f.pendingAmateurOffers) f.pendingAmateurOffers = [];
  if(f.lastGrowthAge === undefined) f.lastGrowthAge = 12; // every career starts at 12 — safe retroactive catch-up point
  applyPendingGrowth(f);
  return f;
}
function getRoster(){
  const roster = loadRoster().map(ensureFighterDefaults);
  saveRoster(roster); // persist any newly-applied defaults/growth so repeated reads stay stable, not re-randomized
  return roster;
}
function getFighterById(id){ return getRoster().find(f=> f.id === id); }
function updateFighter(id, mutateFn){
  const roster = loadRoster().map(ensureFighterDefaults);
  const f = roster.find(r=> r.id === id);
  if(f){ mutateFn(f); saveRoster(roster); }
  return f;
}

/* ============================ GAME CLOCK ============================ */
/*
  One shared, island-wide clock (localStorage, not per-fighter) so "today" and the
  Juvenile background simulation stay consistent across every file that reads it
  (this file, the newspaper in Free Roam, etc). Day 1 = Monday, March 3, 1958 — chosen
  to match Free Roam's existing flavor epoch so both calendars agree.
*/
const CLOCK_KEY = 'iifl_clock_v1';
const GAME_EPOCH = new Date(1958, 2, 3); // Monday, March 3 1958 = Day 1
const WEEKDAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const JUVENILE_SEASON_WEEKS = 16;
const JUVENILE_SEASON_START_DAY = 1;
const JUVENILE_SEASON_END_DAY = JUVENILE_SEASON_START_DAY + JUVENILE_SEASON_WEEKS*7 - 1;

function loadClock(){
  try{ const raw = localStorage.getItem(CLOCK_KEY); return raw ? JSON.parse(raw) : { day: 1 }; }
  catch(err){ return { day: 1 }; }
}
function saveClock(c){ try{ localStorage.setItem(CLOCK_KEY, JSON.stringify(c)); }catch(err){} }
function getCurrentDay(){ return loadClock().day; }
function advanceClockByDays(n){ const c = loadClock(); c.day = Math.max(1, c.day + n); saveClock(c); return c.day; }
function dateForDay(day){ const d = new Date(GAME_EPOCH); d.setDate(d.getDate() + (day-1)); return d; }
function formatCalendarDate(day){ return dateForDay(day).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }); }
function formatCalendarDateShort(day){ return dateForDay(day).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
function weekdayNameForDay(day){ return WEEKDAY_NAMES[((day-1)%7+7)%7]; }
function eventNameForDay(day){
  const w = weekdayNameForDay(day);
  if(w==='Monday') return 'Juvenile League Fight Night';
  if(w==='Tuesday') return 'Juvenile Local Tournament';
  if(w==='Wednesday') return 'Juvenile Fiesta Fights';
  if(w==='Thursday') return 'Junior League Night';
  if(w==='Friday') return 'Amateur Fight Night';
  if(w==='Saturday') return 'Pro League Night';
  return 'Off Night — no scheduled cards';
}

/* ============================ FIELD FIGHTER POOL (persistent Amateur registry) ============================ */
/*
  Instead of inventing a brand-new stranger every fight, both Amateur AND Juvenile
  competition draw from a real, persistent pool of registered fighters per province —
  generated once, then remembered. Records update as the player fights them, so
  "who's out there" is an actual answerable question instead of a random generator.

  Pool sizes aren't arbitrary — they're reverse-engineered from the Pro draft math:
  16 teams × 10 men's roster spots, ~20% annual churn (32 vacancies), a 3-round/48-pick
  draft wants a 60-100-deep pool of draft-eligible 18/19yos, which (using the existing
  Novice/Developing/Contender/Elite split as the "draft-caliber" filter at ~33%) implies
  needing ~240 active 18yo fighters, which (assuming ~30% retention from age 12 given
  dropout/injury/never-good-enough over 6 years) implies ~800 registered 12-year-olds
  entering the Juvenile ranks island-wide per year. That 800 is distributed by each
  province's actual population (from the settlement data), with light flavor bumps —
  Kolsati/Sherwood up (GDD: "lots of fighting opportunities"), Gazon down ("underdeveloped"),
  Carpathia down for cultural isolation despite decent raw population. The browsable
  standing pool below is a representative, UI-practical sample sized proportionally —
  not the literal 800, which would be unusable as a list.
*/
const FIELD_KEY = 'iifl_field_fighters_v2';
const AMATEUR_POOL_COMPOSITION = { Novice:8, Developing:8, Contender:5, Elite:3 }; // 24 per province

// Standing Juvenile pool size per province (ages 11-18), population-weighted.
// Bumped up from the original sample size now that this pool is a real, persistent,
// simulated cast (newspaper + opponents) rather than a one-off flavor list — plus new
// 11-year-olds keep entering every simulated Monday as the season goes (see intake below).
const JUVENILE_POOL_SIZES = {
  kolsati:140, sherwood:88, ditiero:80, northeast:48,
  alexandretta:45, carpathia:43, bay:43, gazon:30,
};
// Relative share of each juvenile age in a standing population with realistic dropout —
// younger cohorts are always more numerous than older ones since attrition is cumulative.
// Ages 14-17 are also the Junior League draft window (14th birth-year earliest, 17 latest);
// 18-year-olds who never got drafted age out of Juvenile entirely into the Amateur ranks.
const JUVENILE_AGE_WEIGHTS = { 11:0.20, 12:0.19, 13:0.16, 14:0.13, 15:0.11, 16:0.09, 17:0.07, 18:0.05 };

function loadFieldPools(){
  try{
    const raw = localStorage.getItem(FIELD_KEY);
    return raw ? JSON.parse(raw) : { amateur:{}, juvenile:{} };
  }catch(err){ console.error('IIFL field pool load failed:', err); return { amateur:{}, juvenile:{} }; }
}
function saveFieldPools(pools){
  try{ localStorage.setItem(FIELD_KEY, JSON.stringify(pools)); return true; }
  catch(err){ console.error('IIFL field pool save failed:', err); return false; }
}

function generateAmateurFieldFighter(division, weightClass, province, leagueId){
  const range = AMATEUR_DIVISIONS[division];
  const targetOVR = rand(range[0], range[1]);
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    stats[k] = clamp(targetOVR + rand(-4,4), 1, 35);
  });
  // Amateur is the 18+ adult money league — Junior League (not Amateur) is what drafts
  // out of the 14-17 Juvenile window now. Amateur rosters are grown men: some are Junior
  // grads who took the Amateur payday instead of staying in the dev pipeline, most are
  // 18-year-olds who aged out of Juvenile undrafted and never made it to Pro or Junior.
  // Skews toward the younger end of "adult" since career length here is short and rough.
  const age = Math.random() < 0.6 ? rand(18,21) : rand(22,30);
  const opp = finalizeOpponent(stats, targetOVR, weightClass, province, age);
  opp.division = division;
  opp.weightClass = weightClassOf(opp.weightLb); // derive from the real BMI-based weight, not the pre-picked target
  opp.provinceId = province.id;
  opp.leagueId = leagueId;
  opp.age = age;
  return opp;
}

function generateJuvenileFieldFighter(weightClass, province){
  const age = parseInt(weightedPick(JUVENILE_AGE_WEIGHTS), 10);
  const tier = rollTalentTier(0.46);
  const rawCenter = rand(10,90);
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    const raw = clamp(rawCenter + rand(-15,15), 1, 99);
    stats[k] = compressStat(raw, age, tier);
  });
  const avgOvr = (stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5;
  const opp = finalizeOpponent(stats, avgOvr, weightClass, province, age);
  opp.age = age;
  opp.talentTier = tier;
  opp.weightClass = weightClassOf(opp.weightLb); // derive from the real BMI-based weight, not the pre-picked target
  opp.provinceId = province.id;
  return opp;
}

function ensureAmateurFieldPoolForLeague(leagueId){
  const pools = loadFieldPools();
  if(!pools.amateur) pools.amateur = {};
  if(pools.amateur[leagueId] && pools.amateur[leagueId].length) return pools;
  const league = getLeague(leagueId);
  if(!league) return pools;
  const province = PROVINCES.find(p=>p.id===league.provinceId);
  const weightClasses = ['Light','Middle','Heavy'];
  const pool = [];
  const composition = league.atRisk
    ? { Novice:4, Developing:3, Contender:2, Elite:1 } // small at-risk leagues have thinner pools
    : (LEAGUE_STRENGTH_COMPOSITION[league.strength] || AMATEUR_POOL_COMPOSITION);
  Object.entries(composition).forEach(([division, count])=>{
    for(let i=0;i<count;i++){
      pool.push(generateAmateurFieldFighter(division, pick(weightClasses), province, leagueId));
    }
  });
  pools.amateur[leagueId] = pool;
  saveFieldPools(pools);
  return pools;
}

function seedJuvenilePoolInPlace(pools, provinceId){
  if(!pools.juvenile) pools.juvenile = {};
  if(pools.juvenile[provinceId] && pools.juvenile[provinceId].length) return;
  const province = PROVINCES.find(p=>p.id===provinceId);
  if(!province) return;
  const weightClasses = ['Light','Middle','Heavy'];
  const size = JUVENILE_POOL_SIZES[provinceId] || 25;
  const pool = [];
  for(let i=0;i<size;i++){
    const f = generateJuvenileFieldFighter(pick(weightClasses), province);
    f.entryDay = JUVENILE_SEASON_START_DAY;
    pool.push(f);
  }
  pools.juvenile[provinceId] = pool;
}

function ensureJuvenileFieldPoolForProvince(provinceId){
  const pools = loadFieldPools();
  seedJuvenilePoolInPlace(pools, provinceId);
  saveFieldPools(pools);
  return pools;
}

function getFieldFighterById(id){
  const pools = loadFieldPools();
  for(const key of Object.keys(pools.amateur || {})){
    const f = pools.amateur[key].find(x=>x.id===id);
    if(f) return f;
  }
  for(const key of Object.keys(pools.juvenile || {})){
    const f = pools.juvenile[key].find(x=>x.id===id);
    if(f) return f;
  }
  return null;
}

// A hard cutoff (e.g. "only trust this filter if it has >=3 matches") can still
// permanently lock a division's weight-matched subset in if that subset happens to sit
// right at the threshold. Instead: probabilistically prefer weight-matched fighters, but
// always leave a real, non-vanishing chance of drawing anyone else in the bucket too —
// this guarantees full eventual coverage of the pool with no one permanently excluded.
function weightedFighterDraw(pool, division, weightClass){
  const divisionPool = pool.filter(f=> f.division===division);
  const narrowPool = divisionPool.filter(f=> f.weightClass===weightClass);
  const useNarrow = narrowPool.length > 0 && Math.random() < 0.55;
  const candidates = useNarrow ? narrowPool : (divisionPool.length ? divisionPool : pool);
  return pick(candidates);
}

function drawFromFieldPool(leagueId, weightClass, divisionWeights){
  const pools = ensureAmateurFieldPoolForLeague(leagueId);
  const pool = pools.amateur[leagueId] || [];
  const division = weightedPick(divisionWeights);
  return weightedFighterDraw(pool, division, weightClass);
}

function drawFromCombinedFieldPools(weightClass, divisionWeights){
  // National tournament stage pulls from the whole island, not just one league or province.
  activeLeagues().forEach(l=> ensureAmateurFieldPoolForLeague(l.id));
  const pools = loadFieldPools();
  const division = weightedPick(divisionWeights);
  let combined = [];
  Object.values(pools.amateur).forEach(list=>{ combined = combined.concat(list); });
  return weightedFighterDraw(combined, division, weightClass);
}

function drawFromProvinceLeaguePools(provinceId, weightClass, divisionWeights){
  // Province stage: pooled "city champions" from every league within the same province.
  const leagues = leaguesInProvince(provinceId).filter(l=> isLeagueActive(l.id));
  if(!leagues.length) return drawFromCombinedFieldPools(weightClass, divisionWeights);
  leagues.forEach(l=> ensureAmateurFieldPoolForLeague(l.id));
  const pools = loadFieldPools();
  const division = weightedPick(divisionWeights);
  let combined = [];
  leagues.forEach(l=>{ combined = combined.concat(pools.amateur[l.id] || []); });
  if(!combined.length) return drawFromCombinedFieldPools(weightClass, divisionWeights);
  return weightedFighterDraw(combined, division, weightClass);
}

function drawJuvenileFromFieldPool(provinceId, weightClass, playerAge){
  const pools = ensureJuvenileFieldPoolForProvince(provinceId);
  const pool = pools.juvenile[provinceId];
  const closeAge = pool.filter(f=> Math.abs(f.age-playerAge)<=1);
  const narrowPool = closeAge.filter(f=> f.weightClass===weightClass);
  const useNarrow = narrowPool.length > 0 && Math.random() < 0.55;
  const candidates = useNarrow ? narrowPool : (closeAge.length ? closeAge : pool);
  return pick(candidates);
}

function updateFieldFighterRecord(fighterId, poolKey, won, isJuvenile, logEntry){
  const pools = loadFieldPools();
  const bucket = isJuvenile ? pools.juvenile : pools.amateur;
  const pool = bucket ? bucket[poolKey] : null;
  if(!pool) return;
  const f = pool.find(x=>x.id===fighterId);
  if(!f) return;
  if(won) f.record.wins += 1; else f.record.losses += 1;
  if(logEntry){
    if(!f.fightLog) f.fightLog = [];
    f.fightLog.push(logEntry);
    if(f.fightLog.length > 10) f.fightLog = f.fightLog.slice(-10); // cap — this is flavor history, not a full ledger
  }
  saveFieldPools(pools);
}

/* ============================ JUVENILE LEAGUE SIMULATION ============================ */
/*
  Background sim for every "other" Juvenile fighter in the standing pool — the exact same
  pool the player draws opponents from and that Free Roam's newspaper reports on. Runs on
  the real Mon/Tue/Wed cadence off the shared game clock: Monday = League Fight Night
  (paired bouts within a settlement), Tuesday = Local Tournament (single-elim within a
  settlement, 8 or 16 deep), Wednesday = Fiesta Fights (wider, sometimes cross-province,
  matchups). Records and stats accumulate for real as days pass, and new 11-year-olds
  keep entering most Mondays — this is what makes "who's out there" and what the paper
  prints an actual, consistent, growing cast instead of invented-per-render flavor.
*/

function quickSimBout(fA, fB){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const effA = ovrA + matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const effB = ovrB + matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const winnerIsA = Math.random() < winProbability(effA, effB);
  return { winner: winnerIsA ? fA : fB, loser: winnerIsA ? fB : fA };
}

function applyNpcGrowthTick(f){
  if(!f || !f.age || !f.stats) return;
  const ceiling = bandCeiling(f.age, f.talentTier||'normal');
  const statKeys = ['speed','quickness','toughness','power','agility'];
  const key = pick(statKeys);
  if(f.stats[key] < ceiling && Math.random() < 0.5){
    f.stats[key] = clamp(f.stats[key]+1, 1, ceiling);
  }
}

function groupFightersBySettlement(list){
  const map = {};
  list.forEach(f=>{ const k = f.hometown || 'unknown'; (map[k] = map[k]||[]).push(f); });
  return map;
}

function logNpcBout(winner, loser, tier, location, day){
  const dateStr = dateForDay(day).toISOString();
  [[winner,loser,'W'],[loser,winner,'L']].forEach(([self, opp, result])=>{
    if(!self.fightLog) self.fightLog = [];
    self.fightLog.push({ tier, opponent: opp.name, result, method: pick(['Decision','TKO','KO']), location, date: dateStr });
    if(self.fightLog.length > 10) self.fightLog = self.fightLog.slice(-10); // flavor history, not a full ledger
  });
}

function runJuvenileLeagueNight(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 2) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    // Not everybody fights every week — roughly 40% of a settlement's roster is on any
    // given week's card, paired off within it.
    const participants = group.filter(()=> Math.random() < 0.4);
    for(let i=0;i+1<participants.length;i+=2){
      const { winner, loser } = quickSimBout(participants[i], participants[i+1]);
      winner.record.wins += 1; loser.record.losses += 1;
      logNpcBout(winner, loser, 'Juvenile', `${settlement} — League Night`, day);
      applyNpcGrowthTick(winner);
      if(Math.random() < 0.5) applyNpcGrowthTick(loser);
    }
  });
}

function runJuvenileTournamentDay(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 8) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    if(group.length < 8) return;
    const size = group.length >= 16 ? 16 : 8;
    let field = [...group].sort(()=>Math.random()-0.5).slice(0, size);
    while(field.length > 1){
      const nextRound = [];
      for(let i=0;i+1<field.length;i+=2){
        const { winner, loser } = quickSimBout(field[i], field[i+1]);
        winner.record.wins += 1; loser.record.losses += 1;
        logNpcBout(winner, loser, 'Juvenile', `${settlement} — Local Tournament`, day);
        nextRound.push(winner);
      }
      field = nextRound;
    }
    if(field[0]){ applyNpcGrowthTick(field[0]); applyNpcGrowthTick(field[0]); } // tournament win = an extra growth tick
  });
}

function runJuvenileFiestaDay(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 2) return;
  const participants = [...pool].sort(()=>Math.random()-0.5).filter(()=> Math.random() < 0.3);
  for(let i=0;i<participants.length;i++){
    const fA = participants[i];
    let fB = null;
    // sometimes fiesta night draws a visiting fighter from another province
    if(Math.random() < 0.25){
      const otherIds = Object.keys(pools.juvenile).filter(id=> id!==provinceId && pools.juvenile[id].length);
      if(otherIds.length) fB = pick(pools.juvenile[pick(otherIds)]);
    }
    if(!fB){
      i += 1;
      fB = participants[i];
    }
    if(!fB || fB.id === fA.id) continue;
    const { winner, loser } = quickSimBout(fA, fB);
    winner.record.wins += 1; loser.record.losses += 1;
    logNpcBout(winner, loser, 'Juvenile', 'Fiesta Fights', day);
    applyNpcGrowthTick(winner);
  }
}

// Roughly population-scaled chance of 1-2 new 11-year-olds registering on a given Monday.
const JUVENILE_INTAKE_CHANCE = {
  kolsati:0.9, sherwood:0.7, ditiero:0.65, northeast:0.55,
  alexandretta:0.5, carpathia:0.45, bay:0.45, gazon:0.35,
};
function runJuvenileIntake(pools, provinceId, day){
  const chance = JUVENILE_INTAKE_CHANCE[provinceId] || 0.5;
  if(Math.random() > chance) return;
  const province = PROVINCES.find(p=>p.id===provinceId);
  if(!province) return;
  const weightClasses = ['Light','Middle','Heavy'];
  const count = rand(1,2);
  for(let i=0;i<count;i++){
    const tier = rollTalentTier(0.46);
    const age = 11;
    const rawCenter = rand(10,90);
    const stats = {};
    ['speed','quickness','toughness','power','agility'].forEach(k=>{
      const raw = clamp(rawCenter + rand(-15,15), 1, 99);
      stats[k] = compressStat(raw, age, tier);
    });
    const avgOvr = (stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5;
    const weightClass = pick(weightClasses);
    const f = finalizeOpponent(stats, avgOvr, weightClass, province, age);
    f.age = age;
    f.talentTier = tier;
    f.weightClass = weightClassOf(f.weightLb); // derive from the real BMI-based weight, not the pre-picked target
    f.provinceId = province.id;
    f.record = { wins:0, losses:0 }; // brand new — no starting flavor record
    f.entryDay = day;
    pools.juvenile[provinceId].push(f);
  }
}

function catchUpJuvenileSimulation(){
  const pools = loadFieldPools();
  if(!pools.juvenile) pools.juvenile = {};
  PROVINCES.forEach(p=> seedJuvenilePoolInPlace(pools, p.id));
  const today = getCurrentDay();
  const lastSim = pools.juvenileLastSimDay || 0;
  if(lastSim >= today){ saveFieldPools(pools); return pools; }
  const MAX_CATCHUP_DAYS = 500; // safety cap so a long-idle save can't spin forever
  const startDay = Math.max(lastSim+1, today-MAX_CATCHUP_DAYS+1);
  for(let d=startDay; d<=today; d++){
    const weekday = weekdayNameForDay(d);
    PROVINCES.forEach(p=>{
      if(weekday==='Monday'){ runJuvenileLeagueNight(pools, p.id, d); runJuvenileIntake(pools, p.id, d); }
      else if(weekday==='Tuesday'){ runJuvenileTournamentDay(pools, p.id, d); }
      else if(weekday==='Wednesday'){ runJuvenileFiestaDay(pools, p.id, d); }
    });
  }
  pools.juvenileLastSimDay = today;
  saveFieldPools(pools);
  return pools;
}

/* ============================ FIGHT MATH ============================ */

function calcOVR(stats){ return Math.round((stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5); }

/*
  Earned growth — the direct answer to "how does a fighter get better." No automatic
  jumps. Every fight is a chance to develop, weighted by:
  - Potential (the existing 1-99 stat) — the main driver of growth rate
  - Performance — a win grows you more than a loss, a finish more than a decision,
    and beating someone tougher than you grows you more than beating a pushover
  - Room to grow — ticks slow down the closer a stat sits to its current ceiling
  A fighter's ceiling is their age-band (Juvenile) — Amateur-tier fighters are already
  age-agnostic and capped by the flat Amateur ceiling (35) regardless of exact age.
*/
function growFighterStats(f, playerWon, method, oppOVR, isAmateurContext){
  const tier = f.talentTier || 'normal';
  // Amateur competition is age-agnostic (adult ranks) — use the age-18 ceiling
  // regardless of literal age, which naturally keeps normal/prodigy capped at 35
  // while still letting a Generational Talent keep climbing toward 85+.
  const ceiling = isAmateurContext ? bandCeiling(18, tier) : bandCeiling(f.age || 12, tier);
  const potentialFactor = clamp((f.potential || 50) / 99, 0, 1);
  const ownOVR = calcOVR(f.stats);

  let growthTicks = 0;
  if(playerWon){
    growthTicks += 1;
    if(method !== 'Decision') growthTicks += 1;
    if(oppOVR > ownOVR) growthTicks += 1; // beat someone tougher — real development moment
  } else if(Math.random() < 0.3){
    growthTicks += 1; // you can still learn something from a loss
  }

  growthTicks = Math.round(growthTicks * (0.4 + potentialFactor * 0.9));
  if(!isAmateurContext) growthTicks = Math.round(growthTicks * juvenileHomeGrowthMultiplier(f));
  if(growthTicks <= 0) return;

  const statKeys = ['speed','quickness','toughness','power','agility'];
  for(let i=0;i<growthTicks;i++){
    const key = pick(statKeys);
    const current = f.stats[key];
    if(current >= ceiling) continue;
    const room = 1 - (current/ceiling);
    if(Math.random() < 0.45 + room*0.4){
      f.stats[key] = clamp(current+1, 1, ceiling);
    }
  }
}
function matchupBonus(myDisc, oppDisc){ const row=MATCHUP[myDisc]; return row && row[oppDisc]!==undefined ? row[oppDisc]*MATCHUP_SCALE : 0; }
function winProbability(effA, effB){ return 1/(1+Math.pow(10, -(effA-effB)/12)); }

function weightClassOf(weightLb){
  // Widened for the BMI-based body model (realistic weights now span ~60lb youth up to
  // 300+lb grown heavyweights, not the old flat 80-135lb-for-everyone range).
  if(weightLb <= 140) return 'Light';
  if(weightLb <= 185) return 'Middle';
  return 'Heavy';
}

function bandCeiling(age, tier){
  const table = tier==='generational' ? AGE_BAND_GENERATIONAL : tier==='prodigy' ? AGE_BAND_PRODIGY : AGE_BAND_TYPICAL;
  return table[clamp(age, 11, 20)];
}
function rollTalentTier(rawAvg01){
  const generationalChance = 0.005 + rawAvg01 * 0.02;
  const prodigyChance = 0.08 + rawAvg01 * 0.28;
  const r = Math.random();
  if(r < generationalChance) return 'generational';
  if(r < generationalChance + prodigyChance) return 'prodigy';
  return 'normal';
}
function compressStat(rawValue, age, tier){
  const ceiling = bandCeiling(age, tier);
  const pct = clamp(rawValue, 1, 99) / 99;
  return clamp(Math.round(1 + pct * (ceiling - 1)), 1, ceiling);
}

  }catch(err){ console.error('IIFL league status load failed:', err); return {}; }
}
function saveLeagueStatus(status){
  try{ localStorage.setItem(LEAGUE_STATUS_KEY, JSON.stringify(status)); return true; }
  catch(err){ console.error('IIFL league status save failed:', err); return false; }
}
function isLeagueActive(id){ const s = loadLeagueStatus(); return s[id] ? s[id].active : true; }
function activeLeagues(){ const s = loadLeagueStatus(); return AMATEUR_LEAGUES.filter(l=> s[l.id] ? s[l.id].active : true); }
function maybeFoldLeague(id){
  const league = getLeague(id);
  if(!league || !league.atRisk) return false;
  const status = loadLeagueStatus();
  if(!status[id] || !status[id].active) return false;
  if(Math.random() < 0.05){ // 5% chance per amateur season completion for at-risk leagues
    status[id].active = false;
    saveLeagueStatus(status);
    return true;
  }
  return false;
}

// 1-3 offers, weighted toward leagues near the fighter's home — "most fighters stay
// somewhat close to home" is a tendency here, not a rule (Amateur has no move penalty).
function generateAmateurOffers(f){
  const homeProvinceId = f.juvenileHomeProvinceId || f.provinceId;
  const pool = activeLeagues();
  if(!pool.length) return [];
  const weights = {};
  pool.forEach(l=>{ weights[l.id] = 1 / (1 + provinceDistance(homeProvinceId, l.provinceId)); });
  const numOffers = Math.min(pool.length, rand(1,3));
  const chosen = [];
  const remaining = { ...weights };
  for(let i=0;i<numOffers;i++){
    const total = Object.values(remaining).reduce((a,b)=>a+b,0);
    if(total <= 0) break;
    const normalized = {};
    Object.entries(remaining).forEach(([k,v])=> normalized[k] = v/total);
    const pick = weightedPick(normalized);
    chosen.push(pick);
    delete remaining[pick];
  }
  return chosen;
}

const AMATEUR_DIVISIONS = { Novice:[1,10], Developing:[11,20], Contender:[21,30], Elite:[31,35] };
const REGULAR_AMATEUR_WEIGHTS = { Novice:0.25, Developing:0.35, Contender:0.30, Elite:0.10 };
// City: 16-fighter bracket, draws from the player's own committed league.
// Province: 16-fighter bracket, draws from every league within the player's province
//   (standing in for pooled city champions across the province).
// National: 8-fighter blind-draw bracket, one slot per province, draws islandwide.
const TOURNAMENT_TIER_WEIGHTS = {
  City:     { Novice:0.15, Developing:0.40, Contender:0.35, Elite:0.10 },
  Province: { Novice:0.08, Developing:0.27, Contender:0.42, Elite:0.23 },
  National: { Novice:0.04, Developing:0.16, Contender:0.40, Elite:0.40 },
};
const TOURNAMENT_STAGE_SIZES = { City:16, Province:16, National:8 };
const TOURNAMENT_ROUND_NAMES = {
  16: ['Round of 16','Quarterfinals','Semifinals','Final'],
  8: ['Quarterfinals','Semifinals','Final'],
};

// Draws (size-1) opponents via drawFn, lightly deduped, and combines with the player
// into a randomly-seeded (blind draw) field of `size` total fighters.
function pickBracketField(playerFighter, size, drawFn){
  const seen = new Set([playerFighter.id]);
  const field = [playerFighter];
  let guard = 0;
  while(field.length < size && guard < size*40){
    const opp = drawFn();
    guard++;
    if(!opp || seen.has(opp.id)) continue;
    seen.add(opp.id);
    field.push(opp);
  }
  // If the pool was genuinely too thin to fill without repeats (small/at-risk league),
  // allow repeats as a last resort rather than leaving the bracket short.
  while(field.length < size){
    const opp = drawFn();
    if(opp) field.push(opp);
    else break;
  }
  // Blind draw: shuffle
  for(let i=field.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [field[i], field[j]] = [field[j], field[i]];
  }
  return field;
}

// Simulates the ENTIRE bracket except any match touching the player's lineage, which is
// left "live" for the player to actually play through the normal preview/bout flow.
// Because sibling subtrees never depend on the player's results, every one of the
// player's future opponents (assuming they keep winning) is knowable immediately —
// that's what powers the bracket-at-a-glance view.
function buildBracket(field, playerId){
  const roundNames = TOURNAMENT_ROUND_NAMES[field.length];
  let current = field.map(f=> ({ fighter:f, pending: f.id===playerId }));
  const rounds = [];
  for(let r=0; r<roundNames.length; r++){
    const matches = [];
    const next = [];
    for(let i=0;i<current.length;i+=2){
      const a = current[i], b = current[i+1];
      if(a.pending || b.pending){
        matches.push({ a, b, winner:null, live:true });
        next.push({ fighter:null, pending:true });
      } else {
        const result = simulateBout(a.fighter, b.fighter, { arena:{floor:'neutral court'}, hometownPit:false });
        matches.push({ a, b, winner:{ fighter: result.winner }, live:false });
        next.push({ fighter: result.winner, pending:false });
      }
    }
    rounds.push({ name: roundNames[r], matches });
    current = next;
  }
  return rounds;
}

function liveMatchOpponent(match){
  return match.a.pending ? match.b.fighter : match.a.fighter;
}

/* ============================ BODY MODEL (height/weight) ============================ */
/*
  Every fighter gets a rolled adult-height target first (floor 5'4" — nobody wants to
  watch a 4'11" fighter, per direct note), then weight is DERIVED from height via BMI
  rather than rolled independently. This is what keeps a 7-footer in the 280-320lb range
  instead of reading like a beanpole, and keeps a 5'4" fighter from being assigned a
  giant's weight. Still-growing Juveniles get their current height as a fraction of that
  adult target (same maturity curve as the Doctor's Review), and a slightly lower BMI
  since kids are leaner pre-growth-spurt, tapering up to the full adult BMI target by 18.
*/
function rollAdultHeightIn(){
  // Sum of 3 uniform rolls approximates a bell curve — cheap, no external deps.
  const t = (Math.random()+Math.random()+Math.random())/3; // 0..1, centered ~.5
  return clamp(Math.round(64 + t*20), 64, 84); // 5'4" to 7'0", centered ~6'2"
}
function bmiForBuild(build){
  if(build==='lean') return rand(19,23);
  if(build==='stocky') return rand(27,32);
  return rand(23,27); // athletic
}
function weightFromHeight(heightIn, bmi){
  const heightM = heightIn * 0.0254;
  return Math.round(bmi * heightM * heightM * 2.20462);
}
function heightForAge(adultHeightIn, age){
  if(!age || age >= 18) return adultHeightIn;
  const pct = MATURITY_PCT_BY_AGE[clamp(age,11,18)] || 1.0;
  return Math.max(50, Math.round(adultHeightIn * pct));
}
function weightForAge(currentHeightIn, age, bmi){
  const youthFactor = (!age || age>=18) ? 1.0 : 0.85 + (clamp(age,11,18)-11)/7*0.15;
  return weightFromHeight(currentHeightIn, bmi*youthFactor);
}

function finalizeOpponent(stats, avgOvrForFlavor, weightClass, pitProvince, age){
  const build = pick(['lean','athletic','stocky']);
  const bmiTarget = bmiForBuild(build);
  const adultHeightIn = rollAdultHeightIn();
  const heightIn = heightForAge(adultHeightIn, age);
  const weightLb = weightForAge(heightIn, age, bmiTarget);
  const settlements = SETTLEMENTS_SHORT[pitProvince.id] || ['a nearby town'];
  const hometown = pick(settlements);
  const recWins = clamp(Math.round(avgOvrForFlavor / 5) + rand(-1,1), 0, 9);
  const recLosses = clamp(rand(0,4), 0, 9);
  return {
    id: 'rival_' + Date.now() + '_' + rand(0,9999),
    name: pickName(pitProvince.id, hometown),
    primaryDisc: pickWeightedDiscipline(pitProvince),
    stats, weightLb, heightIn, adultHeightIn, bmiTarget,
    hometown,
    record: { wins: recWins, losses: recLosses },
    fightLog: [],
    appearance: { skin: pick(SKIN_TONES), hair: pick(HAIR_COLORS), build },
  };
}

// Rough real-world-style maturity curve — current size as a fraction of eventual adult size.
const MATURITY_PCT_BY_AGE = { 11:0.74, 12:0.79, 13:0.84, 14:0.89, 15:0.93, 16:0.96, 17:0.98, 18:1.0 };
function projectAdultSize(f){
  const age = f.age || 18;
  const pct = MATURITY_PCT_BY_AGE[clamp(age, 11, 18)] || 1.0;
  const build = f.appearance ? f.appearance.build : 'athletic';
  // New fighters carry their true rolled adult-height target — use it directly for an
  // exact, always-consistent projection instead of re-estimating.
  let adultHeightIn = f.adultHeightIn;
  let bmiTarget = f.bmiTarget;
  if(!adultHeightIn){
    // Legacy fighter (created before the BMI body model) — back out a reasonable adult
    // height from current height/age, floored at 5'4" same as everyone else.
    adultHeightIn = clamp(Math.round((f.heightIn||64) / pct), 64, 84);
    bmiTarget = bmiForBuild(build);
  }
  const adultWeightLb = weightFromHeight(adultHeightIn, bmiTarget);
  return { adultHeightIn, adultWeightLb, isGrown: pct >= 1.0 };
}

function growthOutlook(f){
  const isAmateurTier = !!f.amateurLeagueId || !f.juvenileHomeProvinceId;
  const ceiling = isAmateurTier ? bandCeiling(18, f.talentTier||'normal') : bandCeiling(f.age||11, f.talentTier||'normal');
  const avgStat = (f.stats.speed+f.stats.quickness+f.stats.toughness+f.stats.power+f.stats.agility)/5;
  const pctOfCeiling = clamp(avgStat/ceiling*100, 0, 100);
  let outlook;
  if(pctOfCeiling >= 90) outlook = 'Close to maxed out for where they are right now — future growth mostly comes from aging up.';
  else if(pctOfCeiling >= 60) outlook = 'Solid development so far, real room left to keep climbing.';
  else if(pctOfCeiling >= 30) outlook = 'Early in the development curve — plenty of runway left.';
  else outlook = 'Very raw. Most of the growth curve is still ahead.';
  return { ceiling, avgStat, pctOfCeiling, outlook };
}

/* ============================ DRAFT WATCH ============================ */
/*
  Juvenile-only. Shows the real draft-eligibility window (14th birth-year earliest, 17
  latest — see the GDD's Career Ladder) computed off the fighter's age and the current
  in-game year, plus a scouting-style projected draft slot based on the same trajectory
  read as Projected Path.
*/
function draftWatchHtml(f){
  if(!f.age || f.age < 11 || f.age > 18) return '';
  if(f.juniorTeamId || f.amateurLeagueId) return ''; // already past the draft window
  const currentYear = dateForDay(getCurrentDay()).getFullYear();
  const birthYear = currentYear - f.age;
  const eligibleYear = birthYear + 14;
  const lastYear = birthYear + 17;
  const growth = growthOutlook(f);
  let spotLine;
  if(f.talentTier === 'generational') spotLine = 'Locked in as a Round 1 pick, likely top 3 overall, the moment they hit 14.';
  else if(f.talentTier === 'prodigy' && growth.pctOfCeiling >= 70) spotLine = 'Round 1 buzz — teams are already circling.';
  else if(growth.pctOfCeiling >= 80) spotLine = 'Early Day 1 projection — mid-to-late first round.';
  else if(growth.pctOfCeiling >= 60) spotLine = 'Day 2 projection — solid mid-round value.';
  else if(growth.pctOfCeiling >= 35) spotLine = 'Late-round flier territory right now — needs a jump to move up boards.';
  else spotLine = 'Off the board as of today. Would need a real leap in development to get drafted at all.';
  const status = f.age < 14
    ? `Eligible starting ${eligibleYear} (turns 14), through ${lastYear}.`
    : (f.age <= 17 ? `Eligible now, through ${lastYear}.` : `Final year of Junior draft eligibility — ages out after this.`);
  return `
    <div class="mf-section-title">Draft Watch</div>
    <p class="mf-growth-text">${status}</p>
    <p class="mf-growth-text">Current projected spot: ${spotLine}</p>
  `;
}

function buildReporterPreview(f, opp, probA, matchupDiff){
  const favIsF = probA >= 0.5;
  const fav = favIsF ? f : opp;
  const dog = favIsF ? opp : f;
  const favProb = favIsF ? probA : 1 - probA;

  const intro = `${f.name} (${f.record.wins}-${f.record.losses}) meets ${opp.name} (${opp.record.wins}-${opp.record.losses}) out of ${opp.hometown} tonight.`;

  // matchupDiff > 0 means f's discipline has the edge over opp's; < 0 means opp has the edge over f
  let matchupLine;
  if(Math.abs(matchupDiff) >= 5){
    const styleEdgeHolder = matchupDiff > 0 ? f : opp;
    const styleDisadvantaged = matchupDiff > 0 ? opp : f;
    if(styleEdgeHolder.id === fav.id){
      matchupLine = fillTpl(pick(MATCHUP_LINES_REINFORCE), { fav: fav.name, favDisc: DISCIPLINE_NAMES[fav.primaryDisc], oppDisc: DISCIPLINE_NAMES[dog.primaryDisc] });
    } else {
      matchupLine = fillTpl(pick(MATCHUP_LINES_TENSION), { fav: fav.name, favDisc: DISCIPLINE_NAMES[fav.primaryDisc], dog: dog.name, dogDisc: DISCIPLINE_NAMES[dog.primaryDisc] });
    }
  } else {
    matchupLine = pick(MATCHUP_LINES_NEUTRAL);
  }

  let predictLine;
  if(favProb >= 0.82) predictLine = fillTpl(pick(PREDICT_LINES_STRONG), { fav: fav.name, dog: dog.name });
  else if(favProb >= 0.62) predictLine = fillTpl(pick(PREDICT_LINES_LEAN), { fav: fav.name, dog: dog.name });
  else predictLine = fillTpl(pick(PREDICT_LINES_TOSSUP), { fav: fav.name, dog: dog.name });

  return `${intro} ${matchupLine} ${predictLine}`;
}

function simulateBout(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const homeBonusA = ctx.hometownPit ? 4 : 0; // player fighting at their own province's pit
  const effA = ovrA + mbA + homeBonusA;
  const effB = ovrB + mbB;
  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;
  const gap = Math.abs(effA - effB);

  let finishWeights;
  if(gap >= 20) finishWeights = { KO:0.38, TKO:0.34, Decision:0.26, DQ:0.02 };
  else if(gap >= 10) finishWeights = { KO:0.20, TKO:0.32, Decision:0.46, DQ:0.02 };
  else finishWeights = { KO:0.09, TKO:0.24, Decision:0.65, DQ:0.02 };

  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.22, 2:0.36, 3:0.42}), 10);

  const floor = ctx.arena.floor;
  const log = [];
  for(let r=1; r<=3; r++){
    log.push({ type:'round-header', round:r });
    const map = { A: fA.name, B: fB.name, floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma) };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });
    if(method !== 'Decision' && r === finishRound){
      const fmap = { W: winner.name, L: loser.name, floor };
      const lib = method === 'KO' ? FINISH_KO : method === 'TKO' ? FINISH_TKO : FINISH_DQ;
      log.push({ type:'finish', text: fillTpl(pick(lib), fmap) });
      break;
    } else {
      log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS), map) });
    }
  }
  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }
  return { winner, loser, method, finishRound, ovrA, ovrB, effA, effB, probA, log };
}

const TIERS = ['All','Juvenile','Amateur','Semi-Pro','Pro','Exhibition'];
let modalFighterId = null;
let modalActiveTier = 'All';

function openFighterCard(id){ modalFighterId = id; modalActiveTier = 'All'; renderModal(); }
function closeFighterCard(){ modalFighterId = null; renderModal(); }

function renderModal(){
  const root = document.getElementById('modal-root');
  if(!modalFighterId){ root.innerHTML = ''; return; }

  const roster = getRoster();
  let f = roster.find(r=> r.id === modalFighterId);
  let isEphemeral = false;

  if(!f && state.opponent && state.opponent.id === modalFighterId){
    f = state.opponent;
    isEphemeral = true;
  }
  if(!f){
    const fieldFighter = getFieldFighterById(modalFighterId);
    if(fieldFighter){ f = fieldFighter; isEphemeral = true; }
  }
  if(!f){ root.innerHTML = ''; return; }

  const prov = PROVINCES.find(p=>p.id===f.provinceId);
  const rec = f.record || { wins:0, losses:0 };

  const commentaryHtml = generateCommentatorTakes(f).map(t=>`
    <div class="mf-quote"><span class="mf-quote-name">${t.name}:</span> "${t.quote}"</div>
  `).join('');

  const projectedPathHtml = `
    <div class="mf-section-title">Projected Path</div>
    <p class="mf-growth-text">${generateProjectedPath(f)}</p>
  `;

  const growth = growthOutlook(f);
  const doc = projectAdultSize(f);
  const growthHtml = `
    <div class="mf-section-title">Growth Outlook</div>
    <div class="mf-growth-bar"><div class="mf-growth-fill" style="width:${growth.pctOfCeiling}%"></div></div>
    <p class="mf-growth-text">${Math.round(growth.pctOfCeiling)}% of current ceiling reached. ${growth.outlook}</p>
    <div class="mf-section-title">Doctor's Review</div>
    <p class="mf-growth-text">${doc.isGrown
      ? `Fully grown — current size is expected to hold.`
      : `Early projection, subject to change: expected adult height ~${heightLabel(doc.adultHeightIn)}, weight ~${doc.adultWeightLb} lb.`}</p>
    ${draftWatchHtml(f)}
  `;

  // Career fight card — same tabbed history view for everyone now that field/NPC
  // fighters carry a real (capped) fight log from the background simulation too, not
  // just a "not tracked yet" placeholder.
  const log = f.fightLog || [];
  const filtered = modalActiveTier === 'All' ? log : log.filter(e=> e.tier === modalActiveTier);
  const sorted = [...filtered].sort((a,b)=> new Date(b.date) - new Date(a.date));
  const historyHtml = sorted.length ? sorted.map(e=>{
    const dateStr = e.date ? new Date(e.date).toLocaleDateString() : '—';
    return `
      <div class="mf-history-row">
        <div class="mfh-date">${dateStr}</div>
        <div class="mfh-opp"><b>${e.result==='W'?'def.':'lost to'}</b> ${e.opponent}${e.location?`<span class="mfh-loc">${e.location}</span>`:''}</div>
        <div class="mfh-result ${e.result==='W'?'win':'loss'}">${e.result} · ${e.method||''}</div>
      </div>
    `;
  }).join('') : `<div class="mf-empty">No fights on record${modalActiveTier==='All'?'':' at this level'} yet${isEphemeral?' — only the last 10 are kept for field fighters':''}.</div>`;
  const tabsHtml = TIERS.map(t=>{
    const count = t==='All' ? log.length : log.filter(e=>e.tier===t).length;
    return `<button class="mf-tier-tab ${modalActiveTier===t?'active':''}" data-mf-tab="${t}">${t} (${count})</button>`;
  }).join('');
  let bodyExtra = `<div class="mf-tier-tabs">${tabsHtml}</div><div class="mf-history">${historyHtml}</div>`;
  if(isEphemeral && !f.fightLog && !f.age){
    bodyExtra = `<div class="mf-empty">Procedural opponent — generated for this bout only, no persistent career record kept.</div>`;
  }

  root.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-card">
        <div class="modal-head">
          <div class="modal-title">Fighter Card</div>
          <button class="modal-close" data-modal-close>✕</button>
        </div>
        <div class="modal-body">
          <div class="mf-head">
            <div class="mf-avatar">${buildSilhouetteSM(f.appearance)}</div>
            <div>
              <div class="mf-name">${f.name}</div>
              <div class="mf-meta">${f.age ? 'Age '+f.age+' · ' : ''}${heightLabel(f.heightIn)}${f.weightLb?' · '+f.weightLb+' lb':''} · ${f.settlement || f.hometown || ''}${prov?', '+prov.name:''}${f.talentTier==='generational'?' · ⚡ Generational Talent':f.talentTier==='prodigy'?' · Prodigy':''}</div>
              <div class="mf-disc">${DISCIPLINE_NAMES[f.primaryDisc]||''} · Career ${rec.wins}-${rec.losses}</div>
            </div>
          </div>
          <div class="mf-stats-grid">
            <div class="mf-stat"><div class="msv">${f.stats.speed}</div><div class="msl">SPD</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.quickness}</div><div class="msl">QCK</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.toughness}</div><div class="msl">TGH</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.power}</div><div class="msl">PWR</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.agility}</div><div class="msl">AGL</div></div>
          </div>
          <div class="mf-section-title">On the Broadcast</div>
          <div class="mf-quotes">${commentaryHtml}</div>
          ${projectedPathHtml}
          ${growthHtml}
          ${bodyExtra}
        </div>
      </div>
    </div>
  `;
}

document.addEventListener('click', (e)=>{
  const openEl = e.target.closest('[data-open-fighter]');
  if(openEl){ openFighterCard(openEl.dataset.openFighter); return; }
  const closeEl = e.target.closest('[data-modal-close]');
  if(closeEl){ closeFighterCard(); return; }
  const overlayEl = e.target.closest('.modal-overlay');
  if(overlayEl && e.target === overlayEl){ closeFighterCard(); return; }
  const tabEl = e.target.closest('[data-mf-tab]');

});

function renderSelect(){
  const roster = getRoster();
  if(!roster.length){
    return `<div class="empty-note">No fighters saved yet. Build one in the Character Creator first — it saves to the same shared roster this reads from.</div>`;
  }
  const rows = roster.map(f=>{
    const prov = PROVINCES.find(p=>p.id===f.provinceId);

    let juvStatus;
    if(f.juvenileSeason && !f.juvenileSeason.complete) juvStatus = `Fight ${f.juvenileSeason.fightsPlayed}/${JUVENILE_TOTAL_FIGHTS} — Continue`;
    else if(f.juvenileSeasonHistory.length) juvStatus = `${f.juvenileSeasonHistory.length} season${f.juvenileSeasonHistory.length===1?'':'s'} done`;
    else juvStatus = 'Start Season';

    const amateurUnlocked = f.juvenileSeasonHistory.length > 0;
    let amStatus;
    if(!amateurUnlocked) amStatus = 'Locked — finish a Juvenile season first';
    else if(f.amateurSeason && !f.amateurSeason.complete) amStatus = `Fight ${f.amateurSeason.fightsPlayed}/${AMATEUR_TOTAL_FIGHTS} — Continue`;
    else if(f.amateurLeagueId) amStatus = `${getLeague(f.amateurLeagueId) ? getLeague(f.amateurLeagueId).name : 'League'} — Continue`;
    else if(f.pendingAmateurOffers && f.pendingAmateurOffers.length) amStatus = `${f.pendingAmateurOffers.length} Offer${f.pendingAmateurOffers.length===1?'':'s'} Waiting!`;
    else amStatus = 'View Offers';

    return `
      <div class="fighter-row" style="--fr-color:${prov?prov.color:'#C9A23C'}">
        <div class="fr-avatar">${buildSilhouetteSM(f.appearance)}</div>
        <div style="flex:1;">
          <div class="fr-name clickable-name" data-open-fighter="${f.id}">${f.name}</div>
          <div class="fr-meta">Age ${f.age} · ${DISCIPLINE_NAMES[f.primaryDisc]} · ${f.settlement} · ${weightClassOf(f.weightLb)} · Career ${f.record.wins}-${f.record.losses}</div>
          <div class="fr-season-actions">
            <button class="fr-season-btn" data-select-fighter="${f.id}" data-season-type="juvenile">Juvenile: ${juvStatus}</button>
            <button class="fr-season-btn" data-select-fighter="${f.id}" data-season-type="amateur" ${amateurUnlocked?'':'disabled'}>Amateur: ${amStatus}</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `<div class="section-label">Pick a Fighter</div><div class="fighter-grid">${rows}</div>`;
}
