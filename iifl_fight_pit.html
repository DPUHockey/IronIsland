function renderRegionalFighters(){
  const f = getFighterById(state.fighterId);
  const isAmateur = state.seasonType === 'amateur';
  const s = isAmateur ? f.amateurSeason : f.juvenileSeason;
  const provinceId = isAmateur
    ? (s ? s.pitProvinceId : (f.amateurLeagueId ? getLeague(f.amateurLeagueId).provinceId : f.provinceId))
    : (s ? s.pitProvinceId : f.provinceId);
  const province = PROVINCES.find(p=>p.id===provinceId);
  const leagueId = isAmateur ? (s ? s.leagueId : f.amateurLeagueId) : null;
  const league = leagueId ? getLeague(leagueId) : null;

  let fieldFighters;
  if(isAmateur && leagueId){
    ensureAmateurFieldPoolForLeague(leagueId);
    const pools = loadFieldPools();
    fieldFighters = (pools.amateur[leagueId] || []).map(x=>({ ...x, isField:true, sortKey:x.division }));
  } else if(isAmateur){
    fieldFighters = [];
  } else {
    ensureJuvenileFieldPoolForProvince(provinceId);
    const pools = loadFieldPools();
    fieldFighters = (pools.juvenile[provinceId] || []).map(x=>({ ...x, isField:true, sortKey:x.age }));
  }

  // Also surface any of the player's OWN other created fighters based in this province —
  // real registered fighters, not just NPCs.
  const roster = getRoster().filter(r=> r.provinceId === provinceId && r.id !== state.fighterId);
  const rosterMapped = roster.map(r=> ({ ...r, isField:false, sortKey: isAmateur ? divisionFromOVR(calcOVR(r.stats)) : r.age }));

  const divisionOrder = { Elite:0, Contender:1, Developing:2, Novice:3 };
  const combined = fieldFighters.concat(rosterMapped);
  if(isAmateur){
    combined.sort((a,b)=> (divisionOrder[a.sortKey]??4) - (divisionOrder[b.sortKey]??4) || calcOVR(b.stats)-calcOVR(a.stats));
  } else {
    combined.sort((a,b)=> (b.sortKey||12) - (a.sortKey||12) || calcOVR(b.stats)-calcOVR(a.stats));
  }

  const rows = combined.map(x=>{
    const ovr = calcOVR(x.stats);
    const tag = isAmateur ? x.sortKey : `Age ${x.sortKey}`;
    return `
      <div class="fighter-row" style="--fr-color:${province.color}">
        <div class="fr-avatar">${buildSilhouetteSM(x.appearance)}</div>
        <div style="flex:1;">
          <div class="fr-name clickable-name" data-open-fighter="${x.id}">${x.name}${x.isField===false ? ' <span style="color:var(--brass); font-size:10px;">(Player Fighter)</span>' : ''}</div>
          <div class="fr-meta">${tag} · ${DISCIPLINE_NAMES[x.primaryDisc]} · OVR ${ovr} · ${x.hometown || x.settlement || ''} · ${x.record.wins}-${x.record.losses}</div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="section-label">${isAmateur && league ? league.name : province.name} — Registered ${isAmateur?'Amateurs':'Juveniles'}</div>
    <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:18px;">
      ${combined.length} fighters on file${isAmateur?' in this league, sorted by division':' for this region, sorted by age'}. This is who you might draw in a regular season fight${isAmateur?' — Regional and National tournament rounds can pull from anywhere on the island.':'.'}
    </p>
    <div class="fighter-grid">${rows || '<div class="empty-note">No registered fighters yet.</div>'}</div>
    <div class="btn-row"><button class="btn" id="back-to-season-from-field">← Back</button><span></span></div>
  `;
}

function divisionFromOVR(ovr){
  if(ovr >= 31) return 'Elite';
  if(ovr >= 21) return 'Contender';
  if(ovr >= 11) return 'Developing';
  return 'Novice';
}

function renderPetition(){
  const f = getFighterById(state.fighterId);
  const currentProv = PROVINCES.find(p=>p.id===f.juvenileHomeProvinceId);
  const chance = petitionApprovalChance(f);
  const candidates = PROVINCES.filter(p=> p.id !== f.juvenileHomeProvinceId);
  const cards = candidates.map(p=>{
    const dist = provinceDistance(f.provinceId, p.id);
    const penalty = Math.round((1 - clamp(1 - dist*0.12, 0.4, 1)) * 100);
    return `
      <div class="pit-card" data-petition-target="${p.id}" style="--pc-color:${p.color}">
        <div class="pit-name">${p.pit}</div>
        <div class="pit-meta">${p.name}${p.id===f.provinceId ? ' · YOUR HOMETOWN' : ` · ~${penalty}% growth penalty if approved`}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="section-label">Petition to Transfer</div>
    <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); margin-bottom:10px;">
      ${f.name} is currently declared with ${currentProv.pit} (${currentProv.name}). Petitioning to fight elsewhere requires the governing body's approval — it's not guaranteed. Right now the odds of approval are roughly <b>${Math.round(chance*100)}%</b>, based on ${f.juvenileSeasonHistory.length} completed season${f.juvenileSeasonHistory.length===1?'':'s'} on record.
    </p>
    <p style="font-family:var(--body); font-size:13px; color:var(--muted); margin-bottom:18px;">
      If approved, the new league becomes permanent (until you petition again). The farther it is from ${f.name}'s actual hometown, the bigger the ongoing development penalty.
    </p>
    <div class="pit-grid">${cards}</div>
    <div class="btn-row"><button class="btn" id="back-to-season-from-petition">← Back</button><span></span></div>
  `;
}

function renderPetitionResult(){
  const f = getFighterById(state.fighterId);
  const approved = state.petitionApproved;
  const targetProv = PROVINCES.find(p=>p.id===state.petitionTargetProvinceId);
  return `
    <div class="stub-screen">
      <h2>${approved ? 'Petition Approved' : 'Petition Denied'}</h2>
      <p>${approved
        ? `The governing body has cleared ${f.name} to fight out of ${targetProv.pit} (${targetProv.name}) going forward. This is now the permanent declared league.`
        : `The governing body denied the request. ${f.name} stays declared with their current league for now — nothing has changed. You're free to petition again anytime.`}</p>
      <button class="btn btn-primary" id="back-to-season-from-petition-result">Continue</button>
    </div>
  `;
}

function renderAmateurOffers(){
  const f = getFighterById(state.fighterId);
  const offers = (f.pendingAmateurOffers || []).map(id=> getLeague(id)).filter(Boolean);
  const cards = offers.map(l=>{
    const dist = provinceDistance(f.juvenileHomeProvinceId || f.provinceId, l.provinceId);
    const distLabel = dist===0 ? 'Close to home' : dist<=1 ? 'Nearby' : dist<=2 ? 'A trip, but doable' : 'Far from home';
    const strengthInfo = LEAGUE_STRENGTH_INFO[l.strength] || LEAGUE_STRENGTH_INFO.Average;
    const scoutStars = '★'.repeat(l.scouting) + '☆'.repeat(5-l.scouting);
    const prov = PROVINCES.find(p=>p.id===l.provinceId);
    return `
      <div class="offer-card" data-offer-accept="${l.id}" style="--pc-color:${prov.color}">
        <div class="offer-head">
          <div class="pit-name">${l.name}</div>
          <div class="offer-strength-tag">${strengthInfo.label}</div>
        </div>
        <div class="pit-meta">${prov.name} · ${distLabel}</div>
        <p class="offer-blurb">${strengthInfo.blurb}</p>
        <div class="offer-row"><span class="offer-row-label">Scouting exposure</span><span class="offer-stars">${scoutStars}</span></div>
        <div class="offer-row"><span class="offer-row-label">Perk</span><span class="offer-row-val">${l.perk}</span></div>
      </div>
    `;
  }).join('');

  return `
    <div class="section-label">${f.name}'s League Offers</div>
    <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); margin-bottom:18px;">
      Amateur leagues have taken notice. Stronger leagues mean tougher competition and faster growth (you level up fastest beating fighters better than you) but a harder record to protect. Weaker leagues are the opposite — easier wins, slower development. Scouting exposure is how visible you'll be to Junior League scouts when draft time comes. No penalty for going far, but most fighters lean toward what's close. Once you accept, you'll fight in that league every Amateur season until you're drafted to Juniors.
    </p>
    <div class="offer-grid">${cards}</div>
    <div class="btn-row"><button class="btn" id="decline-all-offers">Decline All — Stay Juvenile</button><span></span></div>
  `;
}

function repLabel(pct){
  if(pct >= 80) return `${pct}/100 — Local Legend. People show up just to see this kid fight.`;
  if(pct >= 55) return `${pct}/100 — Known around the pit. Crowds are starting to pay attention.`;
  if(pct >= 30) return `${pct}/100 — Building a name, slowly.`;
  return `${pct}/100 — Still mostly unknown outside the family.`;
}

function statCompareRow(keyLabel, valF, valOpp, scaleMax){
  const pctF = clamp(valF / scaleMax * 100, 0, 100);
  const pctOpp = clamp(valOpp / scaleMax * 100, 0, 100);
  return `
    <div class="tape-stat-row">
      <div class="tape-stat-label">${keyLabel}</div>
      <div class="tape-stat-bars">
        <div class="tape-side-l">
          <div class="tape-val">${valF}</div>
          <div class="tape-bar-track"><div class="tape-bar-fill-l" style="width:${pctF}%"></div></div>
        </div>
        <div class="tape-side-r">
          <div class="tape-bar-track"><div class="tape-bar-fill-r" style="width:${pctOpp}%"></div></div>
          <div class="tape-val">${valOpp}</div>
        </div>
      </div>
    </div>
  `;
}

function renderPreview(){
  const f = getFighterById(state.fighterId);
  const opp = state.opponent;
  const r = state.boutResult;
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  const matchupDiff = matchupBonus(f.primaryDisc, opp.primaryDisc) - matchupBonus(opp.primaryDisc, f.primaryDisc);
  const previewText = buildReporterPreview(f, opp, r.probA, matchupDiff);
  const fCeiling = state.seasonType==='amateur' ? bandCeiling(18, f.talentTier) : bandCeiling(f.age||12, f.talentTier);
  const oppCeiling = opp.age ? bandCeiling(opp.age, opp.talentTier) : bandCeiling(18, 'normal');

  return `
    <div class="section-label">Tale of the Tape</div>
    <div class="tape-grid">
      <div class="tape-side">
        <div class="tape-avatar">${buildSilhouetteSM(f.appearance)}</div>
        <div class="tape-name clickable-name" data-open-fighter="${f.id}">${f.name}</div>
        <div class="tape-disc">${DISCIPLINE_NAMES[f.primaryDisc]}</div>
        <div class="tape-ovr">${ovrF}</div>
        <div class="tape-facts">
          <div><b>Age:</b> ${f.age} &nbsp; <b>HT:</b> ${heightLabel(f.heightIn)} &nbsp; <b>WT:</b> ${f.weightLb} lb</div>
          <div><b>From:</b> ${f.settlement}</div>
          <div><b>Record:</b> ${f.record.wins}-${f.record.losses}</div>
        </div>
      </div>
      <div class="tape-side">
        <div class="tape-avatar">${buildSilhouetteSM(opp.appearance)}</div>
        <div class="tape-name clickable-name" data-open-fighter="${opp.id}">${opp.name}</div>
        <div class="tape-disc">${DISCIPLINE_NAMES[opp.primaryDisc]}</div>
        <div class="tape-ovr">${ovrOpp}</div>
        <div class="tape-facts">
          <div>${opp.age ? `<b>Age:</b> ${opp.age} &nbsp; ` : ''}<b>HT:</b> ${heightLabel(opp.heightIn)} &nbsp; <b>WT:</b> ${opp.weightLb} lb</div>
          <div><b>From:</b> ${opp.hometown}</div>
          <div><b>Record:</b> ${opp.record.wins}-${opp.record.losses}</div>
        </div>
      </div>
    </div>

    ${statCompareRow('SPEED', f.stats.speed, opp.stats.speed, scaleMax)}
    ${statCompareRow('QUICKNESS', f.stats.quickness, opp.stats.quickness, scaleMax)}
    ${statCompareRow('TOUGHNESS', f.stats.toughness, opp.stats.toughness, scaleMax)}
    ${statCompareRow('POWER', f.stats.power, opp.stats.power, scaleMax)}
    ${statCompareRow('AGILITY', f.stats.agility, opp.stats.agility, scaleMax)}

    <div class="press-note">
      <div class="press-title">📰 Ringside Preview</div>
      <p>${previewText}</p>
    </div>

    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" id="enter-arena">Enter the Arena →</button>
    </div>
  `;
}

function renderBout(){
  const f = getFighterById(state.fighterId);
  const opp = state.opponent;
  const r = state.boutResult;
  const arena = state.arena;
  const s = state.seasonType === 'amateur' ? f.amateurSeason : f.juvenileSeason;
  const pitLabel = state.mode === 'tournament' ? `${state.tournamentStage} — ${state.bracket.rounds[state.bracketRoundIndex].name}` : s.pitName;
  const visible = r.log.slice(0, state.revealedCount);
  const logHtml = visible.map((entry,i)=>{
    if(entry.type==='round-header') return `<div class="log-round">ROUND ${entry.round}</div>`;
    if(entry.type==='finish') return `<div class="log-line finish" style="animation-delay:${i*0.02}s">${entry.text}</div>`;
    if(entry.type==='decision') return `<div class="log-line decision" style="animation-delay:${i*0.02}s">${entry.text}</div>`;
    return `<div class="log-line" style="animation-delay:${i*0.02}s">${entry.text}</div>`;
  }).join('');
  const done = state.revealedCount >= r.log.length;

  return `
    <div class="arena-card">
      <div class="arena-name">${pitLabel}</div>
      <div class="arena-meta">${arena.name} · ${arena.capacity.toLocaleString()} capacity · ${arena.floor}</div>
    </div>
    <div class="vs-wrap">
      <div class="vs-fighter"><div class="vsa">${buildSilhouetteSM(f.appearance)}</div><div class="vname clickable-name" data-open-fighter="${f.id}">${f.name}</div><div class="vdisc">${DISCIPLINE_NAMES[f.primaryDisc]}</div></div>
      <div class="vs-mid">VS</div>
      <div class="vs-fighter"><div class="vsa">${buildSilhouetteSM(opp.appearance)}</div><div class="vname clickable-name" data-open-fighter="${opp.id}">${opp.name}</div><div class="vdisc">${DISCIPLINE_NAMES[opp.primaryDisc]}</div></div>
    </div>
    <div class="fight-log">${logHtml}</div>
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" id="advance-bout">${done ? 'Confirm Result →' : 'Next →'}</button>
    </div>
  `;
}

function renderTournamentInvite(){
  const f = getFighterById(state.fighterId);
  const s = f.amateurSeason;
  return `
    <div class="stub-screen">
      <h2>Tournament Invite</h2>
      <p>${f.name} closed the Amateur Season at ${s.wins}-${s.losses} — strong enough to earn a tournament invite. The path runs a 16-fighter City bracket, then a 16-fighter Province bracket, then an 8-fighter National bracket (one champion per province, blind draw). Lose any round and the run ends there; win all three brackets and you're the National Amateur Champion.</p>
      <div class="btn-row">
        <button class="btn" id="decline-tournament">Skip It — Bank the Season</button>
        <button class="btn btn-primary" id="accept-tournament">Accept Invite →</button>
      </div>
    </div>
  `;
}

function renderSeasonSummary(){
  const f = getFighterById(state.fighterId);
  if(state.seasonType === 'amateur'){
    const last = f.amateurSeasonHistory[f.amateurSeasonHistory.length-1];
    let headline, extra;
    if(last.tournamentResult === 'National Champion'){
      headline = 'National Amateur Champion!';
      extra = `${f.name} ran the full tournament gauntlet — City, Province, and National — and won all three. That's the top of the amateur pyramid.`;
    } else if(last.tournamentResult && last.tournamentResult.startsWith('Eliminated')){
      headline = 'Tournament Run Complete';
      extra = `${f.name} earned a tournament bid and made it to the ${last.tournamentResult.replace('Eliminated - ','')} stage before falling.`;
    } else if(last.tournamentResult === 'Declined'){
      headline = 'Season Complete';
      extra = `${f.name} qualified for the tournament but the invite was passed on this time.`;
    } else {
      headline = 'Season Complete';
      extra = `Not quite a tournament-caliber record this season, but every fight built the resume.`;
    }
    return `
      <div class="stub-screen">
        <h2>${headline}</h2>
        <p>${f.name} finished the Amateur Season with a record of ${last.wins}-${last.losses} (${last.finishes} finishes), closing with a reputation score of ${last.reputation}/100. ${extra}</p>
        <p>Semi-Pro and Pro leagues aren't built yet — for now the season banks the record and reputation, and a new Amateur Season can start anytime.</p>
        <button class="btn btn-primary" id="back-to-select-from-summary">Back to Fighter Select</button>
      </div>
    `;
  }

  const last = f.juvenileSeasonHistory[f.juvenileSeasonHistory.length-1];
  const champion = last.wins >= 7;
  return `
    <div class="stub-screen">
      <h2>${champion ? `${last.pitName} Champion!` : 'Season Complete'}</h2>
      <p>${f.name} finished the Juvenile Season at ${last.pitName} with a record of ${last.wins}-${last.losses} (${last.finishes} finishes), closing with a reputation score of ${last.reputation}/100.
      ${champion ? ' That record is good enough to call them the pit champion this season.' : ' Not quite a championship run, but every fight built the record.'}</p>
      <p>Once a Juvenile Season is on the books, an Amateur Season unlocks from Fighter Select.</p>
      <button class="btn btn-primary" id="back-to-select-from-summary">Back to Fighter Select</button>
    </div>
  `;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  document.querySelectorAll('[data-select-fighter]').forEach(btn=>{
    btn.onclick = ()=>{
      state.fighterId = btn.dataset.selectFighter;
      state.seasonType = btn.dataset.seasonType;
      state.mode = 'season';
      const f = getFighterById(state.fighterId);
      const season = state.seasonType === 'amateur' ? f.amateurSeason : f.juvenileSeason;

      if(season && !season.complete){
        state.screen = 'season';
      } else if(state.seasonType === 'juvenile'){
        if(f.juvenileHomeProvinceId){
          // Already declared a home league — no re-picking. Auto-start the next season there.
          const province = PROVINCES.find(p=>p.id===f.juvenileHomeProvinceId);
          updateFighter(state.fighterId, (ff)=>{
            ff.juvenileSeason = {
              pitProvinceId: f.juvenileHomeProvinceId, pitName: province.pit,
              fightsPlayed:0, wins:0, losses:0, finishes:0, reputation:10, complete:false,
              qualifiedForTournament:false, tournamentStage:null,
            };
          });
          state.screen = 'season';
        } else {
          state.screen = 'pit-select'; // first-ever Juvenile declaration
        }
      } else {
        // Amateur: committed league → auto-start there. Pending offers → show them.
        // Eligible with no league/offers yet → generate offers now (never a dead end).
        if(f.amateurLeagueId){
          const league = getLeague(f.amateurLeagueId);
          if(league && isLeagueActive(f.amateurLeagueId)){
            const province = PROVINCES.find(p=>p.id===league.provinceId);
            updateFighter(state.fighterId, (ff)=>{
              ff.amateurSeason = {
                leagueId: f.amateurLeagueId, pitProvinceId: league.provinceId, pitName: league.name,
                fightsPlayed:0, wins:0, losses:0, finishes:0, reputation:10, complete:false,
                qualifiedForTournament:false, tournamentStage:null,
              };
            });
            state.screen = 'season';
          } else {
            // Their league folded — force a fresh round of offers.
            updateFighter(state.fighterId, (ff)=>{ ff.amateurLeagueId = null; ff.pendingAmateurOffers = generateAmateurOffers(ff); });
            state.screen = 'amateur-offers';
          }
        } else {
          if(!f.pendingAmateurOffers || !f.pendingAmateurOffers.length){
            updateFighter(state.fighterId, (ff)=>{ ff.pendingAmateurOffers = generateAmateurOffers(ff); });
          }
          state.screen = 'amateur-offers';
        }
      }
      render();
    };
  });

  const backToSelect = document.getElementById('back-to-select');
  if(backToSelect) backToSelect.onclick = ()=>{ state.screen='select'; render(); };

  document.querySelectorAll('[data-pit]').forEach(card=>{
    card.onclick = ()=>{
      const provinceId = card.dataset.pit;
      const province = PROVINCES.find(p=>p.id===provinceId);
      const freshSeason = {
        pitProvinceId: provinceId, pitName: province.pit,
        fightsPlayed:0, wins:0, losses:0, finishes:0, reputation:10, complete:false,
        qualifiedForTournament:false, tournamentStage:null,
      };
      updateFighter(state.fighterId, (f)=>{
        f.juvenileSeason = freshSeason;
        if(!f.juvenileHomeProvinceId) f.juvenileHomeProvinceId = provinceId; // one-time declaration, locked in
      });
      state.screen = 'season';
      render();
    };
  });

  const backToSelectFromSeason = document.getElementById('back-to-select-from-season');
  if(backToSelectFromSeason) backToSelectFromSeason.onclick = ()=>{ state.screen='select'; render(); };

  const viewRegionalFighters = document.getElementById('view-regional-fighters');
  if(viewRegionalFighters) viewRegionalFighters.onclick = ()=>{ state.screen='regional-fighters'; render(); };

  const backToSeasonFromField = document.getElementById('back-to-season-from-field');
  if(backToSeasonFromField) backToSeasonFromField.onclick = ()=>{ state.screen='season'; render(); };

  const petitionTransfer = document.getElementById('petition-transfer');
  if(petitionTransfer) petitionTransfer.onclick = ()=>{ state.screen='petition'; render(); };

  const backToSeasonFromPetition = document.getElementById('back-to-season-from-petition');
  if(backToSeasonFromPetition) backToSeasonFromPetition.onclick = ()=>{ state.screen='season'; render(); };

  document.querySelectorAll('[data-petition-target]').forEach(card=>{
    card.onclick = ()=>{
      const targetId = card.dataset.petitionTarget;
      const f = getFighterById(state.fighterId);
      const chance = petitionApprovalChance(f);
      const approved = Math.random() < chance;
      if(approved){
        updateFighter(state.fighterId, (ff)=>{
          ff.juvenileHomeProvinceId = targetId;
          if(ff.juvenileSeason && !ff.juvenileSeason.complete){
            const targetProv = PROVINCES.find(p=>p.id===targetId);
            ff.juvenileSeason.pitProvinceId = targetId;
            ff.juvenileSeason.pitName = targetProv.pit;
          }
        });
      }
      state.petitionApproved = approved;
      state.petitionTargetProvinceId = targetId;
      state.screen = 'petition-result';
      render();
    };
  });

  const backToSeasonFromPetitionResult = document.getElementById('back-to-season-from-petition-result');
  if(backToSeasonFromPetitionResult) backToSeasonFromPetitionResult.onclick = ()=>{ state.screen='season'; render(); };

  document.querySelectorAll('[data-offer-accept]').forEach(card=>{
    card.onclick = ()=>{
      const leagueId = card.dataset.offerAccept;
      const league = getLeague(leagueId);
      updateFighter(state.fighterId, (f)=>{
        f.amateurLeagueId = leagueId;
        f.pendingAmateurOffers = [];
        f.amateurSeason = {
          leagueId, pitProvinceId: league.provinceId, pitName: league.name,
          fightsPlayed:0, wins:0, losses:0, finishes:0, reputation:10, complete:false,
          qualifiedForTournament:false, tournamentStage:null,
        };
      });
      state.seasonType = 'amateur';
      state.screen = 'season';
      render();
    };
  });

  const declineAllOffers = document.getElementById('decline-all-offers');
  if(declineAllOffers) declineAllOffers.onclick = ()=>{
    updateFighter(state.fighterId, (f)=>{ f.pendingAmateurOffers = []; });
    state.screen = 'select';
    render();
  };

  function setupNextAmateurOrJuvenileFight(){
    const f = getFighterById(state.fighterId);
    const s = state.seasonType === 'amateur' ? f.amateurSeason : f.juvenileSeason;
    const province = PROVINCES.find(p=>p.id===s.pitProvinceId);
    const wClass = weightClassOf(f.weightLb);
    // Both levels now draw from a persistent, browsable regional field pool instead of
    // inventing a stranger each fight — Juvenile matched loosely by age, Amateur by division.
    const opp = state.seasonType === 'amateur'
      ? drawFromFieldPool(s.leagueId, wClass, REGULAR_AMATEUR_WEIGHTS)
      : drawJuvenileFromFieldPool(s.pitProvinceId, wClass, f.age || 12);
    const arena = generateArena();
    const ctx = { arena, hometownPit: province.id === f.provinceId };
    state.opponent = opp;
    state.arena = arena;
    state.boutResult = simulateBout(f, opp, ctx);
    state.revealedCount = 0;
    state.mode = 'season';
  }

  const fightTonight = document.getElementById('fight-tonight');
  if(fightTonight) fightTonight.onclick = ()=>{
    setupNextAmateurOrJuvenileFight();
    if(state.simMode){
      const r = state.boutResult;
      const playerWon = r.winner.id === state.fighterId;
      state.lastSimResult = { won: playerWon, opponent: state.opponent.name, method: r.method };
      applyBoutResult();
    } else {
      state.screen = 'preview';
    }
    render();
  };

  const simRestOfSeason = document.getElementById('sim-rest-of-season');
  if(simRestOfSeason) simRestOfSeason.onclick = ()=>{
    let guard = 0;
    while(state.screen === 'season' && guard < 30){
      setupNextAmateurOrJuvenileFight();
      const r = state.boutResult;
      const playerWon = r.winner.id === state.fighterId;
      state.lastSimResult = { won: playerWon, opponent: state.opponent.name, method: r.method };
      applyBoutResult();
      guard++;
    }
    render();
  };

  const toggleSimMode = document.getElementById('toggle-sim-mode');
  if(toggleSimMode) toggleSimMode.onchange = (e)=>{ state.simMode = e.target.checked; render(); };

  const enterArena = document.getElementById('enter-arena');
  if(enterArena) enterArena.onclick = ()=>{ state.screen = 'bout'; render(); };

  const advanceBout = document.getElementById('advance-bout');
  if(advanceBout) advanceBout.onclick = ()=>{
    const r = state.boutResult;
    if(state.revealedCount < r.log.length){
      state.revealedCount = Math.min(r.log.length, state.revealedCount + 3);
      render();
    } else if(state.mode === 'tournament'){
      applyTournamentBoutResult();
      render();
    } else {
      applyBoutResult();
      render();
    }
  };

  const backToSelectFromSummary = document.getElementById('back-to-select-from-summary');
  if(backToSelectFromSummary) backToSelectFromSummary.onclick = ()=>{ state.screen='select'; state.fighterId=null; render(); };

  const declineTournament = document.getElementById('decline-tournament');
  if(declineTournament) declineTournament.onclick = ()=>{ finalizeAmateurSeason(false); render(); };

  const acceptTournament = document.getElementById('accept-tournament');
  if(acceptTournament) acceptTournament.onclick = ()=>{
    state.mode = 'tournament';
    startBracketStage('City');
    render();
  };

  const enterBracketRoundBtn = document.getElementById('enter-bracket-round');
  if(enterBracketRoundBtn) enterBracketRoundBtn.onclick = ()=>{
    enterBracketRound();
    render();
  };
}

function startBracketStage(stageName){
  const f = getFighterById(state.fighterId);
  const s = f.amateurSeason;
  const wClass = weightClassOf(f.weightLb);
  const size = TOURNAMENT_STAGE_SIZES[stageName];
  const weights = TOURNAMENT_TIER_WEIGHTS[stageName];

  let drawFn;
  if(stageName === 'City') drawFn = ()=> drawFromFieldPool(s.leagueId, wClass, weights);
  else if(stageName === 'Province') drawFn = ()=> drawFromProvinceLeaguePools(s.pitProvinceId, wClass, weights);
  else drawFn = ()=> drawFromCombinedFieldPools(wClass, weights);

  const field = pickBracketField(f, size, drawFn);
  const rounds = buildBracket(field, f.id);

  state.tournamentStage = stageName;
  state.bracket = { rounds };
  state.bracketRoundIndex = 0;
  state.screen = 'bracket-view';
}

function enterBracketRound(){
  const f = getFighterById(state.fighterId);
  const round = state.bracket.rounds[state.bracketRoundIndex];
  const liveMatch = round.matches.find(m=> m.live);
  const opp = liveMatchOpponent(liveMatch);
  const arena = generateArena();
  const ctx = { arena, hometownPit: false }; // championship bouts are away from home comforts
  state.opponent = opp;
  state.arena = arena;
  state.boutResult = simulateBout(f, opp, ctx);
  state.revealedCount = 0;
  state.screen = 'preview';
}

function renderBracketView(){
  const f = getFighterById(state.fighterId);
  const rounds = state.bracket.rounds;
  const roundsHtml = rounds.map(round=>{
    const matchesHtml = round.matches.map(m=>{
      const aName = m.a.fighter ? m.a.fighter.name : 'TBD';
      const bName = m.b.fighter ? m.b.fighter.name : 'TBD';
      const aIsPlayer = m.a.fighter && m.a.fighter.id === f.id;
      const bIsPlayer = m.b.fighter && m.b.fighter.id === f.id;
      const winnerId = m.winner ? m.winner.fighter.id : null;
      const aCls = aIsPlayer ? 'you' : (winnerId && m.a.fighter && winnerId===m.a.fighter.id ? 'winner' : '');
      const bCls = bIsPlayer ? 'you' : (winnerId && m.b.fighter && winnerId===m.b.fighter.id ? 'winner' : '');
      return `
        <div class="bracket-match ${m.live?'live':''}">
          <div class="bracket-side ${aCls}">${aIsPlayer?'YOU — ':''}${aName}</div>
          <div class="bracket-vs">${m.live ? 'LIVE' : 'vs'}</div>
          <div class="bracket-side ${bCls}" style="text-align:right;">${bName}${bIsPlayer?' — YOU':''}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="bracket-round">
        <div class="bracket-round-title">${round.name}</div>
        ${matchesHtml}
      </div>
    `;
  }).join('');

  return `
    <div class="section-label">${state.tournamentStage} Bracket — ${state.bracket.rounds.length===4?'16':'8'} Fighters, Blind Draw</div>
    <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:18px;">
      The full bracket, seeded blind. Everyone not on your side of the draw is already resolved below — your own line stays live until you actually fight it.
    </p>
    ${roundsHtml}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="enter-bracket-round">Enter the Tournament →</button></div>
  `;
}

function applyBoutResult(){
  const r = state.boutResult;
  const playerWon = r.winner.id === state.fighterId;
  const isFinish = r.method !== 'Decision';
  const isAmateur = state.seasonType === 'amateur';
  const total = isAmateur ? AMATEUR_TOTAL_FIGHTS : JUVENILE_TOTAL_FIGHTS;
  const tierName = isAmateur ? 'Amateur' : 'Juvenile';

  updateFighter(state.fighterId, (f)=>{
    const s = isAmateur ? f.amateurSeason : f.juvenileSeason;
    s.fightsPlayed += 1;
    if(playerWon){
      s.wins += 1; f.record.wins += 1;
      s.reputation = clamp(s.reputation + (r.method==='KO'?14 : r.method==='TKO'?11 : r.method==='DQ'?6 : 8), 0, 100);
    } else {
      s.losses += 1; f.record.losses += 1;
      s.reputation = clamp(s.reputation - (isFinish ? 7 : 4), 0, 100);
    }
    if(isFinish) s.finishes += (playerWon ? 1 : 0);
    f.fightLog.push({
      tier: tierName, opponent: state.opponent.name, result: playerWon ? 'W':'L', method: r.method,
      location: `${state.arena.name} — ${s.pitName}`, date: dateForDay(getCurrentDay()).toISOString(),
    });
    growFighterStats(f, playerWon, r.method, calcOVR(state.opponent.stats), isAmateur);
    if(s.fightsPlayed >= total){
      s.complete = true;
      f.age = clamp((f.age || 12) + 1, 12, 18); // a full season completing ≈ a year passing
      if(isAmateur){
        const winPct = s.wins / (s.wins + s.losses);
        s.qualifiedForTournament = winPct >= AMATEUR_QUALIFY_WIN_PCT;
      } else {
        f.juvenileSeasonHistory.push({ pitName: s.pitName, wins: s.wins, losses: s.losses, finishes: s.finishes, reputation: s.reputation });
      }
    }
  });

  const poolKey = isAmateur ? state.opponent.leagueId : state.opponent.provinceId;
  if(poolKey){
    const playerName = getFighterById(state.fighterId).name;
    updateFieldFighterRecord(state.opponent.id, poolKey, !playerWon, !isAmateur, {
      tier: tierName, opponent: playerName, result: playerWon ? 'L' : 'W', method: r.method,
      location: `${state.arena.name} — ${s.pitName}`, date: dateForDay(getCurrentDay()).toISOString(),
    });
  }

  // A fight night represents roughly a week of build-up/travel in-fiction — advance the
  // shared island clock and let the Juvenile background sim catch the rest of the cast up.
  advanceClockByDays(7);
  catchUpJuvenileSimulation();

  const f = getFighterById(state.fighterId);
  const s = isAmateur ? f.amateurSeason : f.juvenileSeason;

  if(s.complete && isAmateur){
    const folded = maybeFoldLeague(s.leagueId);
    if(folded){
      updateFighter(state.fighterId, (ff)=>{ ff.amateurLeagueId = null; });
    }
    if(s.qualifiedForTournament){
      state.screen = 'tournament-invite';
    } else {
      finalizeAmateurSeason(false);
    }
  } else if(s.complete){
    state.screen = 'season-summary';
  } else {
    state.screen = 'season';
  }
  render();
}

function applyTournamentBoutResult(){
  const r = state.boutResult;
  const playerWon = r.winner.id === state.fighterId;
  const stage = state.tournamentStage;
  const roundName = state.bracket.rounds[state.bracketRoundIndex].name;

  updateFighter(state.fighterId, (f)=>{
    if(playerWon) f.record.wins += 1; else f.record.losses += 1;
    f.fightLog.push({
      tier: 'Amateur', opponent: state.opponent.name, result: playerWon ? 'W':'L', method: r.method,
      location: `${state.arena.name} — ${stage} ${roundName}`, date: dateForDay(getCurrentDay()).toISOString(),
    });
    growFighterStats(f, playerWon, r.method, calcOVR(state.opponent.stats), true);
  });

  if(state.opponent.leagueId){
    const playerName = getFighterById(state.fighterId).name;
    updateFieldFighterRecord(state.opponent.id, state.opponent.leagueId, !playerWon, false, {
      tier: 'Amateur', opponent: playerName, result: playerWon ? 'L' : 'W', method: r.method,
      location: `${state.arena.name} — ${stage} ${roundName}`, date: dateForDay(getCurrentDay()).toISOString(),
    });
  }

  if(!playerWon){
    finalizeAmateurSeason(true, `Eliminated - ${stage} ${roundName}`);
    return;
  }

  const isLastRoundOfStage = state.bracketRoundIndex >= state.bracket.rounds.length - 1;
  if(!isLastRoundOfStage){
    state.bracketRoundIndex += 1;
    enterBracketRound();
    return;
  }

  // Won the stage's Final.
  if(stage === 'City'){ startBracketStage('Province'); return; }
  if(stage === 'Province'){ startBracketStage('National'); return; }
  // Won the National Final — crowned champion.
  finalizeAmateurSeason(true, 'National Champion');
}

function finalizeAmateurSeason(wentToTournament, tournamentResult){
  updateFighter(state.fighterId, (f)=>{
    const s = f.amateurSeason;
    f.amateurSeasonHistory.push({
      pitName: s.pitName, wins: s.wins, losses: s.losses, finishes: s.finishes, reputation: s.reputation,
      tournamentResult: wentToTournament ? (tournamentResult || null) : 'Declined',
    });
    f.amateurSeason = null;
  });
  state.mode = 'season';
  state.tournamentStage = null;
  state.bracket = null;
  state.bracketRoundIndex = 0;
  state.screen = 'season-summary';
}

render();
</script>
<div class="version-badge">FIGHT PIT · V14 · 2026-07-12</div>
