<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Island Fight League — Fighter Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1B1714;
    --bg-panel:#241D17;
    --bg-raised:#312820;
    --bg-raised-2:#3A2F25;
    --ink-red:#A6342A;
    --ink-red-dim:#7C2620;
    --brass:#C9A23C;
    --brass-dim:#8E7228;
    --bone:#EDE3CF;
    --bone-dim:#C9BFA9;
    --muted:#8B8070;
    --line:#43392D;
    --good:#5A8C5C;
    --display: 'Anton', sans-serif;
    --label: 'Oswald', sans-serif;
    --body: 'Work Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse at top, #241D17 0%, #1B1714 55%, #14110D 100%);
    color:var(--bone);
    font-family:var(--body);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 80px;
    line-height:1.4;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, transparent 1px, transparent 2px, rgba(255,255,255,0.012) 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.04) 0px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:0;
  }
  .app{
    width:100%;
    max-width:760px;
    position:relative;
    z-index:1;
  }

  /* ---- Ticket header ---- */
  .ticket-header{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-bottom:none;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
  }
  .ticket-header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height:0;
    border-bottom:2px dashed var(--line);
  }
  .ticket-eyebrow{
    font-family:var(--label);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--brass);
  }
  .ticket-title{
    font-family:var(--display);
    font-size:28px;
    letter-spacing:1px;
    color:var(--bone);
    text-transform:uppercase;
  }
  .ticket-sub{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    text-align:right;
  }

  /* ---- progress punch-dots ---- */
  .progress-row{
    display:flex;
    gap:6px;
    padding:14px 24px;
    background:var(--bg-panel);
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }
  .punch{
    width:9px; height:9px;
    border-radius:50%;
    background:var(--bg-base);
    border:1px solid var(--line);
    transition:all .25s ease;
  }
  .punch.done{ background:var(--brass); border-color:var(--brass); box-shadow:0 0 6px rgba(201,162,60,0.5); }
  .punch.current{ background:var(--ink-red); border-color:var(--ink-red); box-shadow:0 0 8px rgba(166,52,42,0.6); transform:scale(1.25); }

  /* ---- main panel ---- */
  .panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-top:none;
    padding:32px;
    min-height:420px;
  }

  /* ---- step: intro ---- */
  .intro{
    text-align:center;
    padding:40px 10px 10px;
  }
  .intro h1{
    font-family:var(--display);
    font-size:42px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--bone);
    line-height:1.05;
  }
  .intro h1 span{ color:var(--ink-red); }
  .intro p{
    font-family:var(--body);
    color:var(--bone-dim);
    max-width:480px;
    margin:18px auto 30px;
    font-size:15px;
  }
  .island-mark{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:18px;
  }

  /* ---- buttons ---- */
  .btn{
    font-family:var(--label);
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-size:13px;
    font-weight:500;
    padding:13px 28px;
    border:1px solid var(--brass);
    background:transparent;
    color:var(--brass);
    cursor:pointer;
    transition:all .15s ease;
  }
  .btn:hover{ background:var(--brass); color:var(--bg-base); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .btn-primary{
    background:var(--ink-red);
    border-color:var(--ink-red);
    color:var(--bone);
  }
  .btn-primary:hover{ background:#C03F32; border-color:#C03F32; color:var(--bone); }
  .btn-row{
    display:flex;
    justify-content:space-between;
    margin-top:28px;
    gap:12px;
  }

  /* ---- section labels ---- */
  .section-label{
    font-family:var(--label);
    font-size:12px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* ---- form fields ---- */
  .field{ margin-bottom:22px; }
  .field label{
    display:block;
    font-family:var(--label);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field input[type=text], .field select{
    width:100%;
    background:var(--bg-base);
    border:1px solid var(--line);
    color:var(--bone);
    font-family:var(--body);
    font-size:15px;
    padding:11px 12px;
  }
  .field input[type=text]:focus, .field select:focus{
    outline:none;
    border-color:var(--brass);
  }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  /* ---- province grid ---- */
  .province-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    margin-bottom:6px;
  }
  .province-card{
    position:relative;
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-left:4px solid var(--card-color, var(--brass));
    padding:13px 14px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .province-card:hover{ background:var(--bg-raised-2); }
  .province-card.selected{
    background:var(--bg-raised-2);
    border-color:var(--card-color, var(--brass));
    box-shadow:inset 0 0 0 1px var(--card-color, var(--brass));
  }
  .province-card .pname{
    font-family:var(--label);
    font-size:13.5px;
    font-weight:600;
    letter-spacing:.5px;
    color:var(--bone);
  }
  .province-card .pdesc{
    font-family:var(--body);
    font-size:11.5px;
    color:var(--muted);
    margin-top:3px;
  }
  .province-card .ptags{
    font-family:var(--mono);
    font-size:10px;
    color:var(--card-color, var(--brass));
    margin-top:6px;
    letter-spacing:.5px;
  }

  /* ---- sequencing question ---- */
  .q-wrap{ min-height:300px; }
  .q-counter{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
    margin-bottom:6px;
  }
  .q-title{
    font-family:var(--display);
    font-size:22px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:10px;
  }
  .q-prompt{
    font-family:var(--body);
    font-size:16px;
    color:var(--bone);
    margin-bottom:22px;
  }
  .option{
    display:block;
    width:100%;
    text-align:left;
    background:var(--bg-raised);
    border:1px solid var(--line);
    color:var(--bone-dim);
    font-family:var(--body);
    font-size:14.5px;
    padding:14px 16px;
    margin-bottom:9px;
    cursor:pointer;
    transition:all .12s ease;
  }
  .option:hover{
    background:var(--bg-raised-2);
    border-color:var(--brass-dim);
    color:var(--bone);
    transform:translateX(3px);
  }
  .option .opt-letter{
    font-family:var(--mono);
    color:var(--ink-red);
    margin-right:10px;
    font-weight:700;
  }

  /* ---- card reveal ---- */
  .card-wrap{ display:flex; flex-direction:column; align-items:center; }
  .stamp-seal{
    font-family:var(--label);
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--good);
    border:1px solid var(--good);
    padding:5px 14px;
    border-radius:2px;
    transform:rotate(-3deg);
    margin-bottom:16px;
    opacity:0;
    animation:stamp-in .4s ease forwards .1s;
  }
  @keyframes stamp-in{
    0%{ opacity:0; transform:rotate(-3deg) scale(2.4); }
    60%{ opacity:1; }
    100%{ opacity:1; transform:rotate(-3deg) scale(1); }
  }
  .fighter-card{
    width:100%;
    max-width:480px;
    background:linear-gradient(180deg, var(--bg-raised), var(--bg-panel));
    border:1px solid var(--brass-dim);
    box-shadow:0 0 0 1px var(--bg-base), 0 18px 40px rgba(0,0,0,0.45);
    padding:0;
  }
  .fc-head{
    padding:18px 22px;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:16px;
    align-items:center;
  }
  .fc-photo{
    width:74px; height:74px;
    background:var(--bg-base);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .fc-name{
    font-family:var(--display);
    font-size:24px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--bone);
    line-height:1.05;
  }
  .fc-meta{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted);
    margin-top:5px;
  }
  .fc-disc{
    font-family:var(--label);
    font-size:12px;
    letter-spacing:1px;
    color:var(--brass);
    margin-top:4px;
    text-transform:uppercase;
  }
  .fc-body{ padding:20px 22px; }
  .fc-stats{ display:grid; gap:11px; margin-bottom:20px; }
  .stat-row{ display:grid; grid-template-columns:90px 1fr 32px; align-items:center; gap:10px; }
  .stat-label{
    font-family:var(--label);
    font-size:11.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
  }
  .stat-track{
    height:7px;
    background:var(--bg-base);
    border:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  .stat-fill{
    position:absolute; left:0; top:0; bottom:0;
    width:0%;
    background:linear-gradient(90deg, var(--ink-red-dim), var(--ink-red));
    transition:width 1s cubic-bezier(.2,.8,.2,1);
  }
  .stat-num{
    font-family:var(--mono);
    font-size:12.5px;
    font-weight:700;
    color:var(--bone);
    text-align:right;
  }
  .fc-meta-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:12px;
    margin-bottom:18px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }
  .meta-box{ text-align:center; }
  .meta-box .mval{
    font-family:var(--mono);
    font-size:20px;
    font-weight:700;
    color:var(--brass);
  }
  .meta-box .mlabel{
    font-family:var(--label);
    font-size:9.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:2px;
  }
  .fc-tags{
    display:flex; flex-wrap:wrap; gap:7px;
    padding-top:14px;
    border-top:1px solid var(--line);
  }
  .tag{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.5px;
    text-transform:uppercase;
    color:var(--bg-base);
    background:var(--brass);
    padding:4px 9px;
  }
  .tag.secondary{ background:transparent; border:1px solid var(--brass-dim); color:var(--brass-dim); }
  .fc-footer{
    padding:13px 22px;
    background:var(--bg-base);
    font-family:var(--mono);
    font-size:10px;
    color:var(--muted);
    letter-spacing:.5px;
  }

  /* ---- report ---- */
  .report{
    margin-top:24px;
    width:100%;
    max-width:480px;
    background:var(--bg-raised);
    border:1px solid var(--line);
    padding:16px 18px;
  }
  .report-title{
    font-family:var(--label);
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .report p{
    font-family:var(--body);
    font-size:13.5px;
    color:var(--bone-dim);
  }

  /* ---- roster ---- */
  .roster-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .roster-count{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
  }
  .roster-empty{
    text-align:center;
    padding:50px 20px;
    color:var(--muted);
    font-family:var(--body);
    font-size:14px;
  }
  .roster-grid{
    display:grid;
    gap:10px;
  }
  .roster-card{
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-left:4px solid var(--rc-color, var(--brass));
    padding:13px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .rc-name{
    font-family:var(--label);
    font-size:15px;
    font-weight:600;
    color:var(--bone);
    letter-spacing:.3px;
  }
  .rc-meta{
    font-family:var(--mono);
    font-size:11px;
    color:var(--muted);
    margin-top:3px;
  }
  .rc-family{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--brass-dim);
    margin-top:5px;
  }
  .rc-avatar{
    width:32px; height:46px;
    flex-shrink:0;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .rc-avatar svg{ width:100%; height:100%; }
  .rc-actions{ display:flex; gap:8px; flex-shrink:0; }
  .rc-btn{
    font-family:var(--label);
    font-size:10.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:7px 11px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
  }
  .rc-btn:hover{ border-color:var(--brass-dim); color:var(--bone); }
  .rc-btn.danger:hover{ border-color:var(--ink-red); color:var(--ink-red); }
  .storage-note{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--muted);
    margin-top:18px;
    line-height:1.6;
    border-top:1px solid var(--line);
    padding-top:14px;
  }
  .save-status{
    font-family:var(--mono);
    font-size:11px;
    color:var(--good);
    margin-top:10px;
    min-height:16px;
  }
  .save-status.error{ color:var(--ink-red); }

  /* ---- cutscene ---- */
  .cutscene-wrap{ width:100%; }
  .cutscene-scene{
    position:relative;
    height:200px;
    overflow:hidden;
    border:1px solid var(--line);
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--scene-color, var(--brass)) 35%, var(--bg-base)) 0%, var(--bg-base) 100%);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:16px;
  }
  .cutscene-scene .scene-figures{
    display:flex;
    align-items:flex-end;
    gap:36px;
  }
  .cutscene-scene .scene-emblem{
    position:absolute;
    top:14px; left:50%;
    transform:translateX(-50%);
    font-family:var(--label);
    font-size:10.5px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:color-mix(in srgb, var(--scene-color, var(--brass)) 70%, var(--bone) 30%);
    opacity:.85;
  }
  .cutscene-dialogue{
    border:1px solid var(--line);
    border-top:none;
    background:var(--bg-raised);
    padding:18px 22px 20px;
  }
  .speaker-name{
    font-family:var(--label);
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:8px;
  }
  .speaker-name.narrator{ color:var(--muted); font-style:italic; }
  .dialogue-text{
    font-family:var(--body);
    font-size:15.5px;
    color:var(--bone);
    line-height:1.55;
    min-height:60px;
    opacity:0;
    animation:dlg-fade .4s ease forwards;
  }
  @keyframes dlg-fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  .cutscene-controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:18px;
  }
  .beat-dots{ display:flex; gap:5px; }
  .beat-dot{ width:6px; height:6px; border-radius:50%; background:var(--line); }
  .beat-dot.active{ background:var(--brass); }
  .stub-screen{ text-align:center; padding:30px 10px 10px; }
  .stub-screen h2{
    font-family:var(--display);
    font-size:26px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-red);
    margin-bottom:14px;
  }
  .stub-screen p{
    font-family:var(--body);
    color:var(--bone-dim);
    font-size:14.5px;
    max-width:420px;
    margin:0 auto 26px;
  }

  /* ---- tuning ---- */
  .tuning-pool{
    text-align:center;
    font-family:var(--mono);
    font-size:15px;
    font-weight:700;
    letter-spacing:1.5px;
    color:var(--brass);
    margin-bottom:22px;
    padding:10px;
    border:1px dashed var(--line);
  }
  .tuning-row{
    display:grid;
    grid-template-columns:96px 1fr auto;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }
  .tuning-val{
    font-family:var(--mono);
    font-size:15px;
    font-weight:700;
    color:var(--bone);
    width:28px;
    text-align:center;
  }
  .tuning-btn{
    width:30px; height:30px;
    border:1px solid var(--line);
    background:var(--bg-raised);
    color:var(--bone-dim);
    font-family:var(--mono);
    font-size:16px;
    line-height:1;
    cursor:pointer;
    transition:all .12s ease;
  }
  .tuning-btn:hover:not(:disabled){ border-color:var(--brass); color:var(--brass); }
  .tuning-btn:disabled{ opacity:.3; cursor:not-allowed; }

  /* ---- customize panel ---- */
  .customize-panel{
    width:100%;
    max-width:480px;
    background:var(--bg-raised);
    border:1px solid var(--line);
    padding:18px 20px 4px;
    margin-bottom:20px;
  }
  .swatch-row{ display:flex; gap:9px; flex-wrap:wrap; margin-bottom:18px; }
  .swatch{
    width:28px; height:28px;
    border-radius:50%;
    border:2px solid var(--line);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
    font-size:11px;
    padding:0;
  }
  .swatch.selected{ border-color:var(--brass); box-shadow:0 0 0 2px var(--bg-base), 0 0 0 3px var(--brass); }

  @media (max-width:600px){
    .province-grid{ grid-template-columns:1fr; }
    .field-row{ grid-template-columns:1fr; }
    .ticket-header{ flex-direction:column; align-items:flex-start; gap:6px; }
    .fc-meta-grid{ grid-template-columns:1fr 1fr; }
    .roster-card{ flex-direction:column; align-items:flex-start; }
  }

  /* ---- fighter card modal ---- */
  .clickable-name{ cursor:pointer; text-decoration:underline; text-decoration-color:transparent; transition:text-decoration-color .12s ease; }
  .clickable-name:hover{ text-decoration-color:var(--brass); color:var(--brass); }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,6,0.78); display:flex; align-items:flex-start; justify-content:center;
    padding:40px 16px; z-index:1000; overflow-y:auto;
  }
  .modal-card{
    background:var(--bg-panel); border:1px solid var(--brass-dim); max-width:520px; width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.55);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line);
  }
  .modal-title{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .modal-close{

const TUNING_POOL_TOTAL = 5; // was 15 — rescaled now that stat ceilings are age-banded (~15-35), not flat 1-99
function sumAlloc(o){ return Object.values(o).reduce((a,b)=>a+b,0); }

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function rand(lo, hi){ return Math.floor(Math.random()*(hi-lo+1))+lo; }

/* ============================ COMPUTE FIGHTER ============================ */

/* ============================ AGE BANDS & TALENT TIERS ============================ */
/*
  Core combat stats (Speed/Quickness/Toughness/Power/Agility) are NOT flat 1-99 the
  way Potential is. A 12-year-old's ceiling is age-gated. Three tiers:
  - normal (~84% of fighters): capped by AGE_BAND_TYPICAL for their age
  - prodigy (~15%): naturally gifted, capped higher — AGE_BAND_PRODIGY
  - generational (~1%, gated behind a high raw-talent roll): a true once-in-a-lifetime
    talent who can blow past the normal Amateur ceiling entirely, Tyson-at-18 style —
    AGE_BAND_GENERATIONAL. Extremely rare on purpose.
  All tiers still cap out around the same ~35 "top amateur" mark UNLESS generational,
  which is allowed to reach toward pro-level numbers even while still an amateur.
*/
const AGE_BAND_TYPICAL      = { 12:15, 13:18, 14:21, 15:25, 16:28, 17:31, 18:35 };
const AGE_BAND_PRODIGY      = { 12:20, 13:23, 14:26, 15:29, 16:32, 17:34, 18:35 };
const AGE_BAND_GENERATIONAL = { 12:30, 13:40, 14:50, 15:60, 16:70, 17:80, 18:88 };

function bandCeiling(age, tier){
  const table = tier==='generational' ? AGE_BAND_GENERATIONAL : tier==='prodigy' ? AGE_BAND_PRODIGY : AGE_BAND_TYPICAL;
  const a = clamp(age, 12, 18);
  return table[a];
}

function rollTalentTier(rawAvg01){
  // No hard gate — every fighter has *some* shot at being an outlier, but stronger raw
  // rolls meaningfully improve the odds. Roughly: ~1-2% generational, ~15-25% prodigy
  // depending on how the Sequencing Event went.
  const generationalChance = 0.005 + rawAvg01 * 0.02;
  const prodigyChance = 0.08 + rawAvg01 * 0.28;
  const r = Math.random();
  if(r < generationalChance) return 'generational';
  if(r < generationalChance + prodigyChance) return 'prodigy';
  return 'normal';
}

function compressStat(rawValue, age, tier){
  // Maps a raw 1-99 talent roll proportionally into the age/tier-appropriate band.
  const ceiling = bandCeiling(age, tier);
  const pct = clamp(rawValue, 1, 99) / 99;
  return clamp(Math.round(1 + pct * (ceiling - 1)), 1, ceiling);
}

function computeFighter(){
  const province = PROVINCES.find(p=>p.id===state.provinceId);

  let stats = {
    speed: rand(22,38), quickness: rand(22,38), toughness: rand(22,38),
    power: rand(22,38), agility: rand(22,38)
  };
  let potential = rand(45,65);
  let injury = rand(8,14);
  let superstar = rand(15,35);
  const traitTally = {};
  const discScore = {};
  Object.keys(DISCIPLINE_NAMES).forEach(d=> discScore[d] = 5);

  // province weighting
  province.primary.forEach(d=> discScore[d] += 25);
  province.secondary.forEach(d=> discScore[d] += 12);

  state.answers.forEach(opt=>{
    if(!opt) return;
    const m = opt.mods || {};
    if(m.speed) stats.speed += m.speed;
    if(m.quickness) stats.quickness += m.quickness;
    if(m.toughness) stats.toughness += m.toughness;
    if(m.power) stats.power += m.power;
    if(m.agility) stats.agility += m.agility;
    if(m.potential) potential += m.potential;
    if(m.injury) injury += m.injury;
    if(m.superstar) superstar += m.superstar;
    Object.entries(opt.disc||{}).forEach(([d,v])=> discScore[d] += v);
    if(opt.trait) traitTally[opt.trait] = (traitTally[opt.trait]||0)+1;
  });

  if(inheritance){
    potential += inheritance.potentialBonus;
    discScore[inheritance.disciplineLean] += 20;
  }

  // Raw stats (uncompressed) still range ~1-99 from base rolls + Sequencing Event
  // modifiers + tuning — that raw spread is what determines HOW gifted the fighter
  // is relative to peers, before being compressed into an age-appropriate band.
  Object.keys(stats).forEach(k=> stats[k] = clamp(Math.round(stats[k]), 1, 99));
  potential = clamp(Math.round(potential), 1, 99);
  injury = clamp(Math.round(injury), 1, 20);
  superstar = clamp(Math.round(superstar), 1, 99);

  const rawAvg = (stats.speed + stats.quickness + stats.toughness + stats.power + stats.agility) / 5;
  const rawAvg01 = clamp(rawAvg / 99, 0, 1);
  const talentTier = rollTalentTier(rawAvg01);
  const age = state.age || 12;

  const compressedStats = {};
  Object.keys(stats).forEach(k=> compressedStats[k] = compressStat(stats[k], age, talentTier));

  const ranked = Object.entries(discScore).sort((a,b)=> b[1]-a[1]);
  const primaryDisc = ranked[0][0];
  const secondaryDisc = ranked[1][0];

  let topTrait = 'Balanced', topCount = 0;
  Object.entries(traitTally).forEach(([t,c])=>{ if(c>topCount){ topCount=c; topTrait=t; } });

  return { province, stats: compressedStats, rawStats: stats, age, talentTier,
    potential, injury, superstar, primaryDisc, secondaryDisc, trait: topTrait, ranked,
    legacy: inheritance ? { parentId: inheritance.parentId, parentName: inheritance.parentName } : null };
}

/* ============================ STORAGE ============================ */
/*
  Roster persistence for the IIFL Character Creator.
  Uses localStorage under the key "iifl_roster_v1" — this is a static,
  single-file prototype meant to be hosted on GitHub Pages / Netlify like
  your other IDHF tools, with no backend yet. localStorage works fine once
  this file is actually deployed/hosted in a real browser; it will NOT
  persist inside Claude.ai's in-chat preview sandbox, so test it after
  pushing it live. Swap this layer for Firebase later if you want the
  roster synced across devices/coaches, same as Minooka/RefPicker.
*/
const ROSTER_KEY = 'iifl_roster_v1';

function loadRoster(){
  try{
    const raw = localStorage.getItem(ROSTER_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(err){
    console.error('IIFL roster load failed:', err);
    return [];
  }
}

function saveRoster(list){
  try{
    localStorage.setItem(ROSTER_KEY, JSON.stringify(list));
    return true;
  }catch(err){
    console.error('IIFL roster save failed:', err);
    return false;
  }
}

function addFighterToRoster(fighterRecord){
  const roster = loadRoster();
  roster.unshift(fighterRecord);
  return saveRoster(roster);
}

function deleteFighterFromRoster(id){
  const roster = loadRoster().filter(f=> f.id !== id);
  return saveRoster(roster);
}

function openFighterCard(id){ modalFighterId = id; modalActiveTier = 'All'; renderModal(); }
function closeFighterCard(){ modalFighterId = null; renderModal(); }

function renderModal(){
  const root = document.getElementById('modal-root');
  if(!modalFighterId){ root.innerHTML = ''; return; }
  const roster = loadRoster();
  const f = roster.find(r=> r.id === modalFighterId);
  if(!f){ root.innerHTML = ''; return; }

  const prov = PROVINCES.find(p=>p.id===f.provinceId);
  const rec = f.record || { wins:0, losses:0 };
  const log = f.fightLog || [];
  const filtered = modalActiveTier === 'All' ? log : log.filter(e=> e.tier === modalActiveTier);
  const sorted = [...filtered].sort((a,b)=> new Date(b.date) - new Date(a.date));

  const historyHtml = sorted.length ? sorted.map(e=>{
    const dateStr = e.date ? new Date(e.date).toLocaleDateString() : '—';
    return `

      </div>
    `;
  }).join('') : `<div class="mf-empty">No fights on record${modalActiveTier==='All'?'':' at this level'} yet.</div>`;

  const tabsHtml = TIERS.map(t=>{
    const count = t==='All' ? log.length : log.filter(e=>e.tier===t).length;
    return `<button class="mf-tier-tab ${modalActiveTier===t?'active':''}" data-mf-tab="${t}">${t} (${count})</button>`;
  }).join('');

  root.innerHTML = `
    <div class="modal-overlay">
      <div class="modal-card">
        <div class="modal-head">
          <div class="modal-title">Fighter Card</div>
          <button class="modal-close" data-modal-close>✕</button>
        </div>
        <div class="modal-body">
          <div class="mf-head">
            <div class="mf-avatar">${buildSilhouetteSM(f.appearance)}</div>
            <div>
              <div class="mf-name">${f.name}</div>
              <div class="mf-meta">${f.heightIn?heightLabel(f.heightIn):''}${f.weightLb?' · '+f.weightLb+' lb':''} · ${f.settlement||''}${prov?', '+prov.name:''}</div>
              <div class="mf-disc">${DISCIPLINE_NAMES[f.primaryDisc]||''} · Career ${rec.wins}-${rec.losses}</div>
            </div>
          </div>
          ${f.stats ? `
          <div class="mf-stats-grid">
            <div class="mf-stat"><div class="msv">${f.stats.speed}</div><div class="msl">SPD</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.quickness}</div><div class="msl">QCK</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.toughness}</div><div class="msl">TGH</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.power}</div><div class="msl">PWR</div></div>
            <div class="mf-stat"><div class="msv">${f.stats.agility}</div><div class="msl">AGL</div></div>
          </div>` : ''}

          <div class="mf-history">${historyHtml}</div>
        </div>

  `;

document.addEventListener('click', (e)=>{
  const openEl = e.target.closest('[data-open-fighter]');
  if(openEl){ openFighterCard(openEl.dataset.openFighter); return; }
  const closeEl = e.target.closest('[data-modal-close]');
  if(closeEl){ closeFighterCard(); return; }
  const overlayEl = e.target.closest('.modal-overlay');
  if(overlayEl && e.target === overlayEl){ closeFighterCard(); return; }
  const tabEl = e.target.closest('[data-mf-tab]');
  if(tabEl){ modalActiveTier = tabEl.dataset.mfTab; renderModal(); return; }
});

function render(){
  if(state.screen === 'roster'){ renderRosterScreen(); return; }
  if(state.screen === 'cutscene'){ renderCutsceneScreen(); return; }

  const idx = state.step;
  let body = '';
  let title = 'FIGHTER INTAKE';
  let sub = `FILE ${String(idx).padStart(2,'0')} / ${String(totalSteps()).padStart(2,'0')}`;

  if(idx === 0){ body = renderIntro(); title='IRON ISLAND FIGHT LEAGUE'; sub='SCOUTING OFFICE'; }
  else if(idx === 1){ body = renderBasics(); title='FIGHTER INTAKE'; }
  else if(idx >= 2 && idx < 2+QUESTIONS.length){ body = renderQuestion(idx-2); title='SEQUENCING EVENT'; }
  else if(idx === 2+QUESTIONS.length){ body = renderTuning(); title='FINAL TRAINING CAMP'; }
  else { body = renderReveal(); title='FIGHTER APPROVED'; }

  const progress = renderProgress();

  app.innerHTML = `
    <div class="ticket-header">
      <div>
        <div class="ticket-eyebrow">Iron Island · Fight League</div>
        <div class="ticket-title">${title}</div>
      </div>
      <div class="ticket-sub">${sub}</div>
    </div>
    ${idx>0 ? `<div class="progress-row">${progress}</div>` : ''}
    <div class="panel">${body}</div>
  `;
  wireEvents();
}

    return `
      <div class="roster-card" style="--rc-color:${prov ? prov.color : '#C9A23C'}">
        <div style="display:flex; gap:12px; align-items:flex-start;">
          <div class="rc-avatar">${buildSilhouetteSM(f.appearance)}</div>
          <div>
            <div class="rc-name clickable-name" data-open-fighter="${f.id}">${f.name}</div>

  const body = `

  `;

  app.innerHTML = `
    <div class="ticket-header">
      <div>
        <div class="ticket-eyebrow">Iron Island · Fight League</div>
        <div class="ticket-title">FIGHTER ROSTER</div>
      </div>
      <div class="ticket-sub">SAVED FILES</div>

  `;

  const backBtn = document.getElementById('back-to-creator');
  if(backBtn) backBtn.onclick = ()=>{
    state.screen = 'creator';
    Object.assign(state, { step:0, name:'', provinceId:null, settlement:'', heightIn:60, weightLb:100, qIndex:0, answers:[], saved:false,
      tuningAlloc:{ speed:0, quickness:0, toughness:0, power:0, agility:0 },
      appearance:{ skin:'#C68642', hair:'#2B1B12', build:'athletic' } });
    fighterCache = null;
    inheritance = null;
    render();
  };

  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.onclick = ()=>{
      deleteFighterFromRoster(btn.dataset.delete);
      renderRosterScreen();
    };
  });

  document.querySelectorAll('[data-replay]').forEach(btn=>{
    btn.onclick = ()=>{
      const roster = loadRoster();
      const f = roster.find(r=> r.id === btn.dataset.replay);
      if(f) startCutscene(f);
    };
  });

  document.querySelectorAll('[data-mate]').forEach(btn=>{
    btn.onclick = ()=>{
      const roster = loadRoster();
      const f = roster.find(r=> r.id === btn.dataset.mate);
      if(!f) return;
      f.mate = generateMate(f.provinceId, f.settlement);
      saveRoster(roster);
      renderRosterScreen();

      if(!f) return;
      startLegacyIntake(f);
    };
  });
}

function startLegacyIntake(parentRecord){
  inheritance = {
    parentId: parentRecord.id,
    parentName: parentRecord.name,
    disciplineLean: parentRecord.primaryDisc,
    potentialBonus: rand(5,12),
  };
  state.screen = 'creator';
  Object.assign(state, {
    step: 1, name:'', provinceId: parentRecord.provinceId, settlement: parentRecord.settlement,
    heightIn:60, weightLb:100, qIndex:0, answers:[], saved:false,
    tuningAlloc:{ speed:0, quickness:0, toughness:0, power:0, agility:0 },
    appearance:{ skin:'#C68642', hair:'#2B1B12', build:'athletic' }
  });
  fighterCache = null;
  render();
}

function startCutscene(record){
  state.screen = 'cutscene';
  state.cutsceneFighter = record;
  state.cutsceneBeat = 0;
  render();
}

function fillTemplate(text, record){
  return text.replace(/{name}/g, record.name).replace(/{settlement}/g, record.settlement);
}

function renderCutsceneScreen(){
  const record = state.cutsceneFighter;
  const province = PROVINCES.find(p=>p.id===record.provinceId);
  const data = CUTSCENES[record.provinceId];
  const beatIdx = state.cutsceneBeat;
  const atEnd = beatIdx >= data.beats.length;

  let body;
  if(atEnd){
    body = `
      <div class="stub-screen">
        <h2>To Be Continued…</h2>
        <p>${record.name} is on the ground in ${record.settlement}, ${province.name}. Free roam — walking the city, training, fight pits, mini-games — is the next layer to build. For now, your fighter is locked in and ready.</p>
        <button class="btn btn-primary" id="end-to-roster">Return to Roster</button>
      </div>
    `;
  } else {
    const beat = data.beats[beatIdx];
    const isGuide = beat.speaker === 'guide';
    const speakerLabel = isGuide ? data.guideName : 'Narrator';
    const dots = data.beats.map((_,i)=> `<div class="beat-dot ${i===beatIdx?'active':''}"></div>`).join('');

    body = `
      <div class="cutscene-wrap">
        <div class="cutscene-scene" style="--scene-color:${province.color}">
          <div class="scene-emblem">${province.name}</div>
          <div class="scene-figures">
            ${buildSilhouetteLG(record.appearance)}
            ${isGuide ? buildSilhouetteLG(GUIDE_APPEARANCE) : ''}
          </div>
        </div>
        <div class="cutscene-dialogue">
          <div class="speaker-name ${isGuide?'':'narrator'}">${speakerLabel}</div>
          <div class="dialogue-text" key="${beatIdx}">${fillTemplate(beat.text, record)}</div>
          <div class="cutscene-controls">
            <div class="beat-dots">${dots}</div>
            <div style="display:flex; gap:10px;">
              <button class="btn" id="skip-cutscene">Skip</button>
              <button class="btn btn-primary" id="next-beat">${beatIdx===data.beats.length-1?'Continue':'Next →'}</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="ticket-header">
      <div>
        <div class="ticket-eyebrow">Iron Island · Fight League</div>
        <div class="ticket-title">${record.name}'S FIRST WALK</div>
      </div>
      <div class="ticket-sub">${province.name.toUpperCase()}</div>
    </div>
    <div class="panel">${body}</div>
  `;

  const nextBtn = document.getElementById('next-beat');
  if(nextBtn) nextBtn.onclick = ()=>{ state.cutsceneBeat += 1; render(); };

  const skipBtn = document.getElementById('skip-cutscene');
  if(skipBtn) skipBtn.onclick = ()=>{ state.cutsceneBeat = data.beats.length; render(); };

  const endBtn = document.getElementById('end-to-roster');
  if(endBtn) endBtn.onclick = ()=>{
    state.screen = 'roster';
    state.cutsceneFighter = null;
    state.cutsceneBeat = 0;
    render();
  };
}

function renderProgress(){
  const n = totalSteps();
  let html = '';
  for(let i=1;i<=n;i++){
    let cls = 'punch';
    if(i < state.step) cls += ' done';
    else if(i === state.step) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  return html;
}

function renderTuning(){
  if(!fighterCache) fighterCache = computeFighter();
  const f = fighterCache;
  const used = sumAlloc(state.tuningAlloc);
  const pool = TUNING_POOL_TOTAL - used;
  const ceiling = bandCeiling(f.age, f.talentTier);
  const statList = [['Speed','speed'],['Quickness','quickness'],['Toughness','toughness'],['Power','power'],['Agility','agility']];

  const rows = statList.map(([label,key])=>{
    const base = f.stats[key];
    const alloc = state.tuningAlloc[key] || 0;
    const final = clamp(base + alloc, 1, ceiling);
    const barPct = clamp(final / ceiling * 100, 0, 100);
    const canPlus = pool > 0 && final < ceiling;
    const canMinus = alloc > 0;
    return `
      <div class="tuning-row">
        <div class="stat-label">${label.toUpperCase()}</div>
        <div class="stat-track"><div class="stat-fill" style="width:${barPct}%"></div></div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="tuning-btn" data-tune="${key}" data-dir="-1" ${canMinus?'':'disabled'}>−</button>
          <div class="tuning-val">${final}</div>
          <button class="tuning-btn" data-tune="${key}" data-dir="1" ${canPlus?'':'disabled'}>+</button>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="section-label">Final Training Camp</div>
    <p style="font-family:var(--body); font-size:14px; color:var(--bone-dim); margin-bottom:18px;">
      Before the card locks in, ${state.name} gets one last stretch of focused training. Spend the points where they'll matter most — leftover points are wasted, so use what you've got.
    </p>
    <div class="tuning-pool">${pool} TRAINING POINT${pool===1?'':'S'} REMAINING</div>
    ${rows}
    <div class="btn-row">
      <span></span>
      <button class="btn btn-primary" id="apply-tuning">Lock In Stats →</button>
    </div>
  `;
}

function renderQuestion(qi){
  const q = QUESTIONS[qi];
  const opts = q.options.map((o,i)=>{
    const letter = String.fromCharCode(65+i);
    return `<button class="option" data-qopt="${i}"><span class="opt-letter">${letter}.</span>${o.text}</button>`;
  }).join('');
  return `
    <div class="q-wrap">
      <div class="q-counter">QUESTION ${qi+1} OF ${QUESTIONS.length}</div>
      <div class="q-title">${q.title}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${opts}
    </div>
  `;
}

function pickName(provinceId, settlementName){
  let poolKey = provinceId;
  if(provinceId === 'alexandretta'){
    poolKey = ALEXANDRETTA_NORTH_SETTLEMENTS.includes(settlementName) ? 'alexandretta_north' : 'alexandretta_south';

  return `${pick(pool.first)} ${pick(pool.last)}`;
}

function renderReveal(){
  if(!fighterCache) fighterCache = computeFighter();

    ['SPD', f.stats.speed], ['QCK', f.stats.quickness], ['TGH', f.stats.toughness],
    ['PWR', f.stats.power], ['AGL', f.stats.agility]

  const statRows = statList.map(([label,val])=>{
    const barPct = clamp(val / ceiling * 100, 0, 100);
    return `
    <div class="stat-row">
      <div class="stat-label">${label}</div>
      <div class="stat-track"><div class="stat-fill" data-target="${barPct}"></div></div>
      <div class="stat-num">${val}</div>

  return `
    <div class="card-wrap">
      <div class="stamp-seal">✓ Intake Approved</div>

function buildMult(b){ return { lean:0.8, athletic:1, stocky:1.25 }[b] || 1; }

function buildSilhouetteSM(app){
  app = app || DEFAULT_APPEARANCE;
  const stroke = (3 * buildMult(app.build)).toFixed(1);
  const hair = app.hair === 'none' ? '' : `<path d="M13 7 Q20 -2 27 7" stroke="${app.hair}" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  return `<svg width="40" height="56" viewBox="0 0 40 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="10" r="7" fill="${app.skin}"/>
    ${hair}
    <path d="M8 56 L11 30 Q12 22 20 22 Q28 22 29 30 L32 56" stroke="${app.skin}" stroke-width="${stroke}" fill="none" stroke-linecap="round"/>
    <path d="M11 28 L4 38 M29 28 L36 38" stroke="${app.skin}" stroke-width="${stroke}" stroke-linecap="round"/>
  </svg>`;
}

function buildSilhouetteLG(app){
  app = app || DEFAULT_APPEARANCE;
  const stroke = (4 * buildMult(app.build)).toFixed(1);
  const hair = app.hair === 'none' ? '' : `<path d="M12 8 Q20 -3 28 8" stroke="${app.hair}" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.82"/>`;
  return `<svg width="64" height="118" viewBox="0 0 40 74" fill="none" xmlns="http://www.w3.org/2000/svg">

    <path d="M7 74 L10 38 Q11 28 20 28 Q29 28 30 38 L33 74" stroke="${app.skin}" stroke-width="${stroke}" fill="none" stroke-linecap="round" opacity="0.82"/>
    <path d="M10 35 L2 48 M30 35 L38 48" stroke="${app.skin}" stroke-width="${stroke}" stroke-linecap="round" opacity="0.82"/>
    <path d="M14 74 L13 56 M26 74 L27 56" stroke="${app.skin}" stroke-width="${stroke}" stroke-linecap="round" opacity="0.82"/>

}

function buildScoutNote(f){
  const notes = [];
  if(f.potential >= 75) notes.push(`elite long-term upside`);
  else if(f.potential >= 60) notes.push(`solid growth projection`);
  else notes.push(`modest ceiling, will need to outwork it`);

  if(f.injury <= 9) notes.push(`worryingly fragile early`);
  else if(f.injury >= 16) notes.push(`built like he doesn't break`);

  if(f.superstar >= 65) notes.push(`already has the "it" factor a promoter dreams about`);
  else if(f.superstar <= 25) notes.push(`will have to win crowds the hard way, on results alone`);

  return `${state.name} projects as a ${DISCIPLINE_NAMES[f.primaryDisc]} out of ${state.settlement}, ${f.province.name} — ${notes.join('; ')}. Personality reads ${f.trait.toLowerCase()}. Recommend assignment to the nearest Fight Pit for Juvenile development.`;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  const startBtn = document.getElementById('start-btn');
  if(startBtn) startBtn.onclick = ()=>{ inheritance = null; state.step = 1; render(); };

  const viewRosterBtn = document.getElementById('view-roster-btn');
  if(viewRosterBtn) viewRosterBtn.onclick = ()=>{ state.screen = 'roster'; render(); };

  const nameInput = document.getElementById('name-input');
  if(nameInput) nameInput.oninput = (e)=>{ state.name = e.target.value; updateNextBasicsDisabled(); };

  document.querySelectorAll('.province-card').forEach(card=>{
    card.onclick = ()=>{
      state.provinceId = card.dataset.prov;
      state.settlement = '';
      render();
    };
  });

  const settlementInput = document.getElementById('settlement-input');
  if(settlementInput) settlementInput.onchange = (e)=>{ state.settlement = e.target.value; updateNextBasicsDisabled(); };

  const heightInput = document.getElementById('height-input');
  if(heightInput) heightInput.oninput = (e)=>{ state.heightIn = parseInt(e.target.value); render(); };

  const weightInput = document.getElementById('weight-input');
  if(weightInput) weightInput.oninput = (e)=>{ state.weightLb = parseInt(e.target.value); render(); };

  const nextBasics = document.getElementById('next-basics');
  if(nextBasics) nextBasics.onclick = ()=>{ if(state.name && state.provinceId && state.settlement){ state.step = 2; render(); } };

  document.querySelectorAll('[data-qopt]').forEach(btn=>{
    btn.onclick = ()=>{
      const qi = state.step - 2;
      const oi = parseInt(btn.dataset.qopt);
      state.answers[qi] = QUESTIONS[qi].options[oi];
      state.step += 1;
      render();
    };
  });

  document.querySelectorAll('[data-tune]').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.tune;
      const dir = parseInt(btn.dataset.dir);
      const used = sumAlloc(state.tuningAlloc);
      const base = fighterCache.stats[key];
      const alloc = state.tuningAlloc[key] || 0;
      const ceiling = bandCeiling(fighterCache.age, fighterCache.talentTier);
      if(dir > 0){
        if(used < TUNING_POOL_TOTAL && base + alloc < ceiling){ state.tuningAlloc[key] = alloc + 1; }
      } else {
        if(alloc > 0){ state.tuningAlloc[key] = alloc - 1; }
      }
      render();
    };
  });

  const applyTuningBtn = document.getElementById('apply-tuning');
  if(applyTuningBtn) applyTuningBtn.onclick = ()=>{
    const ceiling = bandCeiling(fighterCache.age, fighterCache.talentTier);
    Object.keys(state.tuningAlloc).forEach(key=>{
      fighterCache.stats[key] = clamp(fighterCache.stats[key] + (state.tuningAlloc[key] || 0), 1, ceiling);
    });
    state.step += 1;
    render();
  };

  const restartBtn = document.getElementById('restart-btn');
  if(restartBtn) restartBtn.onclick = ()=>{
    Object.assign(state, { step:0, name:'', provinceId:null, settlement:'', heightIn:60, weightLb:100, qIndex:0, answers:[], saved:false,
      tuningAlloc:{ speed:0, quickness:0, toughness:0, power:0, agility:0 },
      appearance:{ skin:'#C68642', hair:'#2B1B12', build:'athletic' } });
    fighterCache = null;
    inheritance = null;
    render();
  };

  const confirmBtn = document.getElementById('confirm-btn');
  if(confirmBtn) confirmBtn.onclick = ()=>{
    const statusEl = document.getElementById('save-status');
    const f = fighterCache;
    if(!f){ return; }
    const record = {
      id: 'fighter_' + Date.now() + '_' + Math.floor(Math.random()*1000),
      name: state.name,
      age: f.age,
      talentTier: f.talentTier,
      provinceId: f.province.id,
      settlement: state.settlement,
      heightIn: state.heightIn,
      weightLb: state.weightLb,
      stats: f.stats,
      potential: f.potential,
      injury: f.injury,
      superstar: f.superstar,
      primaryDisc: f.primaryDisc,
      secondaryDisc: f.secondaryDisc,
      trait: f.trait,
      createdAt: new Date().toISOString(),
      mate: null,
      appearance: { ...state.appearance },
      childrenIds: [],
      parentId: f.legacy ? f.legacy.parentId : null,
      parentName: f.legacy ? f.legacy.parentName : null,
    };
    const ok = addFighterToRoster(record);
    if(ok && f.legacy){
      const roster = loadRoster();
      const parent = roster.find(r=> r.id === f.legacy.parentId);
      if(parent){
        parent.childrenIds = parent.childrenIds || [];
        parent.childrenIds.push(record.id);
        saveRoster(roster);
      }
      inheritance = null;
    }
    if(ok){
      state.saved = true;
      lastConfirmedRecord = record;
      if(statusEl){ statusEl.textContent = '✓ Saved to roster locally.'; statusEl.classList.remove('error'); }
      render();
    } else {
      if(statusEl){ statusEl.textContent = '✗ Save failed — storage may be full or unavailable in this browser.'; statusEl.classList.add('error'); }
    }
  };

  const gotoRosterBtn = document.getElementById('goto-roster-btn');
  if(gotoRosterBtn) gotoRosterBtn.onclick = ()=>{ state.screen = 'roster'; render(); };

  const beginStoryBtn = document.getElementById('begin-story-btn');
  if(beginStoryBtn) beginStoryBtn.onclick = ()=>{ if(lastConfirmedRecord) startCutscene(lastConfirmedRecord); };

  const revealNameInput = document.getElementById('reveal-name-input');
  if(revealNameInput) revealNameInput.oninput = (e)=>{
    state.name = e.target.value;
    const fcName = document.querySelector('.fc-name');
    if(fcName) fcName.textContent = state.name || 'UNNAMED FIGHTER';
  };

  const buildInput = document.getElementById('build-input');
  if(buildInput) buildInput.onchange = (e)=>{ state.appearance.build = e.target.value; render(); };

  const revealHeightInput = document.getElementById('reveal-height-input');
  if(revealHeightInput) revealHeightInput.oninput = (e)=>{ state.heightIn = parseInt(e.target.value); render(); };

  const revealWeightInput = document.getElementById('reveal-weight-input');
  if(revealWeightInput) revealWeightInput.oninput = (e)=>{ state.weightLb = parseInt(e.target.value); render(); };

  document.querySelectorAll('[data-skin]').forEach(btn=>{
    btn.onclick = ()=>{ state.appearance.skin = btn.dataset.skin; render(); };
  });

  document.querySelectorAll('[data-hair]').forEach(btn=>{
    btn.onclick = ()=>{ state.appearance.hair = btn.dataset.hair; render(); };
  });

  // animate stat bars on reveal
  document.querySelectorAll('.stat-fill').forEach((el,i)=>{
    const target = el.dataset.target;
    setTimeout(()=>{ el.style.width = target + '%'; }, 150 + i*90);
  });
}

function updateNextBasicsDisabled(){
  const btn = document.getElementById('next-basics');
  if(btn) btn.disabled = !(state.name && state.provinceId && state.settlement);
}

render();
</script>
</body>
</html>
