<!DOCTYPE html>

<style>

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at top, #241D17 0%, #1B1714 55%, #14110D 100%);
    color:var(--bone); font-family:var(--body); min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:32px 16px 80px; line-height:1.4;
  }
  .app{ width:100%; max-width:820px; }
  .ticket-header{
    background:var(--bg-panel); border:1px solid var(--line); border-bottom:none; padding:18px 24px;

  .ticket-title{ font-family:var(--display); font-size:24px; letter-spacing:1px; color:var(--bone); text-transform:uppercase; }
  .ticket-sub{ font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; }
  .panel{ background:var(--bg-panel); border:1px solid var(--line); border-top:none; padding:32px; min-height:420px; }
  .section-label{
    font-family:var(--label); font-size:12px; letter-spacing:2.5px; text-transform:uppercase; color:var(--brass);
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }
  .btn{
    font-family:var(--label); letter-spacing:1.5px; text-transform:uppercase; font-size:13px; font-weight:500;
    padding:13px 28px; border:1px solid var(--brass); background:transparent; color:var(--brass); cursor:pointer; transition:all .15s ease;
  }
  .btn:hover{ background:var(--brass); color:var(--bg-base); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .btn-primary{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .btn-primary:hover{ background:#C03F32; border-color:#C03F32; color:var(--bone); }
  .btn-row{ display:flex; justify-content:space-between; margin-top:24px; gap:12px; flex-wrap:wrap; }
  .empty-note{ text-align:center; padding:50px 20px; color:var(--muted); font-family:var(--body); font-size:14px; }
  .stub-screen{ text-align:center; padding:24px 10px 10px; }
  .stub-screen h2{ font-family:var(--display); font-size:24px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-red); margin-bottom:14px; }
  .stub-screen p{ font-family:var(--body); color:var(--bone-dim); font-size:14px; max-width:460px; margin:0 auto 18px; }

  /* fighter select */
  .fighter-grid{ display:grid; gap:10px; }
  .fighter-row{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--fr-color, var(--brass));
    padding:13px 16px; display:flex; align-items:center; gap:14px;

  .fr-avatar svg{ width:100%; height:100%; }
  .fr-name{ font-family:var(--label); font-size:15px; font-weight:600; color:var(--bone); }
  .fr-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px; }
  .fr-status{ margin-left:auto; font-family:var(--label); font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); text-align:right; }
  .fr-btn{

  .city-head-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; }
  .block-grid{ display:grid; grid-template-columns:repeat(var(--gcols,4), 1fr); gap:8px; margin-bottom:20px; }
  .block-cell{

function calcOVR(stats){ return Math.round((stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5); }

const AGE_BAND_TYPICAL      = { 12:15, 13:18, 14:21, 15:25, 16:28, 17:31, 18:35 };
const AGE_BAND_PRODIGY      = { 12:20, 13:23, 14:26, 15:29, 16:32, 17:34, 18:35 };
const AGE_BAND_GENERATIONAL = { 12:30, 13:40, 14:50, 15:60, 16:70, 17:80, 18:88 };
function bandCeiling(age, tier){
  const table = tier==='generational' ? AGE_BAND_GENERATIONAL : tier==='prodigy' ? AGE_BAND_PRODIGY : AGE_BAND_TYPICAL;
  return table[clamp(age, 12, 18)];
}
// Same earned-growth pattern as the rest of the game: win, finish, and beating someone
// tougher than you are the levers. Returns which stats actually changed for display.
function growFighterStats(f, playerWon, method, oppOVR){
  const ceiling = bandCeiling(f.age||12, f.talentTier||'normal');
  const potentialFactor = clamp((f.potential || 50) / 99, 0, 1);
  const ownOVR = calcOVR(f.stats);
  let growthTicks = 0;
  if(playerWon){
    growthTicks += 1;
    if(method !== 'Decision') growthTicks += 1;
    if(oppOVR > ownOVR) growthTicks += 1;
  } else if(Math.random() < 0.3){
    growthTicks += 1;
  }
  growthTicks = Math.round(growthTicks * (0.4 + potentialFactor * 0.9));
  const before = { ...f.stats };
  const statKeys = ['speed','quickness','toughness','power','agility'];
  for(let i=0;i<growthTicks;i++){
    const key = pick(statKeys);
    const current = f.stats[key];
    if(current >= ceiling) continue;
    const room = 1 - (current/ceiling);
    if(Math.random() < 0.45 + room*0.4) f.stats[key] = clamp(current+1, 1, ceiling);
  }
  const deltas = {};
  statKeys.forEach(k=>{ if(f.stats[k] !== before[k]) deltas[k] = f.stats[k]-before[k]; });
  return deltas;
}

/* ============================ FIGHT SIMULATION ENGINE ============================ */
/* Ported from the Fight Pit — same math, same feel, so a Junior League team game
   resolves consistently with everything else in the world. */

const MATCHUP = {
  boxer:    { boxer:0, brawler:1, wrestler:-1, sambo:-1, mma:-1, karate:1, judo:-1, catch:-1 },
  brawler:  { boxer:-1, brawler:0, wrestler:-1, sambo:-2, mma:-1, karate:0, judo:-2, catch:-1 },
  wrestler: { boxer:1, brawler:1, wrestler:0, sambo:-1, mma:0, karate:1, judo:0, catch:1 },
  sambo:    { boxer:1, brawler:2, wrestler:1, sambo:0, mma:0, karate:1, judo:-1, catch:0 },
  mma:      { boxer:1, brawler:1, wrestler:0, sambo:0, mma:0, karate:1, judo:0, catch:1 },
  karate:   { boxer:-1, brawler:0, wrestler:-1, sambo:-1, mma:-1, karate:0, judo:-1, catch:0 },
  judo:     { boxer:1, brawler:2, wrestler:0, sambo:1, mma:0, karate:1, judo:0, catch:1 },
  catch:    { boxer:1, brawler:1, wrestler:-1, sambo:0, mma:-1, karate:0, judo:-1, catch:0 },
};
const MATCHUP_SCALE = 5;
function matchupBonus(myDisc, oppDisc){ const row=MATCHUP[myDisc]; return row && row[oppDisc]!==undefined ? row[oppDisc]*MATCHUP_SCALE : 0; }
function winProbability(effA, effB){ return 1/(1+Math.pow(10, -(effA-effB)/12)); }
function weightedPick(weights){
  const r = Math.random(); let acc = 0;
  for(const [k,w] of Object.entries(weights)){ acc += w; if(r <= acc) return k; }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

function fillTpl(text, map){ return text.replace(/{(\w+)}/g, (_,k)=> map[k]!==undefined ? map[k] : ''); }

function submissionWeight(fA, fB){
  const grapplers = [fA.primaryDisc, fB.primaryDisc].filter(d=>GRAPPLING_DISC.includes(d)).length;
  const mmaCount = [fA.primaryDisc, fB.primaryDisc].filter(d=>d==='mma').length;
  if(grapplers>=1) return 0.30 + grapplers*0.08;
  if(mmaCount>=1) return 0.15;
  return 0.03; // pure strikers — rare scrambles still happen
}
function computeFinishWeights(gap, fA, fB){
  let base;
  if(gap >= 20) base = { KO:0.38, TKO:0.34, Decision:0.26, DQ:0.02 };
  else if(gap >= 10) base = { KO:0.20, TKO:0.32, Decision:0.46, DQ:0.02 };
  else base = { KO:0.09, TKO:0.24, Decision:0.65, DQ:0.02 };
  const subW = submissionWeight(fA, fB);
  const strikeShare = base.KO + base.TKO;
  const takeFromStrikes = Math.min(strikeShare*0.65, subW);
  const scale = strikeShare>0 ? (strikeShare - takeFromStrikes) / strikeShare : 1;
  base.KO *= scale; base.TKO *= scale;
  base.Submission = takeFromStrikes;
  return base;
}

function simulateBout(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const homeBonusA = ctx && ctx.hometownPit ? 4 : 0;
  const effA = ovrA + mbA + homeBonusA;
  const effB = ovrB + mbB;
  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;
  const gap = Math.abs(effA - effB);

  const finishWeights = computeFinishWeights(gap, fA, fB);
  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.18, 2:0.34, 3:0.48}), 10);
  const floor = (ctx && ctx.arena && ctx.arena.floor) || 'sport court';
  const isGrappleFinish = method === 'Submission';
  const log = [];

  for(let r=1; r<=3; r++){
    log.push({ type:'round-header', round:r });
    const map = { A: fA.name, B: fB.name, floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma) };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });

    if(method !== 'Decision' && r === finishRound){
      const wmap = { A: fA.name, B: fB.name, W: winner.name, L: loser.name, floor, sub: pick(SUBMISSION_TYPES) };
      if(isGrappleFinish){
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_GRAPPLE), wmap) });
        log.push({ type:'line', text: fillTpl(pick(CONTROL_LINES), wmap) });
        log.push({ type:'line', text: fillTpl(pick(SUB_LOCKED_LINES), wmap) });
        log.push({ type:'finish', text: fillTpl(pick(FINISH_SUBMISSION), wmap) });
      } else if(method === 'DQ'){
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_STRIKE), wmap) });
        log.push({ type:'finish', text: fillTpl(pick(FINISH_DQ), wmap) });
      } else {
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_STRIKE), wmap) });
        log.push({ type:'line', text: fillTpl(pick(KNOCKDOWN_LINES), wmap) });
        log.push({ type:'line', text: fillTpl(pick(BARRAGE_LINES), wmap) });
        const lib = method === 'KO' ? FINISH_KO : FINISH_TKO;
        log.push({ type:'finish', text: fillTpl(pick(lib), wmap) });
      }
      break;
    } else {
      // Non-finish round — a chance of a dramatic scare that doesn't end the fight.
      if(Math.random() < 0.22){
        const scareWinnerIsA = Math.random() < probA;
        const smap = { A: fA.name, B: fB.name, W: scareWinnerIsA?fA.name:fB.name, L: scareWinnerIsA?fB.name:fA.name, floor };
        log.push({ type:'line', text: fillTpl(pick(SCARE_KNOCKDOWN), smap) });
        log.push({ type:'line', text: fillTpl(pick(SCARE_RECOVERY), smap) });
      } else {
        log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS), map) });
      }
    }
  }
  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }
  return { winner, loser, method, finishRound, ovrA, ovrB, effA, effB, probA, log };
}

  catch(err){ console.error('IIFL roster save failed:', err); return false; }
}
function ensureFighterDefaults(f){
  if(!f.record) f.record = { wins:0, losses:0 };
  if(!f.fightLog) f.fightLog = [];
  if(!f.age) f.age = 12;
  if(!f.talentTier) f.talentTier = 'normal';
  if(f.wallet === undefined) f.wallet = 10; // starting bankroll
  if(f.fame === undefined) f.fame = 0;
  if(f.freeRoamPitKey === undefined) f.freeRoamPitKey = null; // "provinceId|city|pitId" — signed home pit
  if(f.freeRoamFightCount === undefined) f.freeRoamFightCount = 0;
  if(f.agentType === undefined) f.agentType = null;
  return f;
}
function getRoster(){
  const roster = loadRoster().map(ensureFighterDefaults);
  saveRoster(roster);
  return roster;
}
function getFighterById(id){ return getRoster().find(f=> f.id === id); }
function updateFighter(id, mutateFn){
  const roster = loadRoster().map(ensureFighterDefaults);
  const f = roster.find(r=> r.id === id);
  if(f){ mutateFn(f); saveRoster(roster); }
  return f;
}

function loadRoamState(){
  try{ const raw = localStorage.getItem(ROAM_STATE_KEY); return raw ? JSON.parse(raw) : { pits:{}, grids:{} }; }
  catch(err){ console.error('IIFL free roam state load failed:', err); return { pits:{}, grids:{} }; }
}
function saveRoamState(s){
  try{ localStorage.setItem(ROAM_STATE_KEY, JSON.stringify(s)); return true; }
  catch(err){ console.error('IIFL free roam state save failed:', err); return false; }
}

const PIT_COUNT_BY_TIER = { Capital:5, City:3, Town:2, Village:1 };
const PIT_NAMES = [
  'The Bone Yard','Cinder Pit','The Rust Bucket','Ironback Arena','The Splinter Yard',"Dead Man's Circle",
  'The Meat Locker','Blood Alley','The Sawdust Ring','Cracked Anvil','The Gutter','Nightfall Pit','The Iron Cage',
  'Fist City','The Butcher Block','Lowlife Arena','The Dust Bowl','Broken Jaw Alley','The Pit Below',
  'Salt Mine Arena','The Choke Point',"Widow's Ring",'The Concrete Jungle','Last Call Arena','The Graveyard Shift',
  'The Tin Roof','Drydock Pit','Foghorn Yard','The Anvil Room','Hollow Bell Hall','The Splinter Room','Cutthroat Court',
];
const BOSS_TITLES = ["The Ledger","Two Fists","The Butcher","Iron","Snake Eyes","The Preacher","Cold Blood","The Banker","Old Scratch","The Undertaker","No Mercy","The Widow","One Punch","The Vulture","Straight Razor"];

function weightClassOf3(weightLb){ return weightClassOf(weightLb); }

function generatePitFighter(provinceId, settlementName, weightClass){
  const wRange = { Light:[75,98], Middle:[99,117], Heavy:[118,140] }[weightClass] || [90,120];
  const age = rand(12,17);
  const r = Math.random();
  const talentTier = r<0.015 ? 'generational' : r<0.18 ? 'prodigy' : 'normal';
  const ceilings = { normal:35, prodigy:35, generational:65 };
  const ceiling = Math.round((ceilings[talentTier]||35) * (age/18));
  const target = rand(Math.round(ceiling*0.3), Math.max(Math.round(ceiling*0.85),4));
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{ stats[k] = clamp(target+rand(-5,5), 3, ceiling+5); });
  const wins = rand(0, age-11); const losses = rand(0, Math.max(1,age-12));
  return {
    id: 'pitfighter_' + Date.now() + '_' + rand(0,999999),
    name: pickName(provinceId, settlementName),
    age, weightLb: rand(wRange[0],wRange[1]), weightClass,
    primaryDisc: pickWeightedDiscipline(PROVINCES.find(p=>p.id===provinceId)),
    stats, talentTier,
    allTimeRecord: { wins, losses },
    appearance: { skin: pick(SKIN_TONES), hair: pick(HAIR_COLORS), build: pick(['lean','athletic','stocky']) },
  };
}

// Roster depth per pit scales with the city's actual population, split across however
// many pits that city supports — bigger cities mean deeper, more numerous pits.
function pitRosterSize(population, pitCount){
  const perPit = population / pitCount;
  return clamp(Math.round(perPit/2200) + rand(-2,3), 5, 24);
}

function ensureCityPits(provinceId, settlementName){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  if(s.pits[key]) return s.pits[key];
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  const tier = entry ? entry.tier : 'Village';
  const population = entry ? entry.population : 800;
  const pitCount = PIT_COUNT_BY_TIER[tier] || 1;
  const usedNames = new Set();
  const pits = [];
  for(let i=0;i<pitCount;i++){
    let pitName = pick(PIT_NAMES);
    let guard=0; while(usedNames.has(pitName) && guard<30){ pitName = pick(PIT_NAMES); guard++; }
    usedNames.add(pitName);
    const rosterSize = pitRosterSize(population, pitCount);
    const roster = [];
    for(let j=0;j<rosterSize;j++){
      const wc = pick(['Light','Middle','Heavy']);
      roster.push(generatePitFighter(provinceId, settlementName, wc));
    }
    pits.push({
      id: 'pit_' + key.replace(/\s+/g,'_') + '_' + i,
      name: pitName,
      bossName: pickName(provinceId, settlementName),
      bossTitle: pick(BOSS_TITLES),
      reputationRequired: i===0 ? 0 : Math.round(8 + i*11 + rand(-2,3)),
      roster,
    });
  }
  s.pits[key] = pits;
  saveRoamState(s);
  return pits;
}

// Persists a win/loss back onto a specific pit-roster fighter — without this, every
// registered fighter would stay frozen at their generated starting record forever.
function updateOpponentRecord(provinceId, settlementName, pitId, opponentId, opponentWon){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  const pits = s.pits[key];
  if(!pits) return;
  const pit = pits.find(p=>p.id===pitId);
  if(!pit) return;
  const opp = pit.roster.find(r=>r.id===opponentId);
  if(!opp) return;
  if(opponentWon) opp.allTimeRecord.wins += 1; else opp.allTimeRecord.losses += 1;
  saveRoamState(s);
}

const ADVICE_LINES_PIT = [
  "There's a fight pit not far from here — {pit} takes on new blood most nights.",
  "You want to fight? Ask around for {pit}. They're always looking for fresh faces.",
  "Heard {pit} is where the real action is. Boss there doesn't mess around.",
];
const ADVICE_LINES_TRAINING = [
  "Training? Nobody worth your time round here yet. Word is that's coming.",
  "You could use a trainer. Nothing set up in this city yet though — soon, they say.",
  "Big-name trainers exist, but they won't waste time on someone nobody's heard of. Yet.",

  "You look like a betting type. Nothing to bet on around here yet, though.",

const NPC_ROLE_LINES = { pit: ADVICE_LINES_PIT, training: ADVICE_LINES_TRAINING, games: ADVICE_LINES_GAMES };

function generateNpc(provinceId, settlementName, role, pits){
  const name = pickName(provinceId, settlementName);
  const lineTemplate = pick(NPC_ROLE_LINES[role]);
  const line = lineTemplate.replace('{pit}', pits.length ? pick(pits).name : 'one of the local pits');
  return { name, role, line };
}

const GRID_SIZE_BY_TIER = { Capital:5, City:4, Town:3, Village:2 };

function ensureCityGrid(provinceId, settlementName){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  if(s.grids[key]) return s.grids[key];
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  const tier = entry ? entry.tier : 'Village';
  const size = GRID_SIZE_BY_TIER[tier] || 2;
  const pits = ensureCityPits(provinceId, settlementName);

  const cells = [];
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) cells.push({ row:r, col:c });
  // shuffle and place locations, keep start cell (center-ish) empty
  const startCell = { row: Math.floor(size/2), col: Math.floor(size/2) };
  const available = cells.filter(c=> !(c.row===startCell.row && c.col===startCell.col));
  for(let i=available.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [available[i],available[j]]=[available[j],available[i]]; }

  const locations = [];
  let idx = 0;
  pits.forEach((pit,i)=>{
    if(idx < available.length){ locations.push({ ...available[idx], type:'pit', pitId: pit.id }); idx++; }
  });
  const npcCount = clamp(Math.round(size), 2, 5);
  const npcRoles = ['pit','training','games'];
  for(let i=0;i<npcCount && idx<available.length;i++){
    locations.push({ ...available[idx], type:'npc', npc: generateNpc(provinceId, settlementName, npcRoles[i%npcRoles.length], pits) });
    idx++;
  }
  if(idx < available.length){ locations.push({ ...available[idx], type:'minigames' }); idx++; }

  const grid = { size, startCell, locations };
  s.grids[key] = grid;
  saveRoamState(s);
  return grid;
}

const AGENT_TYPES = [
  { id:'pitmaster', label:'The Pit Master', skill:4, desc:"Runs the show. Knows every fighter in town cold — the real numbers." },
  { id:'streetguy', label:'A Street Guy', skill:3, desc:"Been around, knows who's who. Solid read, not exact." },
  { id:'brother', label:'Your Older Brother', skill:2, desc:"Believes in you more than he actually knows fighters." },
  { id:'friend', label:'A Friend, A Year Older', skill:1, desc:"Means well. Doesn't really know what he's talking about." },
];
function agentTypeInfo(id){ return AGENT_TYPES.find(a=>a.id===id) || AGENT_TYPES[3]; }

function generateScoutingReport(f, opp, agentSkill){
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  const mbF = matchupBonus(f.primaryDisc, opp.primaryDisc);
  const trueProb = winProbability(ovrF+mbF, ovrOpp);

  if(agentSkill >= 4){
    const styleNote = mbF>0 ? 'Your style has a real edge here.' : mbF<0 ? 'The matchup leans against you stylistically.' : 'Styles are roughly neutral.';
    return `Real numbers: you've got about a ${Math.round(trueProb*100)}% shot. ${styleNote}`;
  }
  if(agentSkill === 3){
    const band = trueProb>=0.65 ? 'a good chance' : trueProb>=0.45 ? "a real shot, could go either way" : 'an uphill fight';
    const statLean = ovrF>ovrOpp ? 'You look sharper overall.' : 'He looks like the tougher matchup on paper.';
    return `I'd call this ${band}. ${statLean}`;
  }
  const errRate = agentSkill===2 ? 0.25 : 0.45;
  const actuallyGood = trueProb >= 0.5;
  const saysGood = Math.random()<errRate ? !actuallyGood : actuallyGood;
  if(agentSkill===2) return saysGood ? "I like your chances on this one." : "Honestly? Tough matchup. Be careful out there.";
  return saysGood ? "You got this, easy! Don't even worry about it." : "I dunno man... this guy looks scary.";
}

        <button class="fr-btn" data-scout="${i}" style="margin-top:8px; width:100%;">🔍 Scout Report</button>
        ${report ? `<p style="font-family:var(--body); font-size:11.5px; color:var(--bone-dim); margin-top:8px; text-align:left; line-height:1.5;"><span style="color:var(--brass); font-family:var(--label); font-size:9.5px; letter-spacing:1px; text-transform:uppercase;">${agent.label} says:</span><br>"${report}"</p>` : ''}
        <button class="btn btn-primary" data-pick-opponent="${i}" style="margin-top:10px; width:100%; padding:9px;">Fight Him</button>
      </div>
    `;
  }).join('');
  const pit = currentPits().find(p=>p.id===state.fightPitId);
  const entryFee = 2 + Math.round(pit.reputationRequired/5);
  return `
    <div class="section-label">${pit.name} — Pick Your Opponent</div>
    <p style="font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:16px;">Entry fee: $${entryFee} · Your wallet: $${f.wallet} · Corner: ${agent.label}</p>
    <div class="tape-grid" style="grid-template-columns:repeat(${state.opponentChoices.length},1fr);">${cards}</div>
    <div class="btn-row"><button class="btn" id="back-to-walk">← Back Out</button><span></span></div>
  `;
}

function renderPreview(){
  const f = getFighterById(state.fighterId);
  const opp = state.opponent;
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  const scaleMax = Math.max(ovrF, ovrOpp, 20) * 1.3;
  function statRow(label, valF, valOpp){
    return `<div style="margin-bottom:10px;"><div class="round-label" style="text-align:center;">${label}</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div style="text-align:right; font-family:var(--mono); font-size:11px; color:var(--bone);">${valF}</div>
        <div style="font-family:var(--mono); font-size:11px; color:var(--bone);">${valOpp}</div>
      </div></div>`;
  }
  return `
    <div class="section-label">Tale of the Tape</div>
    <div class="tape-grid">
      <div class="tape-side"><div class="tape-avatar">${buildSilhouetteSM(f.appearance)}</div><div class="tape-name">${f.name}</div><div class="tape-disc">${DISCIPLINE_NAMES[f.primaryDisc]}</div><div class="tape-ovr">${ovrF}</div></div>
      <div class="tape-side"><div class="tape-avatar">${buildSilhouetteSM(opp.appearance)}</div><div class="tape-name">${opp.name}</div><div class="tape-disc">${DISCIPLINE_NAMES[opp.primaryDisc]}</div><div class="tape-ovr">${ovrOpp}</div></div>
    </div>
    ${statRow('SPEED', f.stats.speed, opp.stats.speed)}
    ${statRow('QUICKNESS', f.stats.quickness, opp.stats.quickness)}
    ${statRow('TOUGHNESS', f.stats.toughness, opp.stats.toughness)}
    ${statRow('POWER', f.stats.power, opp.stats.power)}
    ${statRow('AGILITY', f.stats.agility, opp.stats.agility)}
    <div class="btn-row"><span></span><button class="btn btn-primary" id="enter-arena">Enter the Pit →</button></div>
  `;
}

function renderBout(){
  const r = state.boutResult;
  const visible = r.log.slice(0, state.revealedCount);
  const logHtml = visible.map(entry=>{
    if(entry.type==='round-header') return `<div class="round-label">ROUND ${entry.round}</div>`;
    if(entry.type==='finish') return `<div class="pick-row" style="border-color:var(--ink-red);"><span style="color:var(--ink-red); font-weight:600;">${entry.text}</span></div>`;
    if(entry.type==='decision') return `<div class="pick-row" style="border-color:var(--brass-dim);"><span style="color:var(--brass);">${entry.text}</span></div>`;
    return `<div class="pick-row"><span>${entry.text}</span></div>`;
  }).join('');
  const done = state.revealedCount >= r.log.length;
  return `
    <div>${logHtml}</div>
    <div class="btn-row"><span></span><button class="btn btn-primary" id="advance-bout">${done?'Confirm Result →':'Next →'}</button></div>
  `;
}

function renderFightResult(){
  const f = getFighterById(state.fighterId);
  const r = state.boutResult;
  const res = state.lastResult;
  const won = res.won;
  const statLabels = { speed:'SPD', quickness:'QCK', toughness:'TGH', power:'PWR', agility:'AGL' };
  const growthEntries = Object.entries(res.deltas || {});

  return `
    <div class="stub-screen">
      <h2>${won?'YOU WIN':'YOU LOSE'}</h2>
      <p>${won ? f.name+' defeats '+state.opponent.name : state.opponent.name+' defeats '+f.name} by ${res.method}.</p>
    </div>
    <div class="mt-record-grid" style="grid-template-columns:1fr 1fr; margin-bottom:14px;">
      <div class="mt-record-box"><div class="mrv" style="color:var(--good);">+$${res.prize}</div><div class="mrl">Earned</div></div>
      <div class="mt-record-box"><div class="mrv">+${res.fameGain}</div><div class="mrl">Fame</div></div>
    </div>
    ${growthEntries.length ? `
      <div class="section-label">Skill Growth</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:18px;">
        ${growthEntries.map(([k,v])=>`<span class="wallet-badge" style="color:var(--good);">${statLabels[k]} +${v}</span>`).join('')}
      </div>
    ` : `<p style="font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; margin-bottom:18px;">No stat growth this fight.</p>`}
    ${state.flashMessage ? `<p style="font-family:var(--mono); font-size:12px; color:var(--brass); text-align:center; margin-bottom:14px;">${state.flashMessage}</p>` : ''}
    <div class="btn-row" style="justify-content:center;"><button class="btn btn-primary" id="back-to-walk-from-result">Continue →</button></div>
  `;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  document.querySelectorAll('[data-select-fighter]').forEach(btn=>{
    btn.onclick = ()=>{
      const f = getFighterById(btn.dataset.selectFighter);
      state.fighterId = f.id;
      if(f.freeRoamPitKey){
        const [pid, city] = f.freeRoamPitKey.split('|');
        state.provinceId = pid; state.settlementName = city;
      } else {
        state.provinceId = f.provinceId; state.settlementName = f.settlement;
      }
      const grid = ensureCityGrid(state.provinceId, state.settlementName);
      state.position = { ...grid.startCell };
      state.screen = 'city-walk';
      render();
    };
  });

  const backFromWalk = document.getElementById('back-to-select-from-walk');
  if(backFromWalk) backFromWalk.onclick = ()=>{ state.screen='select'; render(); };

  document.querySelectorAll('[data-walk-cell]').forEach(cell=>{
    cell.onclick = ()=>{
      const [r,c] = cell.dataset.walkCell.split('|').map(Number);
      const dr = Math.abs(state.position.row-r), dc = Math.abs(state.position.col-c);
      if(dr>1 || dc>1) return; // not adjacent, can't walk there directly
      if(dr===0 && dc===0) return;
      state.position = { row:r, col:c };
      const grid = currentGrid();
      const loc = grid.locations.find(l=>l.row===r && l.col===c);
      if(loc){
        state.visitingLocation = loc;
        if(loc.type==='pit') state.screen = 'loc-pit';
        else if(loc.type==='npc') state.screen = 'loc-npc';
        else if(loc.type==='minigames') state.screen = 'loc-minigames';
      }
      render();
    };
  });

  const backToWalk = document.getElementById('back-to-walk');
  if(backToWalk) backToWalk.onclick = ()=>{ state.screen='city-walk'; render(); };

  const findAFight = document.getElementById('find-a-fight');
  if(findAFight) findAFight.onclick = ()=>{ state.screen='choose-pit-to-fight'; render(); };

  const signHere = document.getElementById('sign-here');
  if(signHere) signHere.onclick = ()=>{
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
    updateFighter(state.fighterId, f=>{ f.freeRoamPitKey = cityKey; });
    const f = getFighterById(state.fighterId);
    if(!f.agentType){ state.screen = 'choose-agent'; render(); return; }
    state.screen = 'city-walk';
    render();
  };

  document.querySelectorAll('[data-pick-agent]').forEach(card=>{
    card.onclick = ()=>{
      updateFighter(state.fighterId, f=>{ f.agentType = card.dataset.pickAgent; });
      state.screen = 'city-walk';
      render();
    };
  });

  function beginFightRegistration(pitId){
    state.scoutedIndex = null;
    const f = getFighterById(state.fighterId);
    const pit = currentPits().find(p=>p.id===pitId);
    const entryFee = 2 + Math.round(pit.reputationRequired/5);
    if(f.wallet < entryFee){
      state.flashMessage = `Can't afford the $${entryFee} entry fee — go win some money first.`;
      state.screen = 'city-walk';
      render();
      return;
    }
    const myWc = weightClassOf(f.weightLb);
    let candidates = pit.roster.filter(r=>r.weightClass===myWc);
    if(candidates.length < 3) candidates = candidates.concat(pit.roster.filter(r=>r.weightClass!==myWc));
    const n = Math.min(opponentChoiceCount(f.freeRoamFightCount), candidates.length || 1);
    const chosen = [];
    const pool = [...candidates];
    for(let i=0;i<n && pool.length;i++){
      const idx = Math.floor(Math.random()*pool.length);
      chosen.push(pool.splice(idx,1)[0]);
    }
    state.fightPitId = pitId;
    state.opponentChoices = chosen;
    state.screen = 'choose-opponent';
    render();
  }

  const registerFight = document.getElementById('register-fight');
  if(registerFight) registerFight.onclick = ()=> beginFightRegistration(registerFight.dataset.pitId);

  document.querySelectorAll('[data-fight-at-pit]').forEach(btn=>{
    btn.onclick = ()=>{ state.scoutedIndex = null; beginFightRegistration(btn.dataset.fightAtPit); };
  });

  document.querySelectorAll('[data-scout]').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.scout, 10);
      state.scoutedIndex = state.scoutedIndex === idx ? null : idx;
      render();
    };
  });

  document.querySelectorAll('[data-pick-opponent]').forEach(card=>{
    card.onclick = ()=>{
      const idx = parseInt(card.dataset.pickOpponent, 10);
      const f = getFighterById(state.fighterId);
      const pit = currentPits().find(p=>p.id===state.fightPitId);
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      updateFighter(state.fighterId, ff=>{ ff.wallet -= entryFee; });
      state.opponent = state.opponentChoices[idx];
      state.arena = { name: pit.name };
      const freshF = getFighterById(state.fighterId);
      state.boutResult = simulateBout(freshF, state.opponent, { arena:{floor:'dirt'}, hometownPit:true });
      state.revealedCount = 0;
      state.screen = 'preview';
      render();
    };
  });

  const enterArena = document.getElementById('enter-arena');
  if(enterArena) enterArena.onclick = ()=>{ state.screen='bout'; render(); };

  const advanceBout = document.getElementById('advance-bout');
  if(advanceBout) advanceBout.onclick = ()=>{
    const r = state.boutResult;
    if(state.revealedCount < r.log.length){
      state.revealedCount = Math.min(r.log.length, state.revealedCount + 1);
      render();
      return;
    }
    const f = getFighterById(state.fighterId);
    const won = r.winner.id === f.id;
    const pit = currentPits().find(p=>p.id===state.fightPitId);
    const entryFee = 2 + Math.round(pit.reputationRequired/5);
    const prize = won ? entryFee*3 + rand(0,5) : Math.round(entryFee*0.5);
    const fameGain = won ? (r.method==='Decision' ? rand(1,2) : rand(2,4)) : (Math.random()<0.2 ? 1 : 0);
    const oppOVR = calcOVR(state.opponent.stats);

    // The opponent's record needs to persist back to the pit roster, or they'd stay
    // frozen at whatever record they were generated with forever.
    updateOpponentRecord(state.provinceId, state.settlementName, pit.id, state.opponent.id, !won);

    let flash = null;
    let deltas = {};
    updateFighter(state.fighterId, ff=>{
      if(won) ff.record.wins += 1; else ff.record.losses += 1;
      ff.fightLog.push({
        tier:'Juvenile', opponent: state.opponent.name, result: won?'W':'L', method:r.method,
        location: `${pit.name}, ${state.settlementName}`, date: new Date().toISOString(),
      });
      ff.wallet += prize;
      ff.fame += fameGain;
      ff.freeRoamFightCount += 1;
      deltas = growFighterStats(ff, won, r.method, oppOVR);
      const nextChoices = opponentChoiceCount(ff.freeRoamFightCount);
      const prevChoices = opponentChoiceCount(ff.freeRoamFightCount-1);
      if(nextChoices > prevChoices) flash = `Word's getting around — you can now pick from ${nextChoices} opponents when you register.`;
      const allPits = currentPits();
      const nextTierPit = allPits.find(p=> p.reputationRequired > (ff.fame-fameGain) && p.reputationRequired <= ff.fame);
      if(nextTierPit) flash = `A face from ${nextTierPit.name} was watching tonight — you're on their radar now.`;
    });
    state.lastResult = { won, prize, fameGain, deltas, method:r.method };
    state.flashMessage = flash;
    state.screen = 'fight-result';
    render();
  };

  const backFromResult = document.getElementById('back-to-walk-from-result');
  if(backFromResult) backFromResult.onclick = ()=>{ state.flashMessage=null; state.screen='city-walk'; render(); };
}

render();
</script>
<div class="version-badge">FREE ROAM · V2 · 2026-07-11</div>
</body>
</html>
