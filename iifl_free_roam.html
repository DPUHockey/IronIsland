<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Island Fight League — Free Roam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1B1714; --bg-panel:#241D17; --bg-raised:#312820; --bg-raised-2:#3A2F25;
    --ink-red:#A6342A; --ink-red-dim:#7C2620; --brass:#C9A23C; --brass-dim:#8E7228;
    --bone:#EDE3CF; --bone-dim:#C9BFA9; --muted:#8B8070; --line:#43392D; --good:#5A8C5C;
    --display:'Anton',sans-serif; --label:'Oswald',sans-serif; --body:'Work Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at top, #241D17 0%, #1B1714 55%, #14110D 100%);
    color:var(--bone); font-family:var(--body); min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:32px 16px 80px; line-height:1.4;
  }
  .app{ width:100%; max-width:820px; }
  .ticket-header{
    background:var(--bg-panel); border:1px solid var(--line); border-bottom:none; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .ticket-eyebrow{ font-family:var(--label); font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--brass); }
  .ticket-title{ font-family:var(--display); font-size:24px; letter-spacing:1px; color:var(--bone); text-transform:uppercase; }
  .ticket-sub{ font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; }
  .panel{ background:var(--bg-panel); border:1px solid var(--line); border-top:none; padding:32px; min-height:420px; }
  .section-label{
    font-family:var(--label); font-size:12px; letter-spacing:2.5px; text-transform:uppercase; color:var(--brass);
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }
  .btn{
    font-family:var(--label); letter-spacing:1.5px; text-transform:uppercase; font-size:13px; font-weight:500;
    padding:13px 28px; border:1px solid var(--brass); background:transparent; color:var(--brass); cursor:pointer; transition:all .15s ease;
  }
  .btn:hover{ background:var(--brass); color:var(--bg-base); }
  .btn:disabled{ opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .btn-primary{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .btn-primary:hover{ background:#C03F32; border-color:#C03F32; color:var(--bone); }
  .btn-row{ display:flex; justify-content:space-between; margin-top:24px; gap:12px; flex-wrap:wrap; }
  .empty-note{ text-align:center; padding:50px 20px; color:var(--muted); font-family:var(--body); font-size:14px; }
  .stub-screen{ text-align:center; padding:24px 10px 10px; }
  .stub-screen h2{ font-family:var(--display); font-size:24px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-red); margin-bottom:14px; }
  .stub-screen p{ font-family:var(--body); color:var(--bone-dim); font-size:14px; max-width:460px; margin:0 auto 18px; }

  /* fighter select */
  .fighter-grid{ display:grid; gap:10px; }
  .pit-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .pit-card{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--pc-color, var(--brass));
    padding:14px 16px; cursor:pointer; transition:all .15s ease;
  }
  .pit-card:hover{ background:var(--bg-raised-2); }
  .pit-name{ font-family:var(--label); font-size:14.5px; font-weight:600; color:var(--bone); }
  .pit-meta{ font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:4px; }
  .np-list-fighters{ font-family:'Special Elite',monospace; font-size:12px; line-height:2; }
  .np-list-fighters .clickable-name, .np-body .clickable-name{ color:#221D14; text-decoration-color:transparent; font-weight:bold; }
  .np-list-fighters .clickable-name:hover, .np-body .clickable-name:hover{ text-decoration-color:#221D14; }
  .fighter-row{
    background:var(--bg-raised); border:1px solid var(--line); border-left:4px solid var(--fr-color, var(--brass));
    padding:13px 16px; display:flex; align-items:center; gap:14px;
  }
  .fr-avatar{ width:30px; height:42px; flex-shrink:0; display:flex; align-items:flex-end; }
  .fr-avatar svg{ width:100%; height:100%; }
  .fr-name{ font-family:var(--label); font-size:15px; font-weight:600; color:var(--bone); }
  .fr-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:2px; }
  .fr-status{ margin-left:auto; font-family:var(--label); font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); text-align:right; }
  .fr-btn{
    font-family:var(--label); font-size:11px; letter-spacing:.5px; text-transform:uppercase; padding:9px 14px;
    border:1px solid var(--line); background:var(--bg-raised-2); color:var(--brass); cursor:pointer; flex-shrink:0;
  }
  .fr-btn:disabled{ opacity:.35; cursor:not-allowed; color:var(--muted); }

  /* city walk */
  .city-head{ text-align:center; padding:16px 10px; background:var(--bg-raised); border:1px solid var(--brass-dim); margin-bottom:20px; }
  .city-head-name{ font-family:var(--display); font-size:26px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); }
  .city-head-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; }
  .block-grid{ display:grid; grid-template-columns:repeat(var(--gcols,4), 1fr); gap:8px; margin-bottom:20px; }
  .block-cell{
    aspect-ratio:1; border:1px solid var(--line); background:var(--bg-raised); display:flex; align-items:center; justify-content:center;
    font-family:var(--label); font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); text-align:center;
    cursor:pointer; transition:all .15s ease; position:relative; padding:4px;
  }
  .block-cell:hover{ background:var(--bg-raised-2); border-color:var(--brass-dim); }
  .block-cell.you{ border-color:var(--ink-red); background:var(--bg-raised-2); color:var(--bone); }
  .block-cell.empty{ cursor:default; opacity:.35; }
  .block-cell.empty:hover{ background:var(--bg-raised); border-color:var(--line); }
  .block-cell .bc-icon{ font-size:18px; display:block; margin-bottom:3px; }
  .block-cell.locked{ opacity:.4; }
  .walk-hint{ font-family:var(--mono); font-size:10.5px; color:var(--muted); text-align:center; margin-bottom:18px; }
  .time-bar{
    display:flex; justify-content:space-between; align-items:center; padding:8px 14px; margin-bottom:10px;
    background:var(--bg-raised-2); border:1px solid var(--brass-dim);
  }
  .time-day{ font-family:var(--label); font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--bone); margin-right:10px; }
  .time-period{ font-family:var(--mono); font-size:11px; color:var(--brass); }
  .time-moves{ font-family:var(--mono); font-size:13px; color:var(--brass); letter-spacing:2px; }

  /* ---- fighter card modal ---- */
  .clickable-name{ cursor:pointer; text-decoration:underline; text-decoration-color:transparent; transition:text-decoration-color .12s ease; }
  .clickable-name:hover{ text-decoration-color:var(--brass); color:var(--brass); }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,8,6,0.78); display:flex; align-items:flex-start; justify-content:center;
    padding:40px 16px; z-index:1000; overflow-y:auto;
  }
  .modal-card{ background:var(--bg-panel); border:1px solid var(--brass-dim); max-width:520px; width:100%; box-shadow:0 20px 50px rgba(0,0,0,0.55); }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); }
  .modal-title{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .modal-close{ background:transparent; border:1px solid var(--line); color:var(--muted); width:30px; height:30px; cursor:pointer; font-family:var(--mono); font-size:14px; }
  .modal-close:hover{ border-color:var(--ink-red); color:var(--ink-red); }
  .modal-body{ padding:20px; }
  .mf-head{ display:flex; gap:14px; align-items:center; margin-bottom:18px; }
  .mf-avatar{ width:50px; height:70px; flex-shrink:0; display:flex; align-items:flex-end; }
  .mf-avatar svg{ width:100%; height:100%; }
  .mf-name{ font-family:var(--display); font-size:20px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .mf-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px; }
  .mf-disc{ font-family:var(--label); font-size:11.5px; color:var(--brass); text-transform:uppercase; margin-top:3px; }
  .mf-stats-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:18px; }
  .mf-stat{ background:var(--bg-raised); border:1px solid var(--line); text-align:center; padding:8px 4px; }
  .mf-stat .msv{ font-family:var(--mono); font-size:15px; font-weight:700; color:var(--brass); }
  .mf-stat .msl{ font-family:var(--label); font-size:8.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
  .mf-section-title{
    font-family:var(--label); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass);
    margin:14px 0 8px; padding-top:12px; border-top:1px solid var(--line);
  }
  .mf-quotes{ display:flex; flex-direction:column; gap:6px; }
  .mf-quote{ font-family:var(--body); font-size:12px; color:var(--bone-dim); line-height:1.5; font-style:italic; }
  .mf-quote-name{ font-family:var(--label); font-style:normal; font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); margin-right:4px; }
  .mf-growth-bar{ height:7px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; }
  .mf-growth-fill{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); }
  .mf-growth-text{ font-family:var(--body); font-size:12px; color:var(--bone-dim); margin-top:6px; line-height:1.5; }
  .mf-empty{ text-align:center; padding:24px 10px; color:var(--muted); font-family:var(--body); font-size:13px; }
  .mf-tier-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .mf-tier-tab{ font-family:var(--label); font-size:10.5px; letter-spacing:.5px; text-transform:uppercase; padding:7px 11px; border:1px solid var(--line); background:var(--bg-raised); color:var(--muted); cursor:pointer; }
  .mf-tier-tab.active{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .mf-history-row{ display:grid; grid-template-columns:70px 1fr auto; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-family:var(--body); font-size:12.5px; }
  .mf-history-row:last-child{ border-bottom:none; }
  .mfh-date{ font-family:var(--mono); font-size:10px; color:var(--muted); }
  .mfh-opp{ color:var(--bone-dim); }
  .mfh-opp b{ color:var(--bone); }
  .mfh-loc{ font-family:var(--mono); font-size:10px; color:var(--muted); display:block; margin-top:1px; }
  .mfh-result{ font-family:var(--mono); font-size:11.5px; font-weight:700; }
  .mfh-result.win{ color:var(--good); }
  .mfh-result.loss{ color:var(--ink-red); }

  /* newspaper */
  .newspaper{
    background:#EDE4CC; color:#221D14; padding:22px 20px 30px; margin:-32px; border:1px solid #43392D;
    border-top:7px solid var(--np-accent, #221D14);
  }
  .np-edition-tag{
    font-family:'Special Elite',monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:1.5px;
    color:#5A5138; text-align:center; margin-bottom:2px;
  }
  .np-masthead{ text-align:center; border-bottom:4px double #221D14; padding-bottom:10px; margin-bottom:12px; }
  .np-title{ font-family:'Playfair Display',serif; font-weight:900; font-size:38px; letter-spacing:1px; line-height:1; }
  .np-subtitle{ font-family:'Special Elite',monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .np-dateline{
    display:flex; justify-content:space-between; font-family:'Special Elite',monospace; font-size:10.5px;
    border-bottom:1px solid #221D14; border-top:1px solid #221D14; padding:4px 0; margin-bottom:16px;
  }
  .np-columns{ column-count:1; }
  .np-section{ margin-bottom:18px; break-inside:avoid; }
  .np-headline{ font-family:'Playfair Display',serif; font-weight:700; font-size:18px; margin-bottom:6px; line-height:1.15; }
  .np-byline{ font-family:'Special Elite',monospace; font-size:9.5px; color:#5A5138; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .np-body{ font-family:'Special Elite',monospace; font-size:12px; line-height:1.7; color:#2B2415; }
  .np-body b{ font-weight:normal; text-decoration:underline; }
  .np-divider{ border:none; border-top:1px dashed #8A7F5C; margin:16px 0; }
  .np-list{ font-family:'Special Elite',monospace; font-size:11.5px; line-height:1.9; }
  .np-list li{ margin-left:18px; }
  .np-standings-links{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
  .np-standings-btn{
    font-family:'Special Elite',monospace; font-size:11px; text-transform:uppercase; letter-spacing:1px;
    padding:10px; border:1.5px solid #221D14; background:#DDD2AF; color:#221D14; cursor:pointer;
  }
  .np-standings-btn:hover{ background:#221D14; color:#EDE4CC; }

  /* league standings screen (regular dark theme) */
  .standings-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .standings-tab{
    font-family:var(--label); font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:8px 14px;
    border:1px solid var(--line); background:var(--bg-raised); color:var(--muted); cursor:pointer;
  }
  .standings-tab.active{ background:var(--ink-red); border-color:var(--ink-red); color:var(--bone); }
  .team-standings-row{
    display:grid; grid-template-columns:28px 1fr auto; gap:10px; align-items:center; padding:7px 10px;
    background:var(--bg-raised); border:1px solid var(--line); margin-bottom:3px; font-family:var(--body); font-size:12.5px;
  }
  .tsr-rank{ font-family:var(--mono); color:var(--brass); font-weight:700; }
  .tsr-record{ font-family:var(--mono); font-size:11.5px; color:var(--muted); }
  .weight-tier-block{ margin-bottom:16px; }
  .wtb-label{
    font-family:var(--label); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--brass);
    margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid var(--line);
  }

  /* location detail */
  .loc-head{ text-align:center; padding:18px 10px; background:var(--bg-raised); border:1px solid var(--brass-dim); margin-bottom:20px; }
  .loc-name{ font-family:var(--display); font-size:24px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); }
  .loc-meta{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:6px; }
  .npc-quote{
    font-family:var(--body); font-style:italic; font-size:14px; color:var(--bone-dim); line-height:1.6;
    padding:16px 18px; background:var(--bg-raised); border-left:3px solid var(--brass-dim); margin-bottom:18px;
  }
  .npc-name{ font-family:var(--label); font-style:normal; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); display:block; margin-top:8px; }

  /* pit roster */
  .pit-boss-card{ display:flex; gap:14px; align-items:center; padding:14px 16px; background:var(--bg-raised); border:1px solid var(--line); margin-bottom:18px; }
  .pit-boss-avatar{ width:34px; height:48px; flex-shrink:0; display:flex; align-items:flex-end; }
  .pit-boss-avatar svg{ width:100%; height:100%; }
  .pit-boss-name{ font-family:var(--label); font-size:15px; font-weight:600; color:var(--bone); }
  .pit-boss-title{ font-family:var(--mono); font-size:10.5px; color:var(--brass); margin-top:2px; }
  .weight-class-block{ margin-bottom:14px; }
  .wc-label{
    font-family:var(--label); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
    margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid var(--line);
  }
  .roster-fighter-row{
    display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:6px 4px;
    font-family:var(--body); font-size:12.5px;
  }
  .rfr-name{ color:var(--bone-dim); }
  .rfr-age{ font-family:var(--mono); font-size:10.5px; color:var(--muted); }
  .rfr-record{ font-family:var(--mono); font-size:11px; color:var(--brass); text-align:right; }

  .sched-list{ display:flex; flex-direction:column; gap:4px; }
  .sched-row{
    display:grid; grid-template-columns:70px 1fr auto; gap:10px; align-items:center;
    padding:8px 10px; background:var(--bg-raised); border:1px solid var(--line); font-family:var(--body); font-size:12.5px;
  }
  .sched-row.sched-open{ border-style:dashed; }
  .sched-row.sched-yours{ border-color:var(--brass); background:var(--bg-raised-2); }
  .sched-time{ font-family:var(--mono); font-size:11px; color:var(--muted); }
  .sched-matchup{ color:var(--bone-dim); }
  .sched-headliner{ font-family:var(--label); font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); }

  /* fame bar */
  .fame-bar-wrap{ margin-bottom:18px; }
  .fame-bar-label{ display:flex; justify-content:space-between; font-family:var(--label); font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .fame-bar-track{ height:8px; background:var(--bg-base); border:1px solid var(--line); position:relative; overflow:hidden; }
  .fame-bar-fill{ position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg, var(--brass-dim), var(--brass)); }

  /* tale of tape / bout (shared pattern) */
  .tape-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
  .tape-side{ background:var(--bg-raised); border:1px solid var(--line); padding:14px 16px; text-align:center; cursor:pointer; transition:all .15s ease; }
  .tape-side:hover{ border-color:var(--brass-dim); }
  .tape-side.picked{ border-color:var(--ink-red); background:var(--bg-raised-2); }
  .tape-avatar{ width:50px; height:70px; margin:0 auto 8px; display:flex; align-items:flex-end; justify-content:center; }
  .tape-avatar svg{ width:100%; height:100%; }
  .tape-name{ font-family:var(--display); font-size:16px; letter-spacing:.5px; text-transform:uppercase; color:var(--bone); }
  .tape-disc{ font-family:var(--label); font-size:11px; color:var(--brass); text-transform:uppercase; margin-top:2px; }
  .tape-ovr{ font-family:var(--mono); font-size:22px; font-weight:700; color:var(--brass); margin-top:6px; }
  .tape-record{ font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:3px; }
  .tape-facts{ font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:10px; line-height:1.9; text-align:left; }
  .pick-row{
    display:flex; justify-content:space-between; align-items:center; padding:6px 10px;
    background:var(--bg-raised); border:1px solid var(--line); margin-bottom:3px; font-family:var(--body); font-size:12px;
  }
  .round-label{ font-family:var(--label); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin:6px 0 4px; }

  /* wallet */
  .wallet-badge{
    font-family:var(--mono); font-size:13px; color:var(--brass); background:var(--bg-raised); border:1px solid var(--brass-dim);
    padding:6px 12px; display:inline-block;
  }
  .mt-record-grid{ display:grid; gap:10px; }
  .mt-record-box{ background:var(--bg-raised); border:1px solid var(--line); text-align:center; padding:12px; }
  .mt-record-box .mrv{ font-family:var(--mono); font-size:20px; font-weight:700; color:var(--brass); }
  .mt-record-box .mrl{ font-family:var(--label); font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:2px; }

  @media (max-width:600px){
    .ticket-header{ flex-direction:column; align-items:flex-start; gap:6px; }
    .fighter-row{ flex-wrap:wrap; }
    .tape-grid{ grid-template-columns:1fr; }
  }

  .version-badge{
    position:fixed; bottom:14px; right:16px; font-family:'JetBrains Mono',monospace; font-size:10px; color:#8B8070;
    background:#241D17; border:1px solid #43392D; padding:5px 9px; letter-spacing:.5px; z-index:999;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

const AGE_BAND_GENERATIONAL = { 11:22, 12:30, 13:40, 14:50, 15:60, 16:70, 17:80, 18:88, 19:90, 20:92 };
function bandCeiling(age, tier){
  const table = tier==='generational' ? AGE_BAND_GENERATIONAL : tier==='prodigy' ? AGE_BAND_PRODIGY : AGE_BAND_TYPICAL;
  return table[clamp(age, 11, 20)];
}
function rollTalentTier(rawAvg01){
  const generationalChance = 0.005 + rawAvg01 * 0.02;
  const prodigyChance = 0.08 + rawAvg01 * 0.28;
  const r = Math.random();
  if(r < generationalChance) return 'generational';
  if(r < generationalChance + prodigyChance) return 'prodigy';
  return 'normal';
}
function compressStat(rawValue, age, tier){
  const ceiling = bandCeiling(age, tier);
  const pct = clamp(rawValue, 1, 99) / 99;
  return clamp(Math.round(1 + pct * (ceiling - 1)), 1, ceiling);
}

/* ============================ BODY MODEL (height/weight) ============================ */
function rollAdultHeightIn(){
  const t = (Math.random()+Math.random()+Math.random())/3;
  return clamp(Math.round(64 + t*20), 64, 84); // 5'4" to 7'0", centered ~6'2"
}
function bmiForBuild(build){
  if(build==='lean') return rand(19,23);
  if(build==='stocky') return rand(27,32);
  return rand(23,27); // athletic
}
function weightFromHeight(heightIn, bmi){
  const heightM = heightIn * 0.0254;
  return Math.round(bmi * heightM * heightM * 2.20462);
}
function heightForAge(adultHeightIn, age){
  if(!age || age >= 18) return adultHeightIn;
  const pct = MATURITY_PCT_BY_AGE[clamp(age,11,18)] || 1.0;
  return Math.max(50, Math.round(adultHeightIn * pct));
}
function weightForAge(currentHeightIn, age, bmi){
  const youthFactor = (!age || age>=18) ? 1.0 : 0.85 + (clamp(age,11,18)-11)/7*0.15;
  return weightFromHeight(currentHeightIn, bmi*youthFactor);
}

function finalizeOpponent(stats, avgOvrForFlavor, weightClass, pitProvince, age){
  const build = pick(['lean','athletic','stocky']);
  const bmiTarget = bmiForBuild(build);
  const adultHeightIn = rollAdultHeightIn();
  const heightIn = heightForAge(adultHeightIn, age);
  const weightLb = weightForAge(heightIn, age, bmiTarget);
  const settlements = SETTLEMENTS_SHORT[pitProvince.id] || ['a nearby town'];
  const hometown = pick(settlements);
  const recWins = clamp(Math.round(avgOvrForFlavor / 5) + rand(-1,1), 0, 9);
  const recLosses = clamp(rand(0,4), 0, 9);
  return {
    id: 'rival_' + Date.now() + '_' + rand(0,9999),
    name: pickName(pitProvince.id, hometown),
    primaryDisc: pickWeightedDiscipline(pitProvince),
    stats, weightLb, heightIn, adultHeightIn, bmiTarget,
    hometown,
    record: { wins: recWins, losses: recLosses },
    fightLog: [],
    appearance: { skin: pick(SKIN_TONES), hair: pick(HAIR_COLORS), build },
  };
}
/* ============================ GAME CLOCK ============================ */
/*
  One shared, island-wide clock (localStorage, not per-fighter) so "today" and the
  Juvenile background simulation stay consistent across every file that reads it
  (this file, the newspaper in Free Roam, etc). Day 1 = Monday, March 3, 1958 — chosen
  to match Free Roam's existing flavor epoch so both calendars agree.
*/
const CLOCK_KEY = 'iifl_clock_v1';
const GAME_EPOCH = new Date(1958, 2, 3); // Monday, March 3 1958 = Day 1
const WEEKDAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const JUVENILE_SEASON_WEEKS = 16;
const JUVENILE_SEASON_START_DAY = 1;
const JUVENILE_SEASON_END_DAY = JUVENILE_SEASON_START_DAY + JUVENILE_SEASON_WEEKS*7 - 1;

function loadClock(){
  try{ const raw = localStorage.getItem(CLOCK_KEY); return raw ? JSON.parse(raw) : { day: 1 }; }
  catch(err){ return { day: 1 }; }
}
function saveClock(c){ try{ localStorage.setItem(CLOCK_KEY, JSON.stringify(c)); }catch(err){} }
function getCurrentDay(){ return loadClock().day; }
function advanceClockByDays(n){ const c = loadClock(); c.day = Math.max(1, c.day + n); saveClock(c); return c.day; }
function dateForDay(day){ const d = new Date(GAME_EPOCH); d.setDate(d.getDate() + (day-1)); return d; }
function formatCalendarDate(day){ return dateForDay(day).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }); }
function formatCalendarDateShort(day){ return dateForDay(day).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
function weekdayNameForDay(day){ return WEEKDAY_NAMES[((day-1)%7+7)%7]; }
function eventNameForDay(day){
  const w = weekdayNameForDay(day);
  if(w==='Monday') return 'Juvenile League Fight Night';
  if(w==='Tuesday') return 'Juvenile Local Tournament';
  if(w==='Wednesday') return 'Juvenile Fiesta Fights';
  if(w==='Thursday') return 'Junior League Night';
  if(w==='Friday') return 'Amateur Fight Night';
  if(w==='Saturday') return 'Pro League Night';
  return 'Off Night — no scheduled cards';
}

/* ============================ FIELD FIGHTER POOL (persistent Amateur registry) ============================ */
/*
  Instead of inventing a brand-new stranger every fight, both Amateur AND Juvenile
  competition draw from a real, persistent pool of registered fighters per province —
  generated once, then remembered. Records update as the player fights them, so
  "who's out there" is an actual answerable question instead of a random generator.

  Pool sizes aren't arbitrary — they're reverse-engineered from the Pro draft math:
  16 teams × 10 men's roster spots, ~20% annual churn (32 vacancies), a 3-round/48-pick
  draft wants a 60-100-deep pool of draft-eligible 18/19yos, which (using the existing
  Novice/Developing/Contender/Elite split as the "draft-caliber" filter at ~33%) implies
  needing ~240 active 18yo fighters, which (assuming ~30% retention from age 12 given
  dropout/injury/never-good-enough over 6 years) implies ~800 registered 12-year-olds
  entering the Juvenile ranks island-wide per year. That 800 is distributed by each
  province's actual population (from the settlement data), with light flavor bumps —
  Kolsati/Sherwood up (GDD: "lots of fighting opportunities"), Gazon down ("underdeveloped"),
  Carpathia down for cultural isolation despite decent raw population. The browsable
  standing pool below is a representative, UI-practical sample sized proportionally —
  not the literal 800, which would be unusable as a list.
*/
const FIELD_KEY = 'iifl_field_fighters_v2';
const AMATEUR_POOL_COMPOSITION = { Novice:8, Developing:8, Contender:5, Elite:3 }; // 24 per province

// Standing Juvenile pool size per province (ages 11-18), population-weighted.
// Bumped up from the original sample size now that this pool is a real, persistent,
// simulated cast (newspaper + opponents) rather than a one-off flavor list — plus new
// 11-year-olds keep entering every simulated Monday as the season goes (see intake below).
const JUVENILE_POOL_SIZES = {
  kolsati:140, sherwood:88, ditiero:80, northeast:48,
  alexandretta:45, carpathia:43, bay:43, gazon:30,
};
// Relative share of each juvenile age in a standing population with realistic dropout —
// younger cohorts are always more numerous than older ones since attrition is cumulative.
// Ages 14-17 are also the Junior League draft window (14th birth-year earliest, 17 latest);
// 18-year-olds who never got drafted age out of Juvenile entirely into the Amateur ranks.
const JUVENILE_AGE_WEIGHTS = { 11:0.20, 12:0.19, 13:0.16, 14:0.13, 15:0.11, 16:0.09, 17:0.07, 18:0.05 };

function loadFieldPools(){
  try{
    const raw = localStorage.getItem(FIELD_KEY);
    return raw ? JSON.parse(raw) : { amateur:{}, juvenile:{} };
  }catch(err){ console.error('IIFL field pool load failed:', err); return { amateur:{}, juvenile:{} }; }
}
function saveFieldPools(pools){
  try{ localStorage.setItem(FIELD_KEY, JSON.stringify(pools)); return true; }
  catch(err){ console.error('IIFL field pool save failed:', err); return false; }
}

function generateAmateurFieldFighter(division, weightClass, province, leagueId){
  const range = AMATEUR_DIVISIONS[division];
  const targetOVR = rand(range[0], range[1]);
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    stats[k] = clamp(targetOVR + rand(-4,4), 1, 35);
  });
  // Amateur is the 18+ adult money league — Junior League (not Amateur) is what drafts
  // out of the 14-17 Juvenile window now. Amateur rosters are grown men: some are Junior
  // grads who took the Amateur payday instead of staying in the dev pipeline, most are
  // 18-year-olds who aged out of Juvenile undrafted and never made it to Pro or Junior.
  // Skews toward the younger end of "adult" since career length here is short and rough.
  const age = Math.random() < 0.6 ? rand(18,21) : rand(22,30);
  const opp = finalizeOpponent(stats, targetOVR, weightClass, province, age);
  opp.division = division;
  opp.weightClass = weightClassOf(opp.weightLb);
  opp.provinceId = province.id;
  opp.leagueId = leagueId;
  opp.age = age;
  return opp;
}

function generateJuvenileFieldFighter(weightClass, province){
  const age = parseInt(weightedPick(JUVENILE_AGE_WEIGHTS), 10);
  const tier = rollTalentTier(0.46);
  const rawCenter = rand(10,90);
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    const raw = clamp(rawCenter + rand(-15,15), 1, 99);
    stats[k] = compressStat(raw, age, tier);
  });
  const avgOvr = (stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5;
  const opp = finalizeOpponent(stats, avgOvr, weightClass, province, age);
  opp.age = age;
  opp.talentTier = tier;
  opp.weightClass = weightClassOf(opp.weightLb);
  opp.provinceId = province.id;
  return opp;
}

function ensureAmateurFieldPoolForLeague(leagueId){
  const pools = loadFieldPools();
  if(!pools.amateur) pools.amateur = {};
  if(pools.amateur[leagueId] && pools.amateur[leagueId].length) return pools;
  const league = getLeague(leagueId);
  if(!league) return pools;
  const province = PROVINCES.find(p=>p.id===league.provinceId);
  const weightClasses = ['Light','Middle','Heavy'];
  const pool = [];
  const composition = league.atRisk
    ? { Novice:4, Developing:3, Contender:2, Elite:1 } // small at-risk leagues have thinner pools
    : (LEAGUE_STRENGTH_COMPOSITION[league.strength] || AMATEUR_POOL_COMPOSITION);
  Object.entries(composition).forEach(([division, count])=>{
    for(let i=0;i<count;i++){
      pool.push(generateAmateurFieldFighter(division, pick(weightClasses), province, leagueId));
    }
  });
  pools.amateur[leagueId] = pool;
  saveFieldPools(pools);
  return pools;
}

function seedJuvenilePoolInPlace(pools, provinceId){
  if(!pools.juvenile) pools.juvenile = {};
  if(pools.juvenile[provinceId] && pools.juvenile[provinceId].length) return;
  const province = PROVINCES.find(p=>p.id===provinceId);
  if(!province) return;
  const weightClasses = ['Light','Middle','Heavy'];
  const size = JUVENILE_POOL_SIZES[provinceId] || 25;
  const pool = [];
  for(let i=0;i<size;i++){
    const f = generateJuvenileFieldFighter(pick(weightClasses), province);
    f.entryDay = JUVENILE_SEASON_START_DAY;
    pool.push(f);
  }
  pools.juvenile[provinceId] = pool;
}

function ensureJuvenileFieldPoolForProvince(provinceId){
  const pools = loadFieldPools();
  seedJuvenilePoolInPlace(pools, provinceId);
  saveFieldPools(pools);
  return pools;
}

function getFieldFighterById(id){
  const pools = loadFieldPools();
  for(const key of Object.keys(pools.amateur || {})){
    const f = pools.amateur[key].find(x=>x.id===id);
    if(f) return f;
  }
  for(const key of Object.keys(pools.juvenile || {})){
    const f = pools.juvenile[key].find(x=>x.id===id);
    if(f) return f;
  }
  return null;
}

// A hard cutoff (e.g. "only trust this filter if it has >=3 matches") can still
// permanently lock a division's weight-matched subset in if that subset happens to sit
// right at the threshold. Instead: probabilistically prefer weight-matched fighters, but
// always leave a real, non-vanishing chance of drawing anyone else in the bucket too —
// this guarantees full eventual coverage of the pool with no one permanently excluded.
function weightedFighterDraw(pool, division, weightClass){
  const divisionPool = pool.filter(f=> f.division===division);
  const narrowPool = divisionPool.filter(f=> f.weightClass===weightClass);
  const useNarrow = narrowPool.length > 0 && Math.random() < 0.55;
  const candidates = useNarrow ? narrowPool : (divisionPool.length ? divisionPool : pool);
  return pick(candidates);
}

function drawFromFieldPool(leagueId, weightClass, divisionWeights){
  const pools = ensureAmateurFieldPoolForLeague(leagueId);
  const pool = pools.amateur[leagueId] || [];
  const division = weightedPick(divisionWeights);
  return weightedFighterDraw(pool, division, weightClass);
}

function drawFromCombinedFieldPools(weightClass, divisionWeights){
  // National tournament stage pulls from the whole island, not just one league or province.
  activeLeagues().forEach(l=> ensureAmateurFieldPoolForLeague(l.id));
  const pools = loadFieldPools();
  const division = weightedPick(divisionWeights);
  let combined = [];
  Object.values(pools.amateur).forEach(list=>{ combined = combined.concat(list); });
  return weightedFighterDraw(combined, division, weightClass);
}

function drawFromProvinceLeaguePools(provinceId, weightClass, divisionWeights){
  // Province stage: pooled "city champions" from every league within the same province.
  const leagues = leaguesInProvince(provinceId).filter(l=> isLeagueActive(l.id));
  if(!leagues.length) return drawFromCombinedFieldPools(weightClass, divisionWeights);
  leagues.forEach(l=> ensureAmateurFieldPoolForLeague(l.id));
  const pools = loadFieldPools();
  const division = weightedPick(divisionWeights);
  let combined = [];
  leagues.forEach(l=>{ combined = combined.concat(pools.amateur[l.id] || []); });
  if(!combined.length) return drawFromCombinedFieldPools(weightClass, divisionWeights);
  return weightedFighterDraw(combined, division, weightClass);
}

function drawJuvenileFromFieldPool(provinceId, weightClass, playerAge){
  const pools = ensureJuvenileFieldPoolForProvince(provinceId);
  const pool = pools.juvenile[provinceId];
  const closeAge = pool.filter(f=> Math.abs(f.age-playerAge)<=1);
  const narrowPool = closeAge.filter(f=> f.weightClass===weightClass);
  const useNarrow = narrowPool.length > 0 && Math.random() < 0.55;
  const candidates = useNarrow ? narrowPool : (closeAge.length ? closeAge : pool);
  return pick(candidates);
}

function updateFieldFighterRecord(fighterId, poolKey, won, isJuvenile, logEntry){
  const pools = loadFieldPools();
  const bucket = isJuvenile ? pools.juvenile : pools.amateur;
  const pool = bucket ? bucket[poolKey] : null;
  if(!pool) return;
  const f = pool.find(x=>x.id===fighterId);
  if(!f) return;
  if(won) f.record.wins += 1; else f.record.losses += 1;
  if(logEntry){
    if(!f.fightLog) f.fightLog = [];
    f.fightLog.push(logEntry);
    if(f.fightLog.length > 10) f.fightLog = f.fightLog.slice(-10);
  }
  saveFieldPools(pools);
}

/* ============================ JUVENILE LEAGUE SIMULATION ============================ */
function quickSimBout(fA, fB){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const effA = ovrA + matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const effB = ovrB + matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const winnerIsA = Math.random() < winProbability(effA, effB);
  return { winner: winnerIsA ? fA : fB, loser: winnerIsA ? fB : fA };
}

function applyNpcGrowthTick(f){
  if(!f || !f.age || !f.stats) return;
  const ceiling = bandCeiling(f.age, f.talentTier||'normal');
  const statKeys = ['speed','quickness','toughness','power','agility'];
  const key = pick(statKeys);
  if(f.stats[key] < ceiling && Math.random() < 0.5){
    f.stats[key] = clamp(f.stats[key]+1, 1, ceiling);
  }
}

function groupFightersBySettlement(list){
  const map = {};
  list.forEach(f=>{ const k = f.hometown || 'unknown'; (map[k] = map[k]||[]).push(f); });
  return map;
}

function logNpcBout(winner, loser, tier, location, day){
  const dateStr = dateForDay(day).toISOString();
  [[winner,loser,'W'],[loser,winner,'L']].forEach(([self, opp, result])=>{
    if(!self.fightLog) self.fightLog = [];
    self.fightLog.push({ tier, opponent: opp.name, result, method: pick(['Decision','TKO','KO']), location, date: dateStr });
    if(self.fightLog.length > 10) self.fightLog = self.fightLog.slice(-10);
  });
}

function runJuvenileLeagueNight(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 2) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    const participants = group.filter(()=> Math.random() < 0.4);
    for(let i=0;i+1<participants.length;i+=2){
      const { winner, loser } = quickSimBout(participants[i], participants[i+1]);
      winner.record.wins += 1; loser.record.losses += 1;
      logNpcBout(winner, loser, 'Juvenile', `${settlement} — League Night`, day);
      applyNpcGrowthTick(winner);
      if(Math.random() < 0.5) applyNpcGrowthTick(loser);
    }
  });
}

function runJuvenileTournamentDay(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 8) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    if(group.length < 8) return;
    const size = group.length >= 16 ? 16 : 8;
    let field = [...group].sort(()=>Math.random()-0.5).slice(0, size);
    while(field.length > 1){
      const nextRound = [];
      for(let i=0;i+1<field.length;i+=2){
        const { winner, loser } = quickSimBout(field[i], field[i+1]);
        winner.record.wins += 1; loser.record.losses += 1;
        logNpcBout(winner, loser, 'Juvenile', `${settlement} — Local Tournament`, day);
        nextRound.push(winner);
      }
      field = nextRound;
    }
    if(field[0]){ applyNpcGrowthTick(field[0]); applyNpcGrowthTick(field[0]); }
  });
}

function runJuvenileFiestaDay(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 2) return;
  const participants = [...pool].sort(()=>Math.random()-0.5).filter(()=> Math.random() < 0.3);
  for(let i=0;i<participants.length;i++){
    const fA = participants[i];
    let fB = null;
    if(Math.random() < 0.25){
      const otherIds = Object.keys(pools.juvenile).filter(id=> id!==provinceId && pools.juvenile[id].length);
      if(otherIds.length) fB = pick(pools.juvenile[pick(otherIds)]);
    }
    if(!fB){
      i += 1;
      fB = participants[i];
    }
    if(!fB || fB.id === fA.id) continue;
    const { winner, loser } = quickSimBout(fA, fB);
    winner.record.wins += 1; loser.record.losses += 1;
    logNpcBout(winner, loser, 'Juvenile', 'Fiesta Fights', day);
    applyNpcGrowthTick(winner);
  }
}

const JUVENILE_INTAKE_CHANCE = {
  kolsati:0.9, sherwood:0.7, ditiero:0.65, northeast:0.55,
  alexandretta:0.5, carpathia:0.45, bay:0.45, gazon:0.35,
};
function runJuvenileIntake(pools, provinceId, day){
  const chance = JUVENILE_INTAKE_CHANCE[provinceId] || 0.5;
  if(Math.random() > chance) return;
  const province = PROVINCES.find(p=>p.id===provinceId);
  if(!province) return;
  const weightClasses = ['Light','Middle','Heavy'];
  const count = rand(1,2);
  for(let i=0;i<count;i++){
    const tier = rollTalentTier(0.46);
    const age = 11;
    const rawCenter = rand(10,90);
    const stats = {};
    ['speed','quickness','toughness','power','agility'].forEach(k=>{
      const raw = clamp(rawCenter + rand(-15,15), 1, 99);
      stats[k] = compressStat(raw, age, tier);
    });
    const avgOvr = (stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5;
    const weightClass = pick(weightClasses);
    const f = finalizeOpponent(stats, avgOvr, weightClass, province, age);
    f.age = age;
    f.talentTier = tier;
    f.weightClass = weightClassOf(f.weightLb);
    f.provinceId = province.id;
    f.record = { wins:0, losses:0 };
    f.entryDay = day;
    pools.juvenile[provinceId].push(f);
  }
}

function catchUpJuvenileSimulation(){
  const pools = loadFieldPools();
  if(!pools.juvenile) pools.juvenile = {};
  PROVINCES.forEach(p=> seedJuvenilePoolInPlace(pools, p.id));
  const today = getCurrentDay();
  const lastSim = pools.juvenileLastSimDay || 0;
  if(lastSim >= today){ saveFieldPools(pools); return pools; }
  const MAX_CATCHUP_DAYS = 500;
  const startDay = Math.max(lastSim+1, today-MAX_CATCHUP_DAYS+1);
  for(let d=startDay; d<=today; d++){
    const weekday = weekdayNameForDay(d);
    PROVINCES.forEach(p=>{
      if(weekday==='Monday'){ runJuvenileLeagueNight(pools, p.id, d); runJuvenileIntake(pools, p.id, d); }
      else if(weekday==='Tuesday'){ runJuvenileTournamentDay(pools, p.id, d); }
      else if(weekday==='Wednesday'){ runJuvenileFiestaDay(pools, p.id, d); }
    });
  }
  pools.juvenileLastSimDay = today;
  saveFieldPools(pools);
  return pools;
}

// Same earned-growth pattern as the rest of the game: win, finish, and beating someone
// tougher than you are the levers. Returns which stats actually changed for display.
// Applies a one-fight-only stat boost from the potion event, without permanently
// mutating the fighter's real stats.
function addTempBoost(stats, amount){
  const boosted = { ...stats };
  Object.keys(boosted).forEach(k=> boosted[k] += amount);
  return boosted;
}

function growFighterStats(f, playerWon, method, oppOVR){
  const ceiling = bandCeiling(f.age||12, f.talentTier||'normal');
  const potentialFactor = clamp((f.potential || 50) / 99, 0, 1);
  const ownOVR = calcOVR(f.stats);
  let growthTicks = 0;
  if(playerWon){
    growthTicks += 1;
    if(method !== 'Decision') growthTicks += 1;
    if(oppOVR > ownOVR) growthTicks += 1;
  } else if(Math.random() < 0.3){
    growthTicks += 1;
  }
  growthTicks = Math.round(growthTicks * (0.4 + potentialFactor * 0.9));
  const before = { ...f.stats };
  const statKeys = ['speed','quickness','toughness','power','agility'];
  for(let i=0;i<growthTicks;i++){
    const key = pick(statKeys);
    const current = f.stats[key];
    if(current >= ceiling) continue;
    const room = 1 - (current/ceiling);
    if(Math.random() < 0.45 + room*0.4) f.stats[key] = clamp(current+1, 1, ceiling);
  }
  const deltas = {};
  statKeys.forEach(k=>{ if(f.stats[k] !== before[k]) deltas[k] = f.stats[k]-before[k]; });
  return deltas;
}

function weightClassOf(weightLb){ if(weightLb<=140) return 'Light'; if(weightLb<=185) return 'Middle'; return 'Heavy'; }

/* ============================ FIGHT SIMULATION ENGINE ============================ */
/* Ported from the Fight Pit — same math, same feel, so a Junior League team game
   resolves consistently with everything else in the world. */

const MATCHUP = {
  boxer:    { boxer:0, brawler:1, wrestler:-1, sambo:-1, mma:-1, karate:1, judo:-1, catch:-1 },
  brawler:  { boxer:-1, brawler:0, wrestler:-1, sambo:-2, mma:-1, karate:0, judo:-2, catch:-1 },
  wrestler: { boxer:1, brawler:1, wrestler:0, sambo:-1, mma:0, karate:1, judo:0, catch:1 },
  sambo:    { boxer:1, brawler:2, wrestler:1, sambo:0, mma:0, karate:1, judo:-1, catch:0 },
  mma:      { boxer:1, brawler:1, wrestler:0, sambo:0, mma:0, karate:1, judo:0, catch:1 },
  karate:   { boxer:-1, brawler:0, wrestler:-1, sambo:-1, mma:-1, karate:0, judo:-1, catch:0 },
  judo:     { boxer:1, brawler:2, wrestler:0, sambo:1, mma:0, karate:1, judo:0, catch:1 },
  catch:    { boxer:1, brawler:1, wrestler:-1, sambo:0, mma:-1, karate:0, judo:-1, catch:0 },
};
const MATCHUP_SCALE = 5;
function matchupBonus(myDisc, oppDisc){ const row=MATCHUP[myDisc]; return row && row[oppDisc]!==undefined ? row[oppDisc]*MATCHUP_SCALE : 0; }
function winProbability(effA, effB){ return 1/(1+Math.pow(10, -(effA-effB)/12)); }
function weightedPick(weights){
  const r = Math.random(); let acc = 0;
  for(const [k,w] of Object.entries(weights)){ acc += w; if(r <= acc) return k; }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

function fillTpl(text, map){ return text.replace(/{(\w+)}/g, (_,k)=> map[k]!==undefined ? map[k] : ''); }

function submissionWeight(fA, fB){
  const grapplers = [fA.primaryDisc, fB.primaryDisc].filter(d=>GRAPPLING_DISC.includes(d)).length;
  const mmaCount = [fA.primaryDisc, fB.primaryDisc].filter(d=>d==='mma').length;
  if(grapplers>=1) return 0.30 + grapplers*0.08;
  if(mmaCount>=1) return 0.15;
  return 0.03; // pure strikers — rare scrambles still happen
}
function computeFinishWeights(gap, fA, fB){
  let base;
  if(gap >= 20) base = { KO:0.38, TKO:0.34, Decision:0.26, DQ:0.02 };
  else if(gap >= 10) base = { KO:0.20, TKO:0.32, Decision:0.46, DQ:0.02 };
  else base = { KO:0.09, TKO:0.24, Decision:0.65, DQ:0.02 };
  const subW = submissionWeight(fA, fB);
  const strikeShare = base.KO + base.TKO;
  const takeFromStrikes = Math.min(strikeShare*0.65, subW);
  const scale = strikeShare>0 ? (strikeShare - takeFromStrikes) / strikeShare : 1;
  base.KO *= scale; base.TKO *= scale;
  base.Submission = takeFromStrikes;
  return base;
}

function simulateBout(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const homeBonusA = ctx && ctx.hometownPit ? 4 : 0;
  const effA = ovrA + mbA + homeBonusA;
  const effB = ovrB + mbB;
  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;
  const gap = Math.abs(effA - effB);

  const finishWeights = computeFinishWeights(gap, fA, fB);
  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.18, 2:0.34, 3:0.48}), 10);
  const floor = (ctx && ctx.arena && ctx.arena.floor) || 'sport court';
  const isGrappleFinish = method === 'Submission';
  const log = [];

  for(let r=1; r<=3; r++){
    log.push({ type:'round-header', round:r });
    const map = { A: fA.name, B: fB.name, floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma) };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });

    if(method !== 'Decision' && r === finishRound){
      const wmap = { A: fA.name, B: fB.name, W: winner.name, L: loser.name, floor, sub: pick(SUBMISSION_TYPES) };
      if(isGrappleFinish){
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_GRAPPLE), wmap) });
        log.push({ type:'line', text: fillTpl(pick(CONTROL_LINES), wmap) });
        log.push({ type:'line', text: fillTpl(pick(SUB_LOCKED_LINES), wmap) });
        log.push({ type:'finish', text: fillTpl(pick(FINISH_SUBMISSION), wmap) });
      } else if(method === 'DQ'){
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_STRIKE), wmap) });
        log.push({ type:'finish', text: fillTpl(pick(FINISH_DQ), wmap) });
      } else {
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_STRIKE), wmap) });
        log.push({ type:'line', text: fillTpl(pick(KNOCKDOWN_LINES), wmap) });
        log.push({ type:'line', text: fillTpl(pick(BARRAGE_LINES), wmap) });
        const lib = method === 'KO' ? FINISH_KO : FINISH_TKO;
        log.push({ type:'finish', text: fillTpl(pick(lib), wmap) });
      }
      break;
    } else {
      // Non-finish round — a chance of a dramatic scare that doesn't end the fight.
      if(Math.random() < 0.22){
        const scareWinnerIsA = Math.random() < probA;
        const smap = { A: fA.name, B: fB.name, W: scareWinnerIsA?fA.name:fB.name, L: scareWinnerIsA?fB.name:fA.name, floor };
        log.push({ type:'line', text: fillTpl(pick(SCARE_KNOCKDOWN), smap) });
        log.push({ type:'line', text: fillTpl(pick(SCARE_RECOVERY), smap) });
      } else {
        log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS), map) });
      }
    }
  }
  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }
  return { winner, loser, method, finishRound, ovrA, ovrB, effA, effB, probA, log };
}

function ensureFighterDefaults(f){
  if(!f.record) f.record = { wins:0, losses:0 };
  if(!f.fightLog) f.fightLog = [];
  if(!f.age) f.age = 12;
  if(!f.talentTier) f.talentTier = 'normal';

  if(f.fame === undefined) f.fame = 0;
  if(f.freeRoamPitKey === undefined) f.freeRoamPitKey = null; // legacy single-pit field, kept for old saves
  if(!f.pitMemberships){
    // Migration: fighters signed under the old single-home-pit model get that pit
    // carried over as their first membership. Going forward, a fighter can be
    // registered at multiple pits at once — this array is the real source of truth.
    f.pitMemberships = [];
    if(f.freeRoamPitKey){
      const [pid, city, pitId] = f.freeRoamPitKey.split('|');
      f.pitMemberships.push({ key: f.freeRoamPitKey, pitId, pitName: null, settlementName: city, provinceId: pid, record: { wins:0, losses:0 } });

  if(f.tempBoost === undefined) f.tempBoost = null;
  return f;

function getRoster(){

  saveRoster(roster);
  return roster;
}
function getFighterById(id){ return getRoster().find(f=> f.id === id); }
function updateFighter(id, mutateFn){

/* ============================ MULTI-PIT MEMBERSHIP ============================ */
/*
  A fighter can be signed at more than one pit — the old single "home pit" model is
  gone. Overall record (for standings/top-10) still lives on f.record; each membership
  tracks its own separate win-loss for that specific pit's card.
*/
function isSignedAtPit(f, cityKey){ return f.pitMemberships.some(m=> m.key === cityKey); }
function getMembership(f, cityKey){ return f.pitMemberships.find(m=> m.key === cityKey); }
function signAtPit(fighterId, cityKey, pit, provinceId, settlementName){
  updateFighter(fighterId, f=>{
    if(isSignedAtPit(f, cityKey)) return;
    f.pitMemberships.push({ key: cityKey, pitId: pit.id, pitName: pit.name, settlementName, provinceId, record: { wins:0, losses:0 } });
  });
}
function recordPitResult(fighterId, cityKey, won){
  updateFighter(fighterId, f=>{
    const m = getMembership(f, cityKey);
    if(!m) return;
    if(won) m.record.wins += 1; else m.record.losses += 1;
  });
}

// Roster depth per pit scales with the city's actual population, split across however
// many pits that city supports — bigger cities mean deeper, more numerous pits.
function pitRosterSize(population, pitCount){
  const perPit = population / pitCount;
  return clamp(Math.round(perPit/2200) + rand(-2,3), 5, 24);
}

function ensureCityPits(provinceId, settlementName){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  if(s.pits[key]) return s.pits[key];
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  const tier = entry ? entry.tier : 'Village';
  const population = entry ? entry.population : 800;
  const pitCount = PIT_COUNT_BY_TIER[tier] || 1;
  const usedNames = new Set();
  const pits = [];
  for(let i=0;i<pitCount;i++){
    let pitName = pick(PIT_NAMES);
    let guard=0; while(usedNames.has(pitName) && guard<30){ pitName = pick(PIT_NAMES); guard++; }
    usedNames.add(pitName);
    const rosterSize = pitRosterSize(population, pitCount);
    const roster = [];
    for(let j=0;j<rosterSize;j++){
      const wc = pick(['Light','Middle','Heavy']);
      roster.push(generatePitFighter(provinceId, settlementName, wc));
    }
    pits.push({
      id: 'pit_' + key.replace(/\s+/g,'_') + '_' + i,
      name: pitName,
      bossName: pickName(provinceId, settlementName),
      bossTitle: pick(BOSS_TITLES),
      reputationRequired: i<2 ? 0 : Math.round(8 + (i-1)*11 + rand(-2,3)),
      roster,
    });
  }
  s.pits[key] = pits;
  saveRoamState(s);
  return pits;
}

/* ============================ FIGHT NIGHT SCHEDULE ============================ */
/*
  Monday is Juvenile League Fight Night. 30-minute fight slots with a 10-minute gap
  between them (6:00, 6:40, 7:20, ...). Most of a pit's roster gets paired off into
  fixed, promoter-booked matchups — best matchups (by combined record quality) land in
  the LATEST slots as headliners. A couple of fighters are held out as free agents, and
  a couple of slots stay open, so the player can walk in, pick a free opponent, and pick
  one of the open slots for themselves.
*/
function generateTimeSlots(count){
  const slots = [];
  let hour = 18, minute = 0; // 6:00 PM start
  for(let i=0;i<count;i++){
    const period = hour >= 12 ? 'PM' : 'AM';
    const displayHour = hour > 12 ? hour-12 : (hour===0?12:hour);
    slots.push(`${displayHour}:${minute.toString().padStart(2,'0')} ${period}`);
    minute += 40; // 30-minute slot + 10-minute gap
    if(minute >= 60){ minute -= 60; hour += 1; }
  }
  return slots;
}

function ensurePitSchedule(pit, day){
  const s = loadRoamState();
  if(!s.pitSchedules) s.pitSchedules = {};
  const key = pit.id + '|' + day;
  if(s.pitSchedules[key]) return s.pitSchedules[key];

  const roster = [...pit.roster];
  const shuffled = [...roster].sort(()=>Math.random()-0.5);
  const freeAgentCount = Math.min(4, Math.max(1, Math.floor(shuffled.length*0.25)));
  const freeAgents = shuffled.slice(0, freeAgentCount).map(f=>f.id);
  const toPair = shuffled.slice(freeAgentCount);

  const matches = [];
  for(let i=0;i+1<toPair.length;i+=2){
    const a = toPair[i], b = toPair[i+1];
    const quality = (a.allTimeRecord.wins-a.allTimeRecord.losses) + (b.allTimeRecord.wins-b.allTimeRecord.losses) + calcOVR(a.stats) + calcOVR(b.stats);
    matches.push({ aId: a.id, bId: b.id, quality });
  }
  matches.sort((a,b)=> a.quality-b.quality); // worst first — best matchups land last (headliners)

  const openCount = Math.min(2, Math.max(1, Math.round(shuffled.length/8)));
  const totalSlots = matches.length + openCount;
  const openPositions = new Set();
  while(openPositions.size < openCount && openPositions.size < totalSlots){
    openPositions.add(rand(0, totalSlots-1));
  }
  const times = generateTimeSlots(totalSlots);
  let matchIdx = 0;
  const slots = times.map((time,i)=>{
    if(openPositions.has(i)) return { time, matchup: null, bookedByPlayer: false };
    return { time, matchup: matches[matchIdx++], bookedByPlayer: false };
  });

  const schedule = { day, freeAgents, slots };
  s.pitSchedules[key] = schedule;
  saveRoamState(s);
  return schedule;
}

function bookScheduleSlot(pit, day, slotIndex, opponentId){
  const s = loadRoamState();
  const key = pit.id + '|' + day;
  const schedule = s.pitSchedules[key];
  if(!schedule) return null;
  schedule.slots[slotIndex].matchup = { aId: 'player', bId: opponentId };
  schedule.slots[slotIndex].bookedByPlayer = true;
  schedule.freeAgents = schedule.freeAgents.filter(id=> id !== opponentId);
  saveRoamState(s);
  return schedule;
}

/* ============================ TUESDAY TOURNAMENT ============================ */
/*
  8-fighter single-elimination bracket, locked in by the promoter — no walk-in slot
  picking like Monday. If you're signed at the pit you can buy in before the bracket
  locks; once it exists (someone joined or someone chose to just watch) the field is
  set. Every match that doesn't involve the player resolves instantly; the player's own
  matches wait for them to actually fight, round by round.
*/
function bracketRoundsNeeded(size){ return Math.round(Math.log2(size)); }

function getPitTournament(pit, day){
  const s = loadRoamState();
  if(!s.pitTournaments) return null;
  return s.pitTournaments[pit.id + '|' + day] || null;
}

function createPitTournament(pit, day, includePlayer){
  const s = loadRoamState();
  if(!s.pitTournaments) s.pitTournaments = {};
  const key = pit.id + '|' + day;
  if(s.pitTournaments[key]) return s.pitTournaments[key];

  const pool = [...pit.roster].sort(()=>Math.random()-0.5);
  const size = pool.length >= 16 ? 16 : (pool.length >= 8 ? 8 : 0);
  if(size === 0) return null; // not enough registered fighters for a card tonight

  const fieldIds = pool.slice(0, size).map(x=>x.id);
  if(includePlayer) fieldIds[Math.floor(Math.random()*fieldIds.length)] = 'player';

  const round1 = [];
  for(let i=0;i<fieldIds.length;i+=2){
    round1.push({ aId: fieldIds[i], bId: fieldIds[i+1], winnerId: null });
  }
  const tourney = { day, pitId: pit.id, size, rounds:[round1], complete:false, championId:null };
  s.pitTournaments[key] = tourney;
  saveRoamState(s);
  return tourney;
}

function tournamentFighterById(pit, playerFighter, id){
  if(id === 'player') return playerFighter;
  return pit.roster.find(r=>r.id===id);
}

function progressTournament(pit, playerFighter, tourney){
  const s = loadRoamState();
  const key = pit.id + '|' + tourney.day;
  let changed = false;
  const round = tourney.rounds[tourney.rounds.length-1];
  round.forEach(m=>{
    if(m.winnerId) return;
    if(m.aId==='player' || m.bId==='player') return; // wait for the player to actually fight
    const a = tournamentFighterById(pit, playerFighter, m.aId);
    const b = tournamentFighterById(pit, playerFighter, m.bId);
    if(!a || !b) return;
    const { winner } = quickSimBout(a, b);
    m.winnerId = winner.id;
    changed = true;
  });
  const roundDone = round.every(m=>m.winnerId);
  if(roundDone){
    const winners = round.map(m=>m.winnerId);
    if(winners.length === 1){
      tourney.complete = true;
      tourney.championId = winners[0];
      changed = true;
    } else if(tourney.rounds.length < bracketRoundsNeeded(tourney.size)){
      const nextRound = [];
      for(let i=0;i<winners.length;i+=2){
        nextRound.push({ aId: winners[i], bId: winners[i+1], winnerId: null });
      }
      tourney.rounds.push(nextRound);
      changed = true;
    }
  }
  if(changed){
    s.pitTournaments[key] = tourney;
    saveRoamState(s);
  }
  return tourney;
}

/*
  Wider, looser draw than a normal registered fight — mostly still local, but sometimes
  pulls a visiting fighter from the island-wide Juvenile registry (another pit, sometimes
  another province entirely), same pool the newspaper and the Fight Pit season draw from.
*/
function drawFiestaOpponent(pit){
  if(Math.random() < 0.3){
    const pools = loadFieldPools();
    const ids = Object.keys(pools.juvenile || {}).filter(id=> pools.juvenile[id].length);
    if(ids.length){
      const provinceId = pick(ids);
      const opp = pick(pools.juvenile[provinceId]);
      if(opp) return { opp, isVisitor: true, provinceId };
    }
  }
  if(pit.roster.length) return { opp: pick(pit.roster), isVisitor: false, provinceId: null };
  return null;
}

// Persists a win/loss back onto a specific pit-roster fighter — without this, every
// registered fighter would stay frozen at their generated starting record forever.
function updateOpponentRecord(provinceId, settlementName, pitId, opponentId, opponentWon){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  const pits = s.pits[key];
  if(!pits) return;
  const pit = pits.find(p=>p.id===pitId);
  if(!pit) return;
  const opp = pit.roster.find(r=>r.id===opponentId);
  if(!opp) return;
  if(opponentWon) opp.allTimeRecord.wins += 1; else opp.allTimeRecord.losses += 1;
  saveRoamState(s);
}

const GRID_SIZE_BY_TIER = { Capital:7, City:6, Town:5, Village:4 };

function ensureCityGrid(provinceId, settlementName){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  if(s.grids[key]){
    // Repair pass: grids cached before roaming events existed won't have this field —
    // without this, walking into an older-saved city crashes on grid.roamingEvents.find().
    const grid = s.grids[key];
    if(!Array.isArray(grid.roamingEvents)){
      const tierForRepair = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
      const roamingCount = tierForRepair && tierForRepair.tier==='Capital' ? 2 : 1;
      grid.roamingEvents = [];
      placeRoamingEvents(grid, roamingCount);
      saveRoamState(s);
    }
    return grid;
  }
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  const tier = entry ? entry.tier : 'Village';
  const size = GRID_SIZE_BY_TIER[tier] || 4;
  const pits = ensureCityPits(provinceId, settlementName);

  const cells = [];
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) cells.push({ row:r, col:c });
  // shuffle and place locations, keep start cell (center-ish) empty
  const startCell = { row: Math.floor(size/2), col: Math.floor(size/2) };
  const available = cells.filter(c=> !(c.row===startCell.row && c.col===startCell.col));
  for(let i=available.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [available[i],available[j]]=[available[j],available[i]]; }

  const locations = [];
  let idx = 0;
  pits.forEach((pit,i)=>{
    if(idx < available.length){ locations.push({ ...available[idx], type:'pit', pitId: pit.id }); idx++; }
  });
  if(idx < available.length){ locations.push({ ...available[idx], type:'travel' }); idx++; }
  const npcCount = clamp(Math.round(size*0.9), 2, 6);
  const npcRoles = ['pit','training','games','fighter-news','local-color','fighter-news'];
  for(let i=0;i<npcCount && idx<available.length;i++){
    locations.push({ ...available[idx], type:'npc', npc: generateNpc(provinceId, settlementName, npcRoles[i%npcRoles.length], pits) });
    idx++;
  }
  if(idx < available.length){ locations.push({ ...available[idx], type:'minigames' }); idx++; }

  const roamingCount = tier==='Capital' ? 2 : 1;
  const grid = { size, startCell, locations, roamingEvents: [] };
  s.grids[key] = grid;
  placeRoamingEvents(grid, roamingCount);
  saveRoamState(s);
  return grid;
}

// Roaming event squares wander the grid — they relocate to a fresh empty cell every time
// the period changes, representing chance encounters as the day moves along.
function placeRoamingEvents(grid, count){
  const occupied = new Set(grid.locations.map(l=>l.row+'_'+l.col));
  occupied.add(grid.startCell.row+'_'+grid.startCell.col);
  const options = [];
  for(let r=0;r<grid.size;r++) for(let c=0;c<grid.size;c++){
    if(!occupied.has(r+'_'+c)) options.push({row:r,col:c});
  }
  for(let i=options.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [options[i],options[j]]=[options[j],options[i]]; }
  grid.roamingEvents = options.slice(0, count).map(pos=> ({ ...pos }));
}
function relocateEventSquares(){
  if(!state.provinceId || !state.settlementName) return;
  const s = loadRoamState();
  const key = state.provinceId + '|' + state.settlementName;
  const grid = s.grids[key];
  if(!grid) return;
  placeRoamingEvents(grid, grid.roamingEvents.length || 1);
  saveRoamState(s);
}

// formatGameDate/START_DATE retired — GAME_EPOCH + formatCalendarDate (shared global

function advanceDay(){
  advanceClockByDays(1); // one in-game day of walking around = one real day on the shared island clock

  state.movesRemaining -= 1;

const AGENT_TYPES = [
  { id:'pitmaster', label:'The Pit Master', skill:4, desc:"Runs the show. Knows every fighter in town cold — the real numbers." },
  { id:'streetguy', label:'A Street Guy', skill:3, desc:"Been around, knows who's who. Solid read, not exact." },
  { id:'brother', label:'Your Older Brother', skill:2, desc:"Believes in you more than he actually knows fighters." },

];
function agentTypeInfo(id){ return AGENT_TYPES.find(a=>a.id===id) || AGENT_TYPES[3]; }

function generateScoutingReport(f, opp, agentSkill){
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  const mbF = matchupBonus(f.primaryDisc, opp.primaryDisc);
  const trueProb = winProbability(ovrF+mbF, ovrOpp);

  if(agentSkill >= 4){
    const styleNote = mbF>0 ? 'Your style has a real edge here.' : mbF<0 ? 'The matchup leans against you stylistically.' : 'Styles are roughly neutral.';
    return `Real numbers: you've got about a ${Math.round(trueProb*100)}% shot. ${styleNote}`;
  }
  if(agentSkill === 3){
    const band = trueProb>=0.65 ? 'a good chance' : trueProb>=0.45 ? "a real shot, could go either way" : 'an uphill fight';
    const statLean = ovrF>ovrOpp ? 'You look sharper overall.' : 'He looks like the tougher matchup on paper.';
    return `I'd call this ${band}. ${statLean}`;
  }
  const errRate = agentSkill===2 ? 0.25 : 0.45;
  const actuallyGood = trueProb >= 0.5;
  const saysGood = Math.random()<errRate ? !actuallyGood : actuallyGood;
  if(agentSkill===2) return saysGood ? "I like your chances on this one." : "Honestly? Tough matchup. Be careful out there.";
  return saysGood ? "You got this, easy! Don't even worry about it." : "I dunno man... this guy looks scary.";
}

      list.push({ name: pickName(prov.id, null), wins: rand(8,25), losses: rand(0,6), team: pick(teams).name });
    }
    list.sort((a,b)=> (b.wins-b.losses)-(a.wins-a.losses));
    topByWeight[wc] = list;
  });
  return { teams, topByWeight };
}

function generateIndividualTierData(){
  const list = [];
  for(let i=0;i<10;i++){
    const prov = pick(PROVINCES);
    const settlements = SETTLEMENT_DATA[prov.id] || [];
    const hometown = settlements.length ? pick(settlements).name : prov.name;
    list.push({
      name: pickName(prov.id, hometown),
      wins: rand(8,25), losses: rand(0,6),
      style: DISCIPLINE_NAMES[pickWeightedDiscipline(prov)],
      hometown,
      homePit: pick(PIT_NAMES),
    });
  }
  list.sort((a,b)=> (b.wins-b.losses)-(a.wins-a.losses));
  return list;
}

function realJuvenileStandings(n){

function generateCommentatorTakes(f){
  const names = [...COMMENTATOR_NAMES];
  for(let i=names.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [names[i],names[j]]=[names[j],names[i]]; }
  const statEntries = Object.entries(f.stats);
  statEntries.sort((a,b)=> b[1]-a[1]);
  const bottomStat = statEntries[statEntries.length-1][0];

  takes.push({ name: names[0], quote: pick(DISCIPLINE_TAKES[f.primaryDisc] || DISCIPLINE_TAKES.mma) });

  else if(f.talentTier === 'prodigy') potentialLine = "Ahead of schedule for the age. Worth keeping an eye on.";
  else if(f.potential !== undefined && f.potential >= 70) potentialLine = "Real ceiling here if the work gets put in.";

const MATURITY_PCT_BY_AGE = { 11:0.74, 12:0.79, 13:0.84, 14:0.89, 15:0.93, 16:0.96, 17:0.98, 18:1.0 };
function projectAdultSize(f){
  const age = f.age || 18;
  const pct = MATURITY_PCT_BY_AGE[clamp(age, 11, 18)] || 1.0;
  const build = f.appearance ? f.appearance.build : 'athletic';
  let adultHeightIn = f.adultHeightIn;
  let bmiTarget = f.bmiTarget;
  if(!adultHeightIn){
    adultHeightIn = clamp(Math.round((f.heightIn||64) / pct), 64, 84);
    bmiTarget = bmiForBuild(build);
  }
  const adultWeightLb = weightFromHeight(adultHeightIn, bmiTarget);
  return { adultHeightIn, adultWeightLb, isGrown: pct >= 1.0 };
}
function growthOutlook(f){
  const isAmateurTier = !!f.amateurLeagueId || !f.juvenileHomeProvinceId;
  const ceiling = isAmateurTier ? bandCeiling(18, f.talentTier||'normal') : bandCeiling(f.age||11, f.talentTier||'normal');
  const avgStat = (f.stats.speed+f.stats.quickness+f.stats.toughness+f.stats.power+f.stats.agility)/5;
  const pctOfCeiling = clamp(avgStat/ceiling*100, 0, 100);
  let outlook;
  if(pctOfCeiling >= 90) outlook = 'Close to maxed out for where they are right now — future growth mostly comes from aging up.';
  else if(pctOfCeiling >= 60) outlook = 'Solid development so far, real room left to keep climbing.';
  else if(pctOfCeiling >= 30) outlook = 'Early in the development curve — plenty of runway left.';
  else outlook = 'Very raw. Most of the growth curve is still ahead.';
  return { ceiling, avgStat, pctOfCeiling, outlook };
}

function generateProjectedPath(f){
  const wc = f.weightClass || weightClassOf(f.weightLb||140);
  const discName = DISCIPLINE_NAMES[f.primaryDisc] || 'fighting';
  const growth = growthOutlook(f);
  let bucket;
  if(f.talentTier === 'generational') bucket = growth.pctOfCeiling >= 65 ? 'eliteMatured' : 'eliteWithRoom';
  else if(f.talentTier === 'prodigy') bucket = growth.pctOfCeiling >= 80 ? 'solidPro' : 'eliteWithRoom';
  else if(growth.pctOfCeiling >= 85) bucket = 'topAmateur';
  else if(growth.pctOfCeiling >= 60) bucket = 'averageAmateur';
  else if(growth.pctOfCeiling >= 35) bucket = 'juniorDepth';
  else bucket = 'washout';
  const line = pick(PROJECTED_PATH_TEMPLATES[bucket]);
  return fillTpl(line, { weightClass: wc, discipline: discName });
}

function draftWatchHtml(f){
  if(!f.age || f.age < 11 || f.age > 18) return '';
  if(f.juniorTeamId || f.amateurLeagueId) return '';
  const currentYear = dateForDay(getCurrentDay()).getFullYear();
  const birthYear = currentYear - f.age;
  const eligibleYear = birthYear + 14;
  const lastYear = birthYear + 17;
  const growth = growthOutlook(f);
  let spotLine;
  if(f.talentTier === 'generational') spotLine = 'Locked in as a Round 1 pick, likely top 3 overall, the moment they hit 14.';
  else if(f.talentTier === 'prodigy' && growth.pctOfCeiling >= 70) spotLine = 'Round 1 buzz — teams are already circling.';
  else if(growth.pctOfCeiling >= 80) spotLine = 'Early Day 1 projection — mid-to-late first round.';
  else if(growth.pctOfCeiling >= 60) spotLine = 'Day 2 projection — solid mid-round value.';
  else if(growth.pctOfCeiling >= 35) spotLine = 'Late-round flier territory right now — needs a jump to move up boards.';
  else spotLine = 'Off the board as of today. Would need a real leap in development to get drafted at all.';
  const status = f.age < 14
    ? `Eligible starting ${eligibleYear} (turns 14), through ${lastYear}.`
    : (f.age <= 17 ? `Eligible now, through ${lastYear}.` : `Final year of Junior draft eligibility — ages out after this.`);
  return `
    <div class="mf-section-title">Draft Watch</div>
    <p class="mf-growth-text">${status}</p>
    <p class="mf-growth-text">Current projected spot: ${spotLine}</p>
  `;
}

// Real, persistent Juvenile leaders — same registry the player draws opponents from.
function topJuvenileFightersFor(provinceId, n){
  catchUpJuvenileSimulation();
  const pools = loadFieldPools();
  let pool;
  if(provinceId === 'island'){
    pool = [];
    Object.values(pools.juvenile || {}).forEach(list=> pool = pool.concat(list));
  } else {
    pool = pools.juvenile[provinceId] || [];
  }
  const sorted = [...pool].sort((a,b)=>
    (b.record.wins - b.record.losses) - (a.record.wins - a.record.losses) || b.record.wins - a.record.wins
  );
  return sorted.slice(0, n);
}

// Real new intake — fighters who registered in roughly the last two weeks, not the
// original season-opening seed pool.
function newJuvenileFacesFor(provinceId, day, n){
  const pools = loadFieldPools();
  let pool;
  if(provinceId === 'island'){
    pool = [];
    Object.values(pools.juvenile || {}).forEach(list=> pool = pool.concat(list));
  } else {
    pool = pools.juvenile[provinceId] || [];
  }
  const recent = pool.filter(f=> f.entryDay && f.entryDay !== JUVENILE_SEASON_START_DAY && f.entryDay >= day-13);
  recent.sort((a,b)=> b.entryDay - a.entryDay);
  return recent.slice(0, n);
}

      Amateur: generateFlavorFighterList(isIsland?'bay':provinceId, flavorSettlement, 3),
      Junior: generateFlavorFighterList(isIsland?'bay':provinceId, flavorSettlement, 3),
    },
    rumors: [pick(RUMOR_LINES), pick(RUMOR_LINES)],
    trainerTip: pick(TRAINER_TIP_LINES),
  };
  s.newspapers[key] = paper;
  saveRoamState(s);
  return paper;
}
