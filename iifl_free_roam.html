  function beginFightRegistration(pitId){
    state.scoutedIndex = null;
    const weekday = weekdayNameForDay(getCurrentDay());
    if(!['Monday','Tuesday','Wednesday'].includes(weekday)){
      state.flashMessage = `No Juvenile card tonight — ${weekday} belongs to another tier. Fight nights run Monday through Wednesday.`;
      state.screen = 'city-walk';
      render();
      return;
    }
    const f = getFighterById(state.fighterId);
    if(juvenileFightsRemaining(f) <= 0){
      state.flashMessage = f.age >= 14
        ? "That body's given everything it's got in Juvenile — head to Junior League and see about a draft."
        : "No fights left in the tank — that's the career limit. Check the Season screen about petitioning for early draft entry.";
      state.screen = 'city-walk';
      render();
      return;
    }
    const pit = currentPits().find(p=>p.id===pitId);
    const entryFee = 2 + Math.round(pit.reputationRequired/5);
    if(f.wallet < entryFee){
      state.flashMessage = `Can't afford the $${entryFee} entry fee — go win some money first.`;
      state.screen = 'city-walk';
      render();
      return;
    }
    const myWc = weightClassOf(f.weightLb);
    let candidates = pit.roster.filter(r=>r.weightClass===myWc);
    if(candidates.length < 3) candidates = candidates.concat(pit.roster.filter(r=>r.weightClass!==myWc));
    if(!candidates.length){
      state.flashMessage = "Nobody free to fight at this pit right now — try another pit, or check back after Monday's card.";
      state.screen = 'city-walk';
      render();
      return;
    }
    const n = Math.min(opponentChoiceCount(f.freeRoamFightCount), candidates.length || 1);
    const chosen = [];
    const pool = [...candidates];
    for(let i=0;i<n && pool.length;i++){
      const idx = Math.floor(Math.random()*pool.length);
      chosen.push(pool.splice(idx,1)[0]);
    }
    state.fightPitId = pitId;
    state.opponentChoices = chosen;
    state.screen = 'choose-opponent';
    render();
  }

  const registerFight = document.getElementById('register-fight');
  if(registerFight) registerFight.onclick = ()=> beginFightRegistration(registerFight.dataset.pitId);

  document.querySelectorAll('[data-book-slot]').forEach(btn=>{

  const simToFightNight = document.getElementById('sim-to-fight-night');

  const joinTournament = document.getElementById('join-tournament');

    const f = getFighterById(state.fighterId);
    const day = getCurrentDay();
    if(juvenileFightsRemaining(f) <= 0){
      state.flashMessage = f.age >= 14
        ? "That body's given everything it's got in Juvenile — head to Junior League and see about a draft."
        : "No fights left in the tank — that's the career limit. Check the Season screen about petitioning for early draft entry.";
      render();
      return;
    }
    ensureJuvenileYearWindow(f, day);
    if((f.juvenileTournamentEntriesThisYear||0) >= JUVENILE_TOURNAMENT_ENTRIES_PER_YEAR){
      state.flashMessage = `Already fought ${JUVENILE_TOURNAMENT_ENTRIES_PER_YEAR} tournament cards this year — camp wants a break before the next one.`;
      render();
      return;
    }
    const kind = weekdayNameForDay(day) === 'Wednesday' ? 'fiesta' : 'local';
    createPitTournament(pit, day, true, weightClassOf(f.weightLb), kind);
    updateFighter(state.fighterId, ff=>{
      ensureJuvenileYearWindow(ff, day);
      ff.juvenileTournamentEntriesThisYear = (ff.juvenileTournamentEntriesThisYear||0) + 1;
    });
    render();
  };
  const watchTournament = document.getElementById('watch-tournament');
  if(watchTournament) watchTournament.onclick = ()=>{
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    const f = getFighterById(state.fighterId);
    const day = getCurrentDay();
    const kind = weekdayNameForDay(day) === 'Wednesday' ? 'fiesta' : 'local';
    createPitTournament(pit, day, false, weightClassOf(f.weightLb), kind);

  };
  const fightTournamentRound = document.getElementById('fight-tournament-round');
  if(fightTournamentRound) fightTournamentRound.onclick = ()=>{
    const f = getFighterById(state.fighterId);
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    const day = getCurrentDay();
    const tourney = getPitTournament(pit, day, weightClassOf(f.weightLb));
    const round = tourney.rounds[tourney.rounds.length-1];
    const matchIndex = round.findIndex(m=> (m.aId==='player'||m.bId==='player') && !m.winnerId);
    const match = round[matchIndex];
    const oppId = match.aId==='player' ? match.bId : match.aId;
    const opp = tournamentFighterById(pit, f, oppId);
    if(!opp){
      // Opponent is genuinely gone, not just filtered out of the live roster — give the
      // player the match by forfeit rather than leaving them stuck on a dead button.
      match.winnerId = 'player';
      const s = loadRoamState();
      const key = pit.id + '|' + tourney.day + '|' + tourney.weightClass;
      s.pitTournaments[key] = tourney;
      saveRoamState(s);
      render();
      return;
    }
    state.fightPitId = pit.id;
    state.opponent = opp;
    state.arena = { name: pit.name + (tourney.kind==='fiesta' ? ' — Fiesta Fights' : ' — Tournament') };
    state.isBlackMarket = false;
    state.tournamentContext = { pitId: pit.id, day, weightClass: tourney.weightClass, roundIndex: tourney.rounds.length-1, matchIndex };
    const fighterForBout = f.tempBoost ? { ...f, stats: addTempBoost(f.stats, f.tempBoost.amount) } : f;
    state.boutResult = simulateBout(fighterForBout, opp, { arena:{floor:'dirt'}, hometownPit:true });
    state.revealedCount = 0;
    state.screen = 'preview';
    render();
  };

  document.querySelectorAll('[data-book-opponent]').forEach(card=>{
    card.onclick = ()=>{
      const opponentId = card.dataset.bookOpponent;

      bookScheduleSlot(pit, day, state.pendingScheduleSlot, opponentId);

      updateFighter(state.fighterId, ff=>{ ff.wallet -= entryFee; });
      state.fightPitId = pit.id;
      state.opponent = opp;
      state.arena = { name: pit.name };
      state.isBlackMarket = false;
      const freshF = getFighterById(state.fighterId);
      const fighterForBout = freshF.tempBoost ? { ...freshF, stats: addTempBoost(freshF.stats, freshF.tempBoost.amount) } : freshF;
      state.boutResult = simulateBout(fighterForBout, state.opponent, { arena:{floor:'dirt'}, hometownPit:true });

      state.screen = 'preview';

  document.querySelectorAll('[data-fight-at-pit]').forEach(btn=>{

  document.querySelectorAll('[data-scout]').forEach(btn=>{

  document.querySelectorAll('[data-pick-opponent]').forEach(card=>{
    card.onclick = ()=>{
      const idx = parseInt(card.dataset.pickOpponent, 10);
      const f = getFighterById(state.fighterId);

      state.opponent = state.opponentChoices[idx];
      state.arena = { name: pit.name };
      state.isBlackMarket = false;
      const freshF = getFighterById(state.fighterId);
      const fighterForBout = freshF.tempBoost ? { ...freshF, stats: addTempBoost(freshF.stats, freshF.tempBoost.amount) } : freshF;
      state.boutResult = simulateBout(fighterForBout, state.opponent, { arena:{floor:'dirt'}, hometownPit:true });
      state.revealedCount = 0;
      state.screen = 'preview';
      render();

  const enterArena = document.getElementById('enter-arena');
  if(enterArena) enterArena.onclick = ()=>{ state.screen='bout'; render(); };

  const advanceBout = document.getElementById('advance-bout');
  if(advanceBout) advanceBout.onclick = ()=>{
    const r = state.boutResult;
    if(state.revealedCount < r.log.length){
      state.revealedCount = Math.min(r.log.length, state.revealedCount + 1);
      render();
      return;
    }
    const f = getFighterById(state.fighterId);
    const won = r.winner.id === f.id;
    const oppOVR = calcOVR(state.opponent.stats);
    const myOVR = calcOVR(f.stats);

    let flash = null;
    let deltas = {};
    let prize, fameGain;

    if(state.isBlackMarket){
      prize = won ? rand(5,12) : rand(1,3);
      fameGain = won ? rand(0,1) : 0;
      updateFighter(state.fighterId, ff=>{
        ff.blackMarketLog.push({
          opponent: state.opponent.name, result: won?'W':'L', method:r.method,
          location: `the street, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR, state.opponent.age);
      });
      flash = "Word won't get back to any pit boss about this one.";
    } else if(state.tournamentContext){
      const tc = state.tournamentContext;
      const pit = currentPits().find(p=>p.id===tc.pitId);
      const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
      prize = won ? rand(8,16) : rand(2,5);
      fameGain = computeFameGain(won, r.method==='Decision' ? 2 : 3, myOVR, oppOVR);
      const playerNameT = getFighterById(state.fighterId).name;
      updateOpponentRecord(state.provinceId, state.opponent.id, !won, {
        tier:'Juvenile', opponent: playerNameT, opponentId: state.fighterId, result: won?'L':'W', method:r.method,
        location: `${pit.name} — Tournament, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
      });
      recordPitResult(state.fighterId, cityKey, won);
      updateFighter(state.fighterId, ff=>{
        if(won) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier:'Juvenile', opponent: state.opponent.name, opponentId: state.opponent.id, result: won?'W':'L', method:r.method,
          location: `${pit.name} — Tournament, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR, state.opponent.age);
        ff.juvenileCareerFights = (ff.juvenileCareerFights || 0) + 1;
      });
      const s2 = loadRoamState();
      const key2 = tc.pitId + '|' + tc.day + '|' + tc.weightClass;
      const tourney = s2.pitTournaments ? s2.pitTournaments[key2] : null;
      if(tourney){
        tourney.rounds[tc.roundIndex][tc.matchIndex].winnerId = won ? 'player' : state.opponent.id;
        s2.pitTournaments[key2] = tourney;
        saveRoamState(s2);
      }
      flash = won ? "You're moving on in the bracket." : "That's the tournament for you this week — the rest of the bracket plays out on its own.";
    } else if(state.fiestaContext){
      const pit = currentPits().find(p=>p.id===state.fightPitId);
      const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      prize = won ? entryFee*3 + rand(2,8) : Math.round(entryFee*0.5);
      fameGain = computeFameGain(won, r.method==='Decision' ? 1 : 2, myOVR, oppOVR);
      recordPitResult(state.fighterId, cityKey, won);
      if(state.fiestaContext.isVisitor){
        updateFieldFighterRecord(state.opponent.id, state.fiestaContext.provinceId, !won, true, {
          tier:'Juvenile', opponent: getFighterById(state.fighterId).name, opponentId: state.fighterId, result: won?'L':'W', method:r.method,
          location: `${pit.name} — Fiesta Night, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
      } else {
        updateOpponentRecord(state.provinceId, state.opponent.id, !won, {
          tier:'Juvenile', opponent: getFighterById(state.fighterId).name, opponentId: state.fighterId, result: won?'L':'W', method:r.method,
          location: `${pit.name} — Fiesta Night, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
      }
      updateFighter(state.fighterId, ff=>{
        if(won) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier:'Juvenile', opponent: state.opponent.name, opponentId: state.opponent.id, result: won?'W':'L', method:r.method,
          location: `${pit.name} — Fiesta Night${state.fiestaContext.isVisitor?' (visiting fighter)':''}, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.freeRoamFightCount += 1;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR, state.opponent.age);
      });
      flash = state.fiestaContext.isVisitor ? "Word travels fast — that one might make the papers in another province." : null;
    } else {
      const pit = currentPits().find(p=>p.id===state.fightPitId);
      const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      // Booked League Night slots pay on a curve — earlier in the card pays less, the
      // main event pays the most. Fights that didn't come from a scheduled slot (a
      // casual walk-in fight on a non-Monday) just use a neutral 1x.
      let payMultiplier = 1;
      const daySched = (loadRoamState().pitSchedules || {})[pit.id + '|' + getCurrentDay()];
      if(daySched){
        const slotIdx = daySched.slots.findIndex(sl=> sl.matchup && sl.matchup.aId==='player');
        if(slotIdx >= 0) payMultiplier = paySlotMultiplier(slotIdx, daySched.slots.length);
      }
      prize = won ? Math.round((entryFee*3 + rand(0,5)) * payMultiplier) : Math.round(entryFee*0.5 * payMultiplier);
      fameGain = computeFameGain(won, r.method==='Decision' ? 1 : 2, myOVR, oppOVR);
      // The opponent's record needs to persist back to the pit roster, or they'd stay
      // frozen at whatever record they were generated with forever.
      const playerNameD = getFighterById(state.fighterId).name;
      updateOpponentRecord(state.provinceId, state.opponent.id, !won, {
        tier:'Juvenile', opponent: playerNameD, opponentId: state.fighterId, result: won?'L':'W', method:r.method,
        location: `${pit.name}, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
      });
      recordPitResult(state.fighterId, cityKey, won);
      updateFighter(state.fighterId, ff=>{
        if(won) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier:'Juvenile', opponent: state.opponent.name, opponentId: state.opponent.id, result: won?'W':'L', method:r.method,
          location: `${pit.name}, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.freeRoamFightCount += 1;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR, state.opponent.age);
        ff.juvenileCareerFights = (ff.juvenileCareerFights || 0) + 1;
        const nextChoices = opponentChoiceCount(ff.freeRoamFightCount);
        const prevChoices = opponentChoiceCount(ff.freeRoamFightCount-1);
        if(nextChoices > prevChoices) flash = `Word's getting around — you can now pick from ${nextChoices} opponents when you register.`;
        const allPits = currentPits();
        const nextTierPit = allPits.find(p=> p.reputationRequired > (ff.fame-fameGain) && p.reputationRequired <= ff.fame);
        if(nextTierPit) flash = `A face from ${nextTierPit.name} was watching tonight — you're on their radar now.`;
      });
    }
    const wasTournament = !!state.tournamentContext;
    const tournamentPitId = wasTournament ? state.tournamentContext.pitId : null;
    state.tournamentContext = null;
    state.fiestaContext = null;
    if(!wasTournament){
      advanceDay(); // a fight — official or off the books — ends the day (tournament fights wait — see fight-result)
    }
    state.lastResult = { won, prize, fameGain, deltas, method:r.method, wasTournament, tournamentPitId };
    state.flashMessage = flash;
    state.screen = 'fight-result';
    render();
  };

  const backFromResult = document.getElementById('back-to-walk-from-result');
  if(backFromResult) backFromResult.onclick = ()=>{ state.flashMessage=null; state.screen='city-walk'; render(); };

  const watchRestOfBracket = document.getElementById('watch-rest-of-bracket');
  if(watchRestOfBracket) watchRestOfBracket.onclick = ()=>{
    const res = state.lastResult;
    const pit = currentPits().find(p=>p.id===res.tournamentPitId);
    state.visitingLocation = { type:'pit', pitId: pit.id };
    state.flashMessage = null;
    state.screen = 'tournament-night';
    render();
  };
  const simRestOfNight = document.getElementById('sim-rest-of-night');
  if(simRestOfNight) simRestOfNight.onclick = ()=>{
    advanceDay();
    state.flashMessage = null;
    state.screen = 'city-walk';
    render();
  };
  const callItANight = document.getElementById('call-it-a-night');
  if(callItANight) callItANight.onclick = ()=>{
    advanceDay();
    state.screen = 'city-walk';
    render();
  };
}

// Lets the Home Hub's "click a province, click a city" flow drop the player straight
// onto the streets of that city instead of the fighter-select screen — only kicks in
// once the one-time NPC-selection onboarding for this save is already done, so a brand
// new save still goes through that setup first.
function tryAutoEnterFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const cityParam = params.get('city');
  const provinceParam = params.get('province');
  if(!cityParam && !provinceParam) return false;
  const roster = getRoster();
  const playable = roster.find(f=>f.isPlayable) || roster[0];
  if(!playable) return false;
  const reg = loadSaveRegistry();
  const activeSave = reg.saves.find(s=> s.id === reg.activeSaveId);
  if(!activeSave || !activeSave.npcSelectionConfirmed) return false;
  const targetProvinceId = provinceParam ? decodeURIComponent(provinceParam) : (playable.pitMemberships&&playable.pitMemberships[0] ? playable.pitMemberships[0].provinceId : playable.provinceId);
  const targetSettlementName = cityParam ? decodeURIComponent(cityParam) : playable.settlement;
  if(!hasCityTierAccess(playable, targetProvinceId, targetSettlementName)){
    // Locked destination — this was the "type any URL, go anywhere" loophole. Fall through
    // to the normal fighter-select screen instead of silently dropping them in anyway.
    return false;
  }
  state.fighterId = playable.id;
  state.provinceId = targetProvinceId;
  state.settlementName = targetSettlementName;
  const grid = ensureCityGrid(state.provinceId, state.settlementName);
  state.position = { ...grid.startCell };
  state.screen = 'city-walk';
  persistCurrentLocation();
  return true;
}

tryAutoEnterFromUrl();
render();
</script>
