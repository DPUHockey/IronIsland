function renderLocPit(){
  const f = getFighterById(state.fighterId);
  const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
  const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
  const isSignedHere = isSignedAtPit(f, cityKey);
  const isSignedElsewhere = f.pitMemberships.length > 0 && !isSignedHere;
  const locked = f.fame < pit.reputationRequired;
  const day = getCurrentDay();
  const weekday = weekdayNameForDay(day);

  const byClass = { Light:[], Middle:[], Heavy:[] };
  pit.roster.forEach(r=> byClass[r.weightClass].push(r));
  if(isSignedHere){
    byClass[weightClassOf(f.weightLb)].push({ id:f.id, name:f.name, age:f.age, allTimeRecord:f.record, isPlayer:true });
  }
  Object.values(byClass).forEach(list=> list.sort((a,b)=> b.age-a.age || (b.allTimeRecord.wins-b.allTimeRecord.losses)-(a.allTimeRecord.wins-a.allTimeRecord.losses)));

  const rosterHtml = ['Light','Middle','Heavy'].map(wc=>{
    if(!byClass[wc].length) return '';
    const rows = byClass[wc].map(r=>`
      <div class="roster-fighter-row">
        <span class="rfr-name clickable-name" data-open-fighter="${r.id}">${r.isPlayer?'⭐ ':''}${r.name}${r.isPlayer?' (you)':''}</span>
        <span class="rfr-age">Age ${r.age}</span>
        <span class="rfr-record">${r.allTimeRecord.wins}-${r.allTimeRecord.losses}</span>
      </div>
    `).join('');
    return `<div class="weight-class-block"><div class="wc-label">${wc}weight</div>${rows}</div>`;
  }).join('');

  let scheduleHtml = '';
  if(weekday === 'Monday'){
    const schedule = ensurePitSchedule(pit, day);
    const rosterById = {};
    pit.roster.forEach(r=> rosterById[r.id] = r);
    const canBook = isSignedHere && !locked;
    const alreadyBookedTonight = schedule.slots.some(s=> s.bookedByPlayer);
    const rows = schedule.slots.map((slot, i)=>{
      if(!slot.matchup){
        return `
          <div class="sched-row sched-open">
            <span class="sched-time">${slot.time}</span>
            <span class="sched-matchup">— open slot —</span>
            ${canBook && !alreadyBookedTonight ? `<button class="fr-btn" data-book-slot="${i}">Book This Slot →</button>` : ''}
          </div>`;
      }
      const isPlayerMatch = slot.matchup.aId === 'player';
      const aName = isPlayerMatch ? f.name : (rosterById[slot.matchup.aId]?.name || '???');
      const bName = rosterById[slot.matchup.bId] ? rosterById[slot.matchup.bId].name : '???';
      const headliner = i === schedule.slots.length-1 ? ' <span class="sched-headliner">★ Main Event</span>' : '';
      return `
        <div class="sched-row ${isPlayerMatch?'sched-yours':''}">
          <span class="sched-time">${slot.time}</span>
          <span class="sched-matchup">${isPlayerMatch?'⭐ ':''}${aName} vs. ${bName}${headliner}</span>
        </div>`;
    }).join('');
    scheduleHtml = `
      <div class="section-label" style="margin-top:18px;">Tonight's Card — Juvenile League Fight Night</div>
      <div class="sched-list">${rows}</div>
      ${!canBook && !locked ? `<p style="font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:8px;">Sign here to book yourself a slot.</p>` : ''}
      ${alreadyBookedTonight ? `<p style="font-family:var(--mono); font-size:10.5px; color:var(--brass); margin-top:8px;">You're already on tonight's card.</p>` : ''}
    `;
  } else if(weekday === 'Tuesday'){
    const tourney = getPitTournament(pit, day);
    const isSignedHereForTourney = isSignedHere;
    scheduleHtml = `
      <div class="section-label" style="margin-top:18px;">Tonight — Local Tournament</div>
      <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:10px;">
        The promoter sets the bracket for tournament nights — 8 fighters, single elimination.
        ${tourney ? (tourney.complete ? 'Tonight\'s bracket is finished.' : 'Bracket\'s locked in and underway.') : (isSignedHereForTourney ? 'You can still buy in before it locks.' : 'Sign here to be eligible to buy in.')}
      </p>
      <div class="btn-row"><span></span><button class="btn btn-primary" data-view-tournament="1">${tourney ? 'View Bracket →' : 'See Tonight\'s Bracket →'}</button></div>
    `;
  } else if(weekday === 'Wednesday'){
    const entryFee = 2 + Math.round(pit.reputationRequired/5);
    const canFiesta = isSignedHere && !locked;
    scheduleHtml = `
      <div class="section-label" style="margin-top:18px;">Tonight — Fiesta Fights</div>
      <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:10px;">
        Looser card tonight — local fighters, other pits around town, and sometimes somebody's come in from
        another province entirely. No set schedule, just show up and find someone.
      </p>
      ${canFiesta ? `<div class="btn-row"><span></span><button class="btn btn-primary" id="fiesta-fight" data-pit-id="${pit.id}">Find a Fiesta Opponent — $${entryFee} →</button></div>` : ''}
      ${!isSignedHere && !locked ? `<p style="font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:8px;">Sign here to jump into a fiesta card.</p>` : ''}
    `;
  }

  let actionHtml;
  if(locked){
    actionHtml = `<p style="font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center;">This pit doesn't know your name yet. Build some fame first (needs ${pit.reputationRequired}, you have ${f.fame}).</p>`;
  } else if(!isSignedHere){
    actionHtml = `<div class="btn-row"><span></span><button class="btn btn-primary" id="sign-here" data-pit-id="${pit.id}">${f.pitMemberships.length ? 'Sign Here — Add This Pit →' : 'Sign Here — Start Your Career'}</button></div>`;
  } else {
    actionHtml = `<div class="btn-row"><span></span><button class="btn btn-primary" id="register-fight" data-pit-id="${pit.id}">Register to Fight →</button></div>`;
  }

  return `
    <div class="loc-head">
      <div class="loc-name">${pit.name}</div>
      <div class="loc-meta">${isSignedHere?'Signed here':isSignedElsewhere?'Signed elsewhere, not here':'Unsigned'} · Reputation needed: ${pit.reputationRequired}</div>
    </div>
    <div class="pit-boss-card">
      <div class="pit-boss-avatar">${buildSilhouetteSM({skin:pick(SKIN_TONES), hair:pick(HAIR_COLORS)})}</div>
      <div>
        <div class="pit-boss-name">${pit.bossName}</div>
        <div class="pit-boss-title">"${pit.bossTitle}" — Pit Boss</div>
      </div>
    </div>
    <div class="section-label">Registered This Season (${pit.roster.length + (isSignedHere?1:0)})</div>
    ${rosterHtml}
    ${scheduleHtml}
    ${actionHtml}
    <div class="btn-row" style="margin-top:8px;"><button class="btn" id="back-to-walk">← Keep Walking</button><span></span></div>
  `;
}

function renderTournamentNight(){
  const f = getFighterById(state.fighterId);
  const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
  const day = getCurrentDay();
  const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
  const isSignedHere = isSignedAtPit(f, cityKey);
  let tourney = getPitTournament(pit, day);

  if(!tourney && pit.roster.length < 8){
    return `
      <div class="loc-head"><div class="loc-name">${pit.name} — Tournament Night</div></div>
      <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:16px;">
        Not enough registered fighters at this pit for a tournament card tonight — needs at least 8. Try a bigger pit, or catch League Fight Night Monday instead.
      </p>
      <div class="btn-row">
        <button class="btn" id="back-to-pit">← Back</button>
        <button class="btn btn-primary" id="call-it-a-night">Call It A Night →</button>
      </div>
    `;
  }

  if(!tourney){
    return `
      <div class="loc-head"><div class="loc-name">${pit.name} — Tournament Night</div></div>
      <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:16px;">
        The promoter's about to lock the bracket — 8 fighters, single elimination.
        ${isSignedHere ? "Buy in now or just watch it play out." : "You'd need to sign at this pit first to buy in — you can still watch."}
      </p>
      <div class="btn-row">
        ${isSignedHere ? `<button class="btn btn-primary" id="join-tournament">Buy In — Join Tonight's Bracket →</button>` : '<span></span>'}
        <button class="btn" id="watch-tournament">${isSignedHere?'Just Watch This Week':'Watch The Bracket →'}</button>
      </div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn" id="back-to-pit">← Back</button>
        <button class="btn btn-primary" id="call-it-a-night">Call It A Night →</button>
      </div>
    `;
  }

  tourney = progressTournament(pit, f, tourney);

  const roundsHtml = tourney.rounds.map((round, ri)=>{
    const rows = round.map(m=>{
      const aName = m.aId==='player' ? f.name : (tournamentFighterById(pit,f,m.aId)?.name||'???');
      const bName = m.bId==='player' ? f.name : (tournamentFighterById(pit,f,m.bId)?.name||'???');
      const isPlayerMatch = (m.aId==='player'||m.bId==='player');
      const done = !!m.winnerId;
      const winnerName = done ? (m.winnerId==='player'?f.name:(tournamentFighterById(pit,f,m.winnerId)?.name||'???')) : null;
      return `
        <div class="sched-row ${isPlayerMatch?'sched-yours':''}">
          <span class="sched-time">${isPlayerMatch?'⭐':''}</span>
          <span class="sched-matchup">${aName} vs. ${bName}${done?` — <b>${winnerName} wins</b>`:' — pending'}</span>
        </div>
      `;
    }).join('');
    return `<div class="weight-class-block"><div class="wc-label">Round ${ri+1}</div>${rows}</div>`;
  }).join('');

  const currentRound = tourney.rounds[tourney.rounds.length-1];
  const playerMatch = !tourney.complete ? currentRound.find(m=> (m.aId==='player'||m.bId==='player') && !m.winnerId) : null;
  const playerAppeared = tourney.rounds.some(r=> r.some(m=> m.aId==='player'||m.bId==='player'));
  const eliminated = !tourney.complete && playerAppeared && !playerMatch;

  let actionHtml = '';
  if(tourney.complete){
    const championName = tourney.championId==='player' ? f.name : (tournamentFighterById(pit,f,tourney.championId)?.name||'???');
    actionHtml = `<p style="font-family:var(--label); font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); text-align:center; margin-top:14px;">🏆 ${championName} takes the title tonight.</p>`;
  } else if(playerMatch){
    actionHtml = `<div class="btn-row" style="margin-top:10px;"><span></span><button class="btn btn-primary" id="fight-tournament-round">Fight Your Round →</button></div>`;
  } else if(eliminated){
    actionHtml = `<p style="font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; margin-top:8px;">You're out — the rest of the bracket plays out on its own. Come back next Tuesday.</p>`;
  }

  return `
    <div class="loc-head"><div class="loc-name">${pit.name} — Tournament Night</div></div>
    ${roundsHtml}
    ${actionHtml}
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn" id="back-to-pit">← Back To Pit</button>
      <button class="btn btn-primary" id="call-it-a-night">Call It A Night →</button>
    </div>
  `;
}

function renderPreview(){
  const f = getFighterById(state.fighterId);
  const opp = state.opponent;
  const boostNote = f.tempBoost ? `<p style="font-family:var(--mono); font-size:11px; color:var(--good); text-align:center; margin-bottom:12px;">⚗️ Whatever was in that bottle is kicking in — +${f.tempBoost.amount} to everything, this fight only.</p>` : '';
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  function statRow(label, valF, valOpp){
    return `<div style="margin-bottom:10px;"><div class="round-label" style="text-align:center;">${label}</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div style="text-align:right; font-family:var(--mono); font-size:11px; color:var(--bone);">${valF}</div>
        <div style="font-family:var(--mono); font-size:11px; color:var(--bone);">${valOpp}</div>
      </div></div>`;
  }

  // Same math the actual sim uses for the round-by-round — this is a real prediction,
  // not flavor text, so "who wins on paper" actually lines up with what's likely to happen.
  const effF = ovrF + matchupBonus(f.primaryDisc, opp.primaryDisc);
  const effOpp = ovrOpp + matchupBonus(opp.primaryDisc, f.primaryDisc);
  const probF = winProbability(effF, effOpp);
  const favoredF = probF >= 0.5;
  const favName = favoredF ? f.name : opp.name;
  const favPct = Math.round((favoredF ? probF : 1-probF) * 100);
  let analysisLine;
  if(favPct >= 80) analysisLine = `${favName} is a heavy favorite tonight — this shouldn't be close on paper.`;
  else if(favPct >= 65) analysisLine = `${favName} goes in the clear favorite, but paper doesn't fight.`;
  else if(favPct >= 55) analysisLine = `Slight edge to ${favName} — close enough to go either way.`;
  else analysisLine = `Dead even on paper. Could not find a real edge either way.`;
  const discNote = matchupBonus(f.primaryDisc, opp.primaryDisc) > matchupBonus(opp.primaryDisc, f.primaryDisc)
    ? `${DISCIPLINE_NAMES[f.primaryDisc]} gives ${f.name} a stylistic edge here.`
    : matchupBonus(opp.primaryDisc, f.primaryDisc) > matchupBonus(f.primaryDisc, opp.primaryDisc)
      ? `${DISCIPLINE_NAMES[opp.primaryDisc]} gives ${opp.name} a stylistic edge here.`
      : `No real stylistic edge either way — comes down to who's sharper tonight.`;

  const recF = f.record || { wins:0, losses:0 };
  const recOpp = opp.record || opp.allTimeRecord || { wins:0, losses:0 };

  return `
    <div class="section-label">Tale of the Tape</div>
    ${boostNote}
    <div class="tape-grid">
      <div class="tape-side">
        <div class="tape-avatar">${buildSilhouetteSM(f.appearance)}</div>
        <div class="tape-name">${f.name}</div>
        <div class="tape-disc">${DISCIPLINE_NAMES[f.primaryDisc]}</div>
        <div class="tape-ovr">${ovrF}</div>
        <div class="tape-record">${recF.wins}-${recF.losses}${f.age?' · Age '+f.age:''}</div>
        <div class="tape-facts">
          <div>${f.heightIn?'<b>HT:</b> '+heightLabel(f.heightIn)+' &nbsp; ':''}${f.weightLb?'<b>WT:</b> '+f.weightLb+' lb':''}</div>
          ${f.settlement?`<div><b>From:</b> ${f.settlement}</div>`:''}
        </div>
      </div>
      <div class="tape-side">
        <div class="tape-avatar">${buildSilhouetteSM(opp.appearance)}</div>
        <div class="tape-name">${opp.name}</div>
        <div class="tape-disc">${DISCIPLINE_NAMES[opp.primaryDisc]}</div>
        <div class="tape-ovr">${ovrOpp}</div>
        <div class="tape-record">${recOpp.wins}-${recOpp.losses}${opp.age?' · Age '+opp.age:''}</div>
        <div class="tape-facts">
          <div>${opp.heightIn?'<b>HT:</b> '+heightLabel(opp.heightIn)+' &nbsp; ':''}${opp.weightLb?'<b>WT:</b> '+opp.weightLb+' lb':''}</div>
          ${opp.hometown||opp.settlement?`<div><b>From:</b> ${opp.hometown||opp.settlement}</div>`:''}
        </div>
      </div>
    </div>
    ${statRow('SPEED', f.stats.speed, opp.stats.speed)}
    ${statRow('QUICKNESS', f.stats.quickness, opp.stats.quickness)}
    ${statRow('TOUGHNESS', f.stats.toughness, opp.stats.toughness)}
    ${statRow('POWER', f.stats.power, opp.stats.power)}
    ${statRow('AGILITY', f.stats.agility, opp.stats.agility)}
    <div class="section-label" style="margin-top:16px;">On Paper</div>
    <div class="mf-growth-bar" style="margin-bottom:6px;"><div class="mf-growth-fill" style="width:${Math.round(probF*100)}%"></div></div>
    <p class="mf-growth-text" style="text-align:center;">${f.name} ${Math.round(probF*100)}% · ${opp.name} ${Math.round((1-probF)*100)}%</p>
    <p class="mf-growth-text">${analysisLine} ${discNote}</p>
    <div class="btn-row"><span></span><button class="btn btn-primary" id="enter-arena">Enter the Pit →</button></div>
  `;
}

function wireEvents(){
  document.querySelectorAll('[data-select-fighter]').forEach(btn=>{
    btn.onclick = ()=>{
      const f = getFighterById(btn.dataset.selectFighter);
      state.fighterId = f.id;
      if(f.pitMemberships.length){
        const first = f.pitMemberships[0];
        state.provinceId = first.provinceId; state.settlementName = first.settlementName;
      } else {
        state.provinceId = f.provinceId; state.settlementName = f.settlement;
      }
      const grid = ensureCityGrid(state.provinceId, state.settlementName);
      state.position = { ...grid.startCell };
      state.screen = 'city-walk';
      render();
    };
  });

  const backFromWalk = document.getElementById('back-to-select-from-walk');
  if(backFromWalk) backFromWalk.onclick = ()=>{ state.screen='select'; render(); };

  document.querySelectorAll('[data-walk-cell]').forEach(cell=>{
    cell.onclick = ()=>{
      const [r,c] = cell.dataset.walkCell.split('|').map(Number);
      const dr = Math.abs(state.position.row-r), dc = Math.abs(state.position.col-c);
      if(dr>1 || dc>1) return; // not adjacent, can't walk there directly
      if(dr===0 && dc===0) return;
      state.position = { row:r, col:c };
      spendMove();
      const grid = currentGrid();
      const loc = grid.locations.find(l=>l.row===r && l.col===c);
      const roaming = grid.roamingEvents.find(e=>e.row===r && e.col===c);
      if(loc){
        state.visitingLocation = loc;
        if(loc.type==='pit') state.screen = 'loc-pit';
        else if(loc.type==='npc') state.screen = 'loc-npc';
        else if(loc.type==='minigames') state.screen = 'loc-minigames';
        else if(loc.type==='travel') state.screen = 'loc-travel';
      } else if(roaming){
        triggerRandomEvent();
      }
      render();
    };
  });

  const backToWalk = document.getElementById('back-to-walk');
  if(backToWalk) backToWalk.onclick = ()=>{ state.screen='city-walk'; render(); };

  document.querySelectorAll('[data-travel-to]').forEach(card=>{
    card.onclick = ()=>{
      state.settlementName = card.dataset.travelTo;
      const grid = ensureCityGrid(state.provinceId, state.settlementName);
      state.position = { ...grid.startCell };
      advanceDay(); // the road takes the rest of the day — arrive fresh next morning
      state.screen = 'city-walk';
      render();
    };
  });

  const findAFight = document.getElementById('find-a-fight');
  if(findAFight) findAFight.onclick = ()=>{ state.screen='choose-pit-to-fight'; render(); };

  const readNewspaper = document.getElementById('read-newspaper');
  if(readNewspaper) readNewspaper.onclick = ()=>{
    if(TESTING_MODE){ state.screen='newspaper-picker'; }
    else { state.newspaperProvinceId = state.provinceId; state.screen='newspaper'; }
    render();
  };
  const closeNewspaper = document.getElementById('close-newspaper');
  if(closeNewspaper) closeNewspaper.onclick = ()=>{ state.newspaperProvinceId = null; state.screen='city-walk'; render(); };
  const pickAnotherPaper = document.getElementById('pick-another-paper');
  if(pickAnotherPaper) pickAnotherPaper.onclick = ()=>{ state.newspaperProvinceId = null; state.screen='newspaper-picker'; render(); };
  document.querySelectorAll('[data-open-paper]').forEach(btn=>{
    btn.onclick = ()=>{ state.newspaperProvinceId = btn.dataset.openPaper; state.screen='newspaper'; render(); };
  });

  document.querySelectorAll('[data-view-standings]').forEach(btn=>{
    btn.onclick = ()=>{ state.standingsTier = btn.dataset.viewStandings; state.screen='league-standings'; render(); };
  });
  document.querySelectorAll('[data-standings-tab]').forEach(btn=>{
    btn.onclick = ()=>{ state.standingsTier = btn.dataset.standingsTab; render(); };
  });
  const backToNewspaper = document.getElementById('back-to-newspaper');
  if(backToNewspaper) backToNewspaper.onclick = ()=>{ state.screen='newspaper'; render(); };

  const viewBlackMarket = document.getElementById('view-black-market');
  if(viewBlackMarket) viewBlackMarket.onclick = ()=>{ state.screen='black-market'; render(); };

  const dismissEvent = document.getElementById('dismiss-event');
  if(dismissEvent) dismissEvent.onclick = ()=>{ state.randomEventPending=null; state.screen='city-walk'; render(); };
  const declineEvent = document.getElementById('decline-event');
  if(declineEvent) declineEvent.onclick = ()=>{ state.randomEventPending=null; state.screen='city-walk'; render(); };
  const acceptEvent = document.getElementById('accept-event');
  if(acceptEvent) acceptEvent.onclick = ()=>{
    const f = getFighterById(state.fighterId);
    state.opponent = state.randomEventPending.opponent;
    state.isBlackMarket = true;
    state.fightPitId = null;
    const fighterForBout = f.tempBoost ? { ...f, stats: addTempBoost(f.stats, f.tempBoost.amount) } : f;
    state.boutResult = simulateBout(fighterForBout, state.opponent, { arena:{floor:'the street'}, hometownPit:false });
    state.revealedCount = 0;
    state.randomEventPending = null;
    state.screen = 'preview';
    render();
  };

  const signHere = document.getElementById('sign-here');
  if(signHere) signHere.onclick = ()=>{
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
    signAtPit(state.fighterId, cityKey, pit, state.provinceId, state.settlementName);
    const f = getFighterById(state.fighterId);
    if(!f.agentType){ state.screen = 'choose-agent'; render(); return; }
    state.screen = 'city-walk';
    render();
  };

  document.querySelectorAll('[data-pick-agent]').forEach(card=>{
    card.onclick = ()=>{
      updateFighter(state.fighterId, f=>{ f.agentType = card.dataset.pickAgent; });
      state.screen = 'city-walk';
      render();
    };
  });

  function beginFightRegistration(pitId){
    state.scoutedIndex = null;
    const f = getFighterById(state.fighterId);
    const pit = currentPits().find(p=>p.id===pitId);
    const entryFee = 2 + Math.round(pit.reputationRequired/5);
    if(f.wallet < entryFee){
      state.flashMessage = `Can't afford the $${entryFee} entry fee — go win some money first.`;
      state.screen = 'city-walk';
      render();
      return;
    }
    const myWc = weightClassOf(f.weightLb);
    let candidates = pit.roster.filter(r=>r.weightClass===myWc);
    if(candidates.length < 3) candidates = candidates.concat(pit.roster.filter(r=>r.weightClass!==myWc));
    const n = Math.min(opponentChoiceCount(f.freeRoamFightCount), candidates.length || 1);
    const chosen = [];
    const pool = [...candidates];
    for(let i=0;i<n && pool.length;i++){
      const idx = Math.floor(Math.random()*pool.length);
      chosen.push(pool.splice(idx,1)[0]);
    }
    state.fightPitId = pitId;
    state.opponentChoices = chosen;
    state.screen = 'choose-opponent';
    render();
  }

  const registerFight = document.getElementById('register-fight');
  if(registerFight) registerFight.onclick = ()=> beginFightRegistration(registerFight.dataset.pitId);

  document.querySelectorAll('[data-book-slot]').forEach(btn=>{
    btn.onclick = ()=>{
      state.pendingScheduleSlot = parseInt(btn.dataset.bookSlot, 10);
      state.screen = 'book-slot';
      render();
    };
  });

  const backToPit = document.getElementById('back-to-pit');
  if(backToPit) backToPit.onclick = ()=>{ state.screen = 'loc-pit'; render(); };

  document.querySelectorAll('[data-view-tournament]').forEach(btn=>{
    btn.onclick = ()=>{ state.screen = 'tournament-night'; render(); };
  });

  const joinTournament = document.getElementById('join-tournament');
  if(joinTournament) joinTournament.onclick = ()=>{
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    createPitTournament(pit, getCurrentDay(), true);
    render();
  };
  const watchTournament = document.getElementById('watch-tournament');
  if(watchTournament) watchTournament.onclick = ()=>{
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    createPitTournament(pit, getCurrentDay(), false);
    render();
  };
  const fightTournamentRound = document.getElementById('fight-tournament-round');
  if(fightTournamentRound) fightTournamentRound.onclick = ()=>{
    const f = getFighterById(state.fighterId);
    const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
    const day = getCurrentDay();
    const tourney = getPitTournament(pit, day);
    const round = tourney.rounds[tourney.rounds.length-1];
    const matchIndex = round.findIndex(m=> (m.aId==='player'||m.bId==='player') && !m.winnerId);
    const match = round[matchIndex];
    const oppId = match.aId==='player' ? match.bId : match.aId;
    const opp = pit.roster.find(r=>r.id===oppId);
    if(!opp) return;
    state.fightPitId = pit.id;
    state.opponent = opp;
    state.arena = { name: pit.name + ' — Tournament' };
    state.isBlackMarket = false;
    state.tournamentContext = { pitId: pit.id, day, roundIndex: tourney.rounds.length-1, matchIndex };
    const fighterForBout = f.tempBoost ? { ...f, stats: addTempBoost(f.stats, f.tempBoost.amount) } : f;
    state.boutResult = simulateBout(fighterForBout, opp, { arena:{floor:'dirt'}, hometownPit:true });
    state.revealedCount = 0;
    state.screen = 'preview';
    render();
  };

  const fiestaFight = document.getElementById('fiesta-fight');
  if(fiestaFight) fiestaFight.onclick = ()=>{
    const f = getFighterById(state.fighterId);
    const pit = currentPits().find(p=>p.id===fiestaFight.dataset.pitId);
    const entryFee = 2 + Math.round(pit.reputationRequired/5);
    if(f.wallet < entryFee){
      state.flashMessage = `Can't afford the $${entryFee} entry fee — go win some money first.`;
      state.screen = 'city-walk';
      render();
      return;
    }
    const draw = drawFiestaOpponent(pit);
    if(!draw){
      state.flashMessage = "Nobody free to fight tonight.";
      state.screen = 'city-walk';
      render();
      return;
    }
    updateFighter(state.fighterId, ff=>{ ff.wallet -= entryFee; });
    state.fightPitId = pit.id;
    state.opponent = draw.opp;
    state.fiestaContext = { isVisitor: draw.isVisitor, provinceId: draw.provinceId };
    state.arena = { name: pit.name + ' — Fiesta Night' };
    state.isBlackMarket = false;
    const freshF = getFighterById(state.fighterId);
    const fighterForBout = freshF.tempBoost ? { ...freshF, stats: addTempBoost(freshF.stats, freshF.tempBoost.amount) } : freshF;
    state.boutResult = simulateBout(fighterForBout, draw.opp, { arena:{floor:'dirt'}, hometownPit: !draw.isVisitor });
    state.revealedCount = 0;
    state.screen = 'preview';
    render();
  };

  document.querySelectorAll('[data-book-opponent]').forEach(card=>{
    card.onclick = ()=>{
      const opponentId = card.dataset.bookOpponent;
      const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
      const day = getCurrentDay();
      const opp = pit.roster.find(r=>r.id===opponentId);
      if(!opp) return;
      bookScheduleSlot(pit, day, state.pendingScheduleSlot, opponentId);
      const f = getFighterById(state.fighterId);
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      updateFighter(state.fighterId, ff=>{ ff.wallet -= entryFee; });
      state.fightPitId = pit.id;
      state.opponent = opp;
      state.arena = { name: pit.name };
      state.isBlackMarket = false;
      const freshF = getFighterById(state.fighterId);
      const fighterForBout = freshF.tempBoost ? { ...freshF, stats: addTempBoost(freshF.stats, freshF.tempBoost.amount) } : freshF;
      state.boutResult = simulateBout(fighterForBout, state.opponent, { arena:{floor:'dirt'}, hometownPit:true });
      state.revealedCount = 0;
      state.screen = 'preview';
      render();
    };
  });

  document.querySelectorAll('[data-fight-at-pit]').forEach(btn=>{
    btn.onclick = ()=>{ state.scoutedIndex = null; beginFightRegistration(btn.dataset.fightAtPit); };
  });

  document.querySelectorAll('[data-scout]').forEach(btn=>{
    btn.onclick = ()=>{
      const idx = parseInt(btn.dataset.scout, 10);
      state.scoutedIndex = state.scoutedIndex === idx ? null : idx;
      render();
    };
  });

  document.querySelectorAll('[data-pick-opponent]').forEach(card=>{
    card.onclick = ()=>{
      const idx = parseInt(card.dataset.pickOpponent, 10);
      const f = getFighterById(state.fighterId);
      const pit = currentPits().find(p=>p.id===state.fightPitId);
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      updateFighter(state.fighterId, ff=>{ ff.wallet -= entryFee; });
      state.opponent = state.opponentChoices[idx];
      state.arena = { name: pit.name };
      state.isBlackMarket = false;
      const freshF = getFighterById(state.fighterId);
      const fighterForBout = freshF.tempBoost ? { ...freshF, stats: addTempBoost(freshF.stats, freshF.tempBoost.amount) } : freshF;
      state.boutResult = simulateBout(fighterForBout, state.opponent, { arena:{floor:'dirt'}, hometownPit:true });
      state.revealedCount = 0;
      state.screen = 'preview';
      render();
    };
  });

  const enterArena = document.getElementById('enter-arena');
  if(enterArena) enterArena.onclick = ()=>{ state.screen='bout'; render(); };

  const advanceBout = document.getElementById('advance-bout');
  if(advanceBout) advanceBout.onclick = ()=>{
    const r = state.boutResult;
    if(state.revealedCount < r.log.length){
      state.revealedCount = Math.min(r.log.length, state.revealedCount + 1);
      render();
      return;
    }
    const f = getFighterById(state.fighterId);
    const won = r.winner.id === f.id;
    const oppOVR = calcOVR(state.opponent.stats);

    let flash = null;
    let deltas = {};
    let prize, fameGain;

    if(state.isBlackMarket){
      prize = won ? rand(5,12) : rand(1,3);
      fameGain = won ? rand(1,3) : 0;
      updateFighter(state.fighterId, ff=>{
        ff.blackMarketLog.push({
          opponent: state.opponent.name, result: won?'W':'L', method:r.method,
          location: `the street, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR);
      });
      flash = "Word won't get back to any pit boss about this one.";
    } else if(state.tournamentContext){
      const tc = state.tournamentContext;
      const pit = currentPits().find(p=>p.id===tc.pitId);
      const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
      prize = won ? rand(8,16) : rand(2,5);
      fameGain = won ? rand(3,6) : (Math.random()<0.3 ? 1 : 0);
      updateOpponentRecord(state.provinceId, state.settlementName, pit.id, state.opponent.id, !won);
      recordPitResult(state.fighterId, cityKey, won);
      updateFighter(state.fighterId, ff=>{
        if(won) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier:'Juvenile', opponent: state.opponent.name, result: won?'W':'L', method:r.method,
          location: `${pit.name} — Tournament, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR);
      });
      const s2 = loadRoamState();
      const key2 = tc.pitId + '|' + tc.day;
      const tourney = s2.pitTournaments ? s2.pitTournaments[key2] : null;
      if(tourney){
        tourney.rounds[tc.roundIndex][tc.matchIndex].winnerId = won ? 'player' : state.opponent.id;
        s2.pitTournaments[key2] = tourney;
        saveRoamState(s2);
      }
      flash = won ? "You're moving on in the bracket." : "That's the tournament for you this week — the rest of the bracket plays out on its own.";
    } else if(state.fiestaContext){
      const pit = currentPits().find(p=>p.id===state.fightPitId);
      const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      prize = won ? entryFee*3 + rand(2,8) : Math.round(entryFee*0.5);
      fameGain = won ? (r.method==='Decision' ? rand(2,3) : rand(3,5)) : (Math.random()<0.25 ? 1 : 0);
      recordPitResult(state.fighterId, cityKey, won);
      if(state.fiestaContext.isVisitor){
        updateFieldFighterRecord(state.opponent.id, state.fiestaContext.provinceId, !won, true, {
          tier:'Juvenile', opponent: getFighterById(state.fighterId).name, result: won?'L':'W', method:r.method,
          location: `${pit.name} — Fiesta Night, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
      } else {
        updateOpponentRecord(state.provinceId, state.settlementName, pit.id, state.opponent.id, !won);
      }
      updateFighter(state.fighterId, ff=>{
        if(won) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier:'Juvenile', opponent: state.opponent.name, result: won?'W':'L', method:r.method,
          location: `${pit.name} — Fiesta Night${state.fiestaContext.isVisitor?' (visiting fighter)':''}, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.freeRoamFightCount += 1;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR);
      });
      flash = state.fiestaContext.isVisitor ? "Word travels fast — that one might make the papers in another province." : null;
    } else {
      const pit = currentPits().find(p=>p.id===state.fightPitId);
      const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
      const entryFee = 2 + Math.round(pit.reputationRequired/5);
      prize = won ? entryFee*3 + rand(0,5) : Math.round(entryFee*0.5);
      fameGain = won ? (r.method==='Decision' ? rand(1,2) : rand(2,4)) : (Math.random()<0.2 ? 1 : 0);
      // The opponent's record needs to persist back to the pit roster, or they'd stay
      // frozen at whatever record they were generated with forever.
      updateOpponentRecord(state.provinceId, state.settlementName, pit.id, state.opponent.id, !won);
      recordPitResult(state.fighterId, cityKey, won);
      updateFighter(state.fighterId, ff=>{
        if(won) ff.record.wins += 1; else ff.record.losses += 1;
        ff.fightLog.push({
          tier:'Juvenile', opponent: state.opponent.name, result: won?'W':'L', method:r.method,
          location: `${pit.name}, ${state.settlementName}`, date: dateForDay(getCurrentDay()).toISOString(),
        });
        ff.wallet += prize;
        ff.fame += fameGain;
        ff.freeRoamFightCount += 1;
        ff.tempBoost = null;
        deltas = growFighterStats(ff, won, r.method, oppOVR);
        const nextChoices = opponentChoiceCount(ff.freeRoamFightCount);
        const prevChoices = opponentChoiceCount(ff.freeRoamFightCount-1);
        if(nextChoices > prevChoices) flash = `Word's getting around — you can now pick from ${nextChoices} opponents when you register.`;
        const allPits = currentPits();
        const nextTierPit = allPits.find(p=> p.reputationRequired > (ff.fame-fameGain) && p.reputationRequired <= ff.fame);
        if(nextTierPit) flash = `A face from ${nextTierPit.name} was watching tonight — you're on their radar now.`;
      });
    }
    const wasTournament = !!state.tournamentContext;
    const tournamentPitId = wasTournament ? state.tournamentContext.pitId : null;
    state.tournamentContext = null;
    state.fiestaContext = null;
    if(!wasTournament){
      advanceDay(); // a fight — official or off the books — ends the day (tournament fights wait — see fight-result)
    }
    state.lastResult = { won, prize, fameGain, deltas, method:r.method, wasTournament, tournamentPitId };
    state.flashMessage = flash;
    state.screen = 'fight-result';
    render();
  };

  const backFromResult = document.getElementById('back-to-walk-from-result');
  if(backFromResult) backFromResult.onclick = ()=>{ state.flashMessage=null; state.screen='city-walk'; render(); };

  const watchRestOfBracket = document.getElementById('watch-rest-of-bracket');
  if(watchRestOfBracket) watchRestOfBracket.onclick = ()=>{
    const res = state.lastResult;
    const pit = currentPits().find(p=>p.id===res.tournamentPitId);
    state.visitingLocation = { type:'pit', pitId: pit.id };
    state.flashMessage = null;
    state.screen = 'tournament-night';
    render();
  };
  const simRestOfNight = document.getElementById('sim-rest-of-night');
  if(simRestOfNight) simRestOfNight.onclick = ()=>{
    advanceDay();
    state.flashMessage = null;
    state.screen = 'city-walk';
    render();
  };
  const callItANight = document.getElementById('call-it-a-night');
  if(callItANight) callItANight.onclick = ()=>{
    advanceDay();
    state.screen = 'city-walk';
    render();
  };
}

render();
</script>
<div class="version-badge">FREE ROAM · V12 · 2026-07-12</div>
</body>
</html>
