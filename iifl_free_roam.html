// Birthdays — the single source of truth for age from here on (mirrors fight_pit.html).
// Replaces the earlier calendar catch-up hack in advanceDay with the real mechanism:
// every fighter has a birthDay, age is always derived from it via syncFighterAge.
// A real 365-day calendar year. The whole island calendar recurs annually on this
// same cadence (nextJuvenileOpeningDay jumps to cycleYear+1's May 1, same month/day
// every year) — so a fighter's age should follow the same real-year clock everything
// else on the island already runs on, not an invented shorter unit.
const DAYS_PER_FIGHTER_YEAR = 365;
function birthDayForAge(age, today){
  return today - (age*DAYS_PER_FIGHTER_YEAR) - Math.floor(Math.random()*DAYS_PER_FIGHTER_YEAR); // no floor — a fighter older than the world itself needs a pre-Day-1 (negative) birthday; dateForDay() handles negative days fine via native Date math
}
function ageFromBirthday(birthDay, today){ return Math.max(0, Math.floor((today-birthDay)/DAYS_PER_FIGHTER_YEAR)); }

// Repairs birthDay values saved under the OLD 63-day-year system, which collapse to a
// near-zero apparent age once reinterpreted under the 365-day divisor. entryDay is real
// ground truth where available (juvenile intake always starts at exactly 11); everything
// else falls back to a rough fights-played estimate rather than trusting the already-
// corrupted age field. Gated by ageSystemVersion so it only ever runs once per fighter.
// v3 (2026-07-17): the v2 migration ran before DAYS_PER_FIGHTER_YEAR was corrected
// from 63 to 365, so it stamped fighters "migrated" with a wrong-divisor birthDay.
// v4 (2026-07-17, same day): birthDayForAge() had a Math.max(1, ...) floor that clamped
// EVERY fighter older than the world itself (world was only ~2 sim-years old) to a
// birthDay of exactly 1 — collapsing everyone's age to "years since Day 1" forever,
// which is what actually caused the persistent "everyone is 2" bug. A birthday before
// Day 1 is valid (dateForDay handles negative days fine); the floor was the bug, now
// removed. If age corruption ever resurfaces, bump this number again rather than
// patching in place — re-deriving without bumping just re-stamps the same fighters
// as "already fixed" without ever touching their bad data.
function estimateAgeFallback(f){
  const totalFights = f.record ? (f.record.wins||0)+(f.record.losses||0) : 0;
  if(f.juniorTeamId || f.amateurLeagueId){
    return Math.min(35, Math.max(14, 16 + Math.round(totalFights / 12)));
  }
  return Math.min(18, Math.max(11, 11 + Math.round(totalFights / 7)));
}
function syncFighterAge(f, today){
  if(f.ageSystemVersion === 4){
    if(!f.birthDay) f.birthDay = birthDayForAge(f.age || 12, today);
    f.age = ageFromBirthday(f.birthDay, today);
    return;
  }
  if(f.entryDay){
    f.age = 11 + Math.floor((today - f.entryDay) / DAYS_PER_FIGHTER_YEAR);
  } else {
    f.age = estimateAgeFallback(f);
  }
  f.birthDay = birthDayForAge(f.age, today);
  f.ageSystemVersion = 4;
}

function ensureFighterDefaults(f){
  if(!f.record) f.record = { wins:0, losses:0 };
  if(!f.fightLog) f.fightLog = [];
  if(!f.age) f.age = 12;
  syncFighterAge(f, getCurrentDay());
  if(!f.talentTier) f.talentTier = 'normal';
  if(f.wallet === undefined) f.wallet = 10; // starting bankroll
  if(f.fame === undefined) f.fame = 0;
  if(f.freeRoamPitKey === undefined) f.freeRoamPitKey = null; // legacy single-pit field, kept for old saves
  if(!f.pitMemberships){
    // Migration: fighters signed under the old single-home-pit model get that pit
    // carried over as their first membership. Going forward, a fighter can be
    // registered at multiple pits at once — this array is the real source of truth.
    f.pitMemberships = [];
    if(f.freeRoamPitKey){
      const [pid, city, pitId] = f.freeRoamPitKey.split('|');
      f.pitMemberships.push({ key: f.freeRoamPitKey, pitId, pitName: null, settlementName: city, provinceId: pid, record: { wins:0, losses:0 } });
    }
  }
  if(f.freeRoamFightCount === undefined) f.freeRoamFightCount = 0;
  if(f.agentType === undefined) f.agentType = null;
  if(!f.blackMarketLog) f.blackMarketLog = [];
  if(f.tempBoost === undefined) f.tempBoost = null;
  if(f.juvenileHomeProvinceId === undefined){
    // Backfill for fighters who signed at a pit before this field existed in Free Roam —
    // without this they're permanently locked out of Junior League draft eligibility no
    // matter how active their career actually was.
    f.juvenileHomeProvinceId = (f.pitMemberships && f.pitMemberships.length) ? f.pitMemberships[0].provinceId : null;
  }
  // Province/city access — earned via Wednesday Invitational acceptance or a successful
  // street "connection" encounter, permanent once granted. Home province and (once fame
  // is high enough) every province are always accessible regardless of this list — see
  // hasProvinceAccess()/hasCityTierAccess(). Kept separate from fame so a lucky early
  // connection can open a door before fame would, without needing a whole new system.
  if(!f.earnedProvinceAccess) f.earnedProvinceAccess = [];
  if(!f.earnedCityAccess) f.earnedCityAccess = []; // entries are "provinceId|settlementName"
  if(f.currentProvinceId === undefined) f.currentProvinceId = null;
  if(f.currentSettlementName === undefined) f.currentSettlementName = null;
  reconcileRecord(f);
  return f;
}
// Same fix as Fight Pit — the header record is now always recomputed from the fight
// log rather than tracked as a separate counter that could fall out of sync with it.
function reconcileRecord(f){
  if(!f.fightLog) return;
  const wins = f.fightLog.filter(e=>e.result==='W').length;
  const losses = f.fightLog.filter(e=>e.result==='L').length;
  f.record = { wins, losses };
}
function getRoster(){
  const roster = loadRoster().map(ensureFighterDefaults);
  saveRoster(roster);
  return roster;
}
function getFighterById(id){ return getRoster().find(f=> f.id === id); }
function updateFighter(id, mutateFn){
  const roster = loadRoster().map(ensureFighterDefaults);
  const f = roster.find(r=> r.id === id);
  if(f){ mutateFn(f); saveRoster(roster); }
  return f;
}

/* ============================ MULTI-PIT MEMBERSHIP ============================ */
/*
  A fighter can be signed at more than one pit — the old single "home pit" model is
  gone. Overall record (for standings/top-10) still lives on f.record; each membership
  tracks its own separate win-loss for that specific pit's card.
*/
function isSignedAtPit(f, cityKey){ return f.pitMemberships.some(m=> m.key === cityKey); }
function getMembership(f, cityKey){ return f.pitMemberships.find(m=> m.key === cityKey); }
function signAtPit(fighterId, cityKey, pit, provinceId, settlementName){
  updateFighter(fighterId, f=>{
    if(isSignedAtPit(f, cityKey)) return;
    f.pitMemberships.push({ key: cityKey, pitId: pit.id, pitName: pit.name, settlementName, provinceId, record: { wins:0, losses:0 } });
    // One-time Juvenile league declaration — previously this only ever happened in Fight
    // Pit's separate season-selection screen, so anyone who played exclusively through
    // Free Roam never got it set and was silently locked out of Junior League draft
    // eligibility (which requires it) no matter how active their career was.
    if(!f.juvenileHomeProvinceId) f.juvenileHomeProvinceId = provinceId;
  });
}
function recordPitResult(fighterId, cityKey, won){
  updateFighter(fighterId, f=>{
    const m = getMembership(f, cityKey);
    if(!m) return;
    if(won) m.record.wins += 1; else m.record.losses += 1;
  });
}

  try{ const raw = localStorage.getItem(sk(ROAM_STATE_KEY)); return raw ? JSON.parse(raw) : { pits:{}, grids:{} }; }

function saveRoamState(s){
  try{ localStorage.setItem(sk(ROAM_STATE_KEY), JSON.stringify(s)); return true; }
  catch(err){
    console.error('IIFL free roam state save failed, attempting cleanup:', err);
    pruneRoamStateForSpace(s);
    try{ localStorage.setItem(sk(ROAM_STATE_KEY), JSON.stringify(s)); return true; }
    catch(err2){ console.error('IIFL free roam state save still failing after cleanup:', err2); return false; }
  }
}

// Three separate things in roam state grow without bound the same way the standing
// Juvenile pool did: tournament brackets are cached per pit per day forever, newspaper
// flavor is cached per province per day forever, and every settlement's walkable grid
// gets cached the first time it's visited and never evicted. None of these need to be
// permanent — a tournament bracket is a single night, a newspaper is old news in a
// month, and a revisited settlement can just regenerate a fresh layout.
function pruneRoamStateForSpace(s){
  const today = getCurrentDay();
  if(s.pitTournaments){
    Object.keys(s.pitTournaments).forEach(key=>{
      const day = parseInt(key.split('|').pop(), 10);
      if(!isNaN(day) && today - day > 7) delete s.pitTournaments[key];
    });
  }
  if(s.newspapers){
    Object.keys(s.newspapers).forEach(key=>{
      const day = parseInt(key.split('|').pop(), 10);
      if(!isNaN(day) && today - day > 14) delete s.newspapers[key];
    });
  }
  if(s.grids){
    const keys = Object.keys(s.grids);
    if(keys.length > 20){
      keys.slice(0, keys.length-20).forEach(k=> delete s.grids[k]);
    }
  }
}

function weightClassOf3(weightLb){ return weightClassOf(weightLb); }

function generatePitFighter(provinceId, settlementName, weightClass){
  const age = rand(12,17);
  const r = Math.random();
  const talentTier = r<0.015 ? 'generational' : r<0.18 ? 'prodigy' : 'normal';
  const ceilings = { normal:35, prodigy:35, generational:65 };
  const ceiling = Math.round((ceilings[talentTier]||35) * (age/18));
  const target = rand(Math.round(ceiling*0.3), Math.max(Math.round(ceiling*0.85),4));
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{ stats[k] = clamp(target+rand(-5,5), 3, ceiling+5); });
  const wins = rand(0, age-11); const losses = rand(0, Math.max(1,age-12));
  const build = pick(['lean','athletic','stocky']);
  const bmiTarget = bmiForBuild(build);
  const adultHeightIn = rollAdultHeightIn();
  const heightIn = heightForAge(adultHeightIn, age);
  const weightLb = weightForAge(heightIn, age, bmiTarget);
  return {
    id: 'pitfighter_' + Date.now() + '_' + rand(0,999999),
    name: pickName(provinceId, settlementName),
    age, heightIn, weightLb, weightClass: weightClassOf(weightLb), adultHeightIn, bmiTarget,
    primaryDisc: pickWeightedDiscipline(PROVINCES.find(p=>p.id===provinceId)),
    stats, talentTier,
    allTimeRecord: { wins, losses },
    appearance: { skin: pick(SKIN_TONES), hair: pick(HAIR_COLORS), build },
  };
}

// Roster depth per pit scales with the city's actual population, split across however
// many pits that city supports — bigger cities mean deeper, more numerous pits.
function pitRosterSize(population, pitCount){
  const perPit = population / pitCount;
  return clamp(Math.round(perPit/2200) + rand(-2,3), 5, 24);
}

// Stable, cheap string hash — used to deterministically (not randomly, so it's the
// same every time you check) sort real registry fighters into a settlement's pits.
function hashId(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return h;
}

// Pit rosters are a LIVE view into the real, shared Juvenile registry (pools.juvenile)
// — the same population the newspaper and standings read from — filtered to fighters
// whose hometown is this settlement, then deterministically bucketed across however
// many pits this settlement has. Nothing here is a frozen snapshot: new intake shows
// up automatically, and records/growth are always current because this is computed
// fresh every time, not stored.
function attachLiveRosters(metas, provinceId, settlementName){
  catchUpJuvenileSimulation();
  const pools = loadFieldPools();
  const pool = (pools.juvenile[provinceId] || []).filter(f=> f.hometown === settlementName && juvenileFightsRemaining(f) > 0);
  const buckets = metas.map(()=>[]);
  pool.forEach(f=>{
    const idx = hashId(f.id) % metas.length;
    buckets[idx].push(f);
  });
  return metas.map((m,i)=> Object.assign({}, m, { roster: buckets[i] }));
}

function ensureCityPits(provinceId, settlementName){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  const tier = entry ? entry.tier : 'Village';
  const province = PROVINCES.find(p=>p.id===provinceId);
  let metas = s.pits[key];
  if(metas){
    // Repair pass: saves generated before the flagship-pit fix won't have it yet —
    // rename the free (index 0) pit to it rather than leaving it permanently missing.
    if(tier==='Capital' && province && province.pit && !metas.some(p=>p.name===province.pit)){
      metas[0].name = province.pit;
      saveRoamState(s);
    }
    return attachLiveRosters(metas, provinceId, settlementName);
  }
  const pitCount = PIT_COUNT_BY_TIER[tier] || 1;
  const usedNames = new Set();
  metas = [];
  for(let i=0;i<pitCount;i++){
    let pitName;
    if(i===0 && tier==='Capital' && province && province.pit){
      // Every province has one canonical, GDD-named flagship pit (Big Jim's in Di
      // Tiero, The Forge Pit in Alexandretta, etc) — guarantee it actually shows up
      // in that province's capital instead of only existing in flavor text/dialogue.
      pitName = province.pit;
    } else {
      pitName = pick(PIT_NAMES);
      let guard=0; while((usedNames.has(pitName) || (province && pitName===province.pit)) && guard<30){ pitName = pick(PIT_NAMES); guard++; }
    }
    usedNames.add(pitName);
    metas.push({
      id: 'pit_' + key.replace(/\s+/g,'_') + '_' + i,
      name: pitName,
      bossName: pickName(provinceId, settlementName),
      bossTitle: pick(BOSS_TITLES),
      reputationRequired: i<2 ? 0 : Math.round(8 + (i-1)*11 + rand(-2,3)),
    });
  }
  s.pits[key] = metas;
  saveRoamState(s);
  return attachLiveRosters(metas, provinceId, settlementName);
}

/* ============================ FIGHT NIGHT SCHEDULE ============================ */
/*
  Monday is Juvenile League Fight Night. 30-minute fight slots with a 10-minute gap
  between them, spaced backward from a fixed 9:00 PM main event — a card with more
  fights just starts earlier in the evening instead of the main event landing whenever
  the slots happen to run out. Most of a pit's roster gets paired off into fixed,
  promoter-booked matchups — best matchups (by combined record quality) land in the
  the LATEST slots as headliners. A couple of fighters are held out as free agents, and
  a couple of slots stay open, so the player can walk in, pick a free opponent, and pick
  one of the open slots for themselves.
*/
function generateTimeSlots(count){
  const slots = [];
  const MAIN_EVENT_HOUR = 21, MAIN_EVENT_MINUTE = 0; // 9:00 PM — the last slot always lands here
  const SLOT_SPACING_MIN = 40; // 30-minute fight + 10-minute gap
  let totalMinutes = MAIN_EVENT_HOUR*60 + MAIN_EVENT_MINUTE - (count-1)*SLOT_SPACING_MIN;
  for(let i=0;i<count;i++){
    let hour = Math.floor(totalMinutes/60), minute = totalMinutes%60;
    const period = hour >= 12 ? 'PM' : 'AM';
    const displayHour = hour > 12 ? hour-12 : (hour===0?12:hour);
    slots.push(`${displayHour}:${minute.toString().padStart(2,'0')} ${period}`);
    totalMinutes += SLOT_SPACING_MIN;
  }
  return slots;
}
// Earlier slots pay less, the main event pays the most — same shape every card
// regardless of how many fights are on it, since it's the SLOT position that matters.
function paySlotMultiplier(slotIndex, totalSlots){
  if(totalSlots <= 1) return 1.3;
  return 0.6 + (slotIndex/(totalSlots-1)) * 0.9; // 0.6x opener up to 1.5x main event
}

function ensurePitSchedule(pit, day){
  const s = loadRoamState();
  if(!s.pitSchedules) s.pitSchedules = {};
  const key = pit.id + '|' + day;
  if(s.pitSchedules[key]) return s.pitSchedules[key];

  const roster = [...pit.roster];
  const shuffled = [...roster].sort(()=>Math.random()-0.5);
  const freeAgentCount = Math.min(4, Math.max(1, Math.floor(shuffled.length*0.25)));
  const freeAgents = shuffled.slice(0, freeAgentCount).map(f=>f.id);
  const toPair = shuffled.slice(freeAgentCount);

  const matches = [];
  for(let i=0;i+1<toPair.length;i+=2){
    const a = toPair[i], b = toPair[i+1];
    const quality = (a.record.wins-a.record.losses) + (b.record.wins-b.record.losses) + calcOVR(a.stats) + calcOVR(b.stats);
    matches.push({ aId: a.id, bId: b.id, quality });
  }
  matches.sort((a,b)=> a.quality-b.quality); // worst first — best matchups land last (headliners)

  const openCount = Math.min(2, Math.max(1, Math.round(shuffled.length/8)));
  const totalSlots = matches.length + openCount;
  const openPositions = new Set();
  while(openPositions.size < openCount && openPositions.size < totalSlots){
    openPositions.add(rand(0, totalSlots-1));
  }
  const times = generateTimeSlots(totalSlots);
  let matchIdx = 0;
  const slots = times.map((time,i)=>{
    if(openPositions.has(i)) return { time, matchup: null, bookedByPlayer: false };
    return { time, matchup: matches[matchIdx++], bookedByPlayer: false };
  });

  const schedule = { day, freeAgents, slots };
  s.pitSchedules[key] = schedule;
  saveRoamState(s);
  return schedule;
}

function bookScheduleSlot(pit, day, slotIndex, opponentId){
  const s = loadRoamState();
  const key = pit.id + '|' + day;
  const schedule = s.pitSchedules[key];
  if(!schedule) return null;
  schedule.slots[slotIndex].matchup = { aId: 'player', bId: opponentId };
  schedule.slots[slotIndex].bookedByPlayer = true;
  schedule.freeAgents = schedule.freeAgents.filter(id=> id !== opponentId);
  saveRoamState(s);
  return schedule;
}

/* ============================ TUESDAY TOURNAMENT ============================ */
/*
  8-fighter single-elimination bracket, locked in by the promoter — no walk-in slot
  picking like Monday. If you're signed at the pit you can buy in before the bracket
  locks; once it exists (someone joined or someone chose to just watch) the field is
  set. Every match that doesn't involve the player resolves instantly; the player's own
  matches wait for them to actually fight, round by round.
*/
function bracketRoundsNeeded(size){ return Math.round(Math.log2(size)); }

function getPitTournament(pit, day, weightClass){
  const s = loadRoamState();
  if(!s.pitTournaments) return null;
  return s.pitTournaments[pit.id + '|' + day + '|' + weightClass] || null;
}

function createPitTournament(pit, day, includePlayer, weightClass, kind){
  const s = loadRoamState();
  if(!s.pitTournaments) s.pitTournaments = {};
  const key = pit.id + '|' + day + '|' + weightClass;
  if(s.pitTournaments[key]) return s.pitTournaments[key];

  const classPool = pit.roster.filter(r=> r.weightClass === weightClass);
  const pool = [...classPool].sort(()=>Math.random()-0.5);
  const size = pool.length >= 16 ? 16 : (pool.length >= 8 ? 8 : (pool.length >= 4 ? 4 : 0));
  if(size === 0) return null; // not enough registered fighters in this weight class for a card tonight

  const fieldIds = pool.slice(0, size).map(x=>x.id);
  if(includePlayer) fieldIds[Math.floor(Math.random()*fieldIds.length)] = 'player';

  const round1 = [];
  for(let i=0;i<fieldIds.length;i+=2){
    round1.push({ aId: fieldIds[i], bId: fieldIds[i+1], winnerId: null });
  }
  const tourney = { day, pitId: pit.id, weightClass, kind: kind || 'local', size, rounds:[round1], complete:false, championId:null };
  s.pitTournaments[key] = tourney;
  saveRoamState(s);
  return tourney;
}

function tournamentFighterById(pit, playerFighter, id){
  if(id === 'player') return playerFighter;
  const inRoster = pit.roster.find(r=>r.id===id);
  if(inRoster) return inRoster;
  // The live roster is filtered to fighters who still have fights left
  // (attachLiveRosters) — someone who won an earlier match and then hit their career
  // cap before this screen re-rendered would otherwise vanish from view entirely and
  // show as "???" despite having a real, resolved result. Fall back to the full,
  // unfiltered province pool (name/record still intact there) just for display.
  if(state.provinceId){
    const pools = loadFieldPools();
    const full = (pools.juvenile && pools.juvenile[state.provinceId]) || [];
    const found = full.find(r=>r.id===id);
    if(found) return found;
  }
  return null;
}

function progressTournament(pit, playerFighter, tourney){
  const s = loadRoamState();
  const key = pit.id + '|' + tourney.day + '|' + tourney.weightClass;
  let changed = false;
  const round = tourney.rounds[tourney.rounds.length-1];
  round.forEach(m=>{
    if(m.winnerId) return;
    if(m.aId==='player' || m.bId==='player') return; // wait for the player to actually fight
    const a = tournamentFighterById(pit, playerFighter, m.aId);
    const b = tournamentFighterById(pit, playerFighter, m.bId);
    // Pit rosters are a LIVE view of the shared pool (attachLiveRosters) — a fighter
    // booked into this bracket can vanish before their match comes up (most commonly:
    // they hit their career fight cap via the same day's island-wide auto-sim), which
    // used to leave the match stuck on "pending" forever with no way for the bracket to
    // ever complete. Whoever's still found gets it by forfeit; if neither side can be
    // found, it's dropped as a no-contest so the round can still close out.
    if(!a && !b){ m.winnerId = 'no-contest'; changed = true; return; }
    if(!a || !b){ m.winnerId = a ? m.aId : m.bId; changed = true; return; }
    const { winner } = quickSimBout(a, b);
    m.winnerId = winner.id;
    changed = true;
  });
  const roundDone = round.every(m=>m.winnerId);
  if(roundDone){
    const winners = round.map(m=>m.winnerId).filter(id=> id !== 'no-contest');
    if(winners.length <= 1){
      tourney.complete = true;
      tourney.championId = winners[0] || null;
      changed = true;
    } else if(tourney.rounds.length < bracketRoundsNeeded(tourney.size)){
      const nextRound = [];
      for(let i=0;i<winners.length;i+=2){
        nextRound.push({ aId: winners[i], bId: winners[i+1] || null, winnerId: winners[i+1] ? null : winners[i] });
      }
      tourney.rounds.push(nextRound);
      changed = true;
    }
  }
  if(changed){
    s.pitTournaments[key] = tourney;
    saveRoamState(s);
  }
  return tourney;
}

/* ============================ WEDNESDAY FIESTA ============================ */
/*
  Wider, looser draw than a normal registered fight — mostly still local, but sometimes
  pulls a visiting fighter from the island-wide Juvenile registry (another pit, sometimes
  another province entirely), same pool the newspaper and the Fight Pit season draw from.
*/
function drawFiestaOpponent(pit){
  if(Math.random() < 0.3){
    const pools = loadFieldPools();
    const ids = Object.keys(pools.juvenile || {}).filter(id=> pools.juvenile[id].length);
    if(ids.length){
      const provinceId = pick(ids);
      const opp = pick(pools.juvenile[provinceId]);
      if(opp) return { opp, isVisitor: true, provinceId };
    }
  }
  if(pit.roster.length) return { opp: pick(pit.roster), isVisitor: false, provinceId: null };
  return null;
}

// Persists a win/loss back onto a specific pit-roster fighter — without this, every
// registered fighter would stay frozen at their generated starting record forever.
function updateOpponentRecord(provinceId, opponentId, opponentWon, logEntry){
  // Pit rosters are now a live view into the real Juvenile registry (the same
  // fighters the newspaper and standings show) — recording a result here means
  // writing straight to that registry, not a separate frozen snapshot that never
  // shows up anywhere else. This is what makes "who's in this pit" and "who's #1 in
  // the province" the same population instead of two disconnected casts.
  updateFieldFighterRecord(opponentId, provinceId, opponentWon, true, logEntry);
}

/* ============================ LOCAL ENCOUNTERS ============================ */
/*
  What used to be pure flavor text on "Local" grid boxes is now a real choice, for about
  half of them (fighter-news and local-color stay as quick informational stops — not
  every stranger on the street needs to be a life event). Three tiers, same math under
  every flavor: Decline is always free and safe. Smart Play is a modest, mostly-safe bet.
  Going All In is the foolhardy option — real upside, real chance it costs you.
  Injury is modeled as a negative tempBoost (the same field a lucky potion uses, just
  going the other way) so it plugs into every existing "apply tempBoost before the next
  fight" code path for free instead of needing its own wiring.
*/
const ENCOUNTER_OUTCOME_TABLE = {
  smart: { successChance: 0.80, success: { money:[4,12], fame:[0,1] }, setback: { money:[-6,-2] } },
  bold:  { successChance: 0.55, success: { money:[15,40], fame:[1,3] }, setback: { money:[-20,-8], fame:[-2,0], injury:[-8,-3] } },
};
function resolveLocalEncounterChoice(tier){
  if(tier === 'decline') return { outcome:'declined' };
  const table = ENCOUNTER_OUTCOME_TABLE[tier];
  const won = Math.random() < table.successChance;
  const bucket = won ? table.success : table.setback;
  const result = { outcome: won ? 'success' : 'setback', tier };
  if(bucket.money) result.money = rand(bucket.money[0], bucket.money[1]);
  if(bucket.fame) result.fame = rand(bucket.fame[0], bucket.fame[1]);
  if(bucket.injury) result.injury = rand(bucket.injury[0], bucket.injury[1]);
  if(tier==='bold' && won && Math.random() < 0.25) result.statBoost = 1; // rare genuine growth tick, on top of the cash
  return result;
}

function generateLocalEncounter(provinceId, settlementName){
  const name = pickName(provinceId, settlementName);
  const player = state.fighterId ? getFighterById(state.fighterId) : null;
  const fightLog = (player && player.fightLog) ? player.fightLog : [];
  const pastLosses = fightLog.filter(e=> e.opponentId && e.result === 'L');
  const pastWins = fightLog.filter(e=> e.opponentId && e.result === 'W');

  // ~25% of the time, if the career has real history to draw on, this "stranger" turns
  // out to actually be someone from it — gives street encounters continuity with the
  // real career, and crucially means the name is a real fighterId, not a throwaway —
  // clickable to open their actual Fighter Card, not a dead end.
  if(Math.random() < 0.25 && (pastLosses.length || pastWins.length)){
    const useLoss = pastLosses.length && (!pastWins.length || Math.random() < 0.5);
    const pool = useLoss ? pastLosses : pastWins;
    const past = pick(pool);
    const rivalKind = useLoss ? 'beat-you' : 'you-beat';
    const candidates = LOCAL_ENCOUNTERS.filter(e=> e.rivalKind === rivalKind);
    if(candidates.length){
      const templateIndex = LOCAL_ENCOUNTERS.indexOf(pick(candidates));
      const template = LOCAL_ENCOUNTERS[templateIndex];
      return {
        name: past.opponent, role:'encounter', templateIndex,
        setupLine: template.setup(past.opponent),
        opponentId: past.opponentId, // real fighter — renderLocNpc uses this to make the name clickable
      };
    }
  }

  const generalPool = LOCAL_ENCOUNTERS.filter(e=> !e.rivalKind);
  const templateIndex = LOCAL_ENCOUNTERS.indexOf(pick(generalPool));
  const template = LOCAL_ENCOUNTERS[templateIndex];
  // templateIndex is what actually gets persisted (via the city grid → saveRoamState →
  // JSON.stringify). setupLine is a plain string, safe to store. template itself is NOT
  // stored on the object below — it's a live JS object with function properties
  // (smartWin/smartLose/boldWin/boldLose), and JSON.stringify silently drops functions.
  // Embedding it directly here worked right up until the grid got cached to localStorage
  // and reloaded, at which point every encounter's choice buttons stopped doing anything —
  // renderLocNpc always re-derives the real template from LOCAL_ENCOUNTERS[templateIndex].
  return { name, role:'encounter', templateIndex, setupLine: template.setup(name) };
}

function generateNpc(provinceId, settlementName, role, pits){
  const name = pickName(provinceId, settlementName);
  if(role === 'encounter'){
    return generateLocalEncounter(provinceId, settlementName);
  }
  if(role === 'fighter-news'){
    const pool = pits.flatMap(p=>p.roster);
    if(pool.length){
      const subject = pick(pool);
      const rec = subject.record;
      const recordPhrase = rec.wins > rec.losses*2 ? `${rec.wins}-${rec.losses} and barely breaking a sweat.`
        : rec.wins > rec.losses ? `${rec.wins}-${rec.losses}, solid.`
        : rec.wins === rec.losses ? `${rec.wins}-${rec.losses} — could go either way with this one.`
        : `${rec.wins}-${rec.losses} — rough stretch lately.`;
      const line = fillTpl(pick(FIGHTER_NEWS_TEMPLATES), { name: subject.name, recordPhrase });
      return { name, role, line, subjectFighterId: subject.id };
    }
  }
  if(role === 'local-color'){
    return { name, role, line: pick(LOCAL_COLOR_LINES) };
  }
  const lineTemplate = pick(NPC_ROLE_LINES[role] || ADVICE_LINES_PIT);
  const line = lineTemplate.replace('{pit}', pits.length ? pick(pits).name : 'one of the local pits');
  return { name, role, line };
}

const GRID_SIZE_BY_TIER = { Capital:7, City:6, Town:5, Village:4 };

// A fighter always has their home province and — once famous enough — the whole
// island. Everything else needs a specific earned "in" (invite accepted, street
// connection paid off). Fame thresholds are deliberately island-wide and low relative
// to what it'd take to actually COMPETE somewhere — this is about who'll let you in
// the door, not whether you're good enough, so opening a new region never changes the
// difficulty of what's inside it. See ensureFighterDefaults for earnedProvinceAccess/
// earnedCityAccess persistence.
const FAME_CITY_TIER_UNLOCK = 12;   // opens City/Capital tier inside any already-unlocked province
// Replaces the old flat FAME_PROVINCE_UNLOCK=30 for every province — the door should be
// harder to get through into the flagship provinces than the entry-level ones, same
// prestige ordering the Jr Leagues already use (Ironbound > Northgate > Tidewater).
const PROVINCE_FAME_UNLOCK = {
  kolsati: 65, ditiero: 65,               // Ironbound tier — flagship
  sherwood: 40, alexandretta: 40, bay: 40, // Northgate tier — mid
  gazon: 20, carpathia: 20, northeast: 20, // Tidewater tier — easiest entry point
};
function settlementTier(provinceId, settlementName){
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  return entry ? entry.tier : 'Village';
}
function hasProvinceAccess(f, provinceId){
  if(!provinceId) return false;
  if(provinceId === f.juvenileHomeProvinceId) return true;
  if((f.fame||0) >= (PROVINCE_FAME_UNLOCK[provinceId] !== undefined ? PROVINCE_FAME_UNLOCK[provinceId] : 30)) return true;
  return (f.earnedProvinceAccess||[]).includes(provinceId);
}
function hasCityTierAccess(f, provinceId, settlementName){
  if(!hasProvinceAccess(f, provinceId)) return false;
  if(provinceId === f.juvenileHomeProvinceId) return true; // home turf — every city always open
  const tier = settlementTier(provinceId, settlementName);
  if(tier==='Village' || tier==='Town') return true;
  if((f.fame||0) >= FAME_CITY_TIER_UNLOCK) return true;
  return (f.earnedCityAccess||[]).includes(provinceId+'|'+settlementName);
}
// Call whenever the player's live position changes — Home Hub has no session state of
// its own, so this is the only way it can show "currently in X" without recomputing
// the whole free-roam grid.
function persistCurrentLocation(){
  if(!state.fighterId || !state.provinceId || !state.settlementName) return;
  updateFighter(state.fighterId, ff=>{
    ff.currentProvinceId = state.provinceId;
    ff.currentSettlementName = state.settlementName;
  });
}

function ensureCityGrid(provinceId, settlementName){
  const s = loadRoamState();
  const key = provinceId + '|' + settlementName;
  if(s.grids[key]){
    // Repair pass: grids cached before roaming events existed won't have this field —
    // without this, walking into an older-saved city crashes on grid.roamingEvents.find().
    const grid = s.grids[key];
    if(!Array.isArray(grid.roamingEvents)){
      const tierForRepair = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
      const roamingCount = tierForRepair && tierForRepair.tier==='Capital' ? 2 : 1;
      grid.roamingEvents = [];
      placeRoamingEvents(grid, roamingCount);
      saveRoamState(s);
    }
    return grid;
  }
  const entry = (SETTLEMENT_DATA[provinceId]||[]).find(e=>e.name===settlementName);
  const tier = entry ? entry.tier : 'Village';
  const size = GRID_SIZE_BY_TIER[tier] || 4;
  const pits = ensureCityPits(provinceId, settlementName);

  const cells = [];
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) cells.push({ row:r, col:c });
  // shuffle and place locations, keep start cell (center-ish) empty
  const startCell = { row: Math.floor(size/2), col: Math.floor(size/2) };
  const available = cells.filter(c=> !(c.row===startCell.row && c.col===startCell.col));
  for(let i=available.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [available[i],available[j]]=[available[j],available[i]]; }

  const locations = [];
  let idx = 0;
  pits.forEach((pit,i)=>{
    if(idx < available.length){ locations.push({ ...available[idx], type:'pit', pitId: pit.id }); idx++; }
  });
  if(idx < available.length){ locations.push({ ...available[idx], type:'travel' }); idx++; }
  const npcCount = clamp(Math.round(size*0.9), 2, 6);
  const npcRoles = ['encounter','encounter','encounter','fighter-news','local-color','fighter-news'];
  for(let i=0;i<npcCount && idx<available.length;i++){
    locations.push({ ...available[idx], type:'npc', npc: generateNpc(provinceId, settlementName, npcRoles[i%npcRoles.length], pits) });
    idx++;
  }
  if(idx < available.length){ locations.push({ ...available[idx], type:'minigames' }); idx++; }

  const roamingCount = tier==='Capital' ? 2 : 1;
  const grid = { size, startCell, locations, roamingEvents: [] };
  s.grids[key] = grid;
  placeRoamingEvents(grid, roamingCount);
  saveRoamState(s);
  return grid;
}

// Roaming event squares wander the grid — they relocate to a fresh empty cell every time
// the period changes, representing chance encounters as the day moves along.
function placeRoamingEvents(grid, count){
  const occupied = new Set(grid.locations.map(l=>l.row+'_'+l.col));
  occupied.add(grid.startCell.row+'_'+grid.startCell.col);
  const options = [];
  for(let r=0;r<grid.size;r++) for(let c=0;c<grid.size;c++){
    if(!occupied.has(r+'_'+c)) options.push({row:r,col:c});
  }
  for(let i=options.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [options[i],options[j]]=[options[j],options[i]]; }
  grid.roamingEvents = options.slice(0, count).map(pos=> ({ ...pos }));
}
function relocateEventSquares(){
  if(!state.provinceId || !state.settlementName) return;
  const s = loadRoamState();
  const key = state.provinceId + '|' + state.settlementName;
  const grid = s.grids[key];
  if(!grid) return;
  placeRoamingEvents(grid, grid.roamingEvents.length || 1);
  saveRoamState(s);
}

// Monday morning — a pit you're actually registered at can invite you to headline
// tonight's League Night main event. Only fires for pits you're signed with, and only
// if you can actually get there (province/city access), since the invite is worthless
// otherwise. Accepting relocates you there and locks you into the main event slot.
function checkForMainEventInvite(){
  const today = getCurrentDay();
  if(state.pendingMainEventInvite) return; // already queued, don't stack another
  if(weekdayNameForDay(today) !== 'Monday') return;
  const f = getFighterById(state.fighterId);
  if(!f.pitMemberships || !f.pitMemberships.length) return;
  const candidates = f.pitMemberships.filter(m=>
    hasProvinceAccess(f, m.provinceId) && hasCityTierAccess(f, m.provinceId, m.settlementName)
  );
  if(!candidates.length) return;
  const m = pick(candidates);
  if(Math.random() < 0.25){
    state.pendingMainEventInvite = { pitId: m.pitId, provinceId: m.provinceId, settlementName: m.settlementName, pitName: m.pitName, day: today };
  }
}

// Home Hub's Sim Day/Sim Week/Advance-to-Next-Season already had a pause-on-major-event

// time — never did, so a major event day (like Draft Day) could arrive and pass silently
// with no pop-up at all. This is the same check, triggered every time advanceDay() runs.
function checkForMajorEventToday(){
  const today = getCurrentDay();
  if(state.pendingMajorEvent && state.pendingMajorEvent.day === today) return; // already queued
  const y = resolveTierSeason('juvenile', today).cycleYear;
  const events = [...getMajorEventsForYear(y), ...getMajorEventsForYear(y-1), ...getMajorEventsForYear(y+1)];

  if(!evt) return;
  if(loadEventLog().some(e=> e.day === evt.day)) return; // already surfaced (watched or simmed) once

function spendMove(){
  state.movesRemaining -= 1;

      state.movesRemaining = MOVES_PER_PERIOD;
      relocateEventSquares();

  }
}

const AGENT_TYPES = [
  { id:'pitmaster', label:'The Pit Master', skill:4, desc:"Runs the show. Knows every fighter in town cold — the real numbers." },
  { id:'streetguy', label:'A Street Guy', skill:3, desc:"Been around, knows who's who. Solid read, not exact." },
  { id:'brother', label:'Your Older Brother', skill:2, desc:"Believes in you more than he actually knows fighters." },
  { id:'friend', label:'A Friend, A Year Older', skill:1, desc:"Means well. Doesn't really know what he's talking about." },
];
function agentTypeInfo(id){ return AGENT_TYPES.find(a=>a.id===id) || AGENT_TYPES[3]; }

function generateScoutingReport(f, opp, agentSkill){
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  const mbF = matchupBonus(f.primaryDisc, opp.primaryDisc);
  const trueProb = winProbability(ovrF+mbF, ovrOpp);

  if(agentSkill >= 4){
    const styleNote = mbF>0 ? 'Your style has a real edge here.' : mbF<0 ? 'The matchup leans against you stylistically.' : 'Styles are roughly neutral.';
    return `Real numbers: you've got about a ${Math.round(trueProb*100)}% shot. ${styleNote}`;
  }
  if(agentSkill === 3){
    const band = trueProb>=0.65 ? 'a good chance' : trueProb>=0.45 ? "a real shot, could go either way" : 'an uphill fight';
    const statLean = ovrF>ovrOpp ? 'You look sharper overall.' : 'He looks like the tougher matchup on paper.';
    return `I'd call this ${band}. ${statLean}`;
  }
  const errRate = agentSkill===2 ? 0.25 : 0.45;
  const actuallyGood = trueProb >= 0.5;
  const saysGood = Math.random()<errRate ? !actuallyGood : actuallyGood;
  if(agentSkill===2) return saysGood ? "I like your chances on this one." : "Honestly? Tough matchup. Be careful out there.";
  return saysGood ? "You got this, easy! Don't even worry about it." : "I dunno man... this guy looks scary.";
}

function renderCityWalk(){

  const entry = (SETTLEMENT_DATA[state.provinceId]||[]).find(e=>e.name===state.settlementName);
  const pits = currentPits();
  const juvenileInSeasonForWalk = resolveTierSeason('juvenile', getCurrentDay()).phase !== 'dead-days';
  const eligiblePits = juvenileInSeasonForWalk ? pits.filter(p=> f.fame >= p.reputationRequired) : [];

  const cellsHtml = [];
  for(let r=0;r<grid.size;r++){
    for(let c=0;c<grid.size;c++){
      const isYou = state.position.row===r && state.position.col===c;
      const loc = grid.locations.find(l=>l.row===r && l.col===c);
      const roaming = grid.roamingEvents.find(e=>e.row===r && e.col===c);
      let icon = '', label = '';
      if(loc){
        if(loc.type==='pit'){ icon='🥊'; label = pits.find(p=>p.id===loc.pitId).name; }
        else if(loc.type==='npc'){ icon='🗣️'; label = 'Local'; }
        else if(loc.type==='minigames'){ icon='🎲'; label = '???'; }
        else if(loc.type==='travel'){ icon='🛣️'; label = 'Road Out'; }

      const cls = isYou ? 'you' : (loc||roaming ? '' : 'empty');
      cellsHtml.push(`<div class="block-cell ${cls}" data-walk-cell="${r}|${c}">
        ${isYou ? '<span class="bc-icon">🧍</span>YOU' : (loc||roaming) ? `<span class="bc-icon">${icon}</span>${label}` : ''}
      </div>`);
    }
  }

  const prov = PROVINCES.find(p=>p.id===state.provinceId);
  return `

      ${prov ? `<div style="position:absolute; top:-10px; right:-10px; width:150px; height:150px; background-image:url('${prov.flag}'); background-size:cover; background-position:center; opacity:0.07; pointer-events:none; border-radius:50%;"></div>` : ''}

      <div class="city-head-name">${state.settlementName}</div>
      <div class="city-head-meta">${entry?entry.tier:''} · Pop. ${entry?entry.population.toLocaleString():'?'} · ${pits.length} fight pit${pits.length===1?'':'s'} in town</div>
    </div>
    <div class="time-bar">
      <div><span class="time-day">${formatCalendarDate(getCurrentDay())}</span><span class="time-period">${state.period}</span></div>
      <div class="time-moves">${'●'.repeat(state.movesRemaining)}${'○'.repeat(MOVES_PER_PERIOD-state.movesRemaining)} moves left</div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <span class="wallet-badge">$${f.wallet}</span>
      <span class="clickable-name" data-open-fighter="${f.id}" style="font-family:var(--label); font-size:11px; text-transform:uppercase; letter-spacing:1px;">${f.name} — Fighter Card</span>
      <span class="wallet-badge" style="color:var(--bone-dim);">Fame: ${f.fame}</span>

    <div class="block-grid" style="--gcols:${grid.size};">${cellsHtml.join('')}</div>
    <div class="walk-hint">Click an adjacent block to walk there. Each step costs a move.</div>
    <div class="btn-row">
      <button class="btn" id="back-to-select-from-walk">← Fighter Select</button>
      <button class="btn" id="read-newspaper">📰 Newspaper</button>
      <button class="btn" id="view-black-market">🕶️ Black Market (${(f.blackMarketLog||[]).length})</button>
      ${pits.some(p=> isSignedAtPit(f, state.provinceId+'|'+state.settlementName+'|'+p.id)) && eligiblePits.length ? `<button class="btn btn-primary" id="find-a-fight">Find a Fight →</button>` : ''}

function renderCalendar(){
  const f = state.fighterId ? getFighterById(state.fighterId) : null;
  const today = getCurrentDay();
  // Use the actual calendar year the clock is on — NOT currentIslandYear()/the juvenile
  // cycle-year, which intentionally rolls back to the previous year for the first ~2
  // months of every cycle (before the season opens on May 1). That's correct for season
  // math but wrong here: in early-year saves it showed a nonexistent prior year's dates
  // instead of "whatever year we're actually in."
  const year = dateForDay(today).getFullYear();
  const events = getMajorEventsForYear(year).sort((a,b)=> a.day-b.day);
  const log = loadEventLog();
  const logByDay = {};
  log.forEach(e=> logByDay[e.day] = e);
  const tab = state.calendarTab || 'tracker';

  const tabsHtml = `
    <div class="btn-row" style="margin-bottom:16px;">
      <button class="btn ${tab==='tracker'?'btn-primary':''}" id="cal-tab-tracker" style="flex:1;">Year Tracker</button>
      <button class="btn ${tab==='grid'?'btn-primary':''}" id="cal-tab-grid" style="flex:1;">Month Grid</button>
    </div>
  `;

  if(tab === 'tracker'){
    const trackerHtml = events.map(e=>{
      const status = e.day < today ? 'past' : e.day === today ? 'today' : 'upcoming';
      const logged = logByDay[e.day];
      return `
        <div class="pit-card" style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="pit-name">${e.title}</div>
            <div class="pit-meta">${e.tier} · ${formatCalendarDate(e.day)}</div>
            ${e.description ? `<div class="pit-meta" style="opacity:0.75;">${e.description}</div>` : ''}
          </div>
          <div style="text-align:right;">
            ${status==='today' ? `<span style="color:var(--brass); font-family:var(--label); font-size:11px; text-transform:uppercase;">Today</span>`
              : status==='upcoming' ? `<span style="color:var(--muted); font-family:var(--mono); font-size:11px;">in ${e.day-today}d</span>`
              : logged ? `<span style="font-family:var(--mono); font-size:10px; color:var(--good);">${logged.watched?'Watched':'Simmed'}</span>`
              : `<span style="font-family:var(--mono); font-size:10px; color:var(--muted);">Passed</span>`}
          </div>
        </div>
      `;
    }).join('');
    return `
      ${tabsHtml}
      <div class="section-label">Year Tracker — ${year}</div>
      <div class="pit-grid" style="grid-template-columns:1fr;">${trackerHtml}</div>
      <div class="btn-row" style="margin-top:16px;"><button class="btn" id="cal-back">← Back</button><span></span></div>
    `;
  }

  // Month grid — defaults to the month containing today, navigable via state.calendarMonthOffset
  const offset = state.calendarMonthOffset || 0;
  const base = dateForDay(today);
  const gridMonthDate = new Date(base.getFullYear(), base.getMonth()+offset, 1);
  const gridYear = gridMonthDate.getFullYear();
  const gridMonth = gridMonthDate.getMonth(); // 0-indexed
  const daysInMonth = new Date(gridYear, gridMonth+1, 0).getDate();
  const startWeekday = new Date(gridYear, gridMonth, 1).getDay();
  const gridYearEvents = getMajorEventsForYear(gridYear).sort((a,b)=> a.day-b.day);

  const juniorSeason = f && f.juniorTeamId ? resolveTierSeason('junior', today) : null;

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell cal-empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dayIndex = dayForCalendarDate(gridYear, gridMonth+1, d);
    const isToday = dayIndex === today;
    const weekday = weekdayNameForDay(dayIndex);
    const juvSeason = resolveTierSeason('juvenile', dayIndex);
    const isJuvFightNight = ['Monday','Tuesday','Wednesday'].includes(weekday) && juvSeason.phase !== 'dead-days';
    const majorEvent = gridYearEvents.find(e=> e.day === dayIndex);
    const eventActive = majorEvent && dayIndex <= today; // arrived — clickable through to its landing page
    let markers = '', label = '';
    if(majorEvent){
      markers = `<div class="cal-marker cal-marker-major">★</div>`;
      label = `<div class="cal-event-label ${eventActive?'':'cal-inactive'}">${majorEvent.title}</div>`;
    } else if(isJuvFightNight){
      markers = `<div class="cal-marker" title="${eventNameForDay(dayIndex)}">🥊</div>`;
    }
    const clickable = eventActive && majorEvent.watchUrl;
    const cellTitle = majorEvent ? `${majorEvent.title}${eventActive ? '' : ' — not active yet'}` : (isJuvFightNight ? eventNameForDay(dayIndex) : '');
    cells += `<div class="cal-cell ${isToday?'cal-today':''} ${majorEvent?'cal-has-event':''} ${clickable?'cal-clickable':''}" ${clickable ? `data-cal-event-link="${majorEvent.watchUrl}"` : ''} title="${cellTitle}"><div class="cal-daynum">${d}</div>${markers}${label}</div>`;
  }

  return `
    ${tabsHtml}
    <div class="section-label" style="display:flex; justify-content:space-between; align-items:center;">
      <span>${gridMonthDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
      <span><button class="btn" id="cal-prev-month" style="padding:4px 10px;">←</button> <button class="btn" id="cal-next-month" style="padding:4px 10px;">→</button></span>
    </div>
    ${juniorSeason ? `<p style="font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:8px;">Your Junior team's season: <b>${juniorSeason.phase}</b> — full game-by-game schedule lives in the Junior League file.</p>` : ''}
    <div class="cal-grid">
      ${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-cell cal-head">${d}</div>`).join('')}
      ${cells}
    </div>
    <p style="font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:8px;">★ major event &nbsp; 🥊 Juvenile fight night</p>
    <div class="btn-row" style="margin-top:16px;"><button class="btn" id="cal-back">← Back</button><span></span></div>
  `;
}

function renderLocNpc(){
  const npc = state.visitingLocation.npc;
  if(npc.role === 'encounter'){
    // Always re-derive from the live LOCAL_ENCOUNTERS array — npc.templateIndex is what's
    // actually trustworthy after a save/reload. Falls back to matching by title for NPCs
    // generated before this fix (their stored templateIndex is missing, but the string
    // fields like title survived the old JSON round-trip fine).
    const t = LOCAL_ENCOUNTERS[npc.templateIndex]
      || (npc.template && LOCAL_ENCOUNTERS.find(e=> e.title === npc.template.title))
      || LOCAL_ENCOUNTERS[0];
    // Rival encounters carry a real opponentId — make the name clickable to open their
    // actual Fighter Card, since this genuinely is someone from the fight log, not a
    // throwaway stranger. This is what "I fought this guy and can't look him up" needed.
    const npcNameHtml = npc.opponentId
      ? `<span class="npc-name clickable-name" data-open-fighter="${npc.opponentId}" style="cursor:pointer; text-decoration:underline;">— ${npc.name} 🔍</span>`
      : `<span class="npc-name">— ${npc.name}</span>`;
    if(state.encounterResult){
      const res = state.encounterResult;
      let flavor, tone;
      if(res.outcome === 'declined'){ flavor = "You keep walking. Not every offer's worth the risk."; tone = ''; }
      else if(res.tier === 'smart'){ flavor = res.outcome==='success' ? t.smartWin(npc.name) : t.smartLose(npc.name); tone = res.outcome==='success' ? 'good' : 'bad'; }
      else { flavor = res.outcome==='success' ? t.boldWin(npc.name) : t.boldLose(npc.name); tone = res.outcome==='success' ? 'good' : 'bad'; }
      const bits = [];
      if(res.money){ bits.push(`<span style="color:${res.money>0?'var(--good)':'var(--ink-red)'};">${res.money>0?'+':''}$${res.money}</span>`); }
      if(res.fame){ bits.push(`<span style="color:${res.fame>0?'var(--good)':'var(--ink-red)'};">${res.fame>0?'+':''}${res.fame} Fame</span>`); }
      if(res.statBoost){ bits.push(`<span style="color:var(--brass);">A real, permanent edge — stat boost banked.</span>`); }
      if(res.injury){ bits.push(`<span style="color:var(--ink-red);">Banged up — ${res.injury} to everything, next fight only.</span>`); }
      return `
        <div class="loc-head"><div class="loc-name">${t.title}</div></div>
        <div class="npc-quote">"${npc.setupLine}"${npcNameHtml}</div>
        <p style="font-family:var(--body); font-size:13.5px; color:var(--bone-dim); margin:14px 0 8px;">${flavor}</p>
        ${bits.length ? `<div style="font-family:var(--mono); font-size:12px; text-align:center; margin-bottom:14px;">${bits.join(' &nbsp; ')}</div>` : ''}
        <div class="btn-row"><span></span><button class="btn btn-primary" id="back-to-walk">Keep Walking →</button></div>
      `;
    }
    return `
      <div class="loc-head"><div class="loc-name">${t.title}</div></div>
      <div class="npc-quote">"${npc.setupLine}"${npcNameHtml}</div>
      <div class="btn-row" style="margin-top:14px; flex-direction:column; gap:8px;">
        <button class="btn" id="encounter-decline" style="width:100%;">${t.declineLabel}</button>
        <button class="btn" id="encounter-smart" style="width:100%;">${t.smartLabel}</button>
        <button class="btn btn-primary" id="encounter-bold" style="width:100%;">${t.boldLabel}</button>
      </div>
    `;
  }
  return `
    <div class="npc-quote">
      "${npc.line}"
      <span class="npc-name">— ${npc.name}</span>
    </div>
    ${npc.subjectFighterId ? `<div class="btn-row"><span></span><button class="clickable-name" data-open-fighter="${npc.subjectFighterId}" style="background:none; border:1px solid var(--line); padding:8px 14px; font-family:var(--label); font-size:11px; text-transform:uppercase; letter-spacing:1px; cursor:pointer;">View Their Fighter Card →</button></div>` : ''}

  `;
}

function triggerRandomEvent(){
  const f = getFighterById(state.fighterId);
  const roll = Math.random();
  if(roll < 0.34){
    if(Math.random() < 0.08){
      // Rare — a stranger offering a genuine permanent point, not just a next-fight edge.
      state.randomEventPending = { type:'potion-permanent' };
    } else {
      const amount = rand(3,6);
      state.randomEventPending = { type:'potion', amount };
    }
  } else if(roll < 0.67){
    const opp = generatePitFighter(state.provinceId, state.settlementName, weightClassOf(f.weightLb));
    state.randomEventPending = { type:'kid-challenge', opponent: opp };
  } else {
    const pits = currentPits();
    const rivalPit = pick(pits);
    const opp = generatePitFighter(state.provinceId, state.settlementName, weightClassOf(f.weightLb));
    state.randomEventPending = { type:'pit-rival-challenge', opponent: opp, pitName: rivalPit.name };
  }
  state.screen = 'random-event';
}

/* ============================ LEAGUE STANDINGS (made up for now) ============================ */
/* Pro and Junior are team-based — standings plus a top 5 per weight class. Amateur and
   Juvenile don't have teams, just an island-wide top 10. All flavor-generated for now;
   not wired to the real Junior League file's live state yet. */

const TEAM_NICKNAME_POOL = ['Ironclads','Wolves','Vipers','Sentinels','Marauders','Drifters','Rebels','Stormguard','Tideburners','Grinders','Wardens','Outriders','Brawlers','Anchors','Timberwolves','Ridge Runners','Riptide','Fury','Shoguns','Ronin','Nightwatch','Wraiths','Hollowmen','Dust Runners','Sandstorm','Shades','Foundry'];
function generateTeamName(){
  const prov = pick(PROVINCES);
  const settlements = SETTLEMENT_DATA[prov.id] || [];
  const city = settlements.length ? pick(settlements).name : prov.name;
  return `${city} ${pick(TEAM_NICKNAME_POOL)}`;
}

function generateTeamTierData(teamCount){
  const teams = [];
  const usedNames = new Set();
  for(let i=0;i<teamCount;i++){
    let name = generateTeamName();
    let guard=0; while(usedNames.has(name) && guard<20){ name = generateTeamName(); guard++; }
    usedNames.add(name);
    teams.push({ name, wins: rand(2,18), losses: rand(2,18) });
  }
  teams.sort((a,b)=> (b.wins-b.losses)-(a.wins-a.losses));
  const topByWeight = {};
  WEIGHT_CLASSES_5.forEach(wc=>{
    const list = [];
    for(let i=0;i<5;i++){
      const prov = pick(PROVINCES);
      list.push({ name: pickName(prov.id, null), wins: rand(8,25), losses: rand(0,6), team: pick(teams).name });
    }
    list.sort((a,b)=> (b.wins-b.losses)-(a.wins-a.losses));
    topByWeight[wc] = list;
  });
  return { teams, topByWeight };
}

function generateIndividualTierData(){
  const list = [];
  for(let i=0;i<10;i++){
    const prov = pick(PROVINCES);
    const settlements = SETTLEMENT_DATA[prov.id] || [];
    const hometown = settlements.length ? pick(settlements).name : prov.name;
    list.push({
      name: pickName(prov.id, hometown),
      wins: rand(8,25), losses: rand(0,6),
      style: DISCIPLINE_NAMES[pickWeightedDiscipline(prov)],
      hometown,
      homePit: pick(PIT_NAMES),
    });
  }
  list.sort((a,b)=> (b.wins-b.losses)-(a.wins-a.losses));
  return list;
}

function ensureLeagueStandings(day){
  const s = loadRoamState();
  if(!s.leagueStandings) s.leagueStandings = {};
  if(s.leagueStandings[day]) return s.leagueStandings[day];
  const data = {
    pro: generateTeamTierData(10),
    junior: generateTeamTierData(12),
    amateur: generateIndividualTierData(),
  };
  s.leagueStandings[day] = data;
  saveRoamState(s);
  return data;
}

// Real, live Juvenile standings — same registry the newspaper and Fight Pit draw from.
// Not cached: it should reflect the season as it actually stands right now.
function realJuvenileStandings(n){
  catchUpJuvenileSimulation();
  const pools = loadFieldPools();
  let all = [];
  Object.entries(pools.juvenile || {}).forEach(([provinceId, list])=>{
    list.forEach(f=> all.push(Object.assign({}, f, { provinceId })));
  });
  // Same fix as the newspaper leaderboard — a registered player fighter is a real
  // Juvenile competitor and belongs in real standings, not just the NPC field pool.
  getRoster().filter(f=> f.juvenileHomeProvinceId).forEach(f=>{
    all.push(Object.assign({}, f, { provinceId: f.juvenileHomeProvinceId }));
  });
  all.sort((a,b)=> (b.record.wins-b.record.losses)-(a.record.wins-a.record.losses) || b.record.wins-a.record.wins);
  return all.slice(0, n);
}

  karate: ["Point-fighter speed with real pop on it.", "In and out before you know what hit you.", "That karate background shows up in the footwork."],
  judo: ["One bad grip and it's over for the other guy.", "Throws with real bad intentions.", "Judo background is criminally underused on this island — this one could change that."],
  catch: ["Sneaky mat game, comes out of nowhere.", "Old carny tricks — and I mean that as a compliment.", "Scrambles are where this one lives and dies."],
};
function generateCommentatorTakes(f){
  const names = [...COMMENTATOR_NAMES];
  for(let i=names.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [names[i],names[j]]=[names[j],names[i]]; }
  const statEntries = Object.entries(f.stats);
  statEntries.sort((a,b)=> b[1]-a[1]);
  const bottomStat = statEntries[statEntries.length-1][0];
  const takes = [];
  takes.push({ name: names[0], quote: pick(DISCIPLINE_TAKES[f.primaryDisc] || DISCIPLINE_TAKES.mma) });
  let potentialLine;
  if(f.talentTier === 'generational') potentialLine = "This isn't hype — once-a-generation type talent. Circle this name.";
  else if(f.talentTier === 'prodigy') potentialLine = "Ahead of schedule for the age. Worth keeping an eye on.";
  else if(f.potential !== undefined && f.potential >= 70) potentialLine = "Real ceiling here if the work gets put in.";
  else if(f.potential !== undefined && f.potential <= 30) potentialLine = "What you see now might be close to what you get — but plenty of careers get built on exactly that.";
  else potentialLine = "Solid, unspectacular — the kind of fighter leagues are actually built on.";
  takes.push({ name: names[1], quote: potentialLine });
  takes.push({ name: names[2], quote: `Needs to tighten up the ${bottomStat} before somebody tougher finds it.` });
  return takes;
}

const MATURITY_PCT_BY_AGE = { 11:0.74, 12:0.79, 13:0.84, 14:0.89, 15:0.93, 16:0.96, 17:0.98, 18:1.0 };
function projectAdultSize(f){
  const age = f.age || 18;
  const pct = MATURITY_PCT_BY_AGE[clamp(age, 11, 18)] || 1.0;
  const build = f.appearance ? f.appearance.build : 'athletic';
  let adultHeightIn = f.adultHeightIn;
  let bmiTarget = f.bmiTarget;
  if(!adultHeightIn){
    adultHeightIn = clamp(Math.round((f.heightIn||64) / pct), 64, 84);
    bmiTarget = bmiForBuild(build);
  }
  const adultWeightLb = weightFromHeight(adultHeightIn, bmiTarget);
  return { adultHeightIn, adultWeightLb, isGrown: pct >= 1.0 };
}
function growthOutlook(f){
  // juvenileHomeProvinceId is only ever set on the player's OWN roster fighter (it's
  // stamped during pit sign-up) — NPC field-pool fighters never get it, only a plain
  // provinceId. The old check (!f.juvenileHomeProvinceId) treated every single NPC
  // Juvenile as "amateur tier" and graded them against the adult ceiling (e.g. 88 for a
  // generational 14-year-old instead of the real 50), which is why Growth Outlook could
  // read "91% of ceiling" for a fighter who was actually already over their real cap.
  // Age is reliable on both NPCs and the roster fighter, so use that instead.
  const isAmateurTier = !!f.amateurLeagueId || (f.age !== undefined && f.age !== null && f.age >= 18);
  const ceiling = isAmateurTier ? bandCeiling(18, f.talentTier||'normal') : bandCeiling(f.age||11, f.talentTier||'normal');
  const avgStat = (f.stats.speed+f.stats.quickness+f.stats.toughness+f.stats.power+f.stats.agility)/5;
  const pctOfCeiling = clamp(avgStat/ceiling*100, 0, 100);
  let outlook;
  if(pctOfCeiling >= 90) outlook = 'Close to maxed out for where they are right now — future growth mostly comes from aging up.';
  else if(pctOfCeiling >= 60) outlook = 'Solid development so far, real room left to keep climbing.';
  else if(pctOfCeiling >= 30) outlook = 'Early in the development curve — plenty of runway left.';
  else outlook = 'Very raw. Most of the growth curve is still ahead.';
  return { ceiling, avgStat, pctOfCeiling, outlook };
}

function generateProjectedPath(f){
  const wc = f.weightClass || weightClassOf(f.weightLb||140);
  const discName = DISCIPLINE_NAMES[f.primaryDisc] || 'fighting';
  const growth = growthOutlook(f);
  let bucket;
  if(f.talentTier === 'generational') bucket = growth.pctOfCeiling >= 65 ? 'eliteMatured' : 'eliteWithRoom';
  else if(f.talentTier === 'prodigy') bucket = growth.pctOfCeiling >= 80 ? 'solidPro' : 'eliteWithRoom';
  else if(growth.pctOfCeiling >= 85) bucket = 'topAmateur';
  else if(growth.pctOfCeiling >= 60) bucket = 'averageAmateur';
  else if(growth.pctOfCeiling >= 35) bucket = 'juniorDepth';
  else bucket = 'washout';
  const line = pick(PROJECTED_PATH_TEMPLATES[bucket]);
  return fillTpl(line, { weightClass: wc, discipline: discName });
}

function draftWatchHtml(f){
  if(!f.age || f.age < 11 || f.age > 18) return '';
  if(f.juniorTeamId || f.amateurLeagueId) return '';
  const currentYear = dateForDay(getCurrentDay()).getFullYear();
  const birthYear = currentYear - f.age;
  const eligibleYear = birthYear + 14;
  const lastYear = birthYear + 17;
  const growth = growthOutlook(f);
  let spotLine;
  if(f.talentTier === 'generational') spotLine = 'Locked in as a Round 1 pick, likely top 3 overall, the moment they hit 14.';
  else if(f.talentTier === 'prodigy' && growth.pctOfCeiling >= 70) spotLine = 'Round 1 buzz — teams are already circling.';
  else if(growth.pctOfCeiling >= 80) spotLine = 'Early Day 1 projection — mid-to-late first round.';
  else if(growth.pctOfCeiling >= 60) spotLine = 'Day 2 projection — solid mid-round value.';
  else if(growth.pctOfCeiling >= 35) spotLine = 'Late-round flier territory right now — needs a jump to move up boards.';
  else spotLine = 'Off the board as of today. Would need a real leap in development to get drafted at all.';
  const status = f.age < 14
    ? `Eligible starting ${eligibleYear} (turns 14), through ${lastYear}.`
    : (f.age <= 17 ? `Eligible now, through ${lastYear}.` : `Final year of Junior draft eligibility — ages out after this.`);
  return `
    <div class="mf-section-title">Draft Watch</div>
    <p class="mf-growth-text">${status}</p>
    <p class="mf-growth-text">Current projected spot: ${spotLine}</p>
  `;
}

function topJuvenileFightersFor(provinceId, n){
  catchUpJuvenileSimulation();
  const pools = loadFieldPools();
  let pool;
  if(provinceId === 'island'){
    pool = [];
    Object.values(pools.juvenile || {}).forEach(list=> pool = pool.concat(list));
  } else {
    pool = pools.juvenile[provinceId] || [];
  }
  // The NPC field pool isn't the whole registry — a player's own created fighter is a
  // real, registered Juvenile competitor too, and belongs in "real records" standings
  // right alongside them, not left out because they live in a separate save slot.
  const roster = getRoster().filter(f=>
    (f.juvenileHomeProvinceId) &&
    (provinceId === 'island' || f.juvenileHomeProvinceId === provinceId)
  );
  pool = pool.concat(roster);
  const sorted = [...pool].sort((a,b)=>
    (b.record.wins - b.record.losses) - (a.record.wins - a.record.losses) || b.record.wins - a.record.wins
  );
  return sorted.slice(0, n);
}

// Real new intake — fighters who registered in roughly the last two weeks, not the
// original season-opening seed pool.
function newJuvenileFacesFor(provinceId, day, n){
  const pools = loadFieldPools();
  let pool;
  if(provinceId === 'island'){
    pool = [];
    Object.values(pools.juvenile || {}).forEach(list=> pool = pool.concat(list));
  } else {
    pool = pools.juvenile[provinceId] || [];
  }
  const recent = pool.filter(f=> f.entryDay && f.entryDay !== JUVENILE_SEASON_START_DAY && f.entryDay >= day-13);
  recent.sort((a,b)=> b.entryDay - a.entryDay);
  return recent.slice(0, n);
}

// Still-random flavor lists for Amateur/Junior/Pro — those tiers aren't wired to a real,
// persistent registry yet the way Juvenile now is (banked for a future session).
function generateFlavorFighterList(provinceId, settlementName, n){
  const list = [];
  for(let i=0;i<n;i++){ list.push({ name: pickName(provinceId, settlementName), wins: rand(5,20), losses: rand(0,6) }); }
  list.sort((a,b)=> (b.wins-b.losses)-(a.wins-a.losses));
  return list;
}

function ensureNewspaper(provinceId, day){
  const s = loadRoamState();
  if(!s.newspapers) s.newspapers = {};
  const key = provinceId+'|'+day;
  if(s.newspapers[key]) return s.newspapers[key];
  const isIsland = provinceId === 'island';
  const paper = {
    paperName: isIsland ? ISLAND_PAPER_NAME : (PROVINCE_PAPER_NAMES[provinceId] || 'The Local Herald'),
    rumors: [pick(RUMOR_LINES), pick(RUMOR_LINES)],
    trainerTip: pick(TRAINER_TIP_LINES),
  };
  s.newspapers[key] = paper;
  saveRoamState(s);
  return paper;
}

function renderTournamentNight(){
  const f = getFighterById(state.fighterId);
  const pit = currentPits().find(p=>p.id===state.visitingLocation.pitId);
  const day = getCurrentDay();
  const weekday = weekdayNameForDay(day);
  const kind = weekday === 'Wednesday' ? 'fiesta' : 'local';
  const label = kind === 'fiesta' ? 'Fiesta Fights' : 'Tournament Night';
  const myWc = weightClassOf(f.weightLb);
  const cityKey = state.provinceId+'|'+state.settlementName+'|'+pit.id;
  const isSignedHere = isSignedAtPit(f, cityKey);
  let tourney = getPitTournament(pit, day, myWc);

  const classCount = pit.roster.filter(r=> r.weightClass===myWc).length;
  if(!tourney && classCount < 4){
    return `
      <div class="loc-head"><div class="loc-name">${pit.name} — ${label}</div></div>
      <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:16px;">
        Not enough registered ${myWc.toLowerCase()}weights at this pit for a bracket tonight — needs at least 4. Try a bigger pit, or catch ${kind==='fiesta'?'a marquee invite card':'League Fight Night Monday'} instead.
      </p>
      <div class="btn-row">
        <button class="btn" id="back-to-pit">← Back</button>
        <button class="btn btn-primary" id="call-it-a-night">Call It A Night →</button>
      </div>
    `;
  }

  if(!tourney){
    const sizeGuess = classCount>=16?16:classCount>=8?8:4;
    return `
      <div class="loc-head"><div class="loc-name">${pit.name} — ${label}</div></div>
      <p style="font-family:var(--body); font-size:13px; color:var(--bone-dim); margin-bottom:16px;">
        The promoter's about to lock the ${myWc.toLowerCase()}weight bracket — ${sizeGuess} fighters, single elimination.
        ${isSignedHere ? "Buy in now or just watch it play out." : "You'd need to sign at this pit first to buy in — you can still watch."}
      </p>
      <div class="btn-row">
        ${isSignedHere ? `<button class="btn btn-primary" id="join-tournament">Buy In — Join Tonight's Bracket →</button>` : '<span></span>'}
        <button class="btn" id="watch-tournament">${isSignedHere?'Just Watch This Week':'Watch The Bracket →'}</button>
      </div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn" id="back-to-pit">← Back</button>
        <button class="btn btn-primary" id="call-it-a-night">Call It A Night →</button>
      </div>
    `;
  }

  tourney = progressTournament(pit, f, tourney);

  const roundsHtml = tourney.rounds.map((round, ri)=>{
    const rows = round.map(m=>{
      const aName = m.aId==='player' ? f.name : (tournamentFighterById(pit,f,m.aId)?.name||'???');
      const bName = m.bId==='player' ? f.name : (tournamentFighterById(pit,f,m.bId)?.name||'???');
      const isPlayerMatch = (m.aId==='player'||m.bId==='player');
      const done = !!m.winnerId;
      const winnerName = done ? (m.winnerId==='player'?f.name:(tournamentFighterById(pit,f,m.winnerId)?.name||'???')) : null;
      return `
        <div class="sched-row ${isPlayerMatch?'sched-yours':''}">
          <span class="sched-time">${isPlayerMatch?'⭐':''}</span>
          <span class="sched-matchup">${aName} vs. ${bName}${done?` — <b>${winnerName} wins</b>`:' — pending'}</span>
        </div>
      `;
    }).join('');
    return `<div class="weight-class-block"><div class="wc-label">Round ${ri+1}</div>${rows}</div>`;
  }).join('');

  const currentRound = tourney.rounds[tourney.rounds.length-1];
  const playerMatch = !tourney.complete ? currentRound.find(m=> (m.aId==='player'||m.bId==='player') && !m.winnerId) : null;
  // Bug fix: this used to be "player appeared this round and has no pending match right
  // now" — which is also true the moment the player WINS their round, since the next
  // round doesn't get generated until every match in the current round (including NPC
  // matches still pending) has resolved. That's what made a win read as "You're out."
  // Actual elimination requires the player's own most recent resolved match to have a
  // winner who isn't them.
  const playerMatches = tourney.rounds.flatMap(r=> r.filter(m=> m.aId==='player'||m.bId==='player'));
  const lastPlayerMatch = playerMatches.length ? playerMatches[playerMatches.length-1] : null;
  const eliminated = !tourney.complete && !!lastPlayerMatch && !!lastPlayerMatch.winnerId && lastPlayerMatch.winnerId !== 'player' && !playerMatch;
  const advancingWaitingOnBracket = !tourney.complete && !!lastPlayerMatch && lastPlayerMatch.winnerId === 'player' && !playerMatch;

  let actionHtml = '';
  if(tourney.complete){
    const championName = tourney.championId==='player' ? f.name : (tournamentFighterById(pit,f,tourney.championId)?.name||'???');
    actionHtml = `<p style="font-family:var(--label); font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--brass); text-align:center; margin-top:14px;">🏆 ${championName} takes the ${myWc.toLowerCase()}weight title tonight.</p>`;
  } else if(playerMatch){
    actionHtml = `<div class="btn-row" style="margin-top:10px;"><span></span><button class="btn btn-primary" id="fight-tournament-round">Fight Your Round →</button></div>`;
  } else if(advancingWaitingOnBracket){
    actionHtml = `<p style="font-family:var(--mono); font-size:11px; color:var(--brass); text-align:center; margin-top:8px;">You won your round — waiting on the rest of the bracket to finish. Check back once everyone's fought.</p>`;
  } else if(eliminated){
    actionHtml = `<p style="font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; margin-top:8px;">You're out — the rest of the bracket plays out on its own. Come back next ${kind==='fiesta'?'Wednesday':'Tuesday'}.</p>`;
  }

  return `
    <div class="loc-head"><div class="loc-name">${pit.name} — ${label} (${myWc}weight)</div></div>
    ${roundsHtml}
    ${actionHtml}
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn" id="back-to-pit">← Back To Pit</button>
      <button class="btn btn-primary" id="call-it-a-night">Call It A Night →</button>
    </div>
  `;
}

function renderPreview(){
  const f = getFighterById(state.fighterId);
  const opp = state.opponent;
  const boostNote = f.tempBoost ? `<p style="font-family:var(--mono); font-size:11px; color:var(--good); text-align:center; margin-bottom:12px;">⚗️ Whatever was in that bottle is kicking in — +${f.tempBoost.amount} to everything, this fight only.</p>` : '';
  const ovrF = calcOVR(f.stats), ovrOpp = calcOVR(opp.stats);
  function statRow(label, valF, valOpp){
    return `<div style="margin-bottom:10px;"><div class="round-label" style="text-align:center;">${label}</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div style="text-align:right; font-family:var(--mono); font-size:11px; color:var(--bone);">${valF}</div>
        <div style="font-family:var(--mono); font-size:11px; color:var(--bone);">${valOpp}</div>
      </div></div>`;
  }

  // Same math the actual sim uses for the round-by-round — this is a real prediction,
  // not flavor text, so "who wins on paper" actually lines up with what's likely to happen.
  const effF = ovrF + matchupBonus(f.primaryDisc, opp.primaryDisc);
  const effOpp = ovrOpp + matchupBonus(opp.primaryDisc, f.primaryDisc);
  const probF = winProbability(effF, effOpp);
  const favoredF = probF >= 0.5;
  const favName = favoredF ? f.name : opp.name;
  const favPct = Math.round((favoredF ? probF : 1-probF) * 100);
  let analysisLine;
  if(favPct >= 80) analysisLine = `${favName} is a heavy favorite tonight — this shouldn't be close on paper.`;
  else if(favPct >= 65) analysisLine = `${favName} goes in the clear favorite, but paper doesn't fight.`;
  else if(favPct >= 55) analysisLine = `Slight edge to ${favName} — close enough to go either way.`;
  else analysisLine = `Dead even on paper. Could not find a real edge either way.`;
  const discNote = matchupBonus(f.primaryDisc, opp.primaryDisc) > matchupBonus(opp.primaryDisc, f.primaryDisc)
    ? `${DISCIPLINE_NAMES[f.primaryDisc]} gives ${f.name} a stylistic edge here.`
    : matchupBonus(opp.primaryDisc, f.primaryDisc) > matchupBonus(f.primaryDisc, opp.primaryDisc)
      ? `${DISCIPLINE_NAMES[opp.primaryDisc]} gives ${opp.name} a stylistic edge here.`
      : `No real stylistic edge either way — comes down to who's sharper tonight.`;

  const recF = f.record || { wins:0, losses:0 };
  const recOpp = opp.record || opp.allTimeRecord || { wins:0, losses:0 };

  return `
    <div class="section-label">Tale of the Tape</div>
    ${boostNote}
    <div class="tape-grid">
      <div class="tape-side">
        <div class="tape-avatar">${buildSilhouetteSM(f.appearance)}</div>
        <div class="tape-name">${f.name}</div>
        <div class="tape-disc">${DISCIPLINE_NAMES[f.primaryDisc]}</div>
        <div class="tape-ovr">${ovrF}</div>
        <div class="tape-record">${recF.wins}-${recF.losses}${f.age?' · Age '+f.age:''}</div>
        <div class="tape-facts">
          <div>${f.heightIn?'<b>HT:</b> '+heightLabel(f.heightIn)+' &nbsp; ':''}${f.weightLb?'<b>WT:</b> '+f.weightLb+' lb':''}</div>
          ${f.settlement?`<div><b>From:</b> ${f.settlement}</div>`:''}
        </div>
      </div>
      <div class="tape-side">
        <div class="tape-avatar">${buildSilhouetteSM(opp.appearance)}</div>
        <div class="tape-name">${opp.name}</div>
        <div class="tape-disc">${DISCIPLINE_NAMES[opp.primaryDisc]}</div>
        <div class="tape-ovr">${ovrOpp}</div>
        <div class="tape-record">${recOpp.wins}-${recOpp.losses}${opp.age?' · Age '+opp.age:''}</div>
        <div class="tape-facts">
          <div>${opp.heightIn?'<b>HT:</b> '+heightLabel(opp.heightIn)+' &nbsp; ':''}${opp.weightLb?'<b>WT:</b> '+opp.weightLb+' lb':''}</div>
          ${opp.hometown||opp.settlement?`<div><b>From:</b> ${opp.hometown||opp.settlement}</div>`:''}
        </div>
      </div>
    </div>
    ${statRow('SPEED', f.stats.speed, opp.stats.speed)}
    ${statRow('QUICKNESS', f.stats.quickness, opp.stats.quickness)}
    ${statRow('TOUGHNESS', f.stats.toughness, opp.stats.toughness)}
    ${statRow('POWER', f.stats.power, opp.stats.power)}
    ${statRow('AGILITY', f.stats.agility, opp.stats.agility)}
    <div class="section-label" style="margin-top:16px;">On Paper</div>
    <div class="mf-growth-bar" style="margin-bottom:6px;"><div class="mf-growth-fill" style="width:${Math.round(probF*100)}%"></div></div>
    <p class="mf-growth-text" style="text-align:center;">${f.name} ${Math.round(probF*100)}% · ${opp.name} ${Math.round((1-probF)*100)}%</p>
    <p class="mf-growth-text">${analysisLine} ${discNote}</p>
    <div class="btn-row"><span></span><button class="btn btn-primary" id="enter-arena">Enter the Pit →</button></div>
  `;
}

/* ============================ EVENTS ============================ */

function wireEvents(){
  document.querySelectorAll('[data-npc-add-check]').forEach(cb=>{
    cb.onclick = (e)=>{
      const fid = cb.dataset.npcAddCheck;
      if(e.target.checked) pendingNpcAdds.add(fid); else pendingNpcAdds.delete(fid);
    };
  });

  const confirmNpcBtn = document.querySelector('[data-confirm-npc-selection]');
  if(confirmNpcBtn) confirmNpcBtn.onclick = ()=>{
    const catalog = loadCreatedFighters();
    const roster = getRoster();
    pendingNpcAdds.forEach(fid=>{
      const f = catalog.find(c=> c.id === fid);
      if(f && !roster.some(r=> r.id === fid)) roster.push({ ...f, isPlayable: false });
    });
    saveRoster(roster);

    const reg = loadSaveRegistry();
    const activeSave = reg.saves.find(s=> s.id === reg.activeSaveId);
    if(activeSave){
      activeSave.npcSelectionConfirmed = true;
      activeSave.npcFighterIds = [...new Set([...(activeSave.npcFighterIds||[]), ...pendingNpcAdds])];
      saveSaveRegistry(reg);
    }
    pendingNpcAdds = new Set();
    render();
  };

  const gotoHomeHubBtn = document.querySelector('[data-goto-home-hub]');
  if(gotoHomeHubBtn) gotoHomeHubBtn.onclick = ()=>{
    window.location.href = 'iifl_home.html';
  };

  document.querySelectorAll('[data-select-fighter]').forEach(btn=>{
    btn.onclick = ()=>{
      const f = getFighterById(btn.dataset.selectFighter);
      state.fighterId = f.id;
      if(f.pitMemberships.length){
        const first = f.pitMemberships[0];
        state.provinceId = first.provinceId; state.settlementName = first.settlementName;
      } else {
        state.provinceId = f.provinceId; state.settlementName = f.settlement;
      }
      const grid = ensureCityGrid(state.provinceId, state.settlementName);
      state.position = { ...grid.startCell };
      state.screen = 'city-walk';
      persistCurrentLocation();
      render();
    };
  });

  const backFromWalk = document.getElementById('back-to-select-from-walk');
  if(backFromWalk) backFromWalk.onclick = ()=>{ state.screen='select'; render(); };

  document.querySelectorAll('[data-walk-cell]').forEach(cell=>{
    cell.onclick = ()=>{
      const [r,c] = cell.dataset.walkCell.split('|').map(Number);
      const dr = Math.abs(state.position.row-r), dc = Math.abs(state.position.col-c);
      if(dr>1 || dc>1) return; // not adjacent, can't walk there directly
      if(dr===0 && dc===0) return;
      state.position = { row:r, col:c };
      spendMove();
      const grid = currentGrid();
      const loc = grid.locations.find(l=>l.row===r && l.col===c);
      const roaming = grid.roamingEvents.find(e=>e.row===r && e.col===c);
      if(loc){
        state.visitingLocation = loc;
        if(loc.type==='pit') state.screen = 'loc-pit';
        else if(loc.type==='npc') state.screen = 'loc-npc';
        else if(loc.type==='minigames') state.screen = 'loc-minigames';
        else if(loc.type==='travel') state.screen = 'loc-travel';
      } else if(roaming){
        triggerRandomEvent();
      }
      render();
    };
  });

  const backToWalk = document.getElementById('back-to-walk');
  if(backToWalk) backToWalk.onclick = ()=>{ state.encounterResult = null; state.screen='city-walk'; render(); };
