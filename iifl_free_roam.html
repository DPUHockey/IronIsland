const EVENT_LOG_KEY = 'iifl_event_log_v1';
function loadEventLog(){
  try{ return JSON.parse(localStorage.getItem(sk(EVENT_LOG_KEY))) || []; }catch(e){ return []; }
}
function currentIslandYear(){ return resolveTierSeason('juvenile', getCurrentDay()).cycleYear; }
function majorEventsInRange(fromDayExclusive, toDayInclusive){
  const y = resolveTierSeason('juvenile', fromDayExclusive).cycleYear;
  const events = [...getMajorEventsForYear(y), ...getMajorEventsForYear(y+1)];
  return events.filter(e=> e.day > fromDayExclusive && e.day <= toDayInclusive).sort((a,b)=> a.day-b.day);
}

// Weighted rotation for which QUALIFYING team hosts its league's own playoff bracket.
// Hosting is a venue perk, not a playoff-entry mechanic — it's picked from teams that
// already qualified. Weighted toward "better programs" (all-time win% is the proxy
// until there's a real arena/prestige stat) with a recency penalty so the same team
// doesn't host every single year. lastHostedYear is a { teamKey: year } map the caller
// persists between cycles (teamKey = `${leagueId}_${teamIndex}`).
function pickLeaguePlayoffHost(qualifyingTeams, allTimeStandings, lastHostedYear, cycleYear){
  if(!qualifyingTeams.length) return null;
  const weighted = qualifyingTeams.map(t=>{
    const rec = allTimeStandings[t.teamIndex] || { wins:0, losses:0 };
    const winPct = (rec.wins + rec.losses) ? rec.wins/(rec.wins+rec.losses) : 0.5;
    const key = `${t.leagueId}_${t.teamIndex}`;
    const yearsSinceHosted = lastHostedYear[key] ? Math.min(cycleYear - lastHostedYear[key], 5) : 5;
    // Recency penalty tapers back in over 5 years so a strong program isn't locked
    // out forever after one turn, but can't host back-to-back either.
    const weight = Math.max(0.05, winPct) * (yearsSinceHosted / 5);
    return { ...t, weight };
  });
  const total = weighted.reduce((s,t)=> s+t.weight, 0);
  let roll = Math.random() * total;
  for(const t of weighted){ roll -= t.weight; if(roll <= 0) return t; }
  return weighted[weighted.length-1];
}
/* ============================ OFF-SEASON & DRAFT DECLARATION TRIGGERS ============================ */
/*
  "Silent" island-wide triggers — calendar-driven effects that fire without their own
  screen (at least for now). Off-season conditioning/decline apply once a tier's
  off-season is actively engaged (the "advance to off-season" choice, not just idly
  sitting in dead-days). Draft declarations are a snapshot-on-a-date mechanic: the
  eligible pool and each fighter's in/out decision are both resolved on the deadline day.
*/

// Prime-age assumption (not previously specified) — flagging it here since it's new:
// 24-29 is a fighter's physical prime, decline starts at 30 and compounds the further
// past it they get. Only matters for Amateur/Pro fighters since Juvenile/Junior top out
// at 20.
const PRIME_AGE_START = 24;
const PRIME_AGE_END = 29;
const DECLINE_START_AGE = 30;

// Extra height/weight tick on top of the normal age-based growth curve — a real
// off-season training camp, not just another birthday passing. Only fires for
// still-developing fighters (under 22); grown adults don't get taller in the off-season.
function applyOffSeasonConditioning(f){
  if(!f.age || f.age >= 22) return;
  const buildMult = { lean:0.9, athletic:1.0, stocky:1.15 }[(f.appearance && f.appearance.build) || 'athletic'] || 1.0;
  f.heightIn = (f.heightIn || 60) + rand(0,1);
  f.weightLb = (f.weightLb || 100) + Math.round(rand(2,6) * buildMult);
}

// A real training camp — more generous than the small in-season growth ticks — bumps
// 2-3 stats toward the tier ceiling.
function applyOffSeasonTrainingBonus(f){
  if(!f.stats) return;
  const ceiling = bandCeiling(f.age||18, f.talentTier||'normal');
  const statKeys = ['speed','quickness','toughness','power','agility'];
  const shuffled = [...statKeys].sort(()=> Math.random()-0.5);
  const bumpCount = rand(2,3);
  for(let i=0;i<bumpCount;i++){
    const key = shuffled[i];
    if(f.stats[key] < ceiling) f.stats[key] = clamp(f.stats[key] + rand(1,3), 1, ceiling);
  }
}

// Past-prime decline — chance and magnitude both grow the further past 30 a fighter
// gets. Only ever touches Amateur/Pro fighters since nobody in Juvenile/Junior is old
// enough to trigger it.
function applyPastPrimeDecline(f){
  if(!f.age || f.age < DECLINE_START_AGE || !f.stats) return;
  const yearsPastPrime = f.age - DECLINE_START_AGE;
  const declineChance = clamp(0.15 + yearsPastPrime*0.08, 0.15, 0.85);
  if(Math.random() > declineChance) return;
  const key = pick(Object.keys(f.stats));
  const amount = 1 + Math.floor(yearsPastPrime/3);
  f.stats[key] = clamp(f.stats[key] - amount, 1, 99);
}

// Runs all three off-season effects on a fighter in one pass — the function the
// "advance to off-season" action should call per-fighter once it's wired to a screen.
function applyOffSeasonToFighter(f){
  applyOffSeasonConditioning(f);
  applyOffSeasonTrainingBonus(f);
  applyPastPrimeDecline(f);
}

// The Juvenile→Junior draft-eligible pool as of the May 1 snapshot day — ages 14-17,
// not already attached to a Junior team or Amateur league. Matches the existing Draft
// Watch eligibility window (draftWatchHtml above).
function juniorDraftEligiblePool(fighters){
  return fighters.filter(f=> f.age >= 14 && f.age <= 17 && !f.juniorTeamId && !f.amateurLeagueId);
}

// Age 17 is mandatory — it's the fighter's final eligible year, so staying isn't an
// option (they'd age out with nowhere to go). 14-16 is a real choice; NPCs default to
// declaring once they're far enough along their growth curve, using the same
// pctOfCeiling threshold Projected Path already reads. The player's own fighter should
// get an actual prompt once that screen exists — this just determines the pool + the
// NPC-side default so the mechanic isn't silently absent while the UI catches up.
function resolveJuniorDraftDeclaration(f){
  if(f.age === 17) return 'declared';
  return growthOutlook(f).pctOfCeiling >= 55 ? 'declared' : 'stayed';
}

// The Junior/Amateur→Pro draft-eligible pool as of the May 25 declare deadline (draft
// itself is June 5). Two source pools: Junior players (mandatory declare at 20, since
// that's when they age out of Junior) and Amateur fighters (any year, once they've built
// a real case).
function proDraftEligiblePool(fighters){
  return fighters.filter(f=> f.age >= 18 && (f.juniorTeamId || f.amateurLeagueId));
}

function resolveProDraftDeclaration(f){
  if(f.juniorTeamId && f.age >= 20) return 'declared';
  return growthOutlook(f).pctOfCeiling >= 70 ? 'declared' : 'stayed'; // Pro bar is higher than Junior's
}

/* ============================ FREE AGENT POOL ============================ */
/*
  A shared island-wide holding pool for fighters who are off every league/team's books
  but haven't retired. Two intended feed sources so far: Junior fighters who age out
  (21st year) without a Pro roster spot, and future Pro/Junior roster cuts once those
  release flows exist. Amateur teams draw from this pool to fill roster spots that
  aren't already claimed by a Pro affiliate assignment (see AMATEUR TEAM ROSTERS below).
  Deliberately NOT a permanent parking lot — see processFAWalkAway further down for how
  the pool stays fresh instead of just growing forever.
*/
const FA_POOL_KEY = 'iifl_free_agent_pool_v1';
function loadFAPool(){
  try{ const raw = localStorage.getItem(sk(FA_POOL_KEY)); return raw ? JSON.parse(raw) : []; }
  catch(err){ return []; }
}
function saveFAPool(pool){
  try{ localStorage.setItem(sk(FA_POOL_KEY), JSON.stringify(pool)); return true; }
  catch(err){ console.error('IIFL FA pool save failed:', err); return false; }
}
function addToFAPool(f, entryDay, reason){
  const pool = loadFAPool();
  if(pool.some(x=>x.id===f.id)) return pool;
  pool.push({ ...f, faEntryDay: entryDay, faReason: reason });
  saveFAPool(pool);
  return pool;
}
function removeFromFAPoolInPlace(pool, fighterId){
  const idx = pool.findIndex(f=>f.id===fighterId);
  if(idx>=0) pool.splice(idx,1);
}

// Junior fighters age out after 20 — the 21st year they're no longer Junior-eligible.
// If they never landed a Pro roster spot (proTeamId still unset — inert until Pro
// League exists, but the check is written for when it does), they fall into the FA
// pool instead of just disappearing. Call this wherever Junior rosters get processed
// for aging (iifl_junior_league.html's own roster loop — not yet wired there).
function processJuniorAgeOut(f, today){
  if(!f.age || f.age < 21 || !f.juniorTeamId) return false;
  f.juniorTeamId = null;
  if(!f.proTeamId) addToFAPool(f, today, 'aged-out-of-junior');
  return true;
}

// Keeps the FA pool from bloating with fighters nobody wants forever. A full island
// year of grace before the clock even starts, then rising odds each year after that a
// sitting fighter just walks away from the sport for good — same "compounds the longer
// it drags on" shape as past-prime decline. Call this once per island-year (e.g. when
// the off-season is engaged) rather than every day.
const FA_WALKAWAY_GRACE_DAYS = 365;
function processFAWalkAway(today){
  const pool = loadFAPool();
  const staying = [];
  let walkedAway = 0;
  pool.forEach(f=>{
    const daysSitting = today - (f.faEntryDay || today);
    if(daysSitting < FA_WALKAWAY_GRACE_DAYS){ staying.push(f); return; }
    const yearsPastGrace = (daysSitting - FA_WALKAWAY_GRACE_DAYS) / 365;
    const walkChance = clamp(0.05 + yearsPastGrace*0.10, 0.05, 0.6);
    if(Math.random() < walkChance) walkedAway += 1;
    else staying.push(f);
  });
  if(walkedAway) saveFAPool(staying);
  return walkedAway;
}


/* ============================ CAREER-STAGE MAINTENANCE ============================ */
/*
  The remaining silent, calendar-driven upkeep triggers: roster cutdown, Amateur
  re-commitment windows, retirement (an actual end-of-career roll, building on the
  past-prime decline above), weight class reclassification after growth, and a light
  off-season injury check.
*/

// Junior teams need a finalized roster before the season opens — this is the day that
// "locks" it (3 days before Junior's own opener, so there's a short gap to react to
// any last-minute Pro affiliate movement once that exists). Pro's own cutdown day is
// intentionally left out of tierKeyDates until Pro League has real rosters to cut.
function juniorRosterCutdownDay(cycleYear){
  return tierKeyDates(cycleYear).juniorOpen - 3;
}

// amateurLeagueId was originally a one-time commitment (see ensureFighterDefaults) —
// this gives fighters a real yearly window to request a league change instead of being
// locked in for the whole career. Reuses the Amateur trade-deadline date rather than
// inventing a third date this close to it.
function amateurRecommitmentDay(cycleYear){
  return tierKeyDates(cycleYear).amateurTradeDeadline;
}

// An actual career-ending roll, building on applyPastPrimeDecline — once a veteran's
// average stat has fallen far enough below where it peaked, there's a rising chance
// each off-season they call it. peakAvgStat needs to be tracked on the fighter
// (highest avgStat ever recorded) for this to mean anything; falls back to a flat
// age-based chance if that history isn't there yet.
function checkRetirement(f){
  if(!f.age || f.age < DECLINE_START_AGE || !f.stats) return false;
  const avgStat = (f.stats.speed+f.stats.quickness+f.stats.toughness+f.stats.power+f.stats.agility)/5;
  if(!f.peakAvgStat || avgStat > f.peakAvgStat) f.peakAvgStat = avgStat;
  const declineFromPeak = f.peakAvgStat ? clamp(1 - avgStat/f.peakAvgStat, 0, 1) : 0;
  const ageFactor = clamp((f.age - DECLINE_START_AGE) * 0.02, 0, 0.4);
  const retireChance = clamp(declineFromPeak*0.6 + ageFactor, 0, 0.9);
  return Math.random() < retireChance;
}

// Re-derives weight class from current weightLb — call after off-season growth so a
// fighter who's physically outgrown their old class actually shows it, rather than
// weightClass silently going stale until the next fight recalculates it incidentally.
function reclassifyWeightClass(f){
  const next = weightClassOf(f.weightLb);
  const changed = f.weightClass !== next;
  f.weightClass = next;
  return changed;
}

// Lightweight off-season injury check — small chance of a minor, temporary setback
// (a stat dip that regrows via normal training rather than a lingering "out X weeks"
// system). Flagged as a first pass; a real injury system with recovery timelines and
// missed-game tracking is bigger scope than the calendar layer alone should decide.
function checkOffSeasonInjury(f){
  if(!f.stats || Math.random() > 0.08) return false;
  const key = pick(Object.keys(f.stats));
  f.stats[key] = clamp(f.stats[key] - rand(2,5), 1, 99);
  f.offSeasonInjuryNote = `Nagging injury during camp — ${key} took a hit, should recover with normal training.`;
  return true;
}

function loadClock(){
  try{ const raw = localStorage.getItem(sk(CLOCK_KEY)); return raw ? JSON.parse(raw) : { day: 1 }; }
  catch(err){ return { day: 1 }; }
}
function saveClock(c){ try{ localStorage.setItem(sk(CLOCK_KEY), JSON.stringify(c)); }catch(err){} }
function getCurrentDay(){ return loadClock().day; }
function advanceClockByDays(n){ const c = loadClock(); c.day = Math.max(1, c.day + n); saveClock(c); return c.day; }
function dateForDay(day){ const d = new Date(GAME_EPOCH); d.setDate(d.getDate() + (day-1)); return d; }
function formatCalendarDate(day){ return dateForDay(day).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }); }
function formatCalendarDateShort(day){ return dateForDay(day).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
function weekdayNameForDay(day){ return WEEKDAY_NAMES[((day-1)%7+7)%7]; }
function eventNameForDay(day){
  const w = weekdayNameForDay(day);
  if(w==='Monday') return 'Juvenile League Fight Night';
  if(w==='Tuesday') return 'Juvenile Local Tournament';
  if(w==='Wednesday') return 'Invite Circuit / Fiesta Fights';
  if(w==='Thursday') return 'Junior League Night';
  if(w==='Friday') return 'Amateur Fight Night';
  if(w==='Saturday') return 'Pro League Night';
  return 'Off Night — no scheduled cards';
}

/* ============================ FIELD FIGHTER POOL (persistent Amateur registry) ============================ */
/*
  Instead of inventing a brand-new stranger every fight, both Amateur AND Juvenile
  competition draw from a real, persistent pool of registered fighters per province —
  generated once, then remembered. Records update as the player fights them, so
  "who's out there" is an actual answerable question instead of a random generator.

  Pool sizes aren't arbitrary — they're reverse-engineered from the Pro draft math:
  16 teams × 10 men's roster spots, ~20% annual churn (32 vacancies), a 3-round/48-pick
  draft wants a 60-100-deep pool of draft-eligible 18/19yos, which (using the existing
  Novice/Developing/Contender/Elite split as the "draft-caliber" filter at ~33%) implies
  needing ~240 active 18yo fighters, which (assuming ~30% retention from age 12 given
  dropout/injury/never-good-enough over 6 years) implies ~800 registered 12-year-olds
  entering the Juvenile ranks island-wide per year. That 800 is distributed by each
  province's actual population (from the settlement data), with light flavor bumps —
  Kolsati/Sherwood up (GDD: "lots of fighting opportunities"), Gazon down ("underdeveloped"),
  Carpathia down for cultural isolation despite decent raw population. The browsable
  standing pool below is a representative, UI-practical sample sized proportionally —
  not the literal 800, which would be unusable as a list.
*/
const FIELD_KEY = 'iifl_field_fighters_v3'; // bumped so existing pools regenerate under the settlement-tier pit system
const AMATEUR_POOL_COMPOSITION = { Novice:8, Developing:8, Contender:5, Elite:3 }; // 24 per province

// Carpathia's remote villages are too sparse to each field a standalone Juvenile pit,
// so they pool into three shared regional circuits instead. Bargo Rift is the smallest
// and most remote of the three (built around Wraithwood, the least populated settlement
// on the island) — it's the intended source for the GDD's rare "cohort of near-invincible
// fighters" event; nobody really knows what training looks like that far from anywhere.
const CARPATHIA_COMBINED_PITS = {
  'Highreach Circuit': ['Mikini','Purovest','Greywatch','White Sands','Slanik','Hollowmere'],
  'Hollow Road Circuit': ["Sorrow's Pass",'Ravenshade','Varna','Drovna','Balchik','Ludus'],
  'Bargo Rift Circuit': ['Kessel Vorn','Thornfall','Bargo Pass','Pice','Wraithwood'],
};

// Juvenile pit sizing, PER WEIGHT CLASS (multiply by 3 for a location's total roster).
// TARGET is what a settlement fields at full province appetite (1.0); HARD_MIN is the
// absolute floor regardless of appetite, so even the lowest-interest province still
// puts on a real Tuesday-night bracket everywhere instead of a two-man scrap.
const PIT_TIER_TARGET  = { Village:6, CombinedPit:11, Town:20, City:35, Capital:50 };
const PIT_TIER_HARDMIN = { Village:4, CombinedPit:6,  Town:10, City:18, Capital:28 };

// How much of a province's population actually turns out for organized Juvenile
// fighting (0-1). Settlement counts and populations set the ceiling; appetite is the
// knob that sets the actual island pecking order — Kolsati and Sherwood are fight-mad,
// Gazon and Carpathia are provinces nobody bothers scouting.
const PROVINCE_APPETITE = {
  kolsati:1.00, sherwood:0.90, ditiero:0.68, alexandretta:0.60,
  northeast:0.55, bay:0.58, carpathia:0.28, gazon:0.40,
};

// Every Juvenile pit location in a province, with how many fighters per weight class it
// should carry. Real settlements map 1:1 except Carpathia, where combined-pit members
// are folded into their circuit and each fighter's hometown is drawn from the real
// member villages (so the walkable map never sees a fake location name — only the
// fight-log/tournament grouping treats them as one shared pit).
function pitLocationsForProvince(provinceId){
  const settlements = SETTLEMENT_DATA[provinceId] || [];
  const appetite = PROVINCE_APPETITE[provinceId] ?? 0.5;
  const combined = provinceId === 'carpathia' ? CARPATHIA_COMBINED_PITS : null;
  const combinedMembers = combined ? new Set(Object.values(combined).flat()) : new Set();
  const locations = [];
  settlements.forEach(s=>{
    if(combinedMembers.has(s.name)) return; // folded into a combined pit below
    const perClass = Math.max(PIT_TIER_HARDMIN[s.tier], Math.round(PIT_TIER_TARGET[s.tier] * appetite));
    locations.push({ key: s.name, hometownPool:[s.name], perClass });
  });
  if(combined){
    Object.entries(combined).forEach(([pitName, members])=>{
      const perClass = Math.max(PIT_TIER_HARDMIN.CombinedPit, Math.round(PIT_TIER_TARGET.CombinedPit * appetite));
      locations.push({ key: pitName, hometownPool: members, perClass });
    });
  }
  return locations;
}

// Resolves a fighter's real hometown to its shared-pit grouping key for fight-log and
// tournament-bracket purposes — Carpathia's combined-circuit villages collapse to one
// key (e.g. "Bargo Rift Circuit"), everyone else's hometown is already the key.
function pitKeyForHometown(hometown){
  for(const [pitName, members] of Object.entries(CARPATHIA_COMBINED_PITS)){
    if(members.includes(hometown)) return pitName;
  }
  return hometown;
}

// Every pit location island-wide, ranked by roster depth — this IS the ranking that
// decides which 5-6 pits are big enough to host a Wednesday invitational most weeks.
function topPitsIslandWide(n){
  const all = [];
  PROVINCES.forEach(p=>{
    pitLocationsForProvince(p.id).forEach(loc=>{
      all.push({ provinceId: p.id, key: loc.key, hometownPool: loc.hometownPool, perClass: loc.perClass });
    });
  });
  all.sort((a,b)=> b.perClass - a.perClass);
  return all.slice(0, n);
}

// Roughly evocative, gritty promo-circuit names — the pool an event's sponsor name gets
// drawn from. The same name can run independently at multiple pits, and a single pit
// can host more than one named series over time.
const INVITE_SPONSOR_NAMES = [
  'Cannonball Rumble','Wednesday Beatdown','Iron Fist Invitational','The Blacktop Brawl',
  'Sundown Slugfest','The Hard Row Classic','Lantern Night Showcase','The Anvil Cup',
  'Tin Roof Throwdown','Dustbowl Derby','The Salt Circuit Invitational','Midweek Mayhem',
  'The Broken Bell Invitational','Cinder Row Clash','The Drydock Duel','Foghorn Faceoff',
  'The Split Lip Series','Hollow Bell Showcase','The Rust Belt Rumble','Payday Fights',
];
const INVITE_REGISTRY_KEY = 'iifl_invite_registry_v1';
function loadInviteRegistry(){
  try{ const raw = localStorage.getItem(sk(INVITE_REGISTRY_KEY)); return raw ? JSON.parse(raw) : {}; }
  catch(err){ return {}; }
}
function saveInviteRegistry(reg){
  try{ localStorage.setItem(sk(INVITE_REGISTRY_KEY), JSON.stringify(reg)); }catch(err){}
}
function ordinal(n){
  const suf = ['th','st','nd','rd'], v = n % 100;
  return n + (suf[(v-20)%10] || suf[v] || suf[0]);
}
function bookInviteEdition(pitKey){
  const reg = loadInviteRegistry();
  if(!reg[pitKey]) reg[pitKey] = [];
  let entry;
  if(reg[pitKey].length && Math.random() < 0.85){
    entry = pick(reg[pitKey]);
  } else {
    const used = new Set(reg[pitKey].map(e=>e.name));
    const available = INVITE_SPONSOR_NAMES.filter(n=> !used.has(n));
    const name = available.length ? pick(available) : pick(INVITE_SPONSOR_NAMES);
    entry = { name, count: 0 };
    reg[pitKey].push(entry);
  }
  entry.count += 1;
  saveInviteRegistry(reg);
  return { name: entry.name, edition: entry.count, label: `${ordinal(entry.count)} ${entry.name}` };
}

// Relative share of each juvenile age in a standing population with realistic dropout —
// younger cohorts are always more numerous than older ones since attrition is cumulative.
// Ages 14-17 are also the Junior League draft window (14th birth-year earliest, 17 latest);
// 18-year-olds who never got drafted age out of Juvenile entirely into the Amateur ranks.
const JUVENILE_AGE_WEIGHTS = { 11:0.20, 12:0.19, 13:0.16, 14:0.13, 15:0.11, 16:0.09, 17:0.07, 18:0.05 };

function loadFieldPools(){
  try{
    const raw = localStorage.getItem(sk(FIELD_KEY));
    return raw ? JSON.parse(raw) : { amateur:{}, juvenile:{}, juniorFA:[] };
  }catch(err){ console.error('IIFL field pool load failed:', err); return { amateur:{}, juvenile:{}, juniorFA:[] }; }
}
function saveFieldPools(pools){
  try{ localStorage.setItem(sk(FIELD_KEY), JSON.stringify(pools)); return true; }
  catch(err){
    console.error('IIFL field pool save failed, attempting cleanup:', err);
    // Storage is over quota — prune the standing pool and retry, progressively harder,
    // rather than silently failing forever (which is what used to happen here).
    if(typeof PROVINCES !== 'undefined' && typeof enforceProvincePoolCap === 'function'){
      PROVINCES.forEach(p=> enforceProvincePoolCap(pools, p.id, 150));
      try{ localStorage.setItem(sk(FIELD_KEY), JSON.stringify(pools)); return true; }
      catch(err2){
        PROVINCES.forEach(p=> enforceProvincePoolCap(pools, p.id, 40));
        try{ localStorage.setItem(sk(FIELD_KEY), JSON.stringify(pools)); return true; }
        catch(err3){ console.error('IIFL field pool save still failing after aggressive cleanup:', err3); return false; }
      }
    }
    return false;
  }
}
// Kept as an explicit alias — saveFieldPools is self-healing now, but call sites that
// want to be clear they expect recovery attempts can still say so.
function saveFieldPoolsSafely(pools){ return saveFieldPools(pools); }

function generateAmateurFieldFighter(division, weightClass, province, leagueId){
  const range = AMATEUR_DIVISIONS[division];
  const targetOVR = rand(range[0], range[1]);
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    stats[k] = clamp(targetOVR + rand(-4,4), 1, 35);
  });
  // Amateur is the 18+ adult money league — Junior League (not Amateur) is what drafts
  // out of the 14-17 Juvenile window now. Amateur rosters are grown men: some are Junior
  // grads who took the Amateur payday instead of staying in the dev pipeline, most are
  // 18-year-olds who aged out of Juvenile undrafted and never made it to Pro or Junior.
  // Skews toward the younger end of "adult" since career length here is short and rough.
  const age = Math.random() < 0.6 ? rand(18,21) : rand(22,30);
  const opp = finalizeOpponent(stats, targetOVR, weightClass, province, age);
  opp.division = division;
  opp.weightClass = weightClassOf(opp.weightLb);
  opp.provinceId = province.id;
  opp.leagueId = leagueId;
  opp.age = age;
  opp.birthDay = birthDayForAge(age, getCurrentDay());
  opp.ageSystemVersion = 4;
  return opp;
}

function generateJuvenileFieldFighter(weightClass, province, hometown){
  const age = parseInt(weightedPick(JUVENILE_AGE_WEIGHTS), 10);
  const tier = rollTalentTier(0.46);
  const rawCenter = rand(10,90);
  const stats = {};
  ['speed','quickness','toughness','power','agility'].forEach(k=>{
    const raw = clamp(rawCenter + rand(-15,15), 1, 99);
    stats[k] = compressStat(raw, age, tier);
  });
  const avgOvr = (stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5;
  const opp = finalizeOpponent(stats, avgOvr, weightClass, province, age, hometown);
  opp.age = age;
  opp.birthDay = birthDayForAge(age, getCurrentDay());
  opp.ageSystemVersion = 4;
  opp.talentTier = tier;
  opp.weightClass = weightClassOf(opp.weightLb);
  opp.provinceId = province.id;
  return opp;
}

function ensureAmateurFieldPoolForLeague(leagueId){
  const pools = loadFieldPools();
  if(!pools.amateur) pools.amateur = {};
  if(pools.amateur[leagueId] && pools.amateur[leagueId].length) return pools;
  const league = getLeague(leagueId);
  if(!league) return pools;
  const province = PROVINCES.find(p=>p.id===league.provinceId);
  const weightClasses = ['Light','Middle','Heavy'];
  const pool = [];
  const composition = league.atRisk
    ? { Novice:4, Developing:3, Contender:2, Elite:1 } // small at-risk leagues have thinner pools
    : (LEAGUE_STRENGTH_COMPOSITION[league.strength] || AMATEUR_POOL_COMPOSITION);
  Object.entries(composition).forEach(([division, count])=>{
    for(let i=0;i<count;i++){
      pool.push(generateAmateurFieldFighter(division, pick(weightClasses), province, leagueId));
    }
  });
  pools.amateur[leagueId] = pool;
  saveFieldPools(pools);
  return pools;
}

function seedJuvenilePoolInPlace(pools, provinceId){
  if(!pools.juvenile) pools.juvenile = {};
  if(!pools.juvenile[provinceId]) pools.juvenile[provinceId] = [];
  const province = PROVINCES.find(p=>p.id===provinceId);
  if(!province) return;
  const weightClasses = ['Light','Middle','Heavy'];
  const pool = pools.juvenile[provinceId];
  // Tops up shortfalls instead of only ever seeding once from empty — this is what lets
  // a province actually recover after the emergency population cap trims it for storage
  // reasons, instead of being stuck rebuilding at intake's much slower weekly pace for
  // years. Tracked by TOTAL headcount per location, not exact-per-weight-class — actual
  // weight class is derived from real BMI-based weight after generation, not the class a
  // fighter was aimed at, so it naturally drifts from any per-class target and would
  // never converge (and would silently keep regenerating fighters forever) if checked
  // that precisely.
  const totalsByHometown = {};
  pool.forEach(f=>{ totalsByHometown[f.hometown] = (totalsByHometown[f.hometown]||0) + 1; });
  pitLocationsForProvince(provinceId).forEach(loc=>{
    const target = loc.perClass * 3;
    const have = loc.hometownPool.reduce((s,h)=> s + (totalsByHometown[h]||0), 0);
    const need = target - have;
    for(let i=0;i<need;i++){
      const wc = pick(weightClasses);
      const hometown = pick(loc.hometownPool);
      const f = generateJuvenileFieldFighter(wc, province, hometown);
      f.entryDay = JUVENILE_SEASON_START_DAY;
      pool.push(f);
      totalsByHometown[hometown] = (totalsByHometown[hometown]||0) + 1;
    }
  });
}

function ensureJuvenileFieldPoolForProvince(provinceId){
  const pools = loadFieldPools();
  seedJuvenilePoolInPlace(pools, provinceId);
  saveFieldPools(pools);
  return pools;
}

function getFieldFighterById(id){
  const pools = loadFieldPools();
  for(const key of Object.keys(pools.amateur || {})){
    const f = pools.amateur[key].find(x=>x.id===id);
    if(f) return f;
  }
  for(const key of Object.keys(pools.juvenile || {})){
    const f = pools.juvenile[key].find(x=>x.id===id);
    if(f) return f;
  }
  return null;
}

// A hard cutoff (e.g. "only trust this filter if it has >=3 matches") can still
// permanently lock a division's weight-matched subset in if that subset happens to sit
// right at the threshold. Instead: probabilistically prefer weight-matched fighters, but
// always leave a real, non-vanishing chance of drawing anyone else in the bucket too —
// this guarantees full eventual coverage of the pool with no one permanently excluded.
function weightedFighterDraw(pool, division, weightClass){
  const divisionPool = pool.filter(f=> f.division===division);
  const narrowPool = divisionPool.filter(f=> f.weightClass===weightClass);
  const useNarrow = narrowPool.length > 0 && Math.random() < 0.55;
  const candidates = useNarrow ? narrowPool : (divisionPool.length ? divisionPool : pool);
  return pick(candidates);
}

function drawFromFieldPool(leagueId, weightClass, divisionWeights){
  const pools = ensureAmateurFieldPoolForLeague(leagueId);
  const pool = pools.amateur[leagueId] || [];
  const division = weightedPick(divisionWeights);
  return weightedFighterDraw(pool, division, weightClass);
}

function drawFromCombinedFieldPools(weightClass, divisionWeights){
  // National tournament stage pulls from the whole island, not just one league or province.
  activeLeagues().forEach(l=> ensureAmateurFieldPoolForLeague(l.id));
  const pools = loadFieldPools();
  const division = weightedPick(divisionWeights);
  let combined = [];
  Object.values(pools.amateur).forEach(list=>{ combined = combined.concat(list); });
  return weightedFighterDraw(combined, division, weightClass);
}

function drawFromProvinceLeaguePools(provinceId, weightClass, divisionWeights){
  // Province stage: pooled "city champions" from every league within the same province.
  const leagues = leaguesInProvince(provinceId).filter(l=> isLeagueActive(l.id));
  if(!leagues.length) return drawFromCombinedFieldPools(weightClass, divisionWeights);
  leagues.forEach(l=> ensureAmateurFieldPoolForLeague(l.id));
  const pools = loadFieldPools();
  const division = weightedPick(divisionWeights);
  let combined = [];
  leagues.forEach(l=>{ combined = combined.concat(pools.amateur[l.id] || []); });
  if(!combined.length) return drawFromCombinedFieldPools(weightClass, divisionWeights);
  return weightedFighterDraw(combined, division, weightClass);
}

function drawJuvenileFromFieldPool(provinceId, weightClass, playerAge){
  const pools = ensureJuvenileFieldPoolForProvince(provinceId);
  const pool = pools.juvenile[provinceId].filter(f=> juvenileFightsRemaining(f) > 0);
  const closeAge = pool.filter(f=> Math.abs(f.age-playerAge)<=1);
  const narrowPool = closeAge.filter(f=> f.weightClass===weightClass);
  const useNarrow = narrowPool.length > 0 && Math.random() < 0.55;
  const candidates = useNarrow ? narrowPool : (closeAge.length ? closeAge : pool);
  return pick(candidates);
}

function updateFieldFighterRecord(fighterId, poolKey, won, isJuvenile, logEntry){
  const pools = loadFieldPools();
  const bucket = isJuvenile ? pools.juvenile : pools.amateur;
  const pool = bucket ? bucket[poolKey] : null;
  if(!pool) return;
  const f = pool.find(x=>x.id===fighterId);
  if(!f) return;
  if(won) f.record.wins += 1; else f.record.losses += 1;
  if(logEntry){
    if(!f.fightLog) f.fightLog = [];
    f.fightLog.push(logEntry);
    if(f.fightLog.length > 10) f.fightLog = f.fightLog.slice(-10);
  }
  saveFieldPools(pools);
}

/* ============================ JUVENILE LEAGUE SIMULATION ============================ */
function quickSimBout(fA, fB){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const effA = ovrA + matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const effB = ovrB + matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const winnerIsA = Math.random() < winProbability(effA, effB);
  return { winner: winnerIsA ? fA : fB, loser: winnerIsA ? fB : fA };
}

function applyNpcGrowthTick(f){
  if(!f || !f.age || !f.stats) return;
  const ceiling = bandCeiling(f.age, f.talentTier||'normal');
  const statKeys = ['speed','quickness','toughness','power','agility'];
  const key = pick(statKeys);
  if(f.stats[key] < ceiling && Math.random() < 0.5){
    f.stats[key] = clamp(f.stats[key]+1, 1, ceiling);
  }
}

function groupFightersBySettlement(list){
  const map = {};
  list.forEach(f=>{ const k = pitKeyForHometown(f.hometown || 'unknown'); (map[k] = map[k]||[]).push(f); });
  return map;
}

function logNpcBout(winner, loser, tier, location, day){
  const dateStr = dateForDay(day).toISOString();
  [[winner,loser,'W'],[loser,winner,'L']].forEach(([self, opp, result])=>{
    if(!self.fightLog) self.fightLog = [];
    self.fightLog.push({ tier, opponent: opp.name, opponentId: opp.id, result, method: pick(['Decision','TKO','KO']), location, date: dateStr });
    if(self.fightLog.length > 10) self.fightLog = self.fightLog.slice(-10);
  });
}

function runJuvenileLeagueNight(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 2) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    // Not everybody fights every week — roughly 40% of a settlement's roster is on any
    // given week's card, and each fighter is further capped to a season-length budget of
    // League Night appearances per year so a deep pool doesn't let the same kids fight
    // every single week for years straight.
    const participants = group.filter(f=>{
      if(Math.random() >= 0.4 || juvenileFightsRemaining(f) <= 0) return false;
      ensureJuvenileYearWindow(f, day);
      return (f.juvenileLeagueEntriesThisYear||0) < Math.round(JUVENILE_LEAGUE_ENTRIES_PER_YEAR * juvenilePaceMultiplier(f));
    });
    ['Light','Middle','Heavy'].forEach(wc=>{
      const classGroup = participants.filter(f=> f.weightClass===wc).sort((a,b)=> a.age-b.age);
      for(let i=0;i+1<classGroup.length;i+=2){
        const { winner, loser } = quickSimBout(classGroup[i], classGroup[i+1]);
        winner.record.wins += 1; loser.record.losses += 1;
        winner.juvenileLeagueEntriesThisYear = (winner.juvenileLeagueEntriesThisYear||0) + 1;
        loser.juvenileLeagueEntriesThisYear = (loser.juvenileLeagueEntriesThisYear||0) + 1;
        logNpcBout(winner, loser, 'Juvenile', `${settlement} — League Night (${wc}weight)`, day);
        applyNpcGrowthTick(winner);
        if(Math.random() < 0.5) applyNpcGrowthTick(loser);
      }
    });
  });
}

function runJuvenileTournamentDay(pools, provinceId, day){
  const pool = pools.juvenile[provinceId];
  if(!pool || pool.length < 4) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    ['Light','Middle','Heavy'].forEach(wc=>{
      const classGroup = group.filter(f=>{
        if(f.weightClass!==wc || juvenileFightsRemaining(f) <= 0) return false;
        ensureJuvenileYearWindow(f, day);
        return (f.juvenileTournamentEntriesThisYear||0) < Math.round(JUVENILE_TOURNAMENT_ENTRIES_PER_YEAR * juvenilePaceMultiplier(f));
      });
      let size;
      if(classGroup.length >= 16) size = 16;
      else if(classGroup.length >= 8) size = 8;
      else if(classGroup.length >= 4) size = 4;
      else return; // not enough in this weight class this week — skip, don't force a mismatch
      // Age-sorted seeding so the bracket isn't a coin-flip 12-vs-17 matchup in round one.
      let field = [...classGroup].sort((a,b)=> a.age-b.age).slice(0, size);
      field.forEach(f=>{ f.juvenileTournamentEntriesThisYear = (f.juvenileTournamentEntriesThisYear||0) + 1; }); // one entry per bracket appearance, not per round
      let runnerUp = null;
      while(field.length > 1){
        const isFinal = field.length === 2;
        const nextRound = [];
        for(let i=0;i+1<field.length;i+=2){
          const { winner, loser } = quickSimBout(field[i], field[i+1]);
          winner.record.wins += 1; loser.record.losses += 1;
          logNpcBout(winner, loser, 'Juvenile', `${settlement} — Local Tournament (${wc}weight)`, day);
          if(isFinal) runnerUp = loser;
          nextRound.push(winner);
        }
        field = nextRound;
      }
      if(field[0]){
        applyNpcGrowthTick(field[0]); applyNpcGrowthTick(field[0]); // tournament win = an extra growth tick
        // Not logged to the shared results feed — Tuesday's local brackets run in every
        // settlement with enough registered fighters, dozens per week, and would drown
        // out the comparatively rare Wednesday Invite results the feed exists to surface.
      }
    });
  });
}

// Adds a batch of results to the log in ONE load+save cycle, instead of the naive
// load-modify-save per bracket completion that made a single Wednesday (hundreds of
// small brackets across the island) cost tens of seconds during catch-up.
function flushResultsLog(newEntries){
  if(!newEntries.length) return;
  const log = loadResultsLog();
  const merged = newEntries.concat(log);
  // Was 3000 — cut down as part of the same quota fix as provincePoolCap. Nothing
  // reads more than a handful of recent results at once (newspapers, standings), so
  // this doesn't lose any real functionality, just stops the log from being one of the
  // bigger contributors to the total localStorage footprint.
  if(merged.length > 600) merged.length = 600;
  saveResultsLog(merged);
}

function runJuvenileFiestaDay(pools, provinceId, day, poolOverride, resultsBuffer){
  const pool = poolOverride || pools.juvenile[provinceId];
  if(!pool || pool.length < 4) return;
  Object.entries(groupFightersBySettlement(pool)).forEach(([settlement, group])=>{
    ['Light','Middle','Heavy'].forEach(wc=>{
      const classGroup = group.filter(f=>{
        if(f.weightClass!==wc || juvenileFightsRemaining(f) <= 0) return false;
        ensureJuvenileYearWindow(f, day);
        return (f.juvenileTournamentEntriesThisYear||0) < Math.round(JUVENILE_TOURNAMENT_ENTRIES_PER_YEAR * juvenilePaceMultiplier(f)); // shared budget with Tuesday, per design
      });
      let size;
      if(classGroup.length >= 16) size = 16;
      else if(classGroup.length >= 8) size = 8;
      else if(classGroup.length >= 4) size = 4;
      else return; // not enough for a bracket this week in this class
      let field = [...classGroup].sort(()=>Math.random()-0.5).slice(0, size);
      field.forEach(f=>{ f.juvenileTournamentEntriesThisYear = (f.juvenileTournamentEntriesThisYear||0) + 1; });
      let runnerUp = null;
      while(field.length > 1){
        const isFinal = field.length === 2;
        const nextRound = [];
        for(let i=0;i+1<field.length;i+=2){
          const { winner, loser } = quickSimBout(field[i], field[i+1]);
          winner.record.wins += 1; loser.record.losses += 1;
          logNpcBout(winner, loser, 'Juvenile', `${settlement} — Fiesta Fights (${wc}weight)`, day);
          if(isFinal) runnerUp = loser;
          nextRound.push(winner);
        }
        field = nextRound;
      }
      if(field[0]){
        applyNpcGrowthTick(field[0]); // tournament win = a growth tick, same as Tuesday
        (resultsBuffer||[]).push({
          day, hostKey: settlement, eventLabel: 'Fiesta Fights', weightClass: wc, kind:'fiesta', size,
          championId: field[0].id, championName: field[0].name,
          runnerUpId: runnerUp ? runnerUp.id : null, runnerUpName: runnerUp ? runnerUp.name : null,
        });
      }
    });
  });
}

// Records a 1st/2nd/3rd finish on a fighter's own history — first-round-and-out losses
// in an 8-man field don't get a numbered placement, just the normal fight-log loss.
// A lightweight, bounded, shared log of every bracket champion crowned island-wide —
// Invite Night, Tuesday Local Tournament, and Fiesta Fights all write here. This is what
// makes "who won Wednesday's card in Sherwood" an answerable question instead of
// something only visible if you happened to be standing in that specific pit.
const RESULTS_LOG_KEY = 'iifl_juvenile_results_log_v1';
function loadResultsLog(){
  try{ const raw = localStorage.getItem(sk(RESULTS_LOG_KEY)); return raw ? JSON.parse(raw) : []; }
  catch(err){ return []; }
}
function saveResultsLog(log){
  try{ localStorage.setItem(sk(RESULTS_LOG_KEY), JSON.stringify(log)); }
  catch(err){
    console.error('IIFL results log save failed, trimming and retrying:', err);
    const trimmed = log.slice(0, Math.floor(log.length/2));
    try{ localStorage.setItem(sk(RESULTS_LOG_KEY), JSON.stringify(trimmed)); }
    catch(err2){ console.error('IIFL results log save still failing after trim:', err2); }
  }
}
function logNotableResult(entry){
  const log = loadResultsLog();
  log.unshift(entry);
  if(log.length > 3000) log.length = 3000; // recent history, not a full ledger — filtering by province/day keeps it browsable
  saveResultsLog(log);
}

function recordInvitePlacement(f, eventLabel, weightClass, day, place){
  if(!f.inviteResults) f.inviteResults = [];
  f.inviteResults.push({ event: eventLabel, weightClass, place, date: dateForDay(day).toISOString() });
  if(f.inviteResults.length > 20) f.inviteResults = f.inviteResults.slice(-20);
}

// Not every invite is earned by the numbers — a card needs a hometown kid, a hot
// streak everyone's talking about, a name with real drawing power, or just a promoter
// doing a favor for someone with pull.
const INVITE_WILDCARD_REASONS = ['Local Favorite','Hot Streak','Fan Favorite','Political Appointment'];

// Picks one fighter for a wildcard slot per the given reason, falling back to a random
// pick from the same pool if nobody in it actually fits the story.
function pickInviteWildcard(pool, reason, hostProvinceId){
  let candidates = pool;
  if(reason === 'Local Favorite'){
    candidates = pool.filter(f=> f.provinceId === hostProvinceId);
  } else if(reason === 'Hot Streak'){
    const withForm = pool.map(f=>{
      const recent = (f.fightLog||[]).slice(-3);
      return { f, wins: recent.filter(e=>e.result==='W').length };
    }).filter(x=> x.wins >= 2).sort((a,b)=> b.wins-a.wins);
    candidates = withForm.map(x=>x.f);
  } else if(reason === 'Fan Favorite'){
    candidates = pool.filter(f=> f.talentTier==='prodigy' || f.talentTier==='generational');
  }
  if(!candidates.length) candidates = pool;
  return candidates.length ? pick(candidates) : null;
}

// Runs one pit's invite bracket for a single weight class, pulling from a SHARED,
// already-sorted, mutable array for that class (see runWednesdayEvents) — selected
// fighters are spliced out in place, so repeated calls across multiple host pits in the
// same week work against a shrinking list instead of re-filtering the full population
// (thousands of fighters) from scratch every time.
// Age matters more than weight class for Juvenile — an 11-year-old and a 17-year-old
// can share a weight class but shouldn't share a bracket just because of that. Three
// bands loosely tracking real physical/skill maturity gaps, used to group invite
// brackets and eligibility checks (League Night/Tournament/Fiesta already sort by raw
// age within weight class before pairing, which handles it well enough there).
const JUVENILE_AGE_BANDS = ['Young','Mid','Old'];
function ageBandOf(age){
  if(age <= 13) return 'Young';
  if(age <= 15) return 'Mid';
  return 'Old';
}

function runInviteClassBracket(classListAvailable, hostKey, hostProvinceId, eventLabel, weightClass, ageBand, day, resultsBuffer){
  const size = classListAvailable.length >= 8 ? 8 : (classListAvailable.length >= 4 ? 4 : 0);
  if(!size) return;
  const wildcardCount = size >= 8 ? 2 : 1;
  const field = [];
  for(let i=0;i<wildcardCount;i++){
    if(!classListAvailable.length) break;
    const reason = pick(INVITE_WILDCARD_REASONS);
    const chosen = pickInviteWildcard(classListAvailable, reason, hostProvinceId);
    if(!chosen) continue;
    const idx = classListAvailable.indexOf(chosen);
    if(idx>=0) classListAvailable.splice(idx,1);
    field.push(chosen);
  }
  while(field.length < size && classListAvailable.length){
    field.push(classListAvailable.shift()); // still OVR-sorted, so this is "next best available"
  }
  field.forEach(f=>{ f.juvenileInviteEntriesThisYear = (f.juvenileInviteEntriesThisYear||0) + 1; });
  if(!field.length) return field;
  let remaining = [...field];
  let runnerUp = null;
  while(remaining.length > 1){
    const isFinal = remaining.length === 2;
    const isSemifinal = remaining.length === 4;
    const nextRound = [];
    for(let i=0;i+1<remaining.length;i+=2){
      const { winner, loser } = quickSimBout(remaining[i], remaining[i+1]);
      winner.record.wins += 1; loser.record.losses += 1;
      logNpcBout(winner, loser, 'Juvenile', `${hostKey} — ${eventLabel} (${weightClass}weight, ${ageBand})`, day);
      applyNpcGrowthTick(winner);
      if(isFinal){ recordInvitePlacement(loser, eventLabel, weightClass, day, 2); runnerUp = loser; }
      else if(isSemifinal) recordInvitePlacement(loser, eventLabel, weightClass, day, 3);
      nextRound.push(winner);
    }
    remaining = nextRound;
  }
  if(remaining[0]){
    applyNpcGrowthTick(remaining[0]); applyNpcGrowthTick(remaining[0]);
    recordInvitePlacement(remaining[0], eventLabel, weightClass, day, 1);
    (resultsBuffer||[]).push({
      day, hostKey, eventLabel, weightClass, ageBand, kind:'invite', size,
      championId: remaining[0].id, championName: remaining[0].name,
      runnerUpId: runnerUp ? runnerUp.id : null, runnerUpName: runnerUp ? runnerUp.name : null,
    });
  }
  return field;
}

const WEDNESDAY_TOP_PIT_COUNT = 6;
const WEDNESDAY_TOP_HOST_CHANCE = 0.88;
const WEDNESDAY_SURPRISE_HOST_CHANCE = 0.02;

// Island-wide Wednesday resolution: decides which pits host an invite night this week,
// books each one's event edition, runs the actual brackets, checks whether the player's
// own roster fighters are good enough to get pulled in themselves (queued for a popup
// rather than auto-resolved), and sends everyone left over to ordinary Fiesta Fights.
function runWednesdayEvents(pools, day){
  const resultsBuffer = [];
  const topPits = topPitsIslandWide(WEDNESDAY_TOP_PIT_COUNT);
  const topKeys = new Set(topPits.map(p=>p.key));
  const hostingThisWeek = topPits.filter(()=> Math.random() < WEDNESDAY_TOP_HOST_CHANCE);

  PROVINCES.forEach(prov=>{
    pitLocationsForProvince(prov.id).forEach(loc=>{
      if(topKeys.has(loc.key)) return;
      if(Math.random() < WEDNESDAY_SURPRISE_HOST_CHANCE){
        hostingThisWeek.push({ provinceId: prov.id, key: loc.key, hometownPool: loc.hometownPool, perClass: loc.perClass });
      }
    });
  });

  if(!hostingThisWeek.length){
    PROVINCES.forEach(p=>{ runJuvenileFiestaDay(pools, p.id, day, null, resultsBuffer); });
    flushResultsLog(resultsBuffer);
    return;
  }

  // Build each (weight class × age band) island-wide roster ONCE, sorted by OVR —
  // reused below by every host pit's bracket AND the player-eligibility check. Age band
  // matters more than weight class for Juvenile: an 11-year-old and a 17-year-old can
  // share a weight class but shouldn't share a bracket just because of that.
  const byClassBand = {};
  ['Light','Middle','Heavy'].forEach(wc=>{ byClassBand[wc] = { Young:[], Mid:[], Old:[] }; });
  Object.values(pools.juvenile).forEach(list=>{
    list.forEach(f=>{
      const bucket = byClassBand[f.weightClass];
      if(!bucket || juvenileFightsRemaining(f) <= 0) return;
      ensureJuvenileYearWindow(f, day);
      if((f.juvenileInviteEntriesThisYear||0) >= Math.round(JUVENILE_INVITE_ENTRIES_PER_YEAR * juvenilePaceMultiplier(f))) return;
      bucket[ageBandOf(f.age)].push(f);
    });
  });
  Object.values(byClassBand).forEach(bands=> Object.values(bands).forEach(arr=> arr.sort((a,b)=> calcOVR(b.stats)-calcOVR(a.stats))));

  const claimedFighterIds = new Set();

  const eventLabelByHost = {};
  hostingThisWeek.forEach(host=>{ eventLabelByHost[host.key] = bookInviteEdition(host.key).label; });

  let roster = [];
  try{ roster = loadRoster(); }catch(err){ roster = []; }
  let rosterChanged = false;
  const reservedSlots = [];

  roster.forEach(f=>{
    // Registered Juvenile fighter, either through Fight Pit's season flow or Free Roam's
    // pit sign-up — both set juvenileHomeProvinceId now, so this covers either path.
    if(!f.juvenileHomeProvinceId || f.juniorTeamId) return;
    if(f.age && f.age >= 18) return;
    if(f.pendingJuvenileInvite) return;
    if(juvenileFightsRemaining(f) <= 0) return; // out of career fights, or locked out on a petition
    ensureJuvenileYearWindow(f, day);
    if((f.juvenileInviteEntriesThisYear||0) >= JUVENILE_INVITE_ENTRIES_PER_YEAR) return;
    const wClass = weightClassOf(f.weightLb);
    const band = ageBandOf(f.age);
    const fOvr = calcOVR(f.stats);
    const classList = (byClassBand[wClass] && byClassBand[wClass][band]) || [];
    const bar = classList[7] ? calcOVR(classList[7].stats) : 0;
    let reason = 'Top Contender';
    if(fOvr < bar){
      if(Math.random() >= 0.12) return;
      reason = pick(INVITE_WILDCARD_REASONS);
    }
    const host = hostingThisWeek.find(h=> h.provinceId === f.provinceId) || hostingThisWeek[0];
    if(!host) return;
    if(reason === 'Local Favorite' && host.provinceId !== f.provinceId) reason = 'Political Appointment';
    const label = eventLabelByHost[host.key];
    f.pendingJuvenileInvite = { day, hostKey: host.key, eventLabel: label, weightClass: wClass, ageBand: band, reason };
    f.juvenileInviteEntriesThisYear = (f.juvenileInviteEntriesThisYear||0) + 1;
    reservedSlots.push({ hostKey: host.key, eventLabel: label, weightClass: wClass, ageBand: band });
    rosterChanged = true;
  });
  if(rosterChanged){ try{ saveRoster(roster); }catch(err){} }

  hostingThisWeek.forEach(host=>{
    const label = eventLabelByHost[host.key];
    ['Light','Middle','Heavy'].forEach(wc=>{
      JUVENILE_AGE_BANDS.forEach(band=>{
        const isReserved = reservedSlots.some(r=> r.hostKey===host.key && r.weightClass===wc && r.ageBand===band);
        if(isReserved) return;
        const field = runInviteClassBracket(byClassBand[wc][band], host.key, host.provinceId, label, wc, band, day, resultsBuffer);
        (field||[]).forEach(f=> claimedFighterIds.add(f.id));
      });
    });
  });

  PROVINCES.forEach(p=>{
    const pool = pools.juvenile[p.id];
    if(!pool) return;
    const leftover = pool.filter(f=> !claimedFighterIds.has(f.id));
    runJuvenileFiestaDay(pools, p.id, day, leftover, resultsBuffer);
  });
  flushResultsLog(resultsBuffer);
}

// Picks a pit location for a province weighted by that pit's own size, so new intake
// lands proportionally the same way the standing pool was seeded — a big city pit is
// far more likely to get this Monday's new 11-year-old than a one-village circuit.
function pickWeightedPitLocation(provinceId){
  const locs = pitLocationsForProvince(provinceId);
  if(!locs.length) return null;
  const total = locs.reduce((s,l)=> s + l.perClass, 0);
  let r = Math.random() * total;
  for(const loc of locs){
    r -= loc.perClass;
    if(r <= 0) return loc;
  }
  return locs[locs.length-1];
}

// The standing pool has no natural way to shrink — field-pool NPCs never age up or
// retire the way the player's own fighter does, and intake only ever adds. Left alone,
// a long-running save grows the pool forever until it outgrows what a browser will let
// a site store in localStorage at all (this is exactly what caused the QuotaExceededError
// bug — the save was silently failing every time because the blob had gotten too big).
// Cap is 1.5x each province's own healthy target, so there's real headroom for organic
// growth/variety without it running away.
function provincePoolCap(provinceId){
  // Was target*1.5 with only a floor (no ceiling) — for a populous province like
  // Kolsati that meant 700-800+ standing NPCs, and a fully-topped-up pool across all 8
  // provinces measured out to ~1.6MB of JSON, which combined with everything else this
  // save writes (results log, roam state, roster) was blowing well past the browser's
  // real localStorage limit (~5MB, confirmed empirically) and causing every single
  // save write to silently fail.
  //
  // 100-250/province, worked back from actual capacity math rather than just "what
  // seemed safe": Junior's 40 teams x 10 roster spots turn over ~25%/year (mandatory
  // exit at 21) = ~100 new draftees needed annually island-wide. A real draft (not
  // just "everyone declared gets picked") wants ~1.7x that many declaring, and 14-17
  // year olds are ~40% of the standing Juvenile population by age distribution — so
  // the draft pipeline alone only needs ~425 total island-wide (~53/province average).
  // This range clears that with real margin AND gives enough volume for pit variety /
  // tournament brackets, which was always the bigger driver of pool size than the
  // draft pipeline specifically.
  const target = pitLocationsForProvince(provinceId).reduce((s,l)=> s + l.perClass*3, 0);
  // Raised 2026-07-17: this was tuned down hard while Iron Island shared its origin's
  // localStorage quota with several other unrelated apps. Now isolated on its own domain
  // (Netlify), there's real headroom again — a flagship Capital alone can organically want
  // ~150, and the old 250 hard ceiling meant a whole 17-settlement province was fighting
  // over less room than one city needed. Still capped, not removed: fight logs grow every
  // fighter's JSON size over time regardless of headcount, so an unbounded pool would
  // eventually refill the same wall from a different direction.
  return Math.min(450, Math.max(150, Math.round(target * 0.75)));
}
function enforceProvincePoolCap(pools, provinceId, capOverride){
  const pool = pools.juvenile[provinceId];
  if(!pool) return;
  const cap = capOverride || provincePoolCap(provinceId);
  if(pool.length <= cap) return;
  // Trim the longest-tenured, weakest performers first — "aging out of the scene,"
  // abstracted, since standing-pool NPCs don't actually age up like the player does.
  const sorted = [...pool].sort((a,b)=> (a.entryDay-b.entryDay) || (calcOVR(a.stats)-calcOVR(b.stats)));
  const removeIds = new Set(sorted.slice(0, pool.length-cap).map(f=>f.id));
  pools.juvenile[provinceId] = pool.filter(f=> !removeIds.has(f.id));
}

// Proactively bounds roam state (tournament brackets, newspapers, cached grids) on
// every load, not just reactively when a save has already failed — the goal is to
// avoid hitting the quota wall in the first place, not just recover after the fact.
function pruneRoamStateProactively(){
  const s = loadRoamState();
  const before = JSON.stringify(s).length;
  pruneRoamStateForSpace(s);
  if(JSON.stringify(s).length !== before) saveRoamState(s);
}

function runJuvenileIntake(pools, provinceId, day){
  // Chance is derived straight from PROVINCE_APPETITE rather than tracked as its own
  // separate table — one number per province for "how much does this place care about
  // Juvenile fighting," reused everywhere, instead of two lists that can drift apart.
  const appetite = PROVINCE_APPETITE[provinceId] ?? 0.5;
  const chance = Math.max(0.3, appetite);
  if(Math.random() > chance) return;
  const province = PROVINCES.find(p=>p.id===provinceId);
  if(!province) return;
  const weightClasses = ['Light','Middle','Heavy'];
  const count = rand(1,2);
  for(let i=0;i<count;i++){
    const tier = rollTalentTier(0.46);
    const age = 11;
    const rawCenter = rand(10,90);
    const stats = {};
    ['speed','quickness','toughness','power','agility'].forEach(k=>{
      const raw = clamp(rawCenter + rand(-15,15), 1, 99);
      stats[k] = compressStat(raw, age, tier);
    });
    const avgOvr = (stats.speed+stats.quickness+stats.toughness+stats.power+stats.agility)/5;
    const weightClass = pick(weightClasses);
    const loc = pickWeightedPitLocation(province.id);
    const hometown = loc ? pick(loc.hometownPool) : undefined;
    const f = finalizeOpponent(stats, avgOvr, weightClass, province, age, hometown);
    f.age = age;
    f.birthDay = birthDayForAge(age, day);
    f.ageSystemVersion = 4;
    f.talentTier = tier;
    f.weightClass = weightClassOf(f.weightLb);
    f.provinceId = province.id;
    f.record = { wins:0, losses:0 };
    f.entryDay = day;
    pools.juvenile[provinceId].push(f);
  }
  enforceProvincePoolCap(pools, provinceId);
}

// Fixes fighters whose hometown points to a settlement that's since been removed
// from SETTLEMENTS_SHORT (e.g. old Whitechapel data) — without this they'd be
// permanently unreachable in the walkable city list.
function repairOrphanedHometowns(pools){
  let changed = false;
  Object.entries(pools.juvenile || {}).forEach(([provinceId, list])=>{
    const valid = SETTLEMENTS_SHORT[provinceId] || [];
    list.forEach(f=>{
      if(valid.length && !valid.includes(f.hometown)){
        f.hometown = pick(valid);
        changed = true;
      }
    });
  });
  if(changed) saveFieldPools(pools);
}

// Self-heal for data corrupted by two now-fixed bugs interacting: (1) the pre-cap era
// where a Juvenile could rack up 300+ career fights before JUVENILE_CAREER_FIGHT_CAP
// existed, and (2) the age system going through several broken revisions (63-day-year
// migration, the Math.max(1,...) floor bug) where a fighter's APPARENT age at the time
// of a given growth tick could be wildly wrong — so stats grew toward whatever ceiling
// that wrong age implied, and never got reduced when age was later recomputed correctly.
// Both bugs only ever pushed numbers up and never got retroactively corrected, which is
// why "Aonghas Hamilton (366-53)" and "80-rated 13-year-olds" could still show up long
// after the underlying causes were fixed. This runs every catch-up, but it's a pure
// clamp/scale-down — once a fighter is within bounds it's a no-op, so it's safe to run
// unconditionally rather than gating it behind a version flag.
function healLegacyJuvenileBloat(pools, today){
  let changed = false;
  Object.values(pools.juvenile || {}).forEach(list=>{
    list.forEach(f=>{
      // Stats: an NPC's stats can never legitimately exceed their OWN current-age/tier
      // ceiling — applyNpcGrowthTick (the only thing that grows NPC-vs-NPC stats) always
      // respects that ceiling. Only the player's own fighter gets earned overgrowth past
      // it (growFighterStats, from a player bout). So any NPC stat above its current
      // ceiling is leftover inflation from a wrong historical age, not a real result.
      const ceiling = bandCeiling(f.age||11, f.talentTier||'normal');
      ['speed','quickness','toughness','power','agility'].forEach(k=>{
        if(f.stats && f.stats[k] > ceiling){ f.stats[k] = ceiling; changed = true; }
      });
      // Record: scale down proportionally to the lifetime cap, preserving win rate,
      // rather than just truncating losses or wins outright.
      const total = (f.record.wins||0) + (f.record.losses||0);
      if(total > JUVENILE_CAREER_FIGHT_CAP){
        const ratio = JUVENILE_CAREER_FIGHT_CAP / total;
        const newWins = Math.round((f.record.wins||0) * ratio);
        f.record.wins = newWins;
        f.record.losses = JUVENILE_CAREER_FIGHT_CAP - newWins;
        f.juvenileCareerFights = JUVENILE_CAREER_FIGHT_CAP;
        changed = true;
      }
    });
  });
  // Same two fixes for the player's own fighter(s), which share the exact same history.
  try{
    const roster = loadRoster();
    let rosterChanged = false;
    roster.forEach(f=>{
      if(!f.juvenileHomeProvinceId || !f.record) return;
      const total = (f.record.wins||0) + (f.record.losses||0);
      if(total > JUVENILE_CAREER_FIGHT_CAP){
        const ratio = JUVENILE_CAREER_FIGHT_CAP / total;
        const newWins = Math.round((f.record.wins||0) * ratio);
        f.record.wins = newWins;
        f.record.losses = JUVENILE_CAREER_FIGHT_CAP - newWins;
        f.juvenileCareerFights = JUVENILE_CAREER_FIGHT_CAP;
        rosterChanged = true;
      }
    });
    if(rosterChanged) saveRoster(roster);
  }catch(err){}
  return changed;
}

function syncJuvenilePoolAges(pools, today){
  if(!pools.juniorFA) pools.juniorFA = [];
  PROVINCES.forEach(p=>{
    const pool = pools.juvenile[p.id];
    if(!pool) return;
    pools.juvenile[p.id] = pool.filter(f=>{
      syncFighterAge(f, today);
      if(f.age < 18) return true;
      // Aged out of Juvenile. Junior eligibility doesn't end at 18 — Junior rosters
      // play through 19 (mandatory Pro declare hits at 20) — so anyone who never got
      // drafted still has real value to a team short on bodies. Land them in the
      // Junior free-agent pool instead of just deleting them.
      if(f.age < 20 && !f.juniorTeamId) pools.juniorFA.push(f);
      return false;
    });
  });
  // The FA pool ages out the same way — once someone crosses 20 with nobody having
  // signed them, their Junior window is closed for good.
  pools.juniorFA = pools.juniorFA.filter(f=>{ syncFighterAge(f, today); return f.age < 20 && !f.juniorTeamId; });
}

function catchUpJuvenileSimulation(){
  // Retroactively cleans up orphaned pre-save-system data for saves that already
  // existed before cleanupLegacyFlatKeys() was added to createNewSave() — otherwise
  // this quota-eating dead weight only ever gets cleared for BRAND NEW saves, leaving
  // anyone with an existing save stuck. Safe once a save is active: sk() always
  // resolves to the namespaced keys at that point, so the flat ones are guaranteed unused.
  if(getActiveSaveId()) cleanupLegacyFlatKeys();
  const pools = loadFieldPools();
  if(!pools.juvenile) pools.juvenile = {};
  PROVINCES.forEach(p=> seedJuvenilePoolInPlace(pools, p.id));
  // Self-heal an already-bloated save from before the population cap existed — this is
  // what fixes an existing QuotaExceededError-stuck save without the player having to
  // clear site data by hand.
  PROVINCES.forEach(p=> enforceProvincePoolCap(pools, p.id));
  pruneRoamStateProactively();
  repairOrphanedHometowns(pools);
  const today = getCurrentDay();
  syncJuvenilePoolAges(pools, today);
  healLegacyJuvenileBloat(pools, today);
  // A fighter locked out after a failed early-draft petition still ages toward natural
  // eligibility over real time, even though they can't fight to trigger normal age-up.
  try{
    const roster = loadRoster();
    let changed = false;
    roster.forEach(f=>{
      if(!f.juvenilePetitionStatus) return;
      const before = f.age;
      ageLockedJuvenileIfDue(f, today);
      if(f.age !== before) changed = true;
    });
    if(changed) saveRoster(roster);
  }catch(err){}
  const lastSim = pools.juvenileLastSimDay || 0;
  if(lastSim >= today){ saveFieldPoolsSafely(pools); return pools; }
  const MAX_CATCHUP_DAYS = 500;
  const startDay = Math.max(lastSim+1, today-MAX_CATCHUP_DAYS+1);
  for(let d=startDay; d<=today; d++){
    const weekday = weekdayNameForDay(d);
    if(weekday==='Wednesday'){
      runWednesdayEvents(pools, d);
    } else {
      PROVINCES.forEach(p=>{
        if(weekday==='Monday'){ runJuvenileLeagueNight(pools, p.id, d); runJuvenileIntake(pools, p.id, d); }
        else if(weekday==='Tuesday'){ runJuvenileTournamentDay(pools, p.id, d); }
      });
    }
  }
  pools.juvenileLastSimDay = today;
  saveFieldPoolsSafely(pools);
  return pools;
}

// Same earned-growth pattern as the rest of the game: win, finish, and beating someone
// tougher than you are the levers. Returns which stats actually changed for display.
// Applies a one-fight-only stat boost from the potion event, without permanently
// mutating the fighter's real stats.
function addTempBoost(stats, amount){
  const boosted = { ...stats };
  Object.keys(boosted).forEach(k=> boosted[k] += amount);
  return boosted;
}

// A Juvenile career has a real ceiling now — 9 fights/season × up to ~9 seasons before
// the Junior draft window closes was producing absurd totals (300+ fights for a fighter
// who ran every bracket every week). 75 lifetime fights is the hard cap; yearly caps on
// top of that stop a fighter from blowing through the whole budget in one hot month.
const JUVENILE_CAREER_FIGHT_CAP = 75;
const JUVENILE_INVITE_ENTRIES_PER_YEAR = 4;
const JUVENILE_TOURNAMENT_ENTRIES_PER_YEAR = 4; // Tuesday Local Tournament + Wednesday Fiesta combined
const JUVENILE_LEAGUE_ENTRIES_PER_YEAR = 10; // Monday League Night — roughly matches a player's own season length (9)
const DAYS_PER_JUVENILE_YEAR = 365; // a real calendar year — matches DAYS_PER_FIGHTER_YEAR, so entry-budget resets track the same year the fighter actually ages on

function juvenileFightsRemaining(f){
  const totalFights = Math.max(f.juvenileCareerFights || 0, f.record ? (f.record.wins||0)+(f.record.losses||0) : 0);
  return Math.max(0, JUVENILE_CAREER_FIGHT_CAP - totalFights);
}

// How aggressively a Juvenile NPC chases fights — mirrors fight_pit.html exactly.
function juvenilePaceMultiplier(f){
  const pct = growthOutlook(f).pctOfCeiling;
  if(pct >= 55) return 1.6;
  if(pct >= 35) return 1.0;
  return 0.55;
}

function ensureJuvenileYearWindow(f, today){
  if(!f.juvenileYearResetDay || today - f.juvenileYearResetDay >= DAYS_PER_JUVENILE_YEAR){
    f.juvenileYearResetDay = today;
    f.juvenileInviteEntriesThisYear = 0;
    f.juvenileTournamentEntriesThisYear = 0;
    f.juvenileLeagueEntriesThisYear = 0;
  }
}

// A fighter locked out after a failed/denied early-draft petition stays locked until
// they naturally reach 14 — age itself is now handled everywhere by syncFighterAge
// (birthday-based), so this just clears the lockout flag once that happens.
function ageLockedJuvenileIfDue(f, today){
  if(!f.juvenilePetitionStatus || f.juvenilePetitionStatus === 'approved-pending-draft') return;
  if(f.age >= 14) f.juvenilePetitionStatus = null;
}

function growFighterStats(f, playerWon, method, oppOVR, oppAge){
  const tier = f.talentTier || 'normal';
  const potentialFactor = clamp((f.potential || 50) / 99, 0, 1);
  const ownOVR = calcOVR(f.stats);
  const ownAge = f.age || 12;
  // Every 3 years older or ~12 OVR stronger counts as one "step," capped at 3 combined
  // — the bigger the gap, the bigger the developmental reward either way, win or lose.
  const ageGap = oppAge ? Math.max(0, oppAge - ownAge) : 0;
  const ovrGap = Math.max(0, oppOVR - ownOVR);
  const toughnessSteps = Math.min(3, Math.floor(ageGap/3) + Math.floor(ovrGap/12));
  let growthTicks = 0;
  if(playerWon){
    growthTicks += 1;
    if(method !== 'Decision') growthTicks += 1;
    if(oppOVR > ownOVR) growthTicks += 1;
    growthTicks += toughnessSteps;
  } else {
    const lossChance = 0.3 + toughnessSteps * 0.15;
    if(Math.random() < lossChance) growthTicks += 1 + Math.floor(toughnessSteps/2);
  }
  growthTicks = Math.round(growthTicks * (0.4 + potentialFactor * 0.9));
  const before = { ...f.stats };
  // A fighter isn't hard-walled at their assigned talent tier's ceiling anymore — earned
  // growth (specifically from beating fighters older or tougher — toughnessSteps) can
  // push them toward the NEXT tier's ceiling instead, just at much longer odds.
  const normalCeiling = bandCeiling(f.age||12, tier);
  const hardCeiling = bandCeiling(f.age||12, nextTalentTier(tier));
  const statKeys = ['speed','quickness','toughness','power','agility'];
  for(let i=0;i<growthTicks;i++){
    const key = pick(statKeys);
    const current = f.stats[key];
    const pastNormalCeiling = current >= normalCeiling;
    const effectiveCeiling = pastNormalCeiling ? hardCeiling : normalCeiling;
    if(pastNormalCeiling && toughnessSteps === 0) continue;
    if(current >= effectiveCeiling) continue;
    const room = 1 - (current/effectiveCeiling);
    let chance = 0.45 + room*0.4;
    if(pastNormalCeiling) chance *= (0.15 + toughnessSteps*0.15);
    if(Math.random() < chance) f.stats[key] = clamp(current+1, 1, effectiveCeiling);
  }
  const deltas = {};
  statKeys.forEach(k=>{ if(f.stats[k] !== before[k]) deltas[k] = f.stats[k]-before[k]; });
  return deltas;
}

};
const MATCHUP_SCALE = 5;
function matchupBonus(myDisc, oppDisc){ const row=MATCHUP[myDisc]; return row && row[oppDisc]!==undefined ? row[oppDisc]*MATCHUP_SCALE : 0; }
function winProbability(effA, effB){ return 1/(1+Math.pow(10, -(effA-effB)/12)); }
function weightedPick(weights){
  const r = Math.random(); let acc = 0;
  for(const [k,w] of Object.entries(weights)){ acc += w; if(r <= acc) return k; }
  return Object.keys(weights)[Object.keys(weights).length-1];
}

  '{W} lands the perfect shot and {L} hits the {floor}. It\'s over — KO!',

  '{L}\'s corner is waving it off. TKO, {W} wins.',

  '{L} taps immediately — it\'s over. Submission win for {W}.',

  'That\'s a blatant foul from {L}. Referee calls it — DQ, {W} takes it.',
];
const DECISION_LINES = [
  'After three rounds, it goes to the scorecards.',
  'Both fighters empty the tank — now it\'s in the judges\' hands.',
  'No finish tonight — the crowd waits on the decision.',
];
function fillTpl(text, map){ return text.replace(/{(\w+)}/g, (_,k)=> map[k]!==undefined ? map[k] : ''); }

function submissionWeight(fA, fB){
  const grapplers = [fA.primaryDisc, fB.primaryDisc].filter(d=>GRAPPLING_DISC.includes(d)).length;
  const mmaCount = [fA.primaryDisc, fB.primaryDisc].filter(d=>d==='mma').length;
  if(grapplers>=1) return 0.30 + grapplers*0.08;
  if(mmaCount>=1) return 0.15;
  return 0.03; // pure strikers — rare scrambles still happen
}
function computeFinishWeights(gap, fA, fB){
  let base;
  if(gap >= 20) base = { KO:0.38, TKO:0.34, Decision:0.26, DQ:0.02 };
  else if(gap >= 10) base = { KO:0.20, TKO:0.32, Decision:0.46, DQ:0.02 };
  else base = { KO:0.09, TKO:0.24, Decision:0.65, DQ:0.02 };
  const subW = submissionWeight(fA, fB);
  const strikeShare = base.KO + base.TKO;
  const takeFromStrikes = Math.min(strikeShare*0.65, subW);
  const scale = strikeShare>0 ? (strikeShare - takeFromStrikes) / strikeShare : 1;
  base.KO *= scale; base.TKO *= scale;
  base.Submission = takeFromStrikes;
  return base;
}

function simulateBout(fA, fB, ctx){
  const ovrA = calcOVR(fA.stats), ovrB = calcOVR(fB.stats);
  const mbA = matchupBonus(fA.primaryDisc, fB.primaryDisc);
  const mbB = matchupBonus(fB.primaryDisc, fA.primaryDisc);
  const homeBonusA = ctx && ctx.hometownPit ? 4 : 0;
  const effA = ovrA + mbA + homeBonusA;
  const effB = ovrB + mbB;
  const probA = winProbability(effA, effB);
  const winnerIsA = Math.random() < probA;
  const winner = winnerIsA ? fA : fB;
  const loser = winnerIsA ? fB : fA;
  const gap = Math.abs(effA - effB);

  const finishWeights = computeFinishWeights(gap, fA, fB);
  const method = weightedPick(finishWeights);
  const finishRound = method === 'Decision' ? 3 : parseInt(weightedPick({1:0.18, 2:0.34, 3:0.48}), 10);
  const floor = (ctx && ctx.arena && ctx.arena.floor) || 'sport court';
  const isGrappleFinish = method === 'Submission';
  const log = [];

  for(let r=1; r<=3; r++){
    log.push({ type:'round-header', round:r });
    const map = { A: fA.name, B: fB.name, floor,
      flavorA: pick(DISC_FLAVOR[fA.primaryDisc] || DISC_FLAVOR.mma),
      flavorB: pick(DISC_FLAVOR[fB.primaryDisc] || DISC_FLAVOR.mma) };
    log.push({ type:'line', text: fillTpl(pick(ROUND_OPENERS), map) });
    log.push({ type:'line', text: fillTpl(pick(ROUND_EXCHANGES), map) });

    if(method !== 'Decision' && r === finishRound){
      const wmap = { A: fA.name, B: fB.name, W: winner.name, L: loser.name, floor, sub: pick(SUBMISSION_TYPES) };
      if(isGrappleFinish){
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_GRAPPLE), wmap) });
        log.push({ type:'line', text: fillTpl(pick(CONTROL_LINES), wmap) });
        log.push({ type:'line', text: fillTpl(pick(SUB_LOCKED_LINES), wmap) });
        log.push({ type:'finish', text: fillTpl(pick(FINISH_SUBMISSION), wmap) });
      } else if(method === 'DQ'){
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_STRIKE), wmap) });
        log.push({ type:'finish', text: fillTpl(pick(FINISH_DQ), wmap) });
      } else {
        log.push({ type:'line', text: fillTpl(pick(BUILDUP_STRIKE), wmap) });
        log.push({ type:'line', text: fillTpl(pick(KNOCKDOWN_LINES), wmap) });
        log.push({ type:'line', text: fillTpl(pick(BARRAGE_LINES), wmap) });
        const lib = method === 'KO' ? FINISH_KO : FINISH_TKO;
        log.push({ type:'finish', text: fillTpl(pick(lib), wmap) });
      }
      break;
    } else {
      // Non-finish round — a chance of a dramatic scare that doesn't end the fight.
      if(Math.random() < 0.22){
        // Biased toward whoever actually wins the bout, not an independent re-roll of
        // probA — otherwise a close matchup could easily narrate 2-3 rounds of the
        // eventual LOSER scoring knockdowns before losing anyway, which reads as
        // "robbed" even though nothing in the sim actually contradicts itself. Still
        // lets the eventual loser get a real moment sometimes (20%) for drama — just
        // not as the coin-flip default.
        const scareWinnerIsA = Math.random() < (winnerIsA ? 0.8 : 0.2);
        const smap = { A: fA.name, B: fB.name, W: scareWinnerIsA?fA.name:fB.name, L: scareWinnerIsA?fB.name:fA.name, floor };
        log.push({ type:'line', text: fillTpl(pick(SCARE_KNOCKDOWN), smap) });
        log.push({ type:'line', text: fillTpl(pick(SCARE_RECOVERY), smap) });
      } else {
        // 50/50 neutral vs. giving one fighter the edge for the round — and when it does,
        // biased toward whoever actually wins, same reasoning as the scare above.
        if(Math.random() < 0.5){
          log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS_NEUTRAL), map) });
        } else {
          const edgeIsA = Math.random() < (winnerIsA ? 0.8 : 0.2);
          const edgeMap = Object.assign({}, map, { EDGE: edgeIsA ? fA.name : fB.name });
          log.push({ type:'line', text: fillTpl(pick(ROUND_CLOSERS_EDGE), edgeMap) });
        }
      }
    }
  }
  if(method === 'Decision'){
    log.push({ type:'decision', text: pick(DECISION_LINES) });
    log.push({ type:'decision', text: `Judges score it for ${winner.name}.` });
  }
  return { winner, loser, method, finishRound, ovrA, ovrB, effA, effB, probA, log };
}
